        <div class="perf-attention-title">Needs Attention</div>
        <div class="perf-attention-item" style="opacity:.45;font-style:italic">
            No flags for this period.
        </div>

function buildPerfPipelineHealthBand() {
    const p = PERF.open_pipeline;
    if (!p || p.deal_count === 0) return '';

    const filtered = _perfIsRepFiltered();
    let openValue, openDeals;
    if (filtered) {
        const matchedReps = (p.by_rep || []).filter(r => _perfRepIncluded(r.email));
        openValue = matchedReps.reduce((s, r) => s + (r.value || 0), 0);
        openDeals = matchedReps.reduce((s, r) => s + (r.count || 0), 0);
    } else {
        openValue = p.total_value;
        openDeals = p.deal_count;
    }

    const stalledAll    = p.stalled_deals || [];
    const stalledScoped = filtered
        ? stalledAll.filter(d => _perfRepIncluded(d.rep_email))
        : stalledAll;
    const stalledCount = stalledScoped.length;
    const stalledValue = stalledScoped.reduce((s, d) => s + (d.amount || 0), 0);

    const asOf = p.as_of
        ? new Date(p.as_of).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})
        : '';

    // Stage concentration bar: top 3 stages by deal count
    const allStages = (p.by_pipeline || []).flatMap(pp => pp.by_stage || []);
    const top3 = [...allStages].sort((a,b) => b.count - a.count).slice(0, 3);
    const maxCount = top3[0]?.count || 1;
    const colors = ['#4a6cf7','#34d399','#fbbf24'];
    const concentrationBar = top3.length > 0
        ? `<div class="ov-conc-bar" role="img" aria-label="Top 3 stages by deal count">
            ${top3.map((s, i) => {
                const flex = Math.max((s.count / maxCount) * 100, 8);
                return `<div class="ov-conc-seg" style="flex:${flex.toFixed(0)};background:${colors[i]}"
                    title="${_perfEsc(s.label)}: ${s.count} deals">${_perfEsc(s.label)}</div>`;
            }).join('')}
          </div>`
        : '';

    // Bottleneck: worst stalled stage by count
    let bottleneck = '';
    if (stalledCount > 0) {
        const byStage = {};
        stalledScoped.forEach(d => {
            if (!byStage[d.stage_label]) byStage[d.stage_label] = { count: 0, days: [] };
            byStage[d.stage_label].count++;
            byStage[d.stage_label].days.push(d.days_in_stage || 0);
        });
        const [worstLabel, worstData] = Object.entries(byStage)
            .sort((a,b) => b[1].count - a[1].count)[0];
        const avgDays = Math.round(
            worstData.days.reduce((s,d) => s+d, 0) / worstData.days.length
        );
        bottleneck = `<div class="ov-bottleneck">
            <span class="ov-bottleneck-icon" aria-hidden="true">\u26A0</span>
            <span class="ov-bottleneck-stage">${_perfEsc(worstLabel)}</span>
            <span class="ov-bottleneck-detail">${worstData.count} stalled · avg ${avgDays}d</span>
        </div>`;
    }

    return `<div class="ov-health-band perf-focus-visible"
        onclick="_perfSwitchView('pipeline')"
        role="button" tabindex="0"
        onkeydown="if(event.key==='Enter')_perfSwitchView('pipeline')"
        aria-label="Pipeline health. Click to view Pipeline tab">
        <div class="ov-health-header">
            <span class="ov-health-title">Pipeline Health</span>
            <span class="ov-health-scope">as of ${asOf} · snapshot</span>
            <span class="ov-health-link" aria-hidden="true">View \u2192</span>
        </div>
        <div class="ov-health-stats">
            <div class="ov-health-stat">
                <div class="ov-health-stat-label">Open Value</div>
                <div class="ov-health-stat-val">${_perfFmt(openValue, 'dollar')}</div>
            </div>
            <div class="ov-health-stat">
                <div class="ov-health-stat-label">Open Deals</div>
                <div class="ov-health-stat-val">${openDeals}</div>
            </div>
            <div class="ov-health-stat${stalledCount > 0 ? ' ov-health-stat--warn' : ''}">
                <div class="ov-health-stat-label">Stalled</div>
                <div class="ov-health-stat-val">${stalledCount}</div>
            </div>
            <div class="ov-health-stat">
                <div class="ov-health-stat-label">At Risk</div>
                <div class="ov-health-stat-val">${stalledValue > 0 ? _perfFmt(stalledValue, 'dollar') : '$\u2014'}</div>
            </div>
        </div>
        ${concentrationBar}
        ${bottleneck}
    </div>`;
}

function buildPerfOverviewStageBreakdown() {
    const p = PERF.open_pipeline;
    if (!p || !p.by_pipeline || p.deal_count === 0) return '';

    const merged = {};
    const order = [];

    if (_perfIsRepFiltered()) {
        // Build stage counts from selected reps' open_deals
        for (const [, detail] of _perfGetDetailEntries()) {
            for (const deal of (detail.open_deals || [])) {
                const sid = deal.stage_id;
                if (!merged[sid]) {
                    merged[sid] = { label: deal.stage_label, count: 0, value: 0 };
                    order.push(sid);
                }
                merged[sid].count++;
                merged[sid].value += deal.amount || 0;
            }
        }
    } else {
        // Team-wide: merge stages across all pipelines
        for (const pp of p.by_pipeline) {
            for (const s of (pp.by_stage || [])) {
                if (!merged[s.stage_id]) {
                    merged[s.stage_id] = { label: s.label, count: 0, value: 0 };
                    order.push(s.stage_id);
                }
                merged[s.stage_id].count += s.count;
                merged[s.stage_id].value += (s.value || 0);
            }
        }
    }

    const stages = order.map(id => merged[id]).filter(s => s.count > 0);
    if (stages.length === 0) return '';

    const maxCount = Math.max(...stages.map(s => s.count), 1);

    const rows = stages.map(s => {
        const pct = (s.count / maxCount) * 100;
        const valStr = s.value > 0 ? ` &middot; ${_perfFmt(s.value, 'dollar')}` : '';
        return `<div class="perf-stage-row">
            <div class="perf-stage-label">${_perfEsc(s.label)}</div>
            <div class="perf-stage-bar-wrap">
                <div class="perf-stage-bar" style="width:${pct.toFixed(1)}%"></div>
            </div>
            <div class="perf-stage-count">${s.count}${valStr}</div>
        </div>`;
    }).join('');

    return `<div class="perf-stage-breakdown">
        <div class="perf-stage-breakdown-title">Deals by Stage</div>
        ${rows}
    </div>`;
}

function buildPerfActivityTrend() {
    const byDay = _perfGetByDay();
    if (byDay.length < 4) return '';

    const useDays = ['7d','30d','this_month','last_month'].includes(_perfActivePeriod);
    let points;

    if (useDays) {
        const now = new Date();
        let rangeStart, rangeEnd = now;
        if (_perfActivePeriod === '7d') {
            rangeStart = new Date(now); rangeStart.setDate(rangeStart.getDate() - 6);
        } else if (_perfActivePeriod === '30d') {
            rangeStart = new Date(now); rangeStart.setDate(rangeStart.getDate() - 29);
        } else if (_perfActivePeriod === 'this_month') {
            rangeStart = new Date(now.getFullYear(), now.getMonth(), 1);
        } else if (_perfActivePeriod === 'last_month') {
            rangeStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
            rangeEnd = new Date(now.getFullYear(), now.getMonth(), 0);
        }
        points = byDay
            .filter(d => { const dt = new Date(d.date); return dt >= rangeStart && dt <= rangeEnd; })
            .map(d => ({
                label:         new Date(d.date).toLocaleDateString('en-US', {month:'short', day:'numeric'}),
                meetings:      d.meetings       || 0,
                deals_created: d.deals_created  || 0,
                emails:        d.emails_sent    || 0,
                calls:         d.recorded_calls || 0,
            }));
    } else {
        // 90d: weekly buckets
        const now = new Date();
        const rangeStart = new Date(now); rangeStart.setDate(rangeStart.getDate() - 89);
        const filtered = byDay.filter(d => new Date(d.date) >= rangeStart);
        points = [];
        for (let i = 0; i < filtered.length; i += 7) {
            const chunk = filtered.slice(i, i + 7);
            points.push({
                label:         new Date(chunk[0].date).toLocaleDateString('en-US', {month:'short', day:'numeric'}),
                meetings:      chunk.reduce((s,d) => s + (d.meetings       || 0), 0),
                deals_created: chunk.reduce((s,d) => s + (d.deals_created  || 0), 0),
                emails:        chunk.reduce((s,d) => s + (d.emails_sent    || 0), 0),
                calls:         chunk.reduce((s,d) => s + (d.recorded_calls || 0), 0),
            });
        }
    }
    if (points.length < 2) return '';

    window._perfTrendPoints = points;
    const gran = useDays ? 'Daily' : 'Weekly';
    const scopeNote = `${gran} · ${_perfPeriodLabel(_perfActivePeriod)} · Deals Won not available in daily data`;

    const series = [
        { key: 'meetings',      label: 'Meetings',       color: '#fbbf24' },
        { key: 'deals_created', label: 'Deals Created',  color: '#a78bfa' },
        { key: 'emails',        label: 'Emails Sent',    color: '#4a6cf7' },
        { key: 'calls',         label: 'Recorded Calls', color: '#34d399' },
    ];

    const toggles = series.map(s => `
        <label class="perf-chart-toggle-label${_perfTrendShow[s.key] ? ' active' : ''}"
            id="perf-trend-lbl-${s.key}">
            <input type="checkbox" id="perf-trend-${s.key}"
                ${_perfTrendShow[s.key] ? 'checked' : ''}
                onchange="_perfTrendToggle('${s.key}', this.checked)"
                aria-label="${_perfTrendShow[s.key] ? 'Hide' : 'Show'} ${s.label}">
            <span class="perf-chart-toggle-swatch" style="background:${s.color}"></span>
            ${s.label}
        </label>`).join('');

    return `<div class="perf-trend-chart perf-trend-chart-v2" style="margin-bottom:1.5rem">
        <div class="perf-chart-header">
            <div class="perf-chart-toggles">${toggles}</div>
            <span class="perf-chart-granularity">${gran}</span>
        </div>
        <p class="ov-trend-scope">${scopeNote}</p>
        <div class="perf-chart-svg-wrap" id="perf-trend-svg-wrap"></div>
    </div>`;
}

function _perfTrendToggle(series, checked) {
    const visibleCount = Object.values(_perfTrendShow).filter(Boolean).length;
    if (!checked && visibleCount <= 1) {
        document.getElementById(`perf-trend-${series}`).checked = true;
        return;
    }
    _perfTrendShow[series] = checked;
    const lbl = document.getElementById(`perf-trend-lbl-${series}`);
    if (lbl) lbl.classList.toggle('active', checked);
    _perfDrawTrend();
}

function _perfDrawTrend() {
    const wrap = document.getElementById('perf-trend-svg-wrap');
    if (!wrap) return;
    const points = window._perfTrendPoints;
    if (!points || points.length < 2) return;

    const allSeries = [
        { key: 'meetings',      color: '#fbbf24', dash: ''    },
        { key: 'deals_created', color: '#a78bfa', dash: '5 3' },
        { key: 'emails',        color: '#4a6cf7', dash: ''    },
        { key: 'calls',         color: '#34d399', dash: '5 3' },
    ];
    const visible = allSeries.filter(s => _perfTrendShow[s.key]);
    if (visible.length === 0) return;

    const W = 560, H = 160, PT = 12, PB = 28;
    const PL = 40, PR = visible.length > 1 ? 40 : 10;
    const plotW = W - PL - PR;
    const plotH = H - PT - PB;
    const n = points.length;
    const xOf = i => PL + i * (plotW / Math.max(n - 1, 1));

    const niceMax = v => {
        if (v <= 5)   return Math.ceil(v);
        if (v <= 10)  return Math.ceil(v);
        if (v <= 50)  return Math.ceil(v / 5) * 5;
        if (v <= 200) return Math.ceil(v / 10) * 10;
        if (v <= 500) return Math.ceil(v / 50) * 50;
        return Math.ceil(v / 100) * 100;
    };

    const maxes = {};
    visible.forEach(s => {
        maxes[s.key] = niceMax(Math.max(...points.map(p => p[s.key] || 0), 1));
    });
    const yOf = (key, v) => PT + plotH - (v / maxes[key]) * plotH;

    let svg = `<svg width="100%" viewBox="0 0 ${W} ${H}"
        style="display:block;overflow:visible"
        role="img" aria-label="Activity trend chart">`;

    // Grid lines
    [0, 0.5, 1].forEach(t => {
        svg += `<line x1="${PL}" y1="${(PT + plotH - t * plotH).toFixed(1)}"
            x2="${W - PR}" y2="${(PT + plotH - t * plotH).toFixed(1)}"
            stroke="#1c1f2e" stroke-width="1"/>`;
    });

    // Left y-axis labels (first visible series)
    [0, 0.5, 1].forEach(t => {
        svg += `<text x="${PL - 5}" y="${(PT + plotH - t * plotH + 4).toFixed(1)}"
            fill="${visible[0].color}" font-size="9" text-anchor="end" opacity="0.7">
            ${Math.round(t * maxes[visible[0].key])}</text>`;
    });

    // Right y-axis labels (second visible series only)
    if (visible[1]) {
        [0, 0.5, 1].forEach(t => {
            svg += `<text x="${W - PR + 5}" y="${(PT + plotH - t * plotH + 4).toFixed(1)}"
                fill="${visible[1].color}" font-size="9" text-anchor="start" opacity="0.7">
                ${Math.round(t * maxes[visible[1].key])}</text>`;
        });
    }

    // X-axis labels
    const labelEvery = Math.ceil(n / 7);
    for (let i = 0; i < n; i += labelEvery) {
        svg += `<text x="${xOf(i).toFixed(1)}" y="${H - 6}"
            fill="#3a3e52" font-size="9" text-anchor="middle">${points[i].label}</text>`;
    }

    // Series: area fill + line + dots
    visible.forEach(s => {
        const linePts = points.map((p, i) =>
            `${xOf(i).toFixed(1)},${yOf(s.key, p[s.key] || 0).toFixed(1)}`);
        const areaPts = [
            `${xOf(0).toFixed(1)},${(H - PB).toFixed(1)}`,
            ...linePts,
            `${xOf(n-1).toFixed(1)},${(H - PB).toFixed(1)}`
        ];
        svg += `<polygon points="${areaPts.join(' ')}" fill="${s.color}" opacity="0.06"/>`;
        svg += `<polyline points="${linePts.join(' ')}" fill="none" stroke="${s.color}"
            stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
            ${s.dash ? `stroke-dasharray="${s.dash}"` : ''}/>`;
        for (let i = 0; i < n; i++) {
            svg += `<circle cx="${xOf(i).toFixed(1)}"
                cy="${yOf(s.key, points[i][s.key] || 0).toFixed(1)}"
                r="2.5" fill="${s.color}" class="perf-trend-dot" data-idx="${i}"/>`;
        }
    });

    // Hover guideline (hidden by default)
    svg += `<line id="perf-trend-guide" x1="0" y1="${PT}" x2="0" y2="${H - PB}"
        stroke="#5a5e72" stroke-width="1" stroke-dasharray="3 2" visibility="hidden"/>`;

    // Highlight dots (hidden by default)
    visible.forEach((s, si) => {
        svg += `<circle id="perf-trend-hl-${si}" cx="0" cy="0" r="4"
            fill="${s.color}" stroke="#0e1117" stroke-width="1.5" visibility="hidden"/>`;
    });

    // Invisible hover columns for mouse tracking
    const colW = plotW / Math.max(n - 1, 1);
    for (let i = 0; i < n; i++) {
        const rx = xOf(i) - colW / 2;
        svg += `<rect x="${rx.toFixed(1)}" y="${PT}" width="${colW.toFixed(1)}" height="${plotH}"
            fill="transparent" data-idx="${i}" class="perf-trend-hover-col"/>`;
    }

    svg += '</svg>';

    // Tooltip div
    svg += `<div id="perf-trend-tooltip" class="perf-trend-tooltip" style="display:none"></div>`;

    wrap.innerHTML = svg;

    // Attach hover handlers
    const svgEl = wrap.querySelector('svg');
    const tooltip = document.getElementById('perf-trend-tooltip');
    const guide = document.getElementById('perf-trend-guide');
    const seriesLabels = { meetings: 'Meetings', deals_created: 'Deals Created', emails: 'Emails Sent', calls: 'Recorded Calls' };

    wrap.addEventListener('mousemove', e => {
        const rect = svgEl.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) / rect.width * W;
        // Find closest point index
        let closest = 0, closestDist = Infinity;
        for (let i = 0; i < n; i++) {
            const dist = Math.abs(xOf(i) - svgX);
            if (dist < closestDist) { closestDist = dist; closest = i; }
        }
        const pt = points[closest];
        // Update guideline
        const gx = xOf(closest).toFixed(1);
        guide.setAttribute('x1', gx);
        guide.setAttribute('x2', gx);
        guide.setAttribute('visibility', 'visible');
        // Update highlight dots
        visible.forEach((s, si) => {
            const hl = document.getElementById(`perf-trend-hl-${si}`);
            if (hl) {
                hl.setAttribute('cx', gx);
                hl.setAttribute('cy', yOf(s.key, pt[s.key] || 0).toFixed(1));
                hl.setAttribute('visibility', 'visible');
            }
        });
        // Build tooltip
        let tip = `<div class="perf-trend-tooltip-date">${pt.label}</div>`;
        visible.forEach(s => {
            tip += `<div class="perf-trend-tooltip-row">
                <span class="perf-trend-tooltip-swatch" style="background:${s.color}"></span>
                <span>${seriesLabels[s.key]}:</span> <strong>${pt[s.key] || 0}</strong>
            </div>`;
        });
        tooltip.innerHTML = tip;
        tooltip.style.display = 'block';
        // Position tooltip
        const wrapRect = wrap.getBoundingClientRect();
        const tipX = (e.clientX - wrapRect.left) + 12;
        const tipY = (e.clientY - wrapRect.top) - 10;
        const maxLeft = wrapRect.width - tooltip.offsetWidth - 8;
        tooltip.style.left = Math.min(tipX, maxLeft) + 'px';
        tooltip.style.top = tipY + 'px';
    });

    wrap.addEventListener('mouseleave', () => {
        guide.setAttribute('visibility', 'hidden');
        visible.forEach((s, si) => {
            const hl = document.getElementById(`perf-trend-hl-${si}`);
            if (hl) hl.setAttribute('visibility', 'hidden');
        });
        tooltip.style.display = 'none';
    });
}

function buildPerfNeedsAttention(slice) {
    const team   = slice.team    || {};
    const byRep  = slice.by_rep  || [];
    const honesty = PERF.honesty || {};
    const p = PERF.open_pipeline || {};

    const issues = [];
    const add = (type, text) => issues.push({ type, text });

    // Multi-rep flags (suppressed when exactly one rep is selected)
    if (!_perfActiveRep) {  // show when multiple reps selected
        const zeroEmail = byRep.filter(r => r.email !== 'unassigned' && (r.emails_sent || 0) === 0).length;
        if (zeroEmail > 0)
            add('warn', `${zeroEmail} rep${zeroEmail > 1 ? 's have' : ' has'} sent 0 emails this period`);

        const zeroCalls = byRep.filter(r => r.email !== 'unassigned' && (r.recorded_calls || 0) === 0).length;
        if (zeroCalls > 0)
            add('warn', `${zeroCalls} rep${zeroCalls > 1 ? 's have' : ' has'} 0 recorded calls this period`);
    }

    // Reply rate significant drop (>20% relative decline)
    if (team.reply_rate_prior > 0 && team.reply_rate < team.reply_rate_prior * 0.80) {
        const drop = Math.round((team.reply_rate_prior - team.reply_rate) / team.reply_rate_prior * 100);
        add('warn', `Reply rate dropped ${drop}% vs prior period (${_perfFmt(team.reply_rate,'pct')} from ${_perfFmt(team.reply_rate_prior,'pct')})`);
    }

    // Deals won materially up
    if (team.deals_won_prior > 0 && team.deals_won > team.deals_won_prior * 1.20) {
        const up = Math.round((team.deals_won - team.deals_won_prior) / team.deals_won_prior * 100);
        add('good', `Deals won up ${up}% vs prior (${team.deals_won} vs ${team.deals_won_prior})`);
    }
    // Deals won materially down
    else if (team.deals_won_prior > 0 && team.deals_won < team.deals_won_prior * 0.80) {
        const drop = Math.round((team.deals_won_prior - team.deals_won) / team.deals_won_prior * 100);
        add('warn', `Deals won down ${drop}% vs prior (${team.deals_won} vs ${team.deals_won_prior})`);
    }

    // Meetings booked down >20%
    if (team.meetings_booked_prior > 0 && team.meetings_booked < team.meetings_booked_prior * 0.80) {
        const drop = Math.round((team.meetings_booked_prior - team.meetings_booked) / team.meetings_booked_prior * 100);
        add('warn', `Meetings booked down ${drop}% vs prior period`);
    }

    // High stalled pipeline fraction (>30% of open deals stalled)
    const stalledPct = p.deal_count > 0 ? (p.stalled_deal_count || 0) / p.deal_count : 0;
    if (stalledPct > 0.30) {
        add('warn', `${Math.round(stalledPct * 100)}% of open pipeline is stalled (${p.stalled_deal_count} deals)`);
    }

    // Low reply rate absolute threshold
    if (team.emails_sent > 0 && team.reply_rate < 0.05)
        add('warn', 'Reply rate is below 5%');

    // Low transcript coverage
    if (team.recorded_calls > 0 && team.transcript_coverage < 0.5)
        add('warn', 'Transcript coverage is below 50%');

    // Mixmax data cap
    if (honesty.mixmax_truncated)
        add('warn', 'Mixmax data was capped at 5,000 records. Counts may be understated.');

    // High unassigned activity
    const totalActivity = (team.emails_sent || 0) + (team.recorded_calls || 0) + (team.meetings_booked || 0);
    if (totalActivity > 0 && honesty.unassigned_rep_count > totalActivity * 0.1)
        add('warn', `${honesty.unassigned_rep_count} activities could not be attributed to a known rep`);

    // Attainment flags (this_month only)
    if (_perfActivePeriod === 'this_month') {
        const today = new Date();
        const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
        const monthPct = today.getDate() / daysInMonth;
        if (monthPct > 0.5) {
            byRep
                .filter(r => r.attainment_pct != null && r.attainment_pct < 0.70 && r.email !== 'unassigned')
                .forEach(r => add('warn',
                    `${r.name || r.email} is at ${Math.round(r.attainment_pct*100)}% attainment (${Math.round(monthPct*100)}% of month elapsed)`
                ));
        }
    }

    if (issues.length === 0) return '';

    let html = '<div class="perf-attention"><div class="perf-attention-title">Needs Attention</div>';
    issues.forEach(item => {
        const isGood = item.type === 'good';
        html += `<div class="perf-attention-item${isGood ? ' perf-attention-item--good' : ''}">
            ${isGood ? '\u2191' : '\u26A0\uFE0F'} ${item.text}
        </div>`;
    });
    html += '</div>';
    return html;
}

// ── Pipeline View ──

function _perfToggleStagePopover(stageId) {
    if (_perfActiveStagePopover === stageId) {
        _perfCloseStagePopover();
    } else {
        _perfActiveStagePopover = stageId;
        buildPerformance();
        const pop = document.getElementById(`perf-pop-${stageId}`);
        if (pop) pop.querySelector('.perf-pop-close')?.focus();
    }
}

function _perfCloseStagePopover() {
    if (!_perfActiveStagePopover) return;
    const prevId = _perfActiveStagePopover;
    _perfActiveStagePopover = null;
    buildPerformance();
    document.getElementById(`perf-seg-${prevId}`)?.focus();
}

function _perfBuildStagePopover(stage, pipelineLabel) {
    const popId = `perf-pop-${stage.stage_id}`;
    const isOpen = _perfActiveStagePopover === stage.stage_id;

    const stageDeals = [];
    const detailEntries = _perfGetDetailEntries();
    for (const [repEmail, detail] of detailEntries) {
        for (const deal of (detail.open_deals || [])) {
            if (deal.stage_id === stage.stage_id) {
                const repName = (PERF.open_pipeline.by_rep || []).find(r => r.email === repEmail)?.name
                    || repEmail;
                stageDeals.push({ ...deal, rep_name: repName });
            }
        }
    }
    stageDeals.sort((a, b) => {
        if (a.stalled !== b.stalled) return b.stalled ? 1 : -1;
        return (b.days_in_stage || 0) - (a.days_in_stage || 0);
    });

    const avgDays = (PERF.open_pipeline.avg_days_by_stage || {})[stage.stage_id];
    const threshold = (PERF.stage_thresholds || {})[stage.stage_id] || 14;

    const dealRows = stageDeals.slice(0, 10).map(d => {
        const stalledMark = d.stalled ? '<span class="perf-pop-stalled-flag">\u26A0</span>' : '';
        const ageCls = d.stalled ? 'perf-pop-age-over' : '';
        return `<tr>
            <td>${_perfEsc(d.name)}</td>
            <td>${_perfEsc(d.rep_name)}</td>
            <td class="perf-pop-num ${ageCls}">${d.days_in_stage != null ? d.days_in_stage + 'd' : '\u2014'}${stalledMark}</td>
            <td class="perf-pop-num">${d.amount ? _perfFmt(d.amount, 'dollar') : '$\u2014'}</td>
        </tr>`;
    }).join('');
    const more = stageDeals.length > 10
        ? `<p class="perf-pop-more">+${stageDeals.length - 10} more deals not shown</p>` : '';
    const noDeals = stageDeals.length === 0
        ? `<p class="perf-pop-empty">Deal list not available. Run fetch_performance.py to populate by_rep_detail.</p>` : '';

    const avgBarFill = avgDays != null ? Math.min(avgDays / threshold, 1.5) / 1.5 * 100 : 0;
    const avgBarColor = avgDays > threshold ? '#f0c040' : '#4a6cf7';
    const avgDaysHtml = avgDays != null ? `
        <div class="perf-pop-stat-row">
            <span class="perf-pop-stat-label">Avg days in stage</span>
            <span class="perf-pop-stat-val ${avgDays > threshold ? 'perf-pop-over' : ''}">${avgDays.toFixed(1)}d / ${threshold}d max</span>
        </div>
        <div class="perf-pop-bar-track">
            <div class="perf-pop-bar-fill" style="width:${avgBarFill.toFixed(1)}%;background:${avgBarColor}"></div>
            <div class="perf-pop-bar-threshold"></div>
        </div>` : '';

    return `<div
        id="${popId}"
        class="perf-stage-popover${isOpen ? ' open' : ''}"
        role="dialog"
        aria-labelledby="${popId}-title"
        aria-modal="false"
        ${isOpen ? '' : 'hidden'}>
        <div class="perf-pop-header">
            <span id="${popId}-title" class="perf-pop-title">${_perfEsc(stage.label)}</span>
            <span class="perf-pop-subtitle">${_perfEsc(pipelineLabel)}</span>
            <button class="perf-pop-close" onclick="_perfCloseStagePopover()" aria-label="Close">\u2715</button>
        </div>
        <div class="perf-pop-stats">
            <div class="perf-pop-stat-row">
                <span class="perf-pop-stat-label">Open deals</span>
                <span class="perf-pop-stat-val">${stageDeals.length}</span>
            </div>
            <div class="perf-pop-stat-row">
                <span class="perf-pop-stat-label">Total value</span>
                <span class="perf-pop-stat-val">${_perfFmt(stageDeals.reduce((s, d) => s + (d.amount || 0), 0), 'dollar')}</span>
            </div>
            ${stageDeals.filter(d => d.stalled).length > 0 ? `
            <div class="perf-pop-stat-row">
                <span class="perf-pop-stat-label">Stalled</span>
                <span class="perf-pop-stat-val perf-pop-over">${stageDeals.filter(d => d.stalled).length} deal${stageDeals.filter(d => d.stalled).length > 1 ? 's' : ''} \u26A0</span>
            </div>` : ''}
            ${avgDaysHtml}
        </div>
        ${stageDeals.length > 0 ? `
        <table class="perf-pop-table">
            <thead><tr>
                <th>Deal</th><th>Rep</th><th class="perf-pop-num">Age</th><th class="perf-pop-num">Value</th>
            </tr></thead>
            <tbody>${dealRows}</tbody>
        </table>${more}` : noDeals}
        <p class="perf-pop-footnote">Stock data. Deals currently in this stage as of today.</p>
    </div>`;
}

function buildPerfOpenPipelineSection() {
    const p = PERF.open_pipeline;
    if (!p || p.deal_count === 0) return '';

    const colors = ['#4a6cf7','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8','#fb923c','#e879f9'];
    const asOf = p.as_of ? new Date(p.as_of).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '';

    const filtered = _perfIsRepFiltered();

    // Build per-stage map from by_rep_detail when reps are filtered
    const repStageMap = filtered ? _perfBuildRepStageMap() : {};

    let html = '<div class="perf-section">';
    html += _perfSectionHdr('Open Pipeline', 'HubSpot');
    html += `<div class="perf-card-sub" style="margin-bottom:0.75rem">As of ${asOf}. Not affected by period selector.</div>`;

    let pipeValue, pipeCount;
    if (filtered) {
        const matchedReps = (p.by_rep || []).filter(r => _perfRepIncluded(r.email));
        pipeValue = matchedReps.reduce((s, r) => s + (r.value || 0), 0);
        pipeCount = matchedReps.reduce((s, r) => s + (r.count || 0), 0);
    } else {
        pipeValue = p.total_value;
        pipeCount = p.deal_count;
    }

    html += '<div class="perf-cards" style="margin-bottom:1.25rem">';
    html += _perfCard('Total Value', pipeValue, 'dollar');
    html += _perfCard('Open Deals', pipeCount, 'num');

    let stalledCount, stalledValue;
    if (filtered) {
        const stalledForContext = (p.stalled_deals || []).filter(d => _perfRepIncluded(d.rep_email));
        stalledCount = stalledForContext.length;
        stalledValue = stalledForContext.reduce((s, d) => s + (d.amount || 0), 0);
    } else {
        stalledCount = p.stalled_deal_count || 0;
        stalledValue = p.stalled_deal_value || 0;
    }
    if (stalledCount > 0) {
        html += `<div class="perf-card" style="border-color:#3d3520">
            <div class="perf-card-label" style="color:#f0c040">STALLED DEALS</div>
            <div class="perf-card-value" style="color:#f0c040">${stalledCount}</div>
            <div class="perf-card-sub"><a href="#perf-risk-explorer" style="color:#f0c040;text-decoration:underline">${_perfFmt(stalledValue, 'dollar')} at risk</a></div>
        </div>`;
    }
    html += '</div>';

    // Per-pipeline funnels
    (p.by_pipeline || []).forEach((pp, pi) => {
        html += '<div class="perf-funnel">';
        // When rep is filtered, sum from repStageMap for this pipeline's stages
        let funnelTotal, funnelCount;
        if (filtered) {
            funnelTotal = 0; funnelCount = 0;
            for (const s of (pp.by_stage || [])) {
                const rm = repStageMap[s.stage_id];
                if (rm) { funnelTotal += rm.value; funnelCount += rm.count; }
            }
        } else {
            funnelTotal = pp.total_value; funnelCount = pp.deal_count;
        }
        html += `<div class="perf-funnel-title">${pp.pipeline_label}<span class="perf-funnel-total">${_perfFmt(funnelTotal, 'dollar')} &middot; ${funnelCount} deals</span></div>`;

        if (pp.by_stage && pp.by_stage.length > 0) {
            const stageData = pp.by_stage.map(s => ({
                ...s,
                displayCount: filtered ? (repStageMap[s.stage_id]?.count || 0) : s.count,
                displayValue: filtered ? (repStageMap[s.stage_id]?.value || 0) : s.value,
            }));
            const visibleStages = filtered ? stageData.filter(s => s.displayCount > 0) : stageData;
            const maxCount = Math.max(...visibleStages.map(s => s.displayCount), 1);

            if (visibleStages.length > 0) {
                html += '<div class="perf-pipeline-bar-wrap">';
                visibleStages.forEach((s, i) => {
                    const flex = Math.max((s.displayCount / maxCount) * 100, 8);
                    const color = colors[(pi * 4 + i) % colors.length];
                    // Use rep-specific stalled count when a rep is selected
                    const repStalledCount = filtered
                        ? (repStageMap[s.stage_id]?.stalled_count || 0)
                        : (s.stalled_count || 0);
                    const stalledFlag = repStalledCount > 0
                        ? ` <span class="perf-seg-stalled-dot" aria-label="${repStalledCount} stalled"></span>`
                        : '';
                    const popId = `perf-pop-${s.stage_id}`;
                    html += `<div class="perf-pipeline-seg perf-seg-clickable"
                        role="button"
                        tabindex="0"
                        aria-haspopup="dialog"
                        aria-expanded="${_perfActiveStagePopover === s.stage_id}"
                        aria-controls="${popId}"
                        aria-label="${_perfEsc(s.label)}"
                        title="${_perfEsc(s.label)}: ${s.displayCount} deals, ${_perfFmt(s.displayValue, 'dollar')}"
                        style="flex:${flex.toFixed(0)};background:${color}"
                        onclick="_perfToggleStagePopover('${s.stage_id}')"
                        onkeydown="if(event.key==='Enter'||event.key===' ')_perfToggleStagePopover('${s.stage_id}')"
                        id="perf-seg-${s.stage_id}">
                        <span class="perf-pipeline-seg-label">${_perfEsc(_perfStageChipLabel(s.label))}</span>${stalledFlag}
                    </div>`;
                });
                html += '</div>';
                // Stage popovers
                visibleStages.forEach(s => {
                    html += _perfBuildStagePopover(s, pp.pipeline_label);
                });

                // Stage table
                html += '<table class="perf-table"><thead><tr><th>Stage</th><th class="num">Deals</th><th class="num">Value</th></tr></thead><tbody>';
                visibleStages.forEach(s => {
                    html += `<tr><td>${s.label}</td><td class="num">${s.displayCount}</td><td class="num">${_perfFmt(s.displayValue, 'dollar')}</td></tr>`;
                });
                html += '</tbody></table>';
            }
        }
        html += '</div>';
    });

    // By rep
    if (p.by_rep && p.by_rep.length > 0) {
        const repRowsToShow = filtered
            ? (p.by_rep || []).filter(r => _perfRepIncluded(r.email))
            : (p.by_rep || []);
        if (repRowsToShow.length > 0) {
            html += '<table class="perf-table" style="margin-top:0.5rem"><thead><tr><th>Rep</th><th class="num">Open Deals</th><th class="num">Open Value</th></tr></thead><tbody>';
            repRowsToShow.forEach(r => {
                const isUnassigned = r.email === 'unassigned';
                html += `<tr${isUnassigned ? ' class="unassigned"' : ''}><td>${r.name || r.email}</td><td class="num">${r.count}</td><td class="num">${_perfFmt(r.value, 'dollar')}</td></tr>`;
            });
            html += '</tbody></table>';
        }
    }

    const dmissing = (PERF.honesty || {}).deals_missing_amount || 0;
    if (dmissing > 0) {
        html += `<div class="perf-honesty">${dmissing} deals have no amount set.</div>`;
    }

    html += '</div>';
    return html;
}

        html += `<tr${isUnassigned ? ' class="unassigned"' : ''}>
            <td>${r.name || r.email}</td>
            <td class="num">${_perfFmt(r.deals_created, 'num')}</td>
            <td class="num">${_perfFmt(r.deals_won, 'num')}</td>
        </tr>`;
    });
    html += '</tbody></table></div>';
    return html;
}

// ── Stalled Deals & Avg Days ──

let _perfStalledStageFilter = '';
let _perfStalledRepFilter = '';

// Pipeline Risk Explorer local state
let _perfRiskPipelineFilter = '';
let _perfRiskStageFilter    = '';
let _perfRiskMetric         = 'stalled_count';
let _perfRiskStalledOnly    = true;

function _perfFilterStalledList() {
    const wrap = document.getElementById('perf-stalled-body');
    if (!wrap) return;
    const allStalled = (PERF.open_pipeline || {}).stalled_deals || [];
    let stalled = _perfIsRepFiltered()
        ? allStalled.filter(d => _perfRepIncluded(d.rep_email))
        : allStalled;
    if (_perfStalledStageFilter) stalled = stalled.filter(d => d.stage_label === _perfStalledStageFilter);
    if (_perfStalledRepFilter) stalled = stalled.filter(d => d.rep_email === _perfStalledRepFilter);

    const countEl = document.getElementById('perf-stalled-count');
    if (countEl) countEl.textContent = stalled.length;
    const valEl = document.getElementById('perf-stalled-value');
    if (valEl) valEl.textContent = _perfFmt(stalled.reduce((s, d) => s + (d.amount || 0), 0), 'dollar');

    if (stalled.length === 0) {
        wrap.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#5a5e72;padding:1.5rem">No stalled deals match filters</td></tr>';
        return;
    }
    stalled.sort((a, b) => (b.days_in_stage || 0) - (a.days_in_stage || 0));
    wrap.innerHTML = stalled.map(d =>
        `<tr><td>${_perfEsc(d.name)}</td><td>${_perfEsc(d.stage_label)}</td>
          <td><strong>${d.days_in_stage}d</strong></td>
          <td>${_perfEsc(d.rep_name)}</td>
          <td>${d.amount ? _perfFmt(d.amount, 'dollar') : '$\u2014'}</td></tr>`
    ).join('');
}

function buildPerfStalledList() {
    const allStalled = (PERF.open_pipeline || {}).stalled_deals || [];
    const baseStalled = _perfIsRepFiltered()
        ? allStalled.filter(d => _perfRepIncluded(d.rep_email))
        : allStalled;
    if (!baseStalled.length) return '';

    // Collect unique stages and reps for filter dropdowns
    const stages = [...new Set(baseStalled.map(d => d.stage_label))].sort();
    const reps = [...new Map(baseStalled
        .filter(d => d.rep_email)
        .map(d => [d.rep_email, d.rep_name || d.rep_email])
    )].sort((a, b) => a[1].localeCompare(b[1]));

    // Apply current filters
    let stalled = baseStalled;
    if (_perfStalledStageFilter) stalled = stalled.filter(d => d.stage_label === _perfStalledStageFilter);
    if (_perfStalledRepFilter) stalled = stalled.filter(d => d.rep_email === _perfStalledRepFilter);
    stalled.sort((a, b) => (b.days_in_stage || 0) - (a.days_in_stage || 0));

    const totalValue = stalled.reduce((s, d) => s + (d.amount || 0), 0);

    const stageOpts = stages.map(s =>
        `<option value="${_perfEsc(s)}"${s === _perfStalledStageFilter ? ' selected' : ''}>${_perfEsc(s)}</option>`
    ).join('');
    const repOpts = reps.map(([email, name]) =>
        `<option value="${_perfEsc(email)}"${email === _perfStalledRepFilter ? ' selected' : ''}>${_perfEsc(name)}</option>`
    ).join('');

    const rows = stalled.map(d =>
        `<tr><td>${_perfEsc(d.name)}</td><td>${_perfEsc(d.stage_label)}</td>
          <td><strong>${d.days_in_stage}d</strong></td>
          <td>${_perfEsc(d.rep_name)}</td>
          <td>${d.amount ? _perfFmt(d.amount, 'dollar') : '$\u2014'}</td></tr>`
    ).join('');

    const filters = `<div class="perf-stalled-filters">
        <span class="perf-stalled-summary"><strong id="perf-stalled-count">${stalled.length}</strong> stalled &middot; <span id="perf-stalled-value">${_perfFmt(totalValue, 'dollar')}</span> at risk</span>
        ${stages.length > 1 ? `<select class="perf-stalled-select perf-focus-visible" aria-label="Filter by stage"
            onchange="_perfStalledStageFilter=this.value;_perfFilterStalledList()">
            <option value="">All Stages</option>${stageOpts}
        </select>` : ''}
        ${!_perfIsRepFiltered() && reps.length > 1 ? `<select class="perf-stalled-select perf-focus-visible" aria-label="Filter by rep"
            onchange="_perfStalledRepFilter=this.value;_perfFilterStalledList()">
            <option value="">All Reps</option>${repOpts}
        </select>` : ''}
    </div>`;

    return `<div class="perf-section" id="perf-stalled-list">
        ${_perfSectionHdr('\u26A0 Stalled Deals', 'HubSpot')}
        ${filters}
        <table class="perf-table">
            <thead><tr><th>Deal</th><th>Stage</th><th class="num">Days</th><th>Rep</th><th class="num">Value</th></tr></thead>
            <tbody id="perf-stalled-body">${rows}</tbody>
        </table>
    </div>`;
}

// ── Pipeline Risk Explorer ──────────────────────────────────────

function _perfStageToPipeline() {
    const map = {};
    for (const pp of (PERF.open_pipeline?.by_pipeline || [])) {
        for (const s of (pp.by_stage || [])) {
            map[s.stage_id] = pp.pipeline_label;
        }
    }
    return map;
}

function _perfBuildRiskDataset() {
    const p = PERF.open_pipeline || {};
    const stalledAll = p.stalled_deals || [];
    const pipelineMap = _perfStageToPipeline();

    const filtered = _perfIsRepFiltered();

    // Step 1: Determine in-scope stalled deals
    const stalledFiltered = stalledAll.filter(d => {
        if (filtered && !_perfRepIncluded(d.rep_email)) return false;
        const pipeline = d.pipeline || pipelineMap[d.stage_id] || '';
        if (_perfRiskPipelineFilter && pipeline !== _perfRiskPipelineFilter) return false;
        if (_perfRiskStageFilter && d.stage_id !== _perfRiskStageFilter) return false;
        return true;
    });

    // Step 2: Build stage rows from aggregate by_pipeline data
    const repStageMap = filtered ? _perfBuildRepStageMap() : null;

    // Build all stage rows for the active pipeline (before stage filter)
    const allStageRows = [];
    for (const pp of (p.by_pipeline || [])) {
        if (_perfRiskPipelineFilter && pp.pipeline_label !== _perfRiskPipelineFilter) continue;
        for (const s of (pp.by_stage || [])) {
            const rep = repStageMap?.[s.stage_id];
            allStageRows.push({
                stage_id:      s.stage_id,
                stage_label:   s.label,
                pipeline:      pp.pipeline_label,
                open_count:    rep ? rep.count          : s.count,
                open_value:    rep ? rep.value          : s.value,
                stalled_count: rep ? rep.stalled_count  : s.stalled_count,
                stalled_value: rep ? rep.stalled_value  : s.stalled_value,
            });
        }
    }
    // Apply stage filter for chart/summary/table
    const stageRows = _perfRiskStageFilter
        ? allStageRows.filter(s => s.stage_id === _perfRiskStageFilter)
        : allStageRows;

    // Step 3: Summary totals — derived from stageRows so they honor all filters
    const totalOpen  = stageRows.reduce((s, r) => s + r.open_count, 0);
    const totalValue = stageRows.reduce((s, r) => s + r.open_value, 0);
    const stalledTotal = stalledFiltered.length;
    const stalledValue = stalledFiltered.reduce((s, d) => s + (d.amount || 0), 0);
    const oldestDays   = stalledFiltered.reduce((m, d) => Math.max(m, d.days_in_stage || 0), 0);

    // Step 4: Table deals
    let filteredDeals;
    if (_perfRiskStalledOnly) {
        filteredDeals = stalledFiltered;
    } else {
        const allOpenDeals = [];
        const detail = PERF.by_rep_detail || {};
        const repsToScan = _perfIsRepFiltered() ? [..._perfActiveReps] : Object.keys(detail);
        for (const rep of repsToScan) {
            for (const deal of (detail[rep]?.open_deals || [])) {
                if (_perfRiskPipelineFilter && deal.pipeline !== _perfRiskPipelineFilter) continue;
                if (_perfRiskStageFilter && deal.stage_id !== _perfRiskStageFilter) continue;
                allOpenDeals.push({ ...deal, rep_email: rep,
                    rep_name: (p.by_rep || []).find(r => r.email === rep)?.name || rep });
            }
        }
        filteredDeals = allOpenDeals;
    }

    filteredDeals = [...filteredDeals].sort((a, b) => {
        if ((b.stalled ? 1 : 0) !== (a.stalled ? 1 : 0)) return (b.stalled ? 1 : 0) - (a.stalled ? 1 : 0);
        if ((b.days_in_stage || 0) !== (a.days_in_stage || 0)) return (b.days_in_stage || 0) - (a.days_in_stage || 0);
        return (b.amount || 0) - (a.amount || 0);
    });

    // Step 5: Available filter options (use allStageRows so dropdown always shows all stages)
    const availablePipelines = [...new Set((p.by_pipeline || []).map(pp => pp.pipeline_label))];
    const availableStages = allStageRows.map(s => ({ stage_id: s.stage_id, label: s.stage_label }));

    return { stageRows, filteredDeals, availablePipelines, availableStages,
             summary: { open_value: totalValue, open_deals: totalOpen,
                        stalled_deals: stalledTotal, stalled_value: stalledValue,
                        oldest_days_in_stage: oldestDays } };
}

function _perfSetRiskPipeline(value) {
    _perfRiskPipelineFilter = value;
    // Clear stage filter if the selected stage no longer exists in the new pipeline scope
    if (_perfRiskStageFilter) {
        const p = PERF.open_pipeline || {};
        const validStages = new Set();
        for (const pp of (p.by_pipeline || [])) {
            if (value && pp.pipeline_label !== value) continue;
            for (const s of (pp.by_stage || [])) validStages.add(s.stage_id);
        }
        if (!validStages.has(_perfRiskStageFilter)) _perfRiskStageFilter = '';
    }
    buildPerformance();
}

function _perfSetRiskStage(stageId) {
    _perfRiskStageFilter = (_perfRiskStageFilter === stageId) ? '' : stageId;
    buildPerformance();
}

function _perfSetRiskMetric(value) {
    _perfRiskMetric = value;
    buildPerformance();
}

function _perfExpandRiskTable(btn) {
    document.querySelectorAll('[data-risk-overflow]').forEach(tr => {
        tr.style.display = '';
    });
    if (btn) btn.remove();
}

function _perfToggleRiskStalledOnly(checked) {
    _perfRiskStalledOnly = checked;
    buildPerformance();
}

function buildPerfRiskExplorer() {
    const ds = _perfBuildRiskDataset();
    const { stageRows, filteredDeals, availablePipelines, availableStages, summary } = ds;

    const COLORS = ['#4a6cf7','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8','#fb923c','#e879f9'];
    const metricLabels = {
        stalled_count: 'Stalled Deals',
        stalled_value: 'At-Risk Value',
        open_value: 'Open Value',
        open_count: 'Open Deals',
    };

    // Build scope line
    const scopeParts = [];
    if (_perfRiskPipelineFilter) scopeParts.push(_perfRiskPipelineFilter);
    if (_perfIsRepFiltered()) {
        const repNames = [..._perfActiveReps].map(email =>
            ((PERF.open_pipeline || {}).by_rep || []).find(r => r.email === email)?.name || email
        );
        scopeParts.push(repNames.length === 1 ? repNames[0] : `${repNames.length} reps`);
    }
    if (_perfRiskStageFilter) {
        const sl = availableStages.find(s => s.stage_id === _perfRiskStageFilter);
        if (sl) scopeParts.push(sl.label);
    }
    scopeParts.push(`${summary.open_deals} open deals`);
    scopeParts.push(`${_perfFmt(summary.open_value, 'dollar')} open`);
    scopeParts.push(`${summary.stalled_deals} stalled`);
    scopeParts.push(`${_perfFmt(summary.stalled_value, 'dollar')} at risk`);
    const scopeLine = scopeParts.join(' \u00b7 ');

    // Pipeline dropdown
    const pipeOpts = availablePipelines.map(p =>
        `<option value="${_perfEsc(p)}"${p === _perfRiskPipelineFilter ? ' selected' : ''}>${_perfEsc(p)}</option>`
    ).join('');

    // Stage dropdown
    const stageOpts = availableStages.map(s =>
        `<option value="${_perfEsc(s.stage_id)}"${s.stage_id === _perfRiskStageFilter ? ' selected' : ''}>${_perfEsc(s.label)}</option>`
    ).join('');

    // Metric pills with tooltips
    const pillTooltips = {
        stalled_value: 'Dollar value of stalled deals per stage. Deals sitting past their stage time limit. Default view.',
        stalled_count: 'Count of stalled deals per stage regardless of value. Shows volume of stuck deals, not dollar weight.',
        open_value: 'Total dollar value of all open deals per stage, stalled or not. Shows where the most money currently sits.',
        open_count: 'Count of all open deals per stage. Broadest view. Pure volume with no dollar weighting.',
    };
    const pills = Object.entries(metricLabels).map(([key, label]) =>
        `<div class="risk-pill-wrap"><button class="risk-pill perf-focus-visible${key === _perfRiskMetric ? ' risk-pill-active' : ''}"
            aria-pressed="${key === _perfRiskMetric}" onclick="_perfSetRiskMetric('${key}')"
            title="${pillTooltips[key]}">${label}</button><div class="risk-pill-tooltip" role="tooltip">${pillTooltips[key]}</div></div>`
    ).join('');

    // Chart: ranked horizontal bars
    const metricKey = _perfRiskMetric;
    const chartRows = [...stageRows]
        .map((s, i) => ({ ...s, _idx: i }))
        .filter(s => s[metricKey] > 0)
        .sort((a, b) => b[metricKey] - a[metricKey]);
    const maxVal = chartRows.reduce((m, s) => Math.max(m, s[metricKey]), 0) || 1;
    const isMoney = metricKey.includes('value');

    const barsHtml = chartRows.map(s => {
        const pct = Math.max((s[metricKey] / maxVal) * 100, 2);
        const color = COLORS[s._idx % COLORS.length];
        const val = isMoney ? _perfFmt(s[metricKey], 'dollar') : s[metricKey];
        const stalledBadge = s.stalled_count > 0
            ? `<span class="risk-stalled-badge">\u25cf ${s.stalled_count} stalled</span>` : '';
        const isActive = _perfRiskStageFilter === s.stage_id;
        return `<button class="risk-bar-row perf-focus-visible${isActive ? ' risk-bar-active' : ''}"
            aria-pressed="${isActive}" onclick="_perfSetRiskStage('${s.stage_id}')">
            <span class="risk-bar-label">${_perfEsc(s.stage_label)}${stalledBadge}</span>
            <span class="risk-bar-track">
                <span class="risk-bar-fill" style="width:${pct}%;background:${color}"></span>
            </span>
            <span class="risk-bar-value">${val}</span>
        </button>`;
    }).join('');

    // Summary cards
    const cards = [
        { label: 'Open Value', value: _perfFmt(summary.open_value, 'dollar'), cls: '' },
        { label: 'Open Deals', value: summary.open_deals, cls: '' },
        { label: 'Stalled Deals', value: summary.stalled_deals, cls: 'risk-card-warn' },
        { label: 'Revenue at Risk', value: _perfFmt(summary.stalled_value, 'dollar'), cls: 'risk-card-warn' },
    ];
    const cardsHtml = cards.map(c =>
        `<div class="risk-card ${c.cls}"><div class="risk-card-value">${c.value}</div><div class="risk-card-label">${c.label}</div></div>`
    ).join('');

    // Table — show 10 initially, expand on click
    const RISK_TABLE_LIMIT = 10;
    const totalDeals = filteredDeals.length;
    const hasMore = totalDeals > RISK_TABLE_LIMIT;
    const tableRows = filteredDeals.map((d, i) => {
        const stalledCls = d.stalled ? ' class="risk-row-stalled"' : '';
        const stalledTag = d.stalled ? '<span class="risk-stalled-badge">\u25cf</span>' : '';
        const hiddenAttr = (hasMore && i >= RISK_TABLE_LIMIT) ? ' style="display:none" data-risk-overflow' : '';
        return `<tr${stalledCls}${hiddenAttr}>
            <td>${stalledTag}${_perfEsc(d.name)}</td>
            <td>${_perfEsc(d.rep_name || '')}</td>
            <td>${_perfEsc(d.stage_label || '')}</td>
            <td class="num"><strong>${d.days_in_stage || 0}d</strong></td>
            <td class="num">${d.amount ? _perfFmt(d.amount, 'dollar') : '-'}</td>
        </tr>`;
    }).join('');

    const showMoreBtn = hasMore
        ? `<button class="risk-show-more perf-focus-visible" id="risk-show-more-btn"
            onclick="_perfExpandRiskTable(this)">Show all ${totalDeals} deals (${totalDeals - RISK_TABLE_LIMIT} more)</button>`
        : '';

    const emptyMsg = _perfRiskStalledOnly
        ? 'No stalled deals match this selection.'
        : 'No open deals match this selection.';

    const coverageNote = '';

    return `<div class="perf-section risk-explorer" id="perf-risk-explorer">
        ${_perfSectionHdr('Pipeline Risk Explorer', 'HubSpot')}
        <div class="risk-scope">Current open pipeline snapshot. Affected by: rep filter, pipeline, stage, stalled-only toggle. Not affected by period selector.</div>

        <div class="risk-controls">
            <label class="risk-toggle-label perf-focus-visible">
                <input type="checkbox" ${_perfRiskStalledOnly ? 'checked' : ''} onchange="_perfToggleRiskStalledOnly(this.checked)">
                Stalled only
            </label>
            ${availablePipelines.length > 1 ? `<select class="perf-stalled-select perf-focus-visible" aria-label="Filter by pipeline"
                onchange="_perfSetRiskPipeline(this.value)">
                <option value="">All Pipelines</option>${pipeOpts}
            </select>` : ''}
            ${availableStages.length > 1 ? `<select class="perf-stalled-select perf-focus-visible" aria-label="Filter by stage"
                onchange="_perfRiskStageFilter=this.value;buildPerformance()">
                <option value="">All Stages</option>${stageOpts}
            </select>` : ''}
            ${_perfRiskPipelineFilter || _perfRiskStageFilter ? `<button class="perf-scope-clear perf-focus-visible"
                onclick="_perfRiskPipelineFilter='';_perfRiskStageFilter='';buildPerformance()"
                aria-label="Reset filters">Reset</button>` : ''}
            <div class="risk-pills">${pills}</div>
        </div>

        <div class="risk-scope-summary">${scopeLine}</div>

        <div class="risk-body">
            <div class="risk-chart">
                ${barsHtml || '<div class="risk-empty">No stages match the active metric.</div>'}
            </div>
            <div class="risk-summary-cards">${cardsHtml}</div>
        </div>

        ${(() => {
            const _rstLabel = _perfRiskStageFilter
                ? (availableStages.find(s => s.stage_id === _perfRiskStageFilter)?.label
                   || (PERF.pipeline_stages || {})[_perfRiskStageFilter]
                   || 'selected stage')
                : null;
            return _rstLabel
                ? `<p class="risk-table-hint">Showing ${_perfEsc(_rstLabel)} only \u2014 click the stage bar again to clear. Stalled deals sorted to top.</p>`
                : '<p class="risk-table-hint">Click a stage in the chart above to filter this list. Stalled deals are sorted to the top.</p>';
        })()}
        <table class="perf-table risk-table">
            <thead><tr><th>Deal</th><th>Rep</th><th>Stage</th><th class="num">Days</th><th class="num">Value</th></tr></thead>
            <tbody>${tableRows || `<tr><td colspan="5" style="text-align:center;color:#5a5e72;padding:1.5rem">${emptyMsg}</td></tr>`}</tbody>
        </table>
        ${showMoreBtn}
    </div>`;
}

function buildPerfAvgDaysChart() {
    const avgDays = (PERF.open_pipeline || {}).avg_days_by_stage || {};
    const thresholds = PERF.stage_thresholds || {};
    const stages = PERF.pipeline_stages || {};
    const entries = Object.entries(avgDays)
        .map(([sid, avg]) => ({sid, label: stages[sid] || sid, avg, threshold: thresholds[sid] || 14}))
        .filter(e => e.avg > 0)
        .sort((a, b) => b.avg - a.avg);
    if (entries.length === 0) return '';

    const maxVal = Math.max(...entries.map(e => Math.max(e.avg, e.threshold)));
    const avgDaysNote = _perfIsRepFiltered()
        ? '<p class="perf-rep-filter-note">Avg days in stage reflects all reps. Stage timing is team-level data.</p>'
        : '';
    let html = `<div class="perf-section">${_perfSectionHdr('Avg Days in Stage', 'HubSpot')}${avgDaysNote}`;
    entries.forEach(e => {
        const pct = Math.min((e.avg / maxVal) * 100, 100);
        const over = e.avg > e.threshold;
        const color = over ? '#f0c040' : '#4a6cf7';
        html += `<div style="margin-bottom:0.5rem;font-size:0.82rem">
            <div style="display:flex;justify-content:space-between;margin-bottom:2px">
                <span style="color:#d0d3db">${_perfEsc(e.label)}</span>
                <span style="font-family:'JetBrains Mono',monospace;color:${over ? '#f0c040' : '#d0d3db'}">${e.avg.toFixed(1)} / ${e.threshold}d${over ? ' \u26A0' : ''}</span>
            </div>
            <div style="height:6px;background:#1e2130;border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${pct.toFixed(0)}%;background:${color};border-radius:3px"></div>
            </div>
        </div>`;
    });
    html += '</div>';
    return html;
}

// ── Reps View ──

function _perfEsc(s) { if (!s) return ''; const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

function _perfFmtCurrency(n) { return n != null ? '$' + n.toLocaleString(undefined, {maximumFractionDigits: 0}) : '$\u2014'; }
function _perfFmtPct(n) { return n != null ? (n * 100).toFixed(1) + '%' : '\u2014'; }

function _perfRepMetricCell(rep, metric) {
    const val = rep[metric] ?? 0;
    const target = rep[metric + '_target'];
    return target != null
        ? `<td class="perf-cell-with-target">
            <span class="perf-cell-primary">${val}</span>
            <span class="perf-cell-secondary">/ ${target} target</span>
           </td>`
        : `<td class="num">${val}</td>`;
}

function _perfPeriodLabel(key) {
    return {'7d':'Last 7 days','30d':'Last 30 days','90d':'Last 90 days','this_month':'This month','last_month':'Last month'}[key] || key;
}

function _perfGetPeriodDateRange(periodKey) {
    const now = new Date();
    const fmt = d => d.toISOString().slice(0, 10);
    if (periodKey === '7d') {
        const s = new Date(now); s.setDate(s.getDate() - 6);
        return [fmt(s), fmt(now)];
    }
    if (periodKey === '30d') {
        const s = new Date(now); s.setDate(s.getDate() - 29);
        return [fmt(s), fmt(now)];
    }
    if (periodKey === '90d') {
        const s = new Date(now); s.setDate(s.getDate() - 89);
        return [fmt(s), fmt(now)];
    }
    if (periodKey === 'this_month') {
        const s = new Date(now.getFullYear(), now.getMonth(), 1);
        return [fmt(s), fmt(now)];
    }
    if (periodKey === 'last_month') {
        const s = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const e = new Date(now.getFullYear(), now.getMonth(), 0);
        return [fmt(s), fmt(e)];
    }
    return ['2020-01-01', fmt(now)];
}

let _perfDrawerTrigger = null;

function buildPerfRepsView(slice) {
    const reps = (slice.by_rep || []).filter(r => r.email !== 'unassigned');
    const unassigned = (slice.by_rep || []).find(r => r.email === 'unassigned');
    const hasTargets = reps.some(r => r.attainment_pct != null);
    reps.sort((a, b) => (b.deals_won || 0) - (a.deals_won || 0));
    const allRows = unassigned ? [...reps, unassigned] : reps;

    let html = '<div class="perf-reps-wrap"><table class="perf-reps-table" role="table"><thead><tr>';
    html += '<th>Rep</th>';
    ['Meetings Booked', 'Deals Won', 'Open Pipeline', 'Reply Rate', 'Recorded Calls'].forEach(h => {
        html += `<th class="num"><button class="perf-focus-visible">${h}</button></th>`;
    });
    if (hasTargets) html += '<th class="num"><button class="perf-focus-visible">Attainment</button></th>';
    html += '</tr></thead><tbody>';

    for (const rep of allRows) {
        const isU = rep.email === 'unassigned';
        const isHighlighted = _perfIsRepFiltered() && _perfRepIncluded(rep.email);
        const isDimmed = _perfIsRepFiltered() && !_perfRepIncluded(rep.email) && !isU;
        const rowCls = ['perf-rep-row', isU ? 'perf-rep-unassigned' : '', isHighlighted ? 'perf-rep-highlighted' : '', isDimmed ? 'perf-rep-dimmed' : ''].filter(Boolean).join(' ');
        html += `<tr class="${rowCls}"${
            !isU ? ` onclick="openPerfDrawer('${rep.email.replace(/'/g,"\\'")}')" onkeydown="if(event.key==='Enter')openPerfDrawer('${rep.email.replace(/'/g,"\\'")}')" tabindex="0"` : ' tabindex="-1"'}>`;
        html += `<td>${_perfEsc(rep.name || rep.email)}</td>`;
        html += _perfRepMetricCell(rep, 'meetings_booked');
        html += _perfRepMetricCell(rep, 'deals_won');
        const pipeRep = ((PERF.open_pipeline || {}).by_rep || []).find(r => r.email === rep.email);
        html += `<td class="num">${pipeRep && pipeRep.value ? _perfFmtCurrency(pipeRep.value) : '$\u2014'}</td>`;
        html += `<td class="num">${rep.reply_rate != null ? _perfFmtPct(rep.reply_rate) : '\u2014'}</td>`;
        html += _perfRepMetricCell(rep, 'recorded_calls');
        if (hasTargets) {
            const a = rep.attainment_pct;
            const cls = a == null ? '' : a >= 0.9 ? 'perf-att-green' : a >= 0.7 ? 'perf-att-amber' : 'perf-att-red';
            html += `<td class="num ${cls}">${a != null ? Math.round(a * 100) + '%' + (a < 0.7 ? ' \u26A0' : '') : '\u2014'}</td>`;
        }
        html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
}

// ── Drawer ──

function openPerfDrawer(repEmail) {
    const slice = (PERF.slices || {})[_perfActivePeriod];
    if (!slice) return;
    const rep = (slice.by_rep || []).find(r => r.email === repEmail);
    const detail = (PERF.by_rep_detail || {})[repEmail];
    if (!rep) return;

    _perfDrawerTrigger = document.activeElement;
    const [pStart, pEnd] = _perfGetPeriodDateRange(_perfActivePeriod);

    // WON/LOST stage IDs
    const stages = PERF.pipeline_stages || {};
    const wonLost = new Set(Object.entries(stages).filter(([,l]) => l.toUpperCase() === 'WON' || l.toUpperCase() === 'LOST').map(([id]) => id));

    const periodDeals = (detail?.open_deals || []).filter(d => d.createdate >= pStart && d.createdate <= pEnd);
    const periodCalls = (detail?.recent_calls || []).filter(c => c.date && c.date >= pStart && c.date <= pEnd);
    const periodMeetings = (detail?.recent_meetings || []).filter(m => m.hs_createdate >= pStart && m.hs_createdate <= pEnd);
    const openDeals = (detail?.open_deals || []).filter(d => !wonLost.has(d.stage_id));

    let html = _buildDrawerHeader(rep);
    if (rep.attainment_pct != null) html += _buildDrawerAttainment(rep);
    html += _buildDrawerPipeline(rep, periodDeals, openDeals);
    html += _buildDrawerEmail(rep, slice.team || {});
    html += _buildDrawerCalls(rep, periodCalls);
    html += _buildDrawerMeetings(periodMeetings);

    const panel = document.getElementById('perf-drawer');
    panel.innerHTML = html;
    panel.hidden = false;
    panel.addEventListener('keydown', _perfEscHandler);
    const closeBtn = document.getElementById('perf-drawer-close-btn');
    if (closeBtn) closeBtn.focus();
}

function _perfEscHandler(e) { if (e.key === 'Escape') closePerfDrawer(); }

function closePerfDrawer() {
    const panel = document.getElementById('perf-drawer');
    panel.hidden = true;
    panel.removeEventListener('keydown', _perfEscHandler);
    if (_perfDrawerTrigger) _perfDrawerTrigger.focus();
    _perfDrawerTrigger = null;
}

function _buildDrawerHeader(rep) {
    return `<div class="perf-drawer-header">
        <strong>${_perfEsc(rep.name || rep.email)}</strong>
        <span class="perf-drawer-period">${_perfPeriodLabel(_perfActivePeriod)}</span>
        <button id="perf-drawer-close-btn" class="perf-drawer-close perf-focus-visible"
            onclick="closePerfDrawer()" aria-label="Close rep detail">\u2715</button>
    </div>`;
}

function _buildDrawerAttainment(rep) {
    const METRICS = [['meetings_booked','Meetings'],['deals_created','Deals Created'],
                     ['recorded_calls','Calls'],['emails_sent','Emails']];
    const rows = METRICS.map(([m, label]) => {
        const target = rep[m + '_target'];
        if (target == null) return '';
        const actual = rep[m] ?? 0;
        const pct = rep[m + '_pct'] ?? 0;
        const color = pct >= 0.9 ? '#4ade80' : pct >= 0.7 ? '#f0c040' : '#ff6b6b';
        return `<div class="perf-att-row">
            <span class="perf-att-label">${label}</span>
            <span class="perf-att-nums">${actual} / ${target} (${Math.round(pct*100)}%${pct<0.7?' \u26A0':''})</span>
            <div class="perf-att-bar" style="--fill:${Math.min(pct,1)*100}%;--color:${color}"></div>
        </div>`;
    }).join('');
    const overall = rep.attainment_pct;
    const oColor = overall >= 0.9 ? '#4ade80' : overall >= 0.7 ? '#f0c040' : '#ff6b6b';
    return `<div class="perf-drawer-section">
        <h3 class="perf-drawer-section-title">Attainment</h3>
        <div style="font-size:1.1rem;font-family:'JetBrains Mono',monospace;color:${oColor};margin-bottom:0.75rem">${Math.round(overall*100)}% overall</div>
        ${rows}</div>`;
}

function _buildDrawerPipeline(rep, periodDeals, openDeals) {
    const rows = openDeals.slice(0,5).map(d =>
        `<tr><td>${_perfEsc(d.name)}</td>
          <td>${_perfEsc(d.stage_label)}${d.stalled ? ' <span class="perf-stalled-flag">\u26A0</span>' : ''}</td>
          <td class="num">${d.days_in_stage != null ? d.days_in_stage+'d' : '\u2014'}</td>
          <td class="num">${d.amount ? _perfFmtCurrency(d.amount) : '$\u2014'}</td></tr>`
    ).join('');
    const more = openDeals.length > 5 ? `<p class="perf-drawer-more">+${openDeals.length-5} more</p>` : '';
    return `<div class="perf-drawer-section">
        <h3 class="perf-drawer-section-title">Pipeline <span class="perf-source-badge">HubSpot</span></h3>
        <div class="perf-drawer-stats">
            <span>Created: <strong>${rep.deals_created ?? 0}</strong></span>
            <span>Won: <strong>${rep.deals_won ?? 0}</strong></span>
        </div>
        ${openDeals.length ? `<table class="perf-drawer-table">
            <thead><tr><th>Deal</th><th>Stage</th><th class="num">Age</th><th class="num">Value</th></tr></thead>
            <tbody>${rows}</tbody></table>${more}`
        : '<p class="perf-drawer-empty">No open deals</p>'}
    </div>`;
}

function _buildDrawerEmail(rep, teamSlice) {
    const belowAvg = rep.reply_rate != null && teamSlice.reply_rate != null && rep.reply_rate < teamSlice.reply_rate;
    return `<div class="perf-drawer-section">
        <h3 class="perf-drawer-section-title">Email Activity <span class="perf-source-badge">Mixmax</span></h3>
        <div class="perf-drawer-stats">
            <span>Sent: <strong>${rep.emails_sent ?? 0}</strong></span>
            <span>Reply Rate: <strong>${rep.reply_rate != null ? _perfFmtPct(rep.reply_rate) : '\u2014'}</strong></span>
            ${rep.open_rate != null ? `<span>Open Rate: <strong>${_perfFmtPct(rep.open_rate)}</strong></span>` : ''}
        </div>
        ${belowAvg ? `<p class="perf-drawer-warning">\u26A0 Below team average (${_perfFmtPct(teamSlice.reply_rate)})</p>` : ''}
    </div>`;
}

function _buildDrawerCalls(rep, periodCalls) {
    const rows = periodCalls.slice(0,5).map(c =>
        `<tr><td>${_perfEsc(c.title || '\u2014')}</td><td>${c.date || '\u2014'}</td>
          <td class="num">${c.duration_min}m</td>
          <td>${c.transcript_url ? `<a href="${c.transcript_url}" target="_blank" rel="noopener" style="color:#4a6cf7">view</a>` : '\u2014'}</td></tr>`
    ).join('');
    const more = periodCalls.length > 5 ? `<p class="perf-drawer-more">+${periodCalls.length-5} more</p>` : '';
    return `<div class="perf-drawer-section">
        <h3 class="perf-drawer-section-title">Recorded Calls <span class="perf-source-badge">Fireflies</span></h3>
        <div class="perf-drawer-stats">
            <span>Calls: <strong>${rep.recorded_calls ?? 0}</strong></span>
            ${rep.avg_call_duration_min ? `<span>Avg: <strong>${Math.round(rep.avg_call_duration_min)}m</strong></span>` : ''}
        </div>
        ${periodCalls.length ? `<table class="perf-drawer-table">
            <thead><tr><th>Call</th><th>Date</th><th class="num">Duration</th><th>Transcript</th></tr></thead>
            <tbody>${rows}</tbody></table>${more}`
        : '<p class="perf-drawer-empty">No recorded calls this period</p>'}
    </div>`;
}

function _buildDrawerMeetings(periodMeetings) {
    const rows = periodMeetings.slice(0,5).map(m =>
        `<tr><td>${_perfEsc(m.title || '\u2014')}</td><td>${m.hs_createdate || '\u2014'}</td><td>${m.outcome || '\u2014'}</td></tr>`
    ).join('');
    const more = periodMeetings.length > 5 ? `<p class="perf-drawer-more">+${periodMeetings.length-5} more</p>` : '';
    return `<div class="perf-drawer-section">
        <h3 class="perf-drawer-section-title">Meetings Booked <span class="perf-source-badge">HubSpot</span></h3>
        ${periodMeetings.length ? `<table class="perf-drawer-table">
            <thead><tr><th>Meeting</th><th>Booked</th><th>Outcome</th></tr></thead>
            <tbody>${rows}</tbody></table>${more}`
        : '<p class="perf-drawer-empty">No meetings this period</p>'}

}

// ── Main builder ──

function buildPerformance() {
    const el = document.getElementById('performance-view');
    if (!PERF) {
        el.innerHTML = '<div class="perf-empty">Run fetch_performance.py to load performance data.</div>';
        return;
    }

    const rawSlice = (PERF.slices || {})[_perfActivePeriod];
    if (!rawSlice) {
        el.innerHTML = '<div class="perf-empty">No data for this period.</div>';
        return;
    }
    const slice = _perfFilteredSlice(rawSlice);

    let html = '';

    // Header with sync timestamp
    // NOTE: Refresh button is built and ready — uncomment the block below to enable it.
    html += `<div class="perf-header"><h2>Performance</h2>`;
    if (PERF.generated_at_et) {
        html += `<span class="perf-ts">Synced ${_perfTimeAgo(PERF.generated_at_et)}</span>`;
    }
    // html += `<button id="perf-refresh-btn" class="perf-refresh-btn perf-focus-visible"
    //     onclick="_perfRefresh()" aria-label="Refresh performance data">Refresh Data</button>`;
    // html += `<span id="perf-refresh-status" class="perf-refresh-status" style="display:none"></span>`;
    html += `</div>`;

    // Controls (period + view switch)
    html += buildPerfControls();

    // Close drawer on view/period switch
    closePerfDrawer();

    // Render active view
    if (_perfActiveView === 'overview') {
        html += buildPerfSummaryCards(slice);
        html += buildPerfOverviewMidRow(slice);
        html += buildPerfActivityTrend();
    } else if (_perfActiveView === 'activity') {
        html += buildPerfEmailSection(slice);
        html += buildPerfCallsSection(slice);
    } else if (_perfActiveView === 'pipeline') {
        html += buildPerfOpenPipelineSection();
        html += buildPerfRiskExplorer();
    } else if (_perfActiveView === 'reps') {
        html += buildPerfRepsView(rawSlice);
    }

    // Footer: sources + honesty
    if (PERF.sources && PERF.sources.length > 0) {
        html += `<div class="perf-honesty"><strong>Sources:</strong> ${PERF.sources.join(', ')}</div>`;
    }

    el.innerHTML = html;

    if (_perfActiveView === 'overview') {
        setTimeout(() => _perfDrawTrend(), 0);
    }
}

            </div>
        </div>
    </div>

</div>
    `;
}

// Init -- parse hash for exclusions, date range, and tab, then build
const initTab = parseHash();
buildDateDropdown();
buildSegmentDropdown();
updateNeedsReviewBanner();
updateStats();
buildFeatures();
buildCalls();
buildPersonas();
buildReport();
switchTab(initTab || 'features');
// Record visit after rendering so "new" indicators are computed against previous visit
setTimeout(recordVisit, 2000);
</script>
