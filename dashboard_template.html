// ---- Toast system ----
function showToast(message, undoCallback, durationMs) {
    durationMs = durationMs || 5000;
    var id = ++toastIdCounter;
    var container = document.getElementById('toast-container');

    var el = document.createElement('div');
    el.className = 'toast';
    el.dataset.toastId = id;
    el.innerHTML =
        '<div class="toast-msg">' + message + '</div>' +
        '<button class="toast-undo" data-tid="' + id + '">Undo</button>' +
        '<button class="toast-dismiss" data-tid="' + id + '">&times;</button>' +
        '<div class="toast-progress" style="animation:toastCountdown ' + durationMs + 'ms linear forwards"></div>';

    el.querySelector('.toast-undo').addEventListener('click', function() {
        if (undoCallback) undoCallback();
        dismissToast(id);
    });
    el.querySelector('.toast-dismiss').addEventListener('click', function() {
        dismissToast(id);
    });

    container.appendChild(el);

    var timer = setTimeout(function() { dismissToast(id); }, durationMs);
    toastStack.push({ id: id, el: el, timer: timer });

    // Cap visible toasts at 4
    while (toastStack.length > 4) {
        dismissToast(toastStack[0].id);
    }
    return id;
}

function dismissToast(id) {
    var idx = toastStack.findIndex(function(t) { return t.id === id; });
    if (idx === -1) return;
    var entry = toastStack[idx];
    clearTimeout(entry.timer);
    toastStack.splice(idx, 1);
    entry.el.classList.add('toast-exiting');
    entry.el.addEventListener('animationend', function() {
        if (entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
    }, { once: true });
}

// ---- Capability tier overlay ----
function getCapabilityTier(featureName) {
    const def = { tier: 'unknown', plan_required: null, expert_ref: null,
                  coverage_notes: 'Not yet classified', confidence: 'low' };
    if (!featureName || !CAPABILITY_MAP || Object.keys(CAPABILITY_MAP).length === 0) return def;
    if (CAPABILITY_MAP[featureName]) return CAPABILITY_MAP[featureName];
    const normalized = featureName.trim().toLowerCase();
    for (const [key, val] of Object.entries(CAPABILITY_MAP)) {
        if (key.trim().toLowerCase() === normalized) return val;
    }
    return def;
}

var _tierTipEl = null;

const GENERIC_TITLE_RE = /^connect\s+with\s+teachable$/i;
const FOLLOWUP_TITLE_RE = /^teachable\s+followup$/i;
function getProspectTitle(call) {
    const t = (call.title || '').trim();
    if (!GENERIC_TITLE_RE.test(t) && !FOLLOWUP_TITLE_RE.test(t)) return null;
    // Try marketing_data.company
    if (call.marketing_data && call.marketing_data.company && !isTeachableInternal(call.marketing_data.company)) {
        return call.marketing_data.company;
    }
    // Try hubspot_note COMPANY line
    if (call.hubspot_note) {
        const cm = call.hubspot_note.match(/^COMPANY:\s*(.+)/m);
        if (cm && cm[1].trim() && !isTeachableInternal(cm[1].trim())) return cm[1].trim();
    }
    // Try attendees
    const ext = extractCompany(call.attendees);
    if (ext) return ext;
    // Try marketing_data contacts
    if (call.marketing_data && call.marketing_data.contacts && call.marketing_data.contacts.length > 0) {
        return call.marketing_data.contacts[0].name;
    }
    return null;
}

function extractCompany(attendeeStr) {
    if (!attendeeStr) return '';
    const parts = attendeeStr.split(',').map(s => s.trim()).filter(Boolean);
    const external = parts.filter(p => !p.toLowerCase().includes('teachable'));
    return external.join(', ');
}

function tsLink(m) {
    if (m.link) return '<a href="' + esc(m.link) + '" target="_blank" title="Jump to this moment in the recording">' + esc(m.ts || '0:00') + '</a>';
    if (m.transcript) return '<a href="' + esc(m.transcript) + '" target="_blank">' + (m.ts || 'open') + '</a>';
    return '<span>' + esc(m.ts || '--') + '</span>';
}

function mentionHTML(m, showFeature) {
    let tag = showFeature ? '<span class="feat-tag">' + esc(m.keyword) + '</span> ' : '';
    return '<div class="m-row">' +
        '<div class="m-ts">' + tsLink(m) + '</div>' +
        '<div class="m-body">' +
            '<div class="m-call">' + tag + esc(m.call_title) + ' &middot; ' + m.call_date + '</div>' +
            '<div class="m-quote"><span class="m-spk">' + esc(m.speaker) + ':</span> "' + esc(m.text.slice(0, 160)) + '"</div>' +
        '</div></div>';
}

// ---- Features view (grouped by category) ----
function isTeachableInternal(name) {
    if (!name) return true;
    const low = name.toLowerCase().trim();
    return low === 'teachable' || low === 'unknown' || low === '';
}

function companyFromTitle(title) {
    if (!title) return '';
    const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
    if (chevron) return chevron[1].split(':')[0].trim();
    return '';
}

function companyFromAttendees(attendees) {
    if (!attendees) return '';
    // Extract company from parenthetical in attendee names, skipping Teachable
    const parts = attendees.split(',').map(s => s.trim()).filter(Boolean);
    for (const p of parts) {
        const paren = p.match(/\(([^)]+)\)/);
        if (paren) {
            const co = paren[1].trim();
            if (!isTeachableInternal(co)) return co;
        }
    }
    return '';
}

function getCompany(m, callMap) {
    // Prefer explicit company field from features.json (if not internal)
    if (m.company && !isTeachableInternal(m.company)) return m.company;
    // Fall back to reportGetCompany (parses speaker/call_title)
    const co = reportGetCompany(m, callMap);
    if (co && !isTeachableInternal(co)) return co;
    // Try call title
    const call = callMap[m.call_id];
    if (call) {
        const fromTitle = companyFromTitle(call.title);
        if (fromTitle && !isTeachableInternal(fromTitle)) return fromTitle;
        // Try attendees field
        const fromAttendees = companyFromAttendees(call.attendees);
        if (fromAttendees) return fromAttendees;
    }
    return '';
}

var _featAllCategories = [];    // All category names for dropdown
var _featInitialized = false;   // Whether the scaffold (KPI bar, filters, table) is in the DOM

// ---- Data pipeline: getFilteredFeatures() ----
function getFilteredFeatures() {
    let data = [..._featAllData];
    const q = (document.getElementById('q') ? document.getElementById('q').value : '').toLowerCase();

    // Segment filter: narrow each feature's mentions to matching segments,
    // then recompute aggregates; drop features with zero remaining mentions
    if (activeSegmentFilters.size > 0) {
        data = data.map(f => {
            const filtered = f.mentions.filter(m => {
                const call = _featCallMap[m.call_id];
                return call && call.segment && activeSegmentFilters.has(call.segment.toLowerCase());
            });
            if (filtered.length === 0) return null;
            // Rebuild aggregates from filtered mentions
            const coMap = {};
            filtered.forEach(m => {
                const co = m._company || '';
                if (!co) return;
                if (!coMap[co]) coMap[co] = { contacts: new Set(), count: 0 };
                coMap[co].count++;
            });
            const coEntries = Object.entries(coMap).sort((a, b) => b[1].count - a[1].count || a[0].localeCompare(b[0]));
            const dates = filtered.map(m => m.call_date || '').filter(Boolean).sort();
            const confs = filtered.map(m => m.confidence).filter(c => c != null);
            const avgConf = confs.length > 0 ? confs.reduce((s, c) => s + c, 0) / confs.length : null;
            return Object.assign({}, f, {
                mentions: filtered,
                mentionCount: filtered.length,
                companyCount: coEntries.length,
                coEntries: coEntries,
                topCompany: coEntries.length > 0 ? coEntries[0][0] : '',
                lastDate: dates.length > 0 ? dates[dates.length - 1] : '',
                avgConf: avgConf,
            });
        }).filter(Boolean);
    }

    // Tier filter
    if (!activeTierFilters.has('all')) {
        data = data.filter(f => activeTierFilters.has(f.tier));
    }
    // Category filter
    if (_featCatFilter) {
        data = data.filter(f => f.category === _featCatFilter);
    }
    // Search
    if (q) {
        data = data.filter(f => f.searchText.includes(q));
    }
    // Company filter
    if (activeCompanyFilters.size > 0) {
        data = data.filter(f => {
            return f.coEntries.some(([co]) => activeCompanyFilters.has(co.toLowerCase()));
        });
    }
    // Sort — when grouping by category, force category as primary sort
    const col = _featSortCol;
    const dir = _featSortDir;
    const sortFn = {
        tier: (a, b) => { const order = { gap:0, unknown:1, roadmap:2, workaround:3, native:4 }; return ((order[a.tier]||5) - (order[b.tier]||5)) * dir; },
        feature: (a, b) => a.keyword.localeCompare(b.keyword) * dir,
        mentions: (a, b) => (a.mentionCount - b.mentionCount) * dir,
        companies: (a, b) => (a.companyCount - b.companyCount) * dir,
        recency: (a, b) => (a.lastDate || '').localeCompare(b.lastDate || '') * dir,
        confidence: (a, b) => ((a.avgConf || 0) - (b.avgConf || 0)) * dir,
        category: (a, b) => a.category.localeCompare(b.category) * dir,
    };
    if (_featGroupByCat) {
        // Primary sort: category alphabetical, secondary: user's selected column
        const secondary = sortFn[col] || sortFn.mentions;
        data.sort((a, b) => {
            const catCmp = a.category.localeCompare(b.category);
            return catCmp !== 0 ? catCmp : secondary(a, b);
        });
    } else {
        data.sort(sortFn[col] || sortFn.mentions);
    }
    return data;
}

// ---- Render: Interactive KPI rail from filtered data ----
function renderSummaryBar(features) {
    const totalFeats = features.length;
    const gapFeats = features.filter(f => f.tier === 'gap');
    const gapCount = gapFeats.length;
    const topGap = [...gapFeats].sort((a, b) => b.companyCount - a.companyCount)[0];
    const uniqueCos = new Set();
    features.forEach(f => f.coEntries.forEach(([co]) => uniqueCos.add(co)));

    // Most active prospect (last 30 days)
    const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    const thirtyDaysStr = thirtyDaysAgo.toISOString().slice(0, 10);
    const recentCoCounts = {};
    features.forEach(f => {
        f.mentions.forEach(m => {
            if ((m.call_date || '') >= thirtyDaysStr && m._company) {
                recentCoCounts[m._company] = (recentCoCounts[m._company] || 0) + 1;
            }
        });
    });
    const mostActiveCo = Object.entries(recentCoCounts).sort((a, b) => b[1] - a[1])[0];

    // Active states
    const isAllActive = activeTierFilters.has('all');
    const isGapActive = !activeTierFilters.has('all') && activeTierFilters.has('gap') && activeTierFilters.size === 1;
    const isCoSorted = _featSortCol === 'companies' && _featSortDir === -1;

    const el = document.getElementById('feat-kpi-bar');
    if (!el) return;

    // 1. Total Features (numeric) — resets all filters
    let html = '<article class="kpi-card kpi-numeric' + (isAllActive && !_featCatFilter ? ' kpi-active' : '') + '" data-tooltip="Click to show all features">' +
        '<button class="kpi-action" aria-label="Total features: ' + totalFeats + '. Click to reset all filters" onclick="kpiResetFilters()">' +
        '<div class="kpi-value">' + totalFeats + '</div>' +
        '<div class="kpi-label">Total Features</div>' +
        '</button></article>';

    // 2. Gap Features (numeric) — applies gap tier filter
    html += '<article class="kpi-card kpi-numeric kpi-gap-border' + (isGapActive ? ' kpi-active' : '') + '" data-tooltip="Click to filter to gaps">' +
        '<button class="kpi-action" aria-label="Gap features: ' + gapCount + '. Click to filter to gaps" onclick="kpiFilterGaps()">' +
        '<div class="kpi-value">' + gapCount + '</div>' +
        '<div class="kpi-label">Gap Features</div>' +
        '</button></article>';

    // 3. Top Gap (entity) — opens detail panel for that feature
    const topGapKey = topGap ? esc(topGap.keyword).replace(/'/g, "\\'") : '';
    html += '<article class="kpi-card kpi-entity kpi-gap-bg" data-tooltip="Click to open detail">' +
        '<button class="kpi-action" aria-label="Top gap: ' + (topGap ? esc(topGap.keyword) : 'none') + '. Click to open detail panel" onclick="' + (topGap ? "kpiOpenTopGap('" + topGapKey + "')" : '') + '">' +
        '<div class="kpi-value">' + (topGap ? esc(topGap.keyword) : '--') + '</div>' +
        '<div class="kpi-label">Top Gap</div>' +
        (topGap ? '<div class="kpi-sub">' + topGap.companyCount + ' companies &middot; Gap</div>' : '') +
        '</button></article>';

    // 4. Most Active 30d (entity) — navigates to Personas
    const safeActiveCo = mostActiveCo ? esc(mostActiveCo[0]).replace(/'/g, "\\'") : '';
    html += '<article class="kpi-card kpi-entity kpi-active-co" data-tooltip="Click to view in Personas">' +
        '<button class="kpi-action" aria-label="Most active company: ' + (mostActiveCo ? esc(mostActiveCo[0]) : 'none') + '. Click to view in Personas" onclick="' + (mostActiveCo ? "filterPersonasByCompany('" + safeActiveCo + "')" : '') + '">' +
        '<div class="kpi-value">' + (mostActiveCo ? esc(mostActiveCo[0]) : '--') + '</div>' +
        '<div class="kpi-label">Most Active (30d)</div>' +
        (mostActiveCo ? '<div class="kpi-sub">' + mostActiveCo[1] + ' mentions</div>' : '') +
        '</button></article>';

    // 5. Unique Companies (numeric) — sorts table by companies desc
    html += '<article class="kpi-card kpi-numeric' + (isCoSorted ? ' kpi-active' : '') + '" data-tooltip="Click to sort by companies">' +
        '<button class="kpi-action" aria-label="Unique companies: ' + uniqueCos.size + '. Click to sort by companies" onclick="kpiSortCompanies()">' +
        '<div class="kpi-value">' + uniqueCos.size + '</div>' +
        '<div class="kpi-label">Unique Companies</div>' +
        '</button></article>';

    el.innerHTML = html;
}

// ---- KPI action helpers ----
function kpiResetFilters() {
    activeTierFilters.clear();
    activeTierFilters.add('all');
    _featCatFilter = '';
    // Reset tier button UI
    document.querySelectorAll('#features-view .tier-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tier === 'all');
    });
    // Reset category dropdown
    var catBtn = document.querySelector('.feat-cat-btn');
    if (catBtn) catBtn.textContent = 'Category';
    var catMenu = document.querySelector('.feat-cat-menu');
    if (catMenu) catMenu.querySelectorAll('.feat-cat-opt').forEach(o => o.classList.toggle('active', !o.dataset.cat));
    rebuildFeatureView();
}

function kpiFilterGaps() {
    activeTierFilters.clear();
    activeTierFilters.add('gap');
    // Update tier button UI
    document.querySelectorAll('#features-view .tier-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tier === 'gap');
    });
    rebuildFeatureView();
}

function kpiOpenTopGap(keyword) {
    // Ensure gaps filter is not blocking, then open detail
    if (!activeTierFilters.has('all') && !activeTierFilters.has('gap')) {
        activeTierFilters.clear();
        activeTierFilters.add('all');
        document.querySelectorAll('#features-view .tier-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tier === 'all');
        });
        rebuildFeatureView();
    }
    openFeatureDetail(keyword);
}

function kpiSortCompanies() {
    _featSortCol = 'companies';
    _featSortDir = -1;
    rebuildFeatureView();
}

// ---- Render: Table rows from filtered data ----
function renderTable(features) {
    _featFilteredData = features;
    const maxMentions = features.length > 0 ? Math.max(...features.map(f => f.mentionCount)) : 1;
    let rows = '';
    let lastCat = '';

    features.forEach(f => {
        // Category group header
        if (_featGroupByCat && f.category !== lastCat) {
            lastCat = f.category;
            rows += '<tr class="cat-group-hdr"><td colspan="7">' + esc(f.category) + '</td></tr>';
        }

        const tierColor = { gap:'#ef4444', native:'#22c55e', workaround:'#eab308', roadmap:'#3b82f6', unknown:'#6b7280' }[f.tier] || '#6b7280';
        const barW = maxMentions > 0 ? Math.round((f.mentionCount / maxMentions) * 60) : 0;
        const confCls = f.avgConf >= 0.8 ? 'conf-high' : (f.avgConf >= 0.5 ? 'conf-mid' : 'conf-none');
        const isActive = _activeFeatureKey === f.keyword;
        const safeKey = esc(f.keyword).replace(/'/g, "\\'");

        rows += '<tr class="feat-row' + (isActive ? ' active' : '') + '" data-feat-key="' + esc(f.keyword) + '" data-tier="' + f.tier + '" style="--tier-color:' + tierColor + '" tabindex="0" onclick="openFeatureDetail(\'' + safeKey + '\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openFeatureDetail(\'' + safeKey + '\')}">';
        rows += '<td class="tier-cell"><span class="tier-dot tier-' + f.tier + '"></span></td>';
        rows += '<td class="feat-cell"><span class="feat-name">' + esc(f.keyword) + '</span><span class="feat-cat">' + esc(f.category) + '</span></td>';
        rows += '<td class="mentions-cell"><span class="mention-num">' + f.mentionCount + '</span><span class="mention-bar tier-' + f.tier + '" style="width:' + barW + 'px"></span></td>';
        rows += '<td class="companies-cell">' + f.companyCount + '</td>';
        rows += '<td class="recency-cell col-recency">' + formatRecency(f.lastDate) + '</td>';
        rows += '<td class="top-co-cell col-topco">' + esc(f.topCompany) + '</td>';
        rows += '<td class="col-conf"><span class="conf-dot ' + confCls + '"></span></td>';
        rows += '</tr>';
    });

    const tbody = document.getElementById('feat-table-body');
    if (tbody) tbody.innerHTML = rows || '<tr><td colspan="7" style="padding:2rem;color:#3a3d4e;text-align:center">No features match filters.</td></tr>';

    // Update sort arrows and aria-sort
    document.querySelectorAll('.feat-table th').forEach(th => {
        const c = th.dataset.col;
        th.classList.toggle('sorted', c === _featSortCol);
        if (th.hasAttribute('aria-sort')) {
            th.setAttribute('aria-sort', c === _featSortCol ? (_featSortDir > 0 ? 'ascending' : 'descending') : 'none');
        }
        const arrow = th.querySelector('.sort-arrow');
        if (arrow) arrow.textContent = c === _featSortCol ? (_featSortDir > 0 ? '\u25B2' : '\u25BC') : '';
    });

    // Update search count
    const q = (document.getElementById('q') ? document.getElementById('q').value : '').toLowerCase();
    const countEl = document.getElementById('search-result-count');
    if (q && countEl) countEl.textContent = features.length + ' of ' + _featAllData.length;
    else if (countEl) countEl.textContent = '';
}

    const callMap = _featCallMap;
    const mentions = feat.mentions;
    const cap = getCapabilityTier(feat.keyword);

    // Header
    let html = '<div class="feat-panel-header">';
    html += '<button class="feat-panel-close" aria-label="Close detail panel" onclick="closeDetailPanel()">&times;</button>';
    html += '<h2 class="feat-panel-title" id="feat-panel-title-heading">' + esc(feat.keyword) + '</h2>';
    html += '<div class="feat-panel-cat">' + esc(feat.category) + '</div>';
    html += '<div style="margin-top:6px">' + renderTierBadge(feat.keyword) + '</div>';
    if (cap.coverage_notes && cap.coverage_notes !== 'Not yet classified') {
        html += '<div style="font-size:11px;color:#6b7084;margin-top:4px">' + esc(cap.coverage_notes) + '</div>';
    }
    html += '</div>';

    // Stats row
    const dates = mentions.map(m => m.call_date || '').filter(Boolean).sort();

    html += '<div class="feat-panel-stat">First: ' + esc(firstDate) + '</div>';
    html += '<div class="feat-panel-stat">Latest: ' + esc(lastDate) + '</div>';
    html += '</div>';

    // Company breakdown
    html += '<div class="feat-panel-section">';
    html += '<div class="feat-panel-section-title">Companies</div>';
    const maxCoCnt = feat.coEntries.length > 0 ? feat.coEntries[0][1].count : 1;
    feat.coEntries.forEach(([co, data]) => {

        html += '</div>';
    });
    html += '</div>';

    // Mentions list
    html += '<div class="feat-panel-section">';
    html += '<div class="feat-panel-section-title">Mentions (' + mentions.length + ')</div>';
    const sorted = [...mentions].sort((a, b) => (b.call_date || '').localeCompare(a.call_date || ''));
    sorted.forEach(m => {
        const call = callMap[m.call_id];
        const callDate = m.call_date || (call ? call.date : '');
        const co = m._company || m.company || '';
        const spk = m.speaker || '';
        const title = m.contact_title || '';
        const fullText = m.text || '';
        const conf = m.confidence;

        html += '<div class="detail-mention">';
        html += '<div class="mention-meta">';
        html += '<span class="mention-date">' + esc(callDate) + '</span>';
        html += '<span class="mention-company">' + esc(co) + '</span>';
        if (spk) {
            html += '<span class="mention-speaker">' + esc(spk);
            if (title) html += ' &middot; ' + esc(title);
            html += '</span>';
        }
        html += '</div>';
        if (fullText) {
            html += '<div class="mention-quote">"' + esc(fullText) + '"</div>';
        }
        html += '<div class="mention-footer">';
        if (conf != null) {
            const confCls = conf >= 0.8 ? ' high' : (conf >= 0.5 ? ' mid' : '');
            html += '<span class="conf-badge' + confCls + '">' + conf.toFixed(2) + '</span>';
        }
        if (m.link) {
            html += '<a class="transcript-link" href="' + esc(m.link) + '" target="_blank">View transcript &#8599;</a>';
        } else if (m.transcript) {
            html += '<a class="transcript-link" href="' + esc(m.transcript) + '" target="_blank">View transcript &#8599;</a>';
        }
        if (m.competitor_context && m.competitor_context !== 'NEEDS_REVIEW') {
            html += '<span class="competitor-ctx">vs. ' + esc(m.competitor_context) + '</span>';
        }
        html += '</div>';
        html += '</div>';
    });
    html += '</div>';

    const panel = document.getElementById('feat-panel');
    if (panel) panel.innerHTML = html;
}

// ---- Panel open/close ----
var _featPanelTriggerRow = null; // row that opened the panel, for focus return

function openFeatureDetail(keyword) {
    const feat = _featFilteredData.find(f => f.keyword === keyword);
    if (!feat) return;

    // Highlight active row
    document.querySelectorAll('.feat-table tr.feat-row.active').forEach(r => r.classList.remove('active'));
    const row = document.querySelector('.feat-table tr.feat-row[data-feat-key="' + CSS.escape(keyword) + '"]');
    if (row) row.classList.add('active');

    _activeFeatureKey = keyword;
    _featPanelTriggerRow = row;

    // Populate and open panel
    renderDetailPanel(feat);
    const panel = document.getElementById('feat-panel');
    const overlay = document.getElementById('feat-panel-overlay');
    if (panel) {
        panel.classList.add('open');
        // Focus transfer: move focus to close button inside panel
        requestAnimationFrame(() => {
            const closeBtn = panel.querySelector('.feat-panel-close');
            if (closeBtn) closeBtn.focus();
        });
        // Focus trap
        panel.removeEventListener('keydown', _featPanelFocusTrap);
        panel.addEventListener('keydown', _featPanelFocusTrap);
    }
    if (overlay) overlay.classList.add('open');
}

function _featPanelFocusTrap(e) {
    if (e.key !== 'Tab') return;
    const panel = document.getElementById('feat-panel');
    if (!panel) return;
    const focusable = panel.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
    if (focusable.length === 0) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
}

function closeDetailPanel() {
    const panel = document.getElementById('feat-panel');
    const overlay = document.getElementById('feat-panel-overlay');
    if (panel) {
        panel.classList.remove('open');
        panel.removeEventListener('keydown', _featPanelFocusTrap);
    }
    if (overlay) overlay.classList.remove('open');
    _activeFeatureKey = null;
    document.querySelectorAll('.feat-table tr.feat-row.active').forEach(r => r.classList.remove('active'));
    // Focus return: move focus back to the row that triggered the panel
    if (_featPanelTriggerRow) {
        _featPanelTriggerRow.focus();
        _featPanelTriggerRow = null;
    }
}

// Keep old name as alias for cross-tab close calls
function closeFeatPanel() { closeDetailPanel(); }

function featPanelKeyNav(e) {
    if (!_activeFeatureKey) return;
    if (e.key === 'Escape') { closeDetailPanel(); return; }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const dir = e.key === 'ArrowDown' ? 1 : -1;
        const idx = _featFilteredData.findIndex(f => f.keyword === _activeFeatureKey);
        if (idx < 0) return;
        const nextIdx = idx + dir;
        if (nextIdx >= 0 && nextIdx < _featFilteredData.length) {
            openFeatureDetail(_featFilteredData[nextIdx].keyword);
        }
    }
}

function formatRecency(dateStr) {
    if (!dateStr) return '--';
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return '1d ago';
    if (diff < 14) return diff + 'd ago';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
}

// ---- Cross-tab navigation: company -> Personas ----
function filterPersonasByCompany(companyName) {
    if (!companyName) return;
    closeDetailPanel();
    switchTab('personas');
    // Find the best segment for this company (highest engagement score)
    setTimeout(function() {
        let bestSeg = null;
        let bestScore = -1;
        for (const seg of Object.keys(_personaData)) {
            const d = _personaData[seg][companyName];
            if (d && d.engagementScore > bestScore) {
                bestScore = d.engagementScore;
                bestSeg = seg;
            }
        }
        // Build expected card ID from best segment
        let targetCard = null;
        if (bestSeg) {
            const expectedId = 'prospect-' + (bestSeg + '-' + companyName).replace(/[^a-z0-9]/gi, '-').toLowerCase();
            targetCard = document.getElementById(expectedId);
        }
        // Fallback: scan all cards by header text
        if (!targetCard) {
            const cards = document.querySelectorAll('.prospect-card');
            for (const card of cards) {
                const coEl = card.querySelector('.prospect-co');
                if (coEl && coEl.textContent.trim() === companyName) { targetCard = card; break; }
            }
        }
        if (targetCard) {
            // Expand parent segment group if collapsed
            const group = targetCard.closest('.seg-group');
            if (group && group.classList.contains('collapsed')) {
                group.classList.remove('collapsed');
                const hdr = group.querySelector('.seg-group-hdr');
                if (hdr) hdr.setAttribute('aria-expanded', 'true');
            }
            const groupCards = targetCard.closest('.seg-group-cards');
            const showMoreBtn = groupCards ? groupCards.querySelector('.prospect-show-more[data-expanded="false"]') : null;
            if (showMoreBtn && targetCard.classList.contains('prospect-extra')) {
                toggleProspectGroupLimit(showMoreBtn);
            }
            // Expand the card
            const btn = targetCard.querySelector('.prospect-card-header');
            if (btn && btn.getAttribute('aria-expanded') !== 'true') {
                toggleProspectCard(btn);
            }
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 200);
}

// ---- rebuildFeatureView: single entry point for all filter/sort/search ----
function rebuildFeatureView() {
    const features = getFilteredFeatures();
    renderSummaryBar(features);
    renderTable(features);
    // If detail panel is open, check if active feature is still visible

        } else {
            closeDetailPanel();
        }
    }
}

// ---- Week grouping helpers ----
function getWeekStart(dateStr) {
    // Returns Monday 00:00 of the week containing dateStr
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDay(); // 0=Sun
    const diff = day === 0 ? 6 : day - 1; // shift so Mon=0
    d.setDate(d.getDate() - diff);
    return d;
}

function fmtShortDate(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
}

function weekLabel(weekStart) {
    const now = new Date();
    const thisWeekStart = getWeekStart(now.toISOString().slice(0,10));
    const lastWeekStart = new Date(thisWeekStart);
    lastWeekStart.setDate(lastWeekStart.getDate() - 7);

    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 4); // Friday

    const range = fmtShortDate(weekStart) + ' – ' + fmtShortDate(weekEnd);

    if (weekStart.getTime() === thisWeekStart.getTime()) return 'This Week (' + range + ')';
    if (weekStart.getTime() === lastWeekStart.getTime()) return 'Last Week (' + range + ')';
    return range;
}

// Estimate call duration: use stored value if plausible, otherwise estimate from transcript (~150 wpm)
function estimateCallDuration(c) {
    const text = c.transcript_text || '';
    const words = text.length >= 100 ? text.split(/\s+/).length : 0;
    const estMin = words > 0 ? Math.round(words / 150) : 0;
    // Trust stored duration only if it's within 3x of estimate (or no transcript to compare)
    if (c.duration > 0 && (estMin === 0 || c.duration >= estMin / 3)) return c.duration;
    return estMin || c.duration || 0;
}

// ---- Shared report helpers ----
function reportGetCompany(m, callMap) {
    const spk = m.speaker || '';
    const spkLow = spk.toLowerCase();
    const call = callMap[m.call_id];
    const title = call ? call.title : '';
    const paren = spk.match(/\(([^)]+)\)/);

    // Known speaker → company mappings (works with or without parenthetical)
    if (spkLow.includes('hui ching') || spkLow.includes('kai shan')) return 'LTA';
    if (spkLow.includes('simon davey')) return 'Simon Davey';
    if (spkLow.includes('simon smith') || spkLow.includes('sabine') || spkLow.includes('katrina welch')) return 'Simon & Sabine (Coaching)';
    if (spkLow.includes('ibrahim') || spkLow.includes('bryan') || spkLow.includes('oghenetejiri')) return 'Dot Compliance';

    if (paren) {
        const raw = paren[1].split('/')[0].trim();
        const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
        if (chevron) return chevron[1].trim();
        if (title.toLowerCase().includes('speravita')) return 'Speravita';
        if (title.toLowerCase().includes('dot compliance')) return 'Dot Compliance';
        if (title.toLowerCase().includes('lta') || raw.toLowerCase().includes('lta')) return 'LTA';
        // Never return Teachable or Unknown as a company
        if (!isTeachableInternal(raw)) return raw;
        // Fall through: internal speaker, try extracting from title
        if (title) return companyFromTitle(title);
    }
    return '';
}
function reportFmtTs(sec) {
    if (sec == null) return '';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}
function reportWeekRange(weekStart) {
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 4);
    return fmtShortDate(weekStart) + ' \u2013 ' + fmtShortDate(end) + ', ' + weekStart.getFullYear();
}

    );
    const dates = activeCalls.map(c => c.date).filter(Boolean).sort();
    const dateRange = dates.length
        ? fmtShortDate(new Date(dates[0] + 'T00:00:00')) + ' \u2013 ' +
          fmtShortDate(new Date(dates[dates.length - 1] + 'T00:00:00')) + ', ' + dates[0].slice(0, 4)
        : '';

    // Companies map
    const coMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        if (!coMap[co]) coMap[co] = { features: new Set(), calls: new Map() };
        coMap[co].features.add(m.keyword);
        if (!coMap[co].calls.has(m.call_id)) coMap[co].calls.set(m.call_id, callMap[m.call_id]);
    });
    const companies = Object.entries(coMap).sort((a, b) => b[1].features.size - a[1].features.size);

    // Features by category
    const catMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        const cat = m.category || 'Other';
        if (!catMap[cat]) catMap[cat] = {};
        if (!catMap[cat][m.keyword]) catMap[cat][m.keyword] = [];
        catMap[cat][m.keyword].push({ company: co, tsDisplay: reportFmtTs(m.ts_sec), link: m.link || '' });
    });
    const catEntries = Object.entries(catMap).map(([cat, feats]) => {
        let total = 0;
        const coSet = new Set();
        Object.values(feats).forEach(arr => { total += arr.length; arr.forEach(e => coSet.add(e.company)); });
        return { cat, feats, total, coCount: coSet.size };
    }).sort((a, b) => b.total - a.total);
    const topTheme = catEntries.length ? catEntries[0] : null;

    // Marketing data aggregation
    const allMktData = activeCalls.map(c => ({ call: c, md: c.marketing_data || {} })).filter(x => Object.keys(x.md).length > 0);
    const allQuotes = [], allTerminology = [], allQuestions = [];
    const allObjections = [], allMktCompetitors = [], allBarriers = [];
    const allSignals = [], allTimelines = [];

    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        (md.quotes || []).forEach(q => allQuotes.push({ ...q, _co: co, _call: call }));
        (md.terminology || []).forEach(t => allTerminology.push({ ...t, _co: co }));
        (md.questions_asked || []).forEach(q => allQuestions.push({ ...q, _co: co, _call: call }));
        (md.objections || []).forEach(o => allObjections.push({ ...o, _co: co, _call: call }));
        (md.competitors_mentioned || []).forEach(c => allMktCompetitors.push({ ...c, _co: co, _call: call }));
        (md.barriers_to_adoption || []).forEach(b => {
            const existing = allBarriers.find(x => x.barrier === b);
            if (existing) { if (!existing.companies.includes(co)) existing.companies.push(co); }
            else allBarriers.push({ barrier: b, companies: [co] });
        });
        (md.buying_signals || []).forEach(s => allSignals.push({ ...s, _co: co, _call: call }));
        allTimelines.push({ company: co, timeline: md.timeline || null, call: call });
    });

    // Competitor mentions (merged from structured + legacy)
    const compMentionsByName = {};
    const compMeta = {};
    if (DATA.competitors) {
        DATA.competitors.forEach(c => { compMeta[c.name.toLowerCase()] = c; });
    }
    const _rptCompAliases = { 'wap': 'wapcrm' };
    function rptGetCompMeta(name) {
        const lower = name.toLowerCase();
        if (compMeta[lower]) return compMeta[lower];
        if (_rptCompAliases[lower] && compMeta[_rptCompAliases[lower]]) return compMeta[_rptCompAliases[lower]];
        const stripped = lower.replace(/[\s\-()]/g, '');
        for (const [k, v] of Object.entries(compMeta)) {
            if (k.replace(/[\s\-()]/g, '') === stripped) return v;
        }
        return null;
    }

    activeCalls.forEach(c => {
        (c.competitor_mentions || []).forEach(cm => {
            const name = cm.competitor || cm.name || '';
            if (!name) return;
            if (!compMentionsByName[name]) compMentionsByName[name] = [];
            const co = c.marketing_data ? (c.marketing_data.company || '') : '';
            compMentionsByName[name].push({
                context: cm.context || '', mention_type: cm.mention_type || 'asked_about',
                company: co, segment: c.segment || '', call_date: c.date || ''
            });
        });
    });
    allMktCompetitors.forEach(cm => {
        const name = cm.name || '';
        if (!name) return;
        if (!compMentionsByName[name]) compMentionsByName[name] = [];
        compMentionsByName[name].push({
            context: cm.context || '', mention_type: cm.mention_type || 'asked_about',
            company: cm._co || '', segment: '', call_date: cm._call ? cm._call.date || '' : ''
        });
    });
    const compNames = Object.keys(compMentionsByName).sort((a, b) => compMentionsByName[b].length - compMentionsByName[a].length);

    // Prospect aggregation (for export)
    const prospectMap = {};
    companies.forEach(([name, d]) => {
        if (!prospectMap[name]) prospectMap[name] = { features: [], calls: [], contacts: [], segment: '', description: '', quote: '' };
        d.features.forEach(f => { if (!prospectMap[name].features.includes(f)) prospectMap[name].features.push(f); });
        d.calls.forEach(c => { if (c) prospectMap[name].calls.push(c); });
    });
    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        if (!prospectMap[co]) prospectMap[co] = { features: [], calls: [], contacts: [], segment: '', description: '', quote: '' };
        if (call.segment && !prospectMap[co].segment) prospectMap[co].segment = call.segment;
        if (md.company_description && !prospectMap[co].description) prospectMap[co].description = md.company_description;
        (md.contacts || []).forEach(ct => {
            if (!prospectMap[co].contacts.find(x => x.name === ct.name)) prospectMap[co].contacts.push(ct);
        });
        if (!prospectMap[co].calls.find(x => x.id === call.id)) prospectMap[co].calls.push(call);
        if (!prospectMap[co].quote && md.quotes && md.quotes.length) {
            prospectMap[co].quote = md.quotes[0].text || '';
        }
    });

    // Segment breakdown (for export)
    const segMap = {};
    activeCalls.forEach(c => {
        const seg = c.segment || 'Unclassified';
        if (!segMap[seg]) segMap[seg] = [];
        const callCo = companies.find(([name, d]) => d.calls.has(c.id));
        segMap[seg].push(callCo ? callCo[0] : (c.title || 'Unknown'));
    });
    const segEntries = Object.entries(segMap).sort((a, b) => b[1].length - a[1].length);

    // Helpers
    function insTsLink(call, tsSec, tsDisplay) {
        if (tsSec != null && call && call.transcript) {
            const url = call.transcript.split('?')[0] + '?t=' + Math.floor(tsSec);
            return '<a class="quote-link" href="' + esc(url) + '" target="_blank">' + esc(tsDisplay || reportFmtTs(tsSec)) + ' \u2197</a>';
        }
        return '';
    }
    function emailTsLink(call, tsSec, tsDisplay) {
        if (tsSec != null && call && call.transcript) {
            const url = call.transcript.split('?')[0] + '?t=' + Math.floor(tsSec);
            return '<a href="' + esc(url) + '" target="_blank" style="color:#4a7cff;text-decoration:none">' + esc(tsDisplay || reportFmtTs(tsSec)) + '</a>';
        }
        if (tsDisplay) return '<span style="color:#8b8fa3">' + esc(tsDisplay) + '</span>';
        return '';
    }

    // ==================== COVERAGE & FRESHNESS (Component 0) ====================
    const coverageRatio = activeCalls.length > 0 ? allMktData.length / activeCalls.length : 0;
    const lastDate = dates.length ? dates[dates.length - 1] : '';
    const lastDateFmt = lastDate ? fmtShortDate(new Date(lastDate + 'T00:00:00')) + ', ' + lastDate.slice(0, 4) : 'N/A';
    let coverageH = '<div class="ins-coverage' + (coverageRatio < 0.5 ? ' low-coverage' : '') + '">';
    coverageH += 'Qualitative coverage: ' + allMktData.length + ' of ' + activeCalls.length + ' filtered calls';
    coverageH += ' &middot; Last updated: ' + esc(lastDateFmt);
    coverageH += '</div>';

    // ==================== EXECUTIVE SUMMARY BAR (Component 1) ====================
    // Top barrier
    const sortedBarriers = [...allBarriers].sort((a, b) => b.companies.length - a.companies.length);
    const topBarrier = sortedBarriers.length ? sortedBarriers[0] : null;
    // Unique companies with marketing data
    const mktCompanies = new Set(allMktData.map(x => x.md.company || 'Unknown'));

    let kpiH = '<div class="ins-kpi-bar">';
    // 1. Quotes Captured (numeric)
    kpiH += '<article class="kpi-card kpi-numeric" data-tooltip="Total quotes from prospect calls">';
    kpiH += '<button class="kpi-action" aria-label="' + allQuotes.length + ' quotes captured. Click to view Voice of Customer."';
    kpiH += ' onclick="switchInsTab(\'voc\')">';
    kpiH += '<div class="kpi-value">' + allQuotes.length + '</div>';
    kpiH += '<div class="kpi-label">Quotes</div>';
    kpiH += '</button></article>';
    // 2. Objections (numeric)
    kpiH += '<article class="kpi-card kpi-numeric" data-tooltip="Objections and hesitations raised" style="border-left:3px solid rgba(244,114,182,0.5)">';
    kpiH += '<button class="kpi-action" aria-label="' + allObjections.length + ' objections. Click to view Objections &amp; Barriers."';
    kpiH += ' onclick="switchInsTab(\'objections\')">';
    kpiH += '<div class="kpi-value">' + allObjections.length + '</div>';
    kpiH += '<div class="kpi-label">Objections</div>';
    kpiH += '</button></article>';
    // 3. Buying Signals (numeric)
    kpiH += '<article class="kpi-card kpi-numeric" data-tooltip="Signals indicating purchase intent" style="border-left:3px solid rgba(74,222,128,0.5)">';
    kpiH += '<button class="kpi-action" aria-label="' + allSignals.length + ' buying signals. Click to view Buying Signals."';
    kpiH += ' onclick="switchInsTab(\'signals\')">';
    kpiH += '<div class="kpi-value">' + allSignals.length + '</div>';
    kpiH += '<div class="kpi-label">Buying Signals</div>';
    kpiH += '</button></article>';
    // 4. Top Barrier (entity)
    if (topBarrier) {
        kpiH += '<article class="kpi-card kpi-entity" data-tooltip="Most frequently mentioned barrier. Click to view." style="background:rgba(244,114,182,0.04);border-color:rgba(244,114,182,0.2)">';
        kpiH += '<button class="kpi-action" aria-label="Top barrier: ' + esc(topBarrier.barrier) + '. Click to view Objections."';
        kpiH += ' onclick="switchInsTab(\'objections\')">';
        kpiH += '<div class="kpi-value">' + esc(topBarrier.barrier) + '</div>';
        kpiH += '<div class="kpi-label">Top Barrier</div>';
        kpiH += '<div class="kpi-sub">' + topBarrier.companies.length + ' compan' + (topBarrier.companies.length !== 1 ? 'ies' : 'y') + '</div>';
        kpiH += '</button></article>';
    }
    // 5. Active Prospects (numeric)
    kpiH += '<article class="kpi-card kpi-numeric kpi-active-co" data-tooltip="Companies with qualitative data">';
    kpiH += '<button class="kpi-action" aria-label="' + mktCompanies.size + ' active prospects with qualitative data.">';
    kpiH += '<div class="kpi-value">' + mktCompanies.size + '</div>';
    kpiH += '<div class="kpi-label">Active Prospects</div>';
    kpiH += '</button></article>';
    kpiH += '</div>';

    // ==================== SECTION TABS (Component 2) ====================
    const problemQuotes = allQuotes.filter(q => q.theme === 'problem_description');
    const workaroundQuotes = allQuotes.filter(q => q.theme === 'workaround');
    const otherQuotes = allQuotes.filter(q => q.theme !== 'problem_description' && q.theme !== 'workaround');

    // Enablement data
    var fMentionCounts = {};
    mentions.forEach(function(m) { fMentionCounts[m.keyword] = (fMentionCounts[m.keyword] || 0) + 1; });
    var nativeFeats = Object.entries(fMentionCounts)
        .filter(function(e) { return getCapabilityTier(e[0]).tier === 'native'; })
        .sort(function(a, b) { return b[1] - a[1]; });
    var waFeats = Object.entries(fMentionCounts)
        .filter(function(e) { return getCapabilityTier(e[0]).tier === 'workaround'; })
        .sort(function(a, b) { return b[1] - a[1]; });
    var enableCount = nativeFeats.length + waFeats.length;

    const insTabs = [
        { id: 'voc', label: 'Voice of Customer', count: allQuotes.length },
        { id: 'questions', label: 'Open Questions', count: allQuestions.length },
        { id: 'objections', label: 'Objections & Barriers', count: allObjections.length + allBarriers.length },
        { id: 'signals', label: 'Buying Signals', count: allSignals.length },
        { id: 'terminology', label: 'Terminology', count: allTerminology.length },
        { id: 'enablement', label: 'Enablement', count: enableCount }
    ];

    let tabsH = '<div role="tablist" aria-label="Insights sections" class="ins-tablist" onkeydown="insTablistKeydown(event)">';
    insTabs.forEach((t, i) => {
        const sel = t.id === _insActiveTab;
        tabsH += '<button role="tab" id="ins-tab-' + t.id + '" aria-selected="' + sel + '"';
        tabsH += ' aria-controls="ins-panel-' + t.id + '" tabindex="' + (sel ? '0' : '-1') + '"';
        tabsH += ' class="ins-tab" onclick="switchInsTab(\'' + t.id + '\')">';
        tabsH += esc(t.label) + ' <span class="tab-count">' + t.count + '</span>';
        tabsH += '</button>';
    });
    tabsH += '</div>';

    // ==================== TAB PANELS (Components 3-7) ====================

    // Helper: render a list of quote-like items with top-N + show more
    function renderQuoteGroup(items, cssClass, maxInitial, groupId, renderFn) {
        if (!items.length) return '<div class="ins-empty">No data available.</div>';
        let h = '';
        items.forEach((item, i) => {
            h += '<div' + (i >= maxInitial ? ' class="ins-overflow" style="display:none" data-group="' + groupId + '"' : '') + '>';
            h += renderFn(item);
            h += '</div>';
        });
        if (items.length > maxInitial) {
            h += '<button class="ins-show-more" onclick="insShowMore(this, \'' + groupId + '\')" aria-expanded="false">';
            h += 'Show all ' + items.length + ' items</button>';
        }
        return h;
    }

    // --- VoC Panel ---
    let vocH = '<div role="tabpanel" id="ins-panel-voc" aria-labelledby="ins-tab-voc"' + (_insActiveTab !== 'voc' ? ' hidden' : '') + '>';
    vocH += '<div class="ins-controls">';
    vocH += '<button class="ins-sort-btn' + (_insVocSort === 'company' ? ' active' : '') + '" onclick="insToggleVocSort(\'company\', this)">By company</button>';
    vocH += '<button class="ins-sort-btn' + (_insVocSort === 'date' ? ' active' : '') + '" onclick="insToggleVocSort(\'date\', this)">By date</button>';
    vocH += '</div>';

    function renderQuoteCard(q, extraClass) {
        let h = '<div class="insight-quote' + (extraClass ? ' ' + extraClass : '') + '">';
        h += '<div class="quote-text">\u201c' + esc(q.text || q.quote || q.objection || '') + '\u201d</div>';
        h += '<div class="quote-attr">';
        if (q.speaker) h += '<span class="quote-speaker">' + esc(q.speaker) + '</span>';
        h += '<span class="quote-company">' + esc(q._co) + '</span>';
        if (q._call && q._call.segment) {
            const sc = segColor(q._call.segment);
            h += '<span class="quote-seg" style="--seg-color:' + sc + ';--seg-bg:' + sc + '22">' + esc(q._call.segment) + '</span>';
        }
        h += insTsLink(q._call, q.ts_seconds, q.timestamp);
        h += '</div></div>';
        return h;
    }

    // Sort quotes
    let sortedProblem = [...problemQuotes];
    let sortedWorkaround = [...workaroundQuotes];
    let sortedOther = [...otherQuotes];
    if (_insVocSort === 'date') {
        const byDate = (a, b) => ((b._call && b._call.date) || '').localeCompare((a._call && a._call.date) || '');
        sortedProblem.sort(byDate);
        sortedWorkaround.sort(byDate);
        sortedOther.sort(byDate);
    } else {
        const byCo = (a, b) => (a._co || '').localeCompare(b._co || '');
        sortedProblem.sort(byCo);
        sortedWorkaround.sort(byCo);
        sortedOther.sort(byCo);
    }

    if (sortedProblem.length) {
        vocH += '<div class="ins-section-hdr">How they describe their problems</div>';
        vocH += renderQuoteGroup(sortedProblem, '', 5, 'voc-problems', q => renderQuoteCard(q, ''));
    }
    if (sortedWorkaround.length) {
        vocH += '<div class="ins-section-hdr">Current workarounds</div>';
        vocH += renderQuoteGroup(sortedWorkaround, '', 5, 'voc-workarounds', q => renderQuoteCard(q, 'workaround'));
    }
    if (sortedOther.length) {
        vocH += '<div class="ins-section-hdr">Notable quotes</div>';
        vocH += renderQuoteGroup(sortedOther, '', 5, 'voc-notable', q => renderQuoteCard(q, 'signal'));
    }
    if (!allQuotes.length) {
        vocH += '<div class="ins-empty">No quotes captured in this period.</div>';
    }
    vocH += '</div>';

    // --- Questions Panel ---
    let questH = '<div role="tabpanel" id="ins-panel-questions" aria-labelledby="ins-tab-questions"' + (_insActiveTab !== 'questions' ? ' hidden' : '') + '>';
    if (allQuestions.length) {
        // Group by company
        const qByCompany = {};
        allQuestions.forEach(q => {
            const co = q._co || 'Unknown';
            if (!qByCompany[co]) qByCompany[co] = [];
            qByCompany[co].push(q);
        });
        const qCompanies = Object.entries(qByCompany).sort((a, b) => b[1].length - a[1].length);
        let qIdx = 0;
        qCompanies.forEach(([co, qs]) => {
            questH += '<div class="ins-section-hdr">' + esc(co) + ' (' + qs.length + ')</div>';
            qs.forEach((q, i) => {
                const hidden = qIdx >= 5;
                questH += '<div' + (hidden ? ' class="ins-overflow" style="display:none" data-group="questions-all"' : '') + '>';
                questH += '<div class="insight-question">';
                questH += '<div class="question-text">\u201c' + esc(q.question || q.text || '') + '\u201d</div>';
                questH += '<div class="question-attr">';
                questH += '<span class="question-company">' + esc(co) + '</span>';
                if (q.speaker) questH += '<span>' + esc(q.speaker) + '</span>';
                questH += insTsLink(q._call, q.ts_seconds, q.timestamp);
                questH += '</div></div></div>';
                qIdx++;
            });
        });
        if (allQuestions.length > 5) {
            questH += '<button class="ins-show-more" onclick="insShowMore(this, \'questions-all\')" aria-expanded="false">';
            questH += 'Show all ' + allQuestions.length + ' questions</button>';
        }
    } else {
        questH += '<div class="ins-empty">No questions captured in this period.</div>';
    }
    questH += '</div>';

    // --- Objections & Barriers Panel ---
    let objH = '<div role="tabpanel" id="ins-panel-objections" aria-labelledby="ins-tab-objections"' + (_insActiveTab !== 'objections' ? ' hidden' : '') + '>';
    if (allObjections.length) {
        objH += '<div class="ins-section-hdr">Objections (' + allObjections.length + ')</div>';
        objH += renderQuoteGroup(allObjections, 'objection', 5, 'obj-quotes', o => {
            return renderQuoteCard({ text: o.quote || o.objection || '', speaker: o.speaker, _co: o._co, _call: o._call, ts_seconds: o.ts_seconds, timestamp: o.timestamp }, 'objection');
        });
    }
    if (allBarriers.length) {
        const sortedB = [...allBarriers].sort((a, b) => b.companies.length - a.companies.length);
        objH += '<div class="ins-section-hdr">Barriers to Adoption (' + allBarriers.length + ')</div>';
        sortedB.forEach(b => {
            objH += '<div class="ins-barrier">';
            objH += esc(b.barrier);
            objH += '<span class="ins-barrier-cos">' + esc(b.companies.join(', ')) + '</span>';
            objH += '</div>';
        });
    }
    if (!allObjections.length && !allBarriers.length) {
        objH += '<div class="ins-empty">No objections or barriers in this period.</div>';
    }
    objH += '</div>';

    // --- Buying Signals Panel ---
    let sigH = '<div role="tabpanel" id="ins-panel-signals" aria-labelledby="ins-tab-signals"' + (_insActiveTab !== 'signals' ? ' hidden' : '') + '>';
    if (allSignals.length) {
        allSignals.forEach((s, i) => {
            const hidden = i >= 5;
            sigH += '<div' + (hidden ? ' class="ins-overflow" style="display:none" data-group="signals-all"' : '') + '>';
            sigH += '<div class="insight-signal">';
            sigH += '<div class="signal-text">' + esc(s.signal || '') + '</div>';
            if (s.interpretation) sigH += '<div class="signal-interp">' + esc(s.interpretation) + '</div>';
            sigH += '<div class="signal-attr">';
            sigH += '<span class="signal-company">' + esc(s._co) + '</span>';
            sigH += insTsLink(s._call, s.ts_seconds, s.timestamp);
            sigH += '</div></div></div>';
        });
        if (allSignals.length > 5) {
            sigH += '<button class="ins-show-more" onclick="insShowMore(this, \'signals-all\')" aria-expanded="false">';
            sigH += 'Show all ' + allSignals.length + ' signals</button>';
        }
    }
    if (allTimelines.some(t => t.timeline)) {
        sigH += '<div class="ins-timeline">';
        sigH += '<div class="ins-section-hdr">Timeline Indicators</div>';
        allTimelines.filter(t => t.timeline).forEach(t => {
            sigH += '<div class="ins-timeline-item"><strong>' + esc(t.company) + ':</strong> \u201c' + esc(t.timeline) + '\u201d</div>';
        });
        sigH += '</div>';
    }
    if (!allSignals.length && !allTimelines.some(t => t.timeline)) {
        sigH += '<div class="ins-empty">No buying signals in this period.</div>';
    }
    sigH += '</div>';

    // --- Terminology Panel ---
    let termH = '<div role="tabpanel" id="ins-panel-terminology" aria-labelledby="ins-tab-terminology"' + (_insActiveTab !== 'terminology' ? ' hidden' : '') + '>';
    if (allTerminology.length) {
        // Filter to structured entries with prospect_term + standard_term
        const structured = allTerminology.filter(t => typeof t !== 'string' && t.prospect_term && t.standard_term);
        const unstructured = allTerminology.filter(t => typeof t === 'string' || !t.prospect_term || !t.standard_term);
        if (structured.length) {
            termH += '<table class="ins-term-table"><thead><tr>';
            termH += '<th>Prospect says</th><th>We say</th><th>Company</th>';
            termH += '</tr></thead><tbody>';
            structured.forEach(t => {
                termH += '<tr><td>\u201c' + esc(t.prospect_term) + '\u201d</td>';
                termH += '<td>\u201c' + esc(t.standard_term) + '\u201d</td>';
                termH += '<td>' + esc(t._co || '') + '</td></tr>';
            });
            termH += '</tbody></table>';
        }
        if (unstructured.length) {
            termH += '<div class="ins-section-hdr" style="margin-top:1rem">Other terminology notes</div>';
            unstructured.forEach(t => {
                if (typeof t === 'string') {
                    termH += '<div style="padding:0.2rem 0;color:#9ca3af;font-size:0.85rem">' + esc(t) + '</div>';
                } else {
                    termH += '<div style="padding:0.2rem 0;color:#9ca3af;font-size:0.85rem">' + esc(t.prospect_term || t.standard_term || JSON.stringify(t)) + ' <span style="color:#6b7084">(' + esc(t._co || '') + ')</span></div>';
                }
            });
        }
    } else {
        termH += '<div class="ins-empty">No terminology data in this period.</div>';
    }
    termH += '</div>';

    // --- Enablement Panel ---

// Switch insight section tab (WAI Tabs Pattern)
function switchInsTab(tabId) {
    _insActiveTab = tabId;
    const tablist = document.querySelector('#reports-view .ins-tablist');
    if (!tablist) return;
    tablist.querySelectorAll('[role="tab"]').forEach(t => {
        const sel = t.id === 'ins-tab-' + tabId;
        t.setAttribute('aria-selected', sel ? 'true' : 'false');
        t.tabIndex = sel ? 0 : -1;
    });
    document.querySelectorAll('#reports-view [role="tabpanel"]').forEach(p => {
        p.hidden = p.id !== 'ins-panel-' + tabId;
    });
}

// Tablist keyboard navigation
function insTablistKeydown(e) {
    const tabs = Array.from(e.currentTarget.querySelectorAll('[role="tab"]'));
    const idx = tabs.indexOf(e.target);
    if (idx < 0) return;
    let next = -1;
    if (e.key === 'ArrowRight') next = (idx + 1) % tabs.length;
    else if (e.key === 'ArrowLeft') next = (idx - 1 + tabs.length) % tabs.length;
    else if (e.key === 'Home') next = 0;
    else if (e.key === 'End') next = tabs.length - 1;
    else return;
    e.preventDefault();
    tabs[next].focus();
    // Automatic activation
    const tabId = tabs[next].id.replace('ins-tab-', '');
    switchInsTab(tabId);
}

// Sort toggle for VoC
function insToggleVocSort(mode, btn) {
    _insVocSort = mode;
    buildInsights();
}

// Show more / show less
function insShowMore(btn, groupId) {
    const expanded = btn.getAttribute('aria-expanded') === 'true';
    const items = document.querySelectorAll('.ins-overflow[data-group="' + groupId + '"]');
    items.forEach(el => { el.style.display = expanded ? 'none' : ''; });
    btn.setAttribute('aria-expanded', String(!expanded));
    if (expanded) {
        btn.textContent = 'Show all ' + (items.length + 5) + ' items';
    } else {
        btn.textContent = 'Show less';
    }
}

// Export menu toggle (WAI Menu Button Pattern)
function insToggleExportMenu(btn) {
    const menu = document.getElementById('ins-export-menu');
    const wasOpen = !menu.hidden;
    menu.hidden = wasOpen;
    btn.setAttribute('aria-expanded', String(!wasOpen));
    if (!wasOpen) {
        const first = menu.querySelector('[role="menuitem"]');
        if (first) first.focus();
    }
}

// Close export menu
function insCloseExportMenu() {
    const menu = document.getElementById('ins-export-menu');
    const btn = menu ? menu.previousElementSibling : null;
    if (menu) menu.hidden = true;
    if (btn) {
        btn.setAttribute('aria-expanded', 'false');
        btn.focus();
    }
}

// Export button keydown
function insExportBtnKeydown(e, btn) {
    if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        const menu = document.getElementById('ins-export-menu');
        menu.hidden = false;
        btn.setAttribute('aria-expanded', 'true');
        const first = menu.querySelector('[role="menuitem"]');
        if (first) first.focus();
    }
}

// Menu item keyboard navigation
function insMenuItemKeydown(e) {
    const menu = e.target.closest('[role="menu"]');
    const items = Array.from(menu.querySelectorAll('[role="menuitem"]'));
    const idx = items.indexOf(e.target);
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        items[(idx + 1) % items.length].focus();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        items[(idx - 1 + items.length) % items.length].focus();
    } else if (e.key === 'Escape') {
        e.preventDefault();
        insCloseExportMenu();
    } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.target.click();
    }
}

// Close export menu on outside click
document.addEventListener('click', function(e) {
    if (!e.target.closest('.ins-export-wrap')) {
        const menu = document.getElementById('ins-export-menu');
        if (menu && !menu.hidden) insCloseExportMenu();
    }
});

// Export clipboard action
async function insExport(type, format) {
    if (!await checkActionPassword('Generate report')) { insCloseExportMenu(); return; }
    const btn = document.querySelector('.ins-export-btn');
    insCloseExportMenu();
    if (type === 'product' && format === 'html') {
        const html = _insExportData.prodEmail;
        const blob = new Blob([html], { type: 'text/html' });
        const plainBlob = new Blob([html.replace(/<[^>]+>/g, '')], { type: 'text/plain' });
        await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })]);
    } else if (type === 'product' && format === 'plain') {
        await navigator.clipboard.writeText(_insExportData.prodPlain);
    } else if (type === 'marketing' && format === 'html') {
        const html = _insExportData.mktEmail;
        const blob = new Blob([html], { type: 'text/html' });
        const plainBlob = new Blob([html.replace(/<[^>]+>/g, '')], { type: 'text/plain' });
        await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })]);
    } else if (type === 'marketing' && format === 'plain') {
        await navigator.clipboard.writeText(_insExportData.mktPlain);
    }
    if (btn) {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Export \u25be'; btn.classList.remove('copied'); }, 2000);
    }
}

// ---- Analysis wizard (CC-prep: triage → copy → done) ----
let _analyzeStep = 1;
let _analyzeCCCommand = '';

const _INTERNAL_SPEAKERS = new Set([
    'zach mccall', 'kevin codde', 'jerome olaloye',
    'lennie zhu', 'sarah dean', 'jonathan corvin-blackburn',
    'jonathan corvin blackburn', 'luke easley'
]);

function renderAnalyzeSteps(current) {
    const labels = ['Triage', 'Copy', 'Done'];
    return '<div class="analyze-steps">' + labels.map((l, i) => {
        const n = i + 1;
        const cls = n < current ? 'done' : n === current ? 'active' : '';
        const icon = n < current ? '&#10003;' : n;
        return '<div class="analyze-step ' + cls + '"><span class="analyze-step-num">' + icon + '</span><span class="analyze-step-label">' + l + '</span></div>';
    }).join('') + '</div>';
}

function _triageCalls() {
    const analyzed = new Set(DATA.mentions.map(m => m.call_id));
    const pending = DATA.calls.filter(c => c.pending_analysis || !analyzed.has(c.id));
    const analyze = [];
    const junk = [];
    for (const c of pending) {
        const text = c.transcript_text || '';
        const words = text.split(/\s+/).filter(Boolean).length;

        // Auto-junk: under 100 words (empty/failed recordings)
        if (words < 100) {
            junk.push({ ...c, _words: words, _reason: words + ' words' });
            continue;
        }

        // Extract speakers from transcript lines ("Speaker Name: text")
        const speakerSet = new Set();
        for (const line of text.split('\n')) {
            const m = line.match(/^([^:]+):\s/);
            if (m) speakerSet.add(m[1].trim().toLowerCase());
        }
        const hasProspect = [...speakerSet].some(name => !_INTERNAL_SPEAKERS.has(name));

        // Title signals for prospect calls — internal calls won't have "teachable" in the name
        const title = c.title || '';
        const titleLower = title.toLowerCase();
        const _REP_NAMES = ['zach mccall', 'jerome olaloye', 'kevin codde'];
        const hasProspectTitle = titleLower.includes('teachable')
            || _REP_NAMES.some(n => titleLower.includes(n));

        let warn = '';
        if (!hasProspect && words >= 300 && !hasProspectTitle) {
            warn = '\u26A0 speakers look internal, verify';
        } else if (words < 300) {
            warn = '\u26A0 short transcript, review';
        }

        analyze.push({ ...c, _words: words, _warn: warn });
    }
    return { analyze, junk };
}

async function processSelectedCalls() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const ids = Array.from(checks).map(cb => cb.dataset.callId);

    if (ids.length === 0) return;

    const btn = document.getElementById('scan-process-btn');
    const info = document.getElementById('scan-modal-info');
    btn.textContent = 'Processing...';
    btn.classList.add('processing');
    btn.disabled = true;
    info.textContent = 'Running feature scan on ' + ids.length + ' call' + (ids.length > 1 ? 's' : '') + '...';

    try {
        const resp = await fetch('/api/scan/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ call_ids: ids }),
        });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Processing failed (' + resp.status + ')');
        }
        const newData = await resp.json();

        // Merge new calls into global DATA (dedup by ID)
        const existCallIds = new Set(DATA.calls.map(c => c.id));
        let addedCount = 0;
        (newData.calls || []).forEach(c => {
            if (!existCallIds.has(c.id)) {
                DATA.calls.push(c);
                existCallIds.add(c.id);
                addedCount++;
            }
        });
        // Preserve existing mentions unchanged
        if (newData.mentions) {
            const existMentionKeys = new Set(DATA.mentions.map(m => m.call_id + '|' + m.keyword + '|' + m.ts));
            newData.mentions.forEach(m => {
                const k = m.call_id + '|' + m.keyword + '|' + m.ts;
                if (!existMentionKeys.has(k)) { DATA.mentions.push(m); existMentionKeys.add(k); }
            });
        }

        // Rebuild everything
        updateStats();
        buildFeatures();
        buildCalls();
        if (typeof buildReport === 'function') buildReport();

        // Reject unselected calls so they don't re-appear in future scans
        const allPreviewIds = _scanPreviewCalls.map(c => c.id);
        const rejectedIds = allPreviewIds.filter(id => !ids.includes(id));
        if (rejectedIds.length > 0) {
            fetch('/api/scan/reject', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ call_ids: rejectedIds })
            }).catch(err => console.warn('Failed to record rejections:', err));
        }

        btn.textContent = 'Done!';
        btn.classList.remove('processing');
        info.textContent = addedCount + ' call' + (addedCount > 1 ? 's' : '') + ' added (pending analysis).';

        setTimeout(() => { closeScanModal(); }, 1200);
    } catch (err) {
        btn.textContent = 'Failed';
        btn.classList.remove('processing');
        info.textContent = err.message;
        setTimeout(() => {
            btn.textContent = 'Process Selected';
            btn.disabled = false;
        }, 3000);
    }
}
