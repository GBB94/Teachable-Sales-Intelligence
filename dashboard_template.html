function buildPersonas() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();

    // Check if any segment data exists
    const hasSegmentData = DATA.calls.some(c => c.segment);
    if (!hasSegmentData) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">Segment data not available. Re-run analysis with persona categorization enabled to populate this tab.</div>';
        return;
    }

    // Tag mentions with company
    mentions.forEach(m => { m._co = m._co || getCompany(m, callMap) || reportGetCompany(m, callMap) || ''; });

    // Active date-filtered + non-excluded calls with segments
    const dateIds = activeCallIds();
    const noCoFilter = activeCompanyFilters.size === 0;
    const activeCalls = DATA.calls.filter(c =>
        c.segment && !excludedCalls.has(c.id) && dateIds.has(c.id)
    );

    // Apply segment filter
    const noSegFilter = activeSegmentFilters.size === 0;
    let filteredCalls = activeCalls.filter(c =>
        noSegFilter || activeSegmentFilters.has(c.segment.toLowerCase())
    );

    // Fix A: Apply company filter to filteredCalls before building overview cards
    if (!noCoFilter) {
        filteredCalls = filteredCalls.filter(c => {
            // Check if call has mentions from any active company
            const callMentions = mentions.filter(m => m.call_id === c.id);
            const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
            if (cos.size === 0) {
                const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
                if (chevron) cos.add(chevron[1].split(':')[0].trim());
            }
            return [...cos].some(co => activeCompanyFilters.has(co.toLowerCase()));
        });
    }

    if (filteredCalls.length === 0) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">No calls match the selected filters.</div>';
        return;
    }

    // Group calls by segment
    const segGroups = {};
    filteredCalls.forEach(c => {
        const seg = c.segment;
        if (!segGroups[seg]) segGroups[seg] = { calls: [], companies: new Set(), features: {} };
        segGroups[seg].calls.push(c);
    });

    // Cross-ref mentions with calls to get features per segment and per company
    const filteredCallIds = new Set(filteredCalls.map(c => c.id));
    let filteredMentions = mentions.filter(m => filteredCallIds.has(m.call_id));

    // Apply company filter to mentions
    if (!noCoFilter) {
        filteredMentions = filteredMentions.filter(m => activeCompanyFilters.has((m._co || '').toLowerCase()));
    }

    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        const seg = call.segment;
        if (!segGroups[seg]) return;
        const co = m._co || 'Unknown';
        segGroups[seg].companies.add(co);
        if (!segGroups[seg].features[m.keyword]) segGroups[seg].features[m.keyword] = 0;
        segGroups[seg].features[m.keyword]++;
    });

    // Also add companies from calls (even if no feature mentions)
    filteredCalls.forEach(c => {
        const seg = c.segment;
        const callMentions = filteredMentions.filter(m => m.call_id === c.id);
        const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
        if (cos.size === 0 && noCoFilter) {
            // Fallback: extract from call title (only when no company filter active)
            const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
            if (chevron) cos.add(chevron[1].split(':')[0].trim());
        }
        cos.forEach(co => {
            if (noCoFilter || activeCompanyFilters.has(co.toLowerCase())) {
                segGroups[seg].companies.add(co);
            }
        });
    });

    // Sort segments by call count desc, NEEDS_REVIEW always last
    const sortedSegs = Object.entries(segGroups).sort((a, b) => {
        if (a[0] === 'NEEDS_REVIEW') return 1;
        if (b[0] === 'NEEDS_REVIEW') return -1;
        return b[1].calls.length - a[1].calls.length;
    });

    let html = '';

    // ========== SECTION 1: Segment Overview Cards ==========
    html += '<div class="seg-section-title">Segment Overview</div>';
    html += '<div class="seg-overview">';
    sortedSegs.forEach(([seg, data]) => {
        const isNR = seg === 'NEEDS_REVIEW';
        const color = segColor(seg);
        const displaySeg = isNR ? 'Unclassified' : seg;
        const topFeats = Object.entries(data.features)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3);
        let featsHTML = '';
        if (topFeats.length > 0) {
            featsHTML = '<ul class="seg-card-feats">';
            topFeats.forEach(([f]) => { featsHTML += '<li>' + esc(f) + '</li>'; });
            featsHTML += '</ul>';
        }
        const nrIcon = isNR ? '<span style="margin-right:4px">&#9888;</span>' : '';
        const safeSeg = esc(seg).replace(/'/g, "\\'");
        const callLabel = data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '');
        const coLabel = data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y');

        // Check if segment has a definition for the back face
        const def = (typeof SEGMENT_DEFS !== 'undefined') ? SEGMENT_DEFS[seg] : null;
        const hasDef = def && def.description;

        if (hasDef) {
            // Flippable card with front + back
            const examples = (def.examples || []).slice(0, 4).join(', ');
            const signals = (def.signals || []).slice(0, 6);
            let backHTML = '<button class="seg-back-close" aria-label="Flip back" onclick="event.stopPropagation();flipSegCard(this)">&times;</button>';
            backHTML += '<div class="seg-back-name">' + nrIcon + esc(displaySeg) + '</div>';
            backHTML += '<div class="seg-back-desc">' + esc(def.description) + '</div>';
            if (examples) {
                backHTML += '<div class="seg-back-examples"><span class="seg-back-label">Examples: </span>' + esc(examples) + '</div>';
            }
            if (signals.length) {
                backHTML += '<div class="seg-back-signals"><span class="seg-back-label">Signals: </span>';
                signals.forEach(function(s) { backHTML += '<span class="seg-back-tag">' + esc(s) + '</span>'; });
                backHTML += '</div>';
            }
            backHTML += '<div class="seg-back-stats">' + esc(callLabel) + ' \u00b7 ' + esc(coLabel) + '</div>';
            backHTML += '<button class="seg-back-action" onclick="event.stopPropagation();flipSegCard(this);scrollToSegGroup(\'' + safeSeg + '\')">View prospects \u2192</button>';

            html += '<div class="seg-card-flip seg-overview-card" style="--seg-color:' + color + '">' +
                '<div class="seg-card-inner">' +
                    '<div class="seg-card seg-card-front" onclick="flipSegCard(this)">' +
                        '<div class="seg-card-name">' + nrIcon + esc(displaySeg) + '</div>' +
                        '<div class="seg-card-stat">' + callLabel + '</div>' +
                        '<div class="seg-card-sub">' + coLabel + '</div>' +
                        featsHTML +
                    '</div>' +
                    '<div class="seg-card-back" onclick="flipSegCard(this)">' + backHTML + '</div>' +
                '</div>' +
            '</div>';
        } else {
            // No definition — plain card, direct scroll
            html += '<div class="seg-card seg-overview-card" style="--seg-color:' + color + '" onclick="scrollToSegGroup(\'' + safeSeg + '\')">' +
                '<div class="seg-card-name">' + nrIcon + esc(displaySeg) + '</div>' +
                '<div class="seg-card-stat">' + callLabel + '</div>' +
                '<div class="seg-card-sub">' + coLabel + '</div>' +
                featsHTML +
            '</div>';
        }
    });
    html += '</div>';

    // ========== SEGMENT MIX BAR ==========
    if (sortedSegs.length > 0) {
        const totalCalls = filteredCalls.length;
        html += '<div class="seg-mix">';
        html += '<div class="seg-section-title">Segment Mix</div>';
        html += '<div class="seg-mix-bar">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? (data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            const label = pct >= 12 ? (displaySeg.split(' ').slice(0, 3).join(' ') + ' ' + Math.round(pct) + '%') : (pct >= 6 ? Math.round(pct) + '%' : '');
            html += '<div class="seg-mix-seg" data-pct="' + pct.toFixed(1) + '" style="background:' + color + '" title="' + esc(displaySeg) + ': ' + Math.round(pct) + '% (' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + ')">';
            html += '<span>' + esc(label) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        html += '<div class="seg-mix-legend">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? Math.round(data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            html += '<div class="seg-mix-legend-item">' +
                '<span class="seg-mix-dot" style="background:' + color + '"></span>' +
                esc(displaySeg) + ' ' + pct + '%' +
            '</div>';
        });
        html += '</div>';
        html += '</div>';
    }

    // ========== SECTION 2: Segment Comparison Table ==========
    // Collect all features with 2+ total mentions across ALL segments
    const allFeatureCounts = {};
    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        if (!allFeatureCounts[m.keyword]) allFeatureCounts[m.keyword] = { total: 0, bySegment: {} };
        allFeatureCounts[m.keyword].total++;
        if (!allFeatureCounts[m.keyword].bySegment[call.segment]) allFeatureCounts[m.keyword].bySegment[call.segment] = 0;
        allFeatureCounts[m.keyword].bySegment[call.segment]++;
    });

    const tableFeatures = Object.entries(allFeatureCounts)
        .filter(([, v]) => v.total >= 2)
        .sort((a, b) => b[1].total - a[1].total);

    if (tableFeatures.length > 0 && sortedSegs.length > 1) {
        // Fix D: Compute distinctiveness score for each feature
        // Distinctiveness = how concentrated a feature is in one segment vs evenly spread
        const segNames = sortedSegs.map(([seg]) => seg);
        tableFeatures.forEach(([, data]) => {
            const counts = segNames.map(seg => data.bySegment[seg] || 0);
            const total = counts.reduce((a, b) => a + b, 0);
            if (total === 0) { data.distinctiveness = 0; return; }
            // Gini coefficient as distinctiveness measure
            const n = counts.length;
            const mean = total / n;
            const sumAbsDiff = counts.reduce((acc, c) => acc + Math.abs(c - mean), 0);
            data.distinctiveness = sumAbsDiff / (2 * n * mean);
        });

        html += '<div style="display:flex;align-items:center;gap:0.5rem;margin-top:1rem">';
        html += '<div class="seg-section-title" style="margin:0">Segment Comparison</div>';
        html += '<button class="seg-compare-sort-toggle" id="distinctiveness-sort-btn" onclick="toggleDistinctivenessSort(this)">Sort by distinctiveness</button>';
        html += '</div>';
        html += '<div class="seg-compare-wrap"><table class="seg-compare" id="seg-compare-table">';
        html += '<tr><th>Feature</th>';
        sortedSegs.forEach(([seg]) => {
            const label = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg.split(' ').slice(0, 3).join(' ');
            html += '<th>' + esc(label) + '</th>';
        });
        html += '</tr>';

        // Find max count for heat map scaling
        let heatMax = 1;
        tableFeatures.forEach(([, data]) => {
            sortedSegs.forEach(([seg]) => {
                const c = data.bySegment[seg] || 0;
                if (c > heatMax) heatMax = c;
            });
        });

        // Store for re-sort
        window._segCompareData = { tableFeatures, segNames, heatMax, sortedSegs };

        const INITIAL_ROWS = 15;
        tableFeatures.forEach(([feat, data], idx) => {
            const hidden = idx >= INITIAL_ROWS ? ' style="display:none" class="seg-compare-extra"' : '';
            // Mark most distinctive cell per feature
            const counts = segNames.map(seg => data.bySegment[seg] || 0);
            const maxCount = Math.max(...counts);
            html += '<tr' + hidden + ' data-feat="' + esc(feat) + '" data-dist="' + (data.distinctiveness || 0).toFixed(4) + '"><td>' + esc(feat) + '</td>';
            sortedSegs.forEach(([seg]) => {
                const count = data.bySegment[seg] || 0;
                if (count === 0) {
                    html += '<td></td>';
                } else {
                    const opacity = Math.min(0.15 + (count / heatMax) * 0.6, 0.75);
                    const distinctive = data.distinctiveness > 0.3 && count === maxCount ? ' distinctive' : '';
                    html += '<td class="heat' + distinctive + '" style="background:rgba(59,130,246,' + opacity.toFixed(2) + ')">' + count + '</td>';
                }
            });
            html += '</tr>';
        });
        html += '</table>';
        // Heat map legend
        html += '<div class="seg-heat-legend">';
        html += '<span>Mentions:</span>';
        [1, 2, 3].forEach(n => {
            const op = Math.min(0.15 + (n / heatMax) * 0.6, 0.75);
            html += '<span><span class="seg-heat-swatch" style="background:rgba(59,130,246,' + op.toFixed(2) + ')"></span>' + n + '</span>';
        });
        html += '</div>';
        if (tableFeatures.length > INITIAL_ROWS) {
            html += '<button class="seg-show-all" onclick="toggleCompareRows(this)">Show all ' + tableFeatures.length + ' features</button>';
        }
        html += '</div>';
    }

    // ========== SECTION 3: Prospect Cards by Segment (progressive disclosure) ==========
    // Build per-segment company data
    _personaData = {};
    const today = new Date();
    sortedSegs.forEach(([seg, data]) => {
        const coData = {};
        data.calls.forEach(c => {
            const callMentions = filteredMentions.filter(m => m.call_id === c.id);
            const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
            if (cos.size === 0) {
                const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
                if (chevron) cos.add(chevron[1].split(':')[0].trim());
                else cos.add(c.title || 'Unknown');
            }
            cos.forEach(co => {
                if (!coData[co]) coData[co] = { contacts: [], calls: [], features: [], mentionMap: {}, competitors: {}, contactTitles: {} };
                coData[co].calls.push(c);
                callMentions.forEach(m => {
                    if (!coData[co].mentionMap[m.keyword]) {
                        coData[co].mentionMap[m.keyword] = m;
                        coData[co].features.push(m);
                    }
                    // Enhancement 5: Competitor context from mentions
                    if (m.competitor_context) {
                        const compName = typeof m.competitor_context === 'string' ? m.competitor_context : (m.competitor_context.name || '');
                        const compType = typeof m.competitor_context === 'object' ? (m.competitor_context.mention_type || '') : '';
                        if (compName && !coData[co].competitors[compName]) {
                            coData[co].competitors[compName] = compType;
                        }
                    }
                    // Enhancement 1: Contact titles from mentions
                    if (m.contact_title && m._co === co) {
                        coData[co].contactTitles[m.contact_title] = true;
                    }
                });
                // Enhancement 5: Competitor mentions from calls
                if (c.competitor_mentions && Array.isArray(c.competitor_mentions)) {
                    c.competitor_mentions.forEach(cm => {
                        const name = cm.name || cm.competitor || '';
                        const type = cm.mention_type || cm.type || '';
                        if (name && !coData[co].competitors[name]) {
                            coData[co].competitors[name] = type;
                        }
                    });
                }
            });
        });
        // Extract contacts + titles
        Object.entries(coData).forEach(([co, d]) => {
            d.calls.forEach(c => {
                if (c.marketing_data && c.marketing_data.contacts) {
                    c.marketing_data.contacts.forEach(ct => {
                        if (!d.contacts.find(x => x.name === ct.name)) d.contacts.push(ct);
                    });
                }
            });
            // Enhancement 2: Compute recency
            const sortedCalls = [...d.calls].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            d.lastCallDate = sortedCalls[0] && sortedCalls[0].date ? sortedCalls[0].date : null;
            if (d.lastCallDate) {
                const diff = Math.floor((today - new Date(d.lastCallDate)) / (1000 * 60 * 60 * 24));
                d.daysSinceLastCall = diff;
            } else {
                d.daysSinceLastCall = 9999;
            }
            // Enhancement 3: Engagement score
            const mentionCount = d.features.length;
            const callCount = d.calls.length;
            const recencyBonus = d.daysSinceLastCall <= 30 ? 10 : (d.daysSinceLastCall <= 60 ? 5 : 0);
            const compBonus = Object.keys(d.competitors).length > 0 ? 5 : 0;
            d.engagementScore = mentionCount * 2 + callCount * 5 + recencyBonus + compBonus;
            // Enhancement 4: Feature fit ratio
            let gapCount = 0, nativeCount = 0, workaroundCount = 0, roadmapCount = 0;
            d.features.forEach(m => {
                const tier = getCapabilityTier(m.keyword).tier;
                if (tier === 'gap') gapCount++;
                else if (tier === 'native') nativeCount++;
                else if (tier === 'workaround') workaroundCount++;
                else if (tier === 'roadmap') roadmapCount++;
            });
            d.fit = { gap: gapCount, native: nativeCount, workaround: workaroundCount, roadmap: roadmapCount };
            // Enhancement 6: Segment confidence
            d.segConfidence = null;
            d.calls.forEach(c => {
                if (c.segment_confidence !== undefined && c.segment_confidence !== null) {
                    if (d.segConfidence === null || c.segment_confidence < d.segConfidence) {
                        d.segConfidence = c.segment_confidence;
                    }
                }
            });
        });
        _personaData[seg] = coData;
    });

    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem">' +
        '<div class="seg-section-title" style="margin:0">Prospects by Segment</div>' +
        '<button class="expand-btn" onclick="togglePersonasExpand(this)">' + (allExpanded ? 'Collapse All' : 'Expand All') + '</button>' +
        '</div>';

    sortedSegs.forEach(([seg, data], idx) => {
        const color = segColor(seg);
        const coData = _personaData[seg];
        const coEntries = Object.entries(coData)
            .filter(([co]) => noCoFilter || activeCompanyFilters.has(co.toLowerCase()))
            // Enhancement 2: Sort by recency (most recent first)
            .sort((a, b) => (a[1].daysSinceLastCall || 9999) - (b[1].daysSinceLastCall || 9999));
        if (coEntries.length === 0) return;
        const defaultExpanded = allExpanded || idx === 0;

        const isNR = seg === 'NEEDS_REVIEW';
        const displaySeg = isNR ? 'Unclassified' : seg;
        const nrClass = isNR ? ' seg-section-nr' : '';
        const groupId = 'seg-group-' + seg.replace(/[^a-z0-9]/gi, '-').toLowerCase();
        const cardsId = groupId + '-cards';
        // Fix C: Use <button> with aria-expanded/aria-controls
        html += '<div class="seg-group' + (defaultExpanded ? '' : ' collapsed') + nrClass + '" id="' + esc(groupId) + '" style="--seg-color:' + color + '">';
        html += '<button class="seg-group-hdr" aria-expanded="' + (defaultExpanded ? 'true' : 'false') + '" aria-controls="' + cardsId + '" onclick="toggleSegGroup(this)">';
        html += '<span class="seg-group-arrow">&#9654;</span>';
        html += (isNR ? '<span style="color:#f0c040;margin-right:4px">&#9888;</span>' : '');
        html += '<span class="seg-group-name">' + esc(displaySeg) + '</span>';
        html += '<span class="seg-group-count">' + coEntries.length + ' compan' + (coEntries.length !== 1 ? 'ies' : 'y') + ' &middot; ' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</span>';
        html += '</button>';
        html += '<div class="seg-group-cards" id="' + cardsId + '">';

        coEntries.forEach(([co, d], idx) => {
            const cardId = 'prospect-' + (seg + '-' + co).replace(/[^a-z0-9]/gi, '-').toLowerCase();
            const detailId = cardId + '-detail';

            // Engagement level
            const engLevel = d.engagementScore >= 25 ? 'high' : (d.engagementScore >= 12 ? 'med' : 'low');

            // Recency label
            let recencyLabel = '';
            let recencyClass = '';
            if (d.daysSinceLastCall <= 7) { recencyLabel = d.daysSinceLastCall + 'd ago'; }
            else if (d.daysSinceLastCall <= 30) { recencyLabel = Math.ceil(d.daysSinceLastCall / 7) + 'w ago'; }
            else if (d.daysSinceLastCall <= 365) { recencyLabel = Math.round(d.daysSinceLastCall / 30) + 'mo ago'; recencyClass = d.daysSinceLastCall > 90 ? ' stale' : ''; }
            else if (d.daysSinceLastCall < 9999) { recencyLabel = '1y+ ago'; recencyClass = ' stale'; }

            // Contact title summary (first title found)
            let titleSummary = '';
            if (d.contacts.length > 0 && d.contacts[0].title) {
                titleSummary = d.contacts[0].title;
            } else {
                const inferredTitles = Object.keys(d.contactTitles);
                if (inferredTitles.length > 0) titleSummary = inferredTitles[0];
            }

            // Collapsed summary: keep to a short, scannable disclosure row.
            const summaryParts = [];
            summaryParts.push(d.features.length + ' feature' + (d.features.length !== 1 ? 's' : ''));
            summaryParts.push(d.calls.length + ' call' + (d.calls.length !== 1 ? 's' : ''));
            if (titleSummary) summaryParts.push(titleSummary);

            const compEntries = Object.entries(d.competitors);
            const signalParts = [];
            if (d.fit.gap > 0) signalParts.push('<span class="prospect-signal-gap">' + d.fit.gap + ' gap' + (d.fit.gap !== 1 ? 's' : '') + '</span>');
            if (d.fit.workaround > 0) signalParts.push('<span class="prospect-signal-workaround">' + d.fit.workaround + ' workaround' + (d.fit.workaround !== 1 ? 's' : '') + '</span>');
            if (d.fit.roadmap > 0) signalParts.push('<span class="prospect-signal-roadmap">' + d.fit.roadmap + ' roadmap</span>');
            if (signalParts.length === 0 && d.fit.native > 0) signalParts.push('<span class="prospect-signal-ok">Native-only signal</span>');
            if (signalParts.length === 0 && compEntries.length > 0) signalParts.push('<span class="prospect-signal-muted">' + compEntries.length + ' competitor' + (compEntries.length !== 1 ? 's' : '') + ' mentioned</span>');

            const hiddenStyle = idx >= INITIAL_PROSPECTS_PER_SEGMENT ? ';display:none' : '';

            html += '<div class="prospect-card' + (idx >= INITIAL_PROSPECTS_PER_SEGMENT ? ' prospect-extra' : '') + '" style="--seg-color:' + color + hiddenStyle + '" id="' + cardId + '">';
            // Header (button for accessibility)
            html += '<button class="prospect-card-header" aria-expanded="false" aria-controls="' + detailId + '" onclick="toggleProspectCard(this)">';
            html += '<span class="prospect-collapse-arrow">&#9654;</span>';
            html += '<span class="prospect-main">';
            html += '<span class="prospect-co">' + esc(co) + '</span>';
            html += '<span class="prospect-primary">' + esc(summaryParts.join(' · ')) + '</span>';
            if (signalParts.length > 0) html += '<span class="prospect-secondary">' + signalParts.join('') + '</span>';
            html += '</span>';
            if (recencyLabel) html += '<span class="prospect-recency' + recencyClass + '">' + recencyLabel + '</span>';
            html += '<span class="prospect-score engagement-' + engLevel + '">' + d.engagementScore + '</span>';
            html += '</button>';

            // Detail section (collapsed by default)
            html += '<div class="prospect-card-detail" id="' + detailId + '">';

            html += '<div class="prospect-detail-meta">';
            html += '<span class="prospect-inline-chip score">Engagement ' + d.engagementScore + '</span>';
            html += '<span class="prospect-inline-chip">' + d.features.length + ' feature' + (d.features.length !== 1 ? 's' : '') + '</span>';
            html += '<span class="prospect-inline-chip">' + d.calls.length + ' call' + (d.calls.length !== 1 ? 's' : '') + '</span>';
            if (recencyLabel) html += '<span class="prospect-inline-chip">' + esc(recencyLabel) + '</span>';
            html += '</div>';

            if (d.features.length > 0) {
                html += '<div class="prospect-fit-detail">';
                if (d.fit.native > 0) html += '<span class="prospect-inline-chip fit-native">' + d.fit.native + ' native</span>';
                if (d.fit.workaround > 0) html += '<span class="prospect-inline-chip fit-workaround">' + d.fit.workaround + ' workaround' + (d.fit.workaround !== 1 ? 's' : '') + '</span>';
                if (d.fit.gap > 0) html += '<span class="prospect-inline-chip fit-gap">' + d.fit.gap + ' gap' + (d.fit.gap !== 1 ? 's' : '') + '</span>';
                if (d.fit.roadmap > 0) html += '<span class="prospect-inline-chip fit-roadmap">' + d.fit.roadmap + ' roadmap</span>';
                html += '</div>';
            }

            if (compEntries.length > 0) {
                html += '<div class="prospect-section-label">Competitors</div>';
                html += '<div class="prospect-competitors-detail">';
                compEntries.forEach(([name, type]) => {
                    const typeClass = type ? ' ' + type.toLowerCase().replace(/\s+/g, '_') : '';
                    html += '<span class="prospect-comp-badge' + typeClass + '">' + esc(name) + '</span>';
                });
                html += '</div>';
            }

            // Contacts
            if (d.contacts.length > 0) {
                html += '<div class="prospect-section-label">Contacts</div>';
                d.contacts.forEach(ct => {
                    html += '<div class="prospect-contact">' + esc(ct.name || '');
                    if (ct.title) html += ' <span class="contact-title">' + esc(ct.title) + '</span>';
                    else if (d.contactTitles && Object.keys(d.contactTitles).length > 0) {
                        html += ' <span class="contact-title inferred">' + esc(Object.keys(d.contactTitles)[0]) + '</span>';
                    }
                    if (ct.email) html += ' <span class="contact-title">' + esc(ct.email) + '</span>';
                    html += '</div>';
                });
            }

            // Calls
            html += '<div class="prospect-section-label">Calls (' + d.calls.length + ')</div>';
            const sortedCalls = [...d.calls].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            sortedCalls.forEach(c => {
                const dateStr = c.date ? c.date.slice(5).replace('-', '/') : '';
                html += '<div class="prospect-call">';
                if (c.transcript) {
                    html += '<a href="' + esc(c.transcript) + '" target="_blank">' + esc(c.title || 'Call') + '</a>';
                } else {
                    html += esc(c.title || 'Call');
                }

function buildCompetitors() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });

    // Collect all competitor mentions from calls (date-filtered, segment-filtered, non-excluded)
    const dateIds = activeCallIds();
    const noSegFilter = activeSegmentFilters.size === 0;
    const activeCalls = DATA.calls.filter(c =>
        !excludedCalls.has(c.id) && dateIds.has(c.id) &&
        (noSegFilter || (c.segment && activeSegmentFilters.has(c.segment.toLowerCase()))) &&
        ((c.competitor_mentions && c.competitor_mentions.length > 0) ||
         (c.marketing_data && c.marketing_data.competitors_mentioned && c.marketing_data.competitors_mentioned.length > 0))
    );

    // Flatten all mentions from new format (competitor_mentions) and legacy (marketing_data.competitors_mentioned)
    const allMentions = [];
    const seen = new Set(); // deduplicate
    activeCalls.forEach(c => {
        (c.competitor_mentions || []).forEach(cm => {
            const key = c.id + '|' + (cm.competitor || cm.name || '') + '|' + (cm.timestamp || '');
            if (seen.has(key)) return;
            seen.add(key);
            allMentions.push({
                competitor: cm.competitor || cm.name || '?',
                context: cm.context || '',
                timestamp: cm.timestamp || '',
                mention_type: cm.mention_type || 'asked_about',
                call_id: c.id,
                call_title: c.title || '',
                call_date: c.date || '',
                company: '',
                segment: c.segment || ''
            });
        });
        // Legacy: marketing_data.competitors_mentioned
        if (c.marketing_data && c.marketing_data.competitors_mentioned) {
            c.marketing_data.competitors_mentioned.forEach(cm => {
                const name = cm.name || cm.competitor || '?';
                const key = c.id + '|' + name + '|' + (cm.timestamp || '');
                if (seen.has(key)) return;
                seen.add(key);
                allMentions.push({
                    competitor: name,
                    context: cm.context || '',
                    timestamp: cm.timestamp || '',
                    mention_type: cm.mention_type || 'asked_about',
                    call_id: c.id,
                    call_title: c.title || '',
                    call_date: c.date || '',
                    company: '',
                    segment: c.segment || ''
                });
            });
        }
    });

    // Infer company for each mention
    const mentions = activeMentions();
    mentions.forEach(m => { m._co = m._co || getCompany(m, callMap) || reportGetCompany(m, callMap) || ''; });
    const callCompanyMap = {};
    activeCalls.forEach(c => {
        const callMentions = mentions.filter(m => m.call_id === c.id);
        const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
        if (cos.size === 0) {
            const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
            if (chevron) cos.add(chevron[1].split(':')[0].trim());
        }
        callCompanyMap[c.id] = [...cos][0] || '';
    });
    allMentions.forEach(cm => { cm.company = callCompanyMap[cm.call_id] || ''; });

    if (allMentions.length === 0) {
        document.getElementById('competitors-view').innerHTML =
            '<div class="comp-empty">No competitor mentions found. Competitor data is extracted during call analysis — re-analyze calls to populate this tab.</div>';
        return;
    }

    // Build competitor lookup from competitors.json data embedded in DATA (or fallback)
    const compMeta = {};
    const _compMetaLower = {}; // lowercase name -> meta
    const _compMetaStrip = {}; // stripped (no spaces, lowercase) -> meta
    if (DATA.competitors) {
        DATA.competitors.forEach(c => {
            const entry = { type: c.type || 'direct', description: c.description || '', differentiator: c.differentiator || '', short_description: c.short_description || '', positioning: c.positioning || '' };
            compMeta[c.name] = entry;
            _compMetaLower[c.name.toLowerCase()] = entry;
            _compMetaStrip[c.name.toLowerCase().replace(/[\s\-()]/g, '')] = entry;
        });
    }
    // Fallback descriptions for competitors not in competitors.json
    const _unknownCompDesc = {
        'fiducare': 'Financial compliance and fiduciary management platform.'
    };
    // Aliases for legacy/abbreviated competitor names in call data
    const _compAliases = { 'wap': 'wapcrm', 'school': 'skool' };
    // Resolve a competitor name to its canonical form (for grouping/dedup)
    function resolveCompName(name) {
        if (compMeta[name]) return name;
        const lower = name.toLowerCase();
        if (_compMetaLower[lower]) return DATA.competitors.find(c => c.name.toLowerCase() === lower)?.name || name;
        if (_compAliases[lower]) {
            const aliasTarget = _compAliases[lower];
            const canon = DATA.competitors?.find(c => c.name.toLowerCase() === aliasTarget);
            if (canon) return canon.name;
        }
        const stripped = lower.replace(/[\s\-()]/g, '');
        if (_compMetaStrip[stripped]) {
            const canon = DATA.competitors?.find(c => c.name.toLowerCase().replace(/[\s\-()]/g, '') === stripped);
            if (canon) return canon.name;
        }
        const paren = name.match(/\(([^)]+)\)/);
        if (paren) {
            const inner = paren[1];
            const resolved = resolveCompName(inner);
            if (resolved !== inner) return resolved;
        }
        return name;
    }
    function getCompMeta(name) {
        if (compMeta[name]) return compMeta[name];
        const lower = name.toLowerCase();
        if (_compMetaLower[lower]) return _compMetaLower[lower];
        if (_compAliases[lower] && _compMetaLower[_compAliases[lower]]) return _compMetaLower[_compAliases[lower]];
        const stripped = lower.replace(/[\s\-()]/g, '');
        if (_compMetaStrip[stripped]) return _compMetaStrip[stripped];
        // Check if name contains a canonical name in parentheses, e.g. "School (Skool)" -> "Skool"
        const paren = name.match(/\(([^)]+)\)/);
        if (paren) {
            const inner = paren[1].toLowerCase();
            if (_compMetaLower[inner]) return _compMetaLower[inner];
            if (_compMetaStrip[inner.replace(/[\s\-()]/g, '')]) return _compMetaStrip[inner.replace(/[\s\-()]/g, '')];
        }
        // Fallback for known unknowns
        const lk = name.toLowerCase();
        if (_unknownCompDesc[lk]) return { short_description: _unknownCompDesc[lk] };
        return { short_description: 'Description not available.' };
    }

    function isNeedsReview(name) {
        return name.toUpperCase() === 'NEEDS_REVIEW';
    }

    function compTier(name, mentionCount) {
        if (getCompMeta(name).type) return 'verified';
        if (mentionCount >= 2) return 'notable';
        return 'noise';
    }

    // Group by competitor (separate active vs excluded), resolving aliases
    const byComp = {};
    const byCompExcluded = {};
    allMentions.forEach(cm => {
        if (isNeedsReview(cm.competitor)) return;
        const name = resolveCompName(cm.competitor);
        cm.competitor = name; // normalize for downstream display
        const isExcluded = excludedCompetitors.has(name.toLowerCase());
        const target = isExcluded ? byCompExcluded : byComp;
        if (!target[name]) target[name] = { mentions: [], types: new Set(), companies: new Set() };
        target[name].mentions.push(cm);
        target[name].types.add(cm.mention_type);
        if (cm.company) target[name].companies.add(cm.company);
    });

    // Build filter dropdowns (always show all non-excluded competitors, even if filtered out by type)
    buildCompFilterDropdown(Object.keys(byComp));
    const availableTypes = new Set();
    Object.entries(byComp).forEach(([name]) => {
        const type = getCompMeta(name).type || 'unknown';
        availableTypes.add(type);
    });
    buildCompTypeDropdown(availableTypes);

    // Apply competitor name filter and type filter
    let filteredComps = Object.entries(byComp);
    if (activeCompNameFilters.size > 0) {
        filteredComps = filteredComps.filter(([name]) => activeCompNameFilters.has(name.toLowerCase()));
    }
    if (activeCompTypeFilter) {
        filteredComps = filteredComps.filter(([name]) => {
            const type = getCompMeta(name).type || 'unknown';
            return type === activeCompTypeFilter;
        });
    }

    // In default mode, filter out noise (unverified + 1 mention)
    if (!compShowAll) {
        filteredComps = filteredComps.filter(([name, data]) =>
            compTier(name, data.mentions.length) !== 'noise'
        );
    }

    // Sort competitors: verified → notable → noise, then by mention count desc
    const tierRank = { verified: 0, notable: 1, noise: 2 };
    const sortedComps = filteredComps.sort((a, b) => {
        const aTier = compTier(a[0], a[1].mentions.length);
        const bTier = compTier(b[0], b[1].mentions.length);
        if (aTier !== bTier) return tierRank[aTier] - tierRank[bTier];
        return b[1].mentions.length - a[1].mentions.length;
    });
    const activeMentionCount = sortedComps.reduce((sum, [, d]) => sum + d.mentions.length, 0);

    if (sortedComps.length === 0 && Object.keys(byCompExcluded).length > 0) {
        let html = '<div class="comp-empty">All competitor mentions are excluded or filtered out.</div>';
        html += buildExcludedSection(byCompExcluded, 0);
        document.getElementById('competitors-view').innerHTML = html;
        return;
    }

    if (sortedComps.length === 0) {
        document.getElementById('competitors-view').innerHTML =
            '<div class="comp-empty">No competitors match the current filters.</div>';
        return;
    }

    let html = '';

    // Assign stable per-competitor colors (sorted order = color assignment order)
    sortedComps.forEach(([name]) => compColor(name));

    // ========== COMPETITOR OVERVIEW CARDS ==========
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">';
    html += '<div class="seg-section-title" style="margin:0;border:0;padding:0">Competitor Overview</div>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="comp-toggle-btn' + (compShowAll ? '' : ' active') + '" onclick="setCompShowAll(false)">Verified &amp; Notable</button>';
    html += '<button class="comp-toggle-btn' + (compShowAll ? ' active' : '') + '" onclick="setCompShowAll(true)">Show All</button>';
    html += '</div></div>';
    html += '<div class="seg-overview">';
    sortedComps.forEach(([name, data]) => {
        const meta = getCompMeta(name);
        const color = compColor(name);
        const tier = compTier(name, data.mentions.length);
        const tierClass = tier === 'verified' ? ' comp-verified' : tier === 'notable' ? ' comp-notable' : ' comp-noise';
        const type = meta.type || 'unknown';
        const typeLabel = type === 'lms' ? 'LMS' : type === 'diy' ? 'DIY' : type === 'unknown' ? '' : type.charAt(0).toUpperCase() + type.slice(1);
        const typeBadge = typeLabel ? '<span class="comp-type-badge type-' + esc(type) + '">' + esc(typeLabel) + '</span>' : '';
        const tierBadge = tier === 'notable'
            ? '<span class="comp-overview-tier tier-notable">Notable</span>'
            : tier === 'noise'
                ? '<span class="comp-overview-tier tier-noise">Unverified</span>'
                : '';
        const descHTML = '<div class="comp-overview-desc">' + esc(meta.short_description || 'Description not available.') + '</div>';
        const hasNewMentions = data.mentions.some(cm => isNewMention(cm));
        html += '<div class="seg-card clickable comp-overview-card' + tierClass + '" style="--seg-color:' + color + '" onclick="scrollToCompDetail(\'' + esc(name).replace(/'/g, "\\'") + '\')">' +
            (hasNewMentions ? '<span class="new-dot"></span>' : '') +
            '<div class="comp-overview-head">' +
                '<div class="comp-overview-title">' + esc(name) + '</div>' +
                (tier === 'verified' ? '<span class="comp-overview-mark" aria-hidden="true">&#10003;</span>' : '') +
            '</div>' +
            '<div class="comp-overview-meta">' + typeBadge + tierBadge + '</div>' +
            '<div class="comp-overview-stat">' + data.mentions.length + ' mention' + (data.mentions.length !== 1 ? 's' : '') + '</div>' +
            '<div class="comp-overview-sub">from ' + data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y') + '</div>' +
            descHTML +
        '</div>';
    });
    html += '</div>';

    // ========== COLLAPSED NOISE SECTION (default mode only) ==========
    if (!compShowAll) {
        const allComps = Object.entries(byComp);
        const noiseComps = allComps.filter(([name, data]) => compTier(name, data.mentions.length) === 'noise');
        if (noiseComps.length > 0) {
            html += '<div class="comp-noise-section">';
            html += '<button class="comp-noise-toggle" onclick="toggleNoiseSection()">';
            html += '<span id="noise-chevron" style="font-size:0.7rem;transition:transform 0.15s">&#9654;</span>';
            html += 'Other mentions (' + noiseComps.length + ')';
            html += '</button>';
            html += '<div class="comp-noise-grid" id="noise-grid">';
            noiseComps.sort((a, b) => b[1].mentions.length - a[1].mentions.length).forEach(([name, data]) => {
                const color = compColor(name);
                const meta = getCompMeta(name);
                const type = meta.type || 'unknown';
                const typeLabel = type === 'lms' ? 'LMS' : type === 'diy' ? 'DIY' : type === 'unknown' ? '' : type.charAt(0).toUpperCase() + type.slice(1);
                const typeBadge = typeLabel ? '<span class="comp-type-badge type-' + esc(type) + '">' + esc(typeLabel) + '</span>' : '';
                const descHTML = '<div class="comp-overview-desc">' + esc(meta.short_description || 'Description not available.') + '</div>';
                html += '<div class="seg-card comp-overview-card comp-noise" style="--seg-color:' + color + '">' +
                    '<div class="comp-overview-head">' +
                        '<div class="comp-overview-title">' + esc(name) + '</div>' +
                    '</div>' +
                    '<div class="comp-overview-meta">' + typeBadge + '<span class="comp-overview-tier tier-noise">Unverified</span></div>' +
                    '<div class="comp-overview-stat">' + data.mentions.length + ' mention' + (data.mentions.length !== 1 ? 's' : '') + '</div>' +
                    '<div class="comp-overview-sub">from ' + data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y') + '</div>' +
                    descHTML +
                '</div>';
            });
            html += '</div>';
            html += '</div>';
        }
    }

    // ========== COMPETITOR MIX BAR ==========
    if (sortedComps.length > 0) {
        html += '<div class="seg-mix">';
        html += '<div class="seg-section-title">Competitor Mix</div>';
        html += '<div class="seg-mix-bar">';
        sortedComps.forEach(([name, data]) => {
            const pct = activeMentionCount > 0 ? (data.mentions.length / activeMentionCount * 100) : 0;
            const color = compColor(name);
            const shortName = name.split(' ').slice(0, 2).join(' ');
            const label = pct >= 12 ? (shortName + ' ' + Math.round(pct) + '%') : (pct >= 6 ? Math.round(pct) + '%' : '');
            html += '<div class="seg-mix-seg" data-pct="' + pct.toFixed(1) + '" style="background:' + color + '" title="' + esc(name) + ': ' + Math.round(pct) + '% (' + data.mentions.length + ' mention' + (data.mentions.length !== 1 ? 's' : '') + ')">';
            html += '<span>' + esc(label) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        html += '<div class="seg-mix-legend">';
        sortedComps.forEach(([name, data]) => {
            const pct = activeMentionCount > 0 ? Math.round(data.mentions.length / activeMentionCount * 100) : 0;
            const color = compColor(name);
            html += '<div class="seg-mix-legend-item">' +
                '<span class="seg-mix-dot" style="background:' + color + '"></span>' +
                esc(name) + ' ' + pct + '%' +
            '</div>';
        });
        html += '</div>';
        html += '</div>';
    }

    // ========== DETAIL SECTION — Master/Detail Layout ==========
    // Get related features for each competitor
    const allMentionsForFeats = activeMentions();
    function getRelatedFeatures(competitorName, competitorCallIds) {
        const directFeats = {};
        allMentionsForFeats.forEach(m => {
            if (m.competitor_context) {
                const resolved = resolveCompName(m.competitor_context);
                if (resolved === competitorName) {
                    directFeats[m.keyword] = (directFeats[m.keyword] || 0) + 1;
                }
            }
        });
        const coFeats = {};
        const callIdSet = new Set(competitorCallIds);
        allMentionsForFeats.forEach(m => {
            if (callIdSet.has(m.call_id) && !directFeats[m.keyword]) {
                coFeats[m.keyword] = (coFeats[m.keyword] || 0) + 1;
            }
        });
        return {
            direct: Object.entries(directFeats).sort((a, b) => b[1] - a[1]),
            cooccurring: Object.entries(coFeats).sort((a, b) => b[1] - a[1]).slice(0, 5)
        };
    }

    // Group sorted competitors by type
    const TYPE_ORDER = ['direct', 'lms', 'diy', 'adjacent', 'marketplace', 'unknown'];
    const TYPE_LABELS = { direct: 'Direct Competitors', lms: 'LMS Platforms', diy: 'DIY / Self-Hosted', adjacent: 'Adjacent Tools', marketplace: 'Marketplaces', unknown: 'Other / Unverified' };
    const byType = {};
    sortedComps.forEach(([name, data]) => {
        const type = getCompMeta(name).type || 'unknown';
        if (!byType[type]) byType[type] = [];
        byType[type].push([name, data]);
    });

    // Pre-compute detail data for each competitor (for the detail panel)
    _compDetailData = {};
    sortedComps.forEach(([name, data]) => {
        const meta = getCompMeta(name);
        const color = compColor(name);
        const type = meta.type || 'unknown';
        const typeLabel = type === 'lms' ? 'LMS' : type === 'diy' ? 'DIY' : type === 'unknown' ? 'Unverified' : type.charAt(0).toUpperCase() + type.slice(1);
        const isCanonical = !!meta.type;
        const dates = data.mentions.map(m => m.call_date || '').filter(Boolean).sort();
        const lastDate = dates.length > 0 ? dates[dates.length - 1] : '';
        const recencyText = lastDate ? formatRecency(lastDate) : '';
        const mtCounts = {};
        data.mentions.forEach(m => { mtCounts[m.mention_type] = (mtCounts[m.mention_type] || 0) + 1; });
        const compCallIds = data.mentions.map(m => m.call_id);
        const related = getRelatedFeatures(name, compCallIds);
        _compDetailData[name] = { meta, data, related, mtCounts, recencyText, color, type, typeLabel, isCanonical };
    });

    // Determine initial selection: keep previous if still in list, else pick first
    let autoSelect = null;
    if (_activeCompetitor && _compDetailData[_activeCompetitor]) {
        autoSelect = _activeCompetitor;
    } else {
        // Pick first from direct, then lms, then first available
        for (const t of TYPE_ORDER) {
            if (byType[t] && byType[t].length > 0) { autoSelect = byType[t][0][0]; break; }
        }
    }

    html += '<div class="seg-section-title" style="margin-bottom:0.75rem">Competitor Details</div>';
    html += '<div class="comp-master-detail">';

    // ---- LEFT: Compact list grouped by type ----
    html += '<div class="comp-list-col">';
    TYPE_ORDER.forEach(type => {
        if (!byType[type] || byType[type].length === 0) return;
        const comps = byType[type];
        const groupLabel = TYPE_LABELS[type] || type;
        const totalMentions = comps.reduce((s, [, d]) => s + d.mentions.length, 0);
        const defaultExpanded = (type === 'direct' || type === 'lms');
        const groupId = 'comp-list-type-' + type;

        html += '<div class="comp-list-group' + (defaultExpanded ? '' : ' collapsed') + '" id="' + groupId + '">';
        html += '<button class="comp-list-group-hdr" style="--type-color:' + (COMP_TYPE_COLORS[type] || '#6b7280') + '"';
        html += ' aria-expanded="' + (defaultExpanded ? 'true' : 'false') + '" aria-controls="' + groupId + '-items"';
        html += ' onclick="this.setAttribute(\'aria-expanded\', this.parentElement.classList.toggle(\'collapsed\') ? \'false\' : \'true\')">';
        html += '<span class="comp-list-group-arrow">&#9654;</span>';
        html += '<span class="comp-list-group-name">' + esc(groupLabel) + '</span>';
        html += '<span class="comp-list-group-count">' + comps.length + ' &middot; ' + totalMentions + '</span>';
        html += '</button>';
        html += '<div class="comp-list-group-items" id="' + groupId + '-items">';

        comps.forEach(([name, data]) => {
            const dd = _compDetailData[name];
            const isSel = name === autoSelect;
            const safeName = esc(name).replace(/'/g, "\\'");
            html += '<button class="comp-list-row" data-comp="' + esc(name) + '" style="--comp-color:' + dd.color + '"';
            html += ' aria-current="' + (isSel ? 'true' : 'false') + '"';
            html += ' onclick="selectCompetitor(\'' + safeName + '\')"';
            html += ' onkeydown="compListKeydown(event)">';
            html += '<span class="comp-list-dot"></span>';
            html += '<span class="comp-list-name">' + esc(name) + '</span>';
            html += '<span class="comp-type-badge type-' + esc(dd.type) + '">' + esc(dd.typeLabel) + '</span>';
            html += '<span class="comp-list-count">' + data.mentions.length + '</span>';
            if (dd.recencyText) html += '<span class="comp-list-recency">' + dd.recencyText + '</span>';
            html += '</button>';
        });
        html += '</div></div>';
    });
    html += '</div>';

    // ---- RIGHT: Detail panel ----
    html += '<div class="comp-detail-panel" id="comp-detail-panel" aria-live="polite" aria-label="Competitor detail">';
    html += '<div class="comp-detail-empty">Select a competitor to view details.</div>';
    html += '</div>';

    html += '</div>'; // close comp-master-detail

    // ========== EXCLUDED SECTION ==========
    html += buildExcludedSection(byCompExcluded, sortedComps.length);

    document.getElementById('competitors-view').innerHTML = html;

    // Animate mix bar widths
    requestAnimationFrame(() => {
        document.querySelectorAll('#competitors-view .seg-mix-seg').forEach(el => {
            el.style.width = el.dataset.pct + '%';
        });
    });

    // Auto-select first competitor
    if (autoSelect) selectCompetitor(autoSelect);
}

function buildExcludedSection(byCompExcluded, visibleCount) {
    const excludedNames = Object.keys(byCompExcluded).sort();
    if (excludedNames.length === 0) return '';
    const total = (visibleCount || 0) + excludedNames.length;
    let html = '<div class="comp-excluded-section">';
    html += '<span class="comp-excluded-summary">Showing ' + (visibleCount || 0) + ' of ' + total + ' competitors. </span>';
    html += '<button class="comp-excluded-toggle" onclick="toggleExcludedList()">' + excludedNames.length + ' hidden.</button>';
    html += '<div class="comp-excluded-list" id="comp-excluded-list">';
    excludedNames.forEach(name => {
        const count = byCompExcluded[name].mentions.length;
        html += '<div class="comp-excluded-item">';
        html += '<span>' + esc(name) + ' <span style="color:#3a3d4e">(' + count + ' mention' + (count !== 1 ? 's' : '') + ')</span></span>';
        html += '<button class="comp-restore-btn" onclick="restoreCompetitor(\'' + esc(name).replace(/'/g, "\\'") + '\')">Restore</button>';
        html += '</div>';
    });
    html += '</div></div>';
    return html;
}

function toggleExcludedList() {
    const list = document.getElementById('comp-excluded-list');
    if (list) list.classList.toggle('open');
}

function scrollToCompDetail(name) {
    // In new master/detail layout, just select the competitor
    selectCompetitor(name);
    // Expand parent list group if collapsed
    const row = document.querySelector('.comp-list-row[data-comp="' + CSS.escape(name) + '"]');
    if (row) {
        const group = row.closest('.comp-list-group');
        if (group && group.classList.contains('collapsed')) {
            group.classList.remove('collapsed');
            const hdr = group.querySelector('.comp-list-group-hdr');
            if (hdr) hdr.setAttribute('aria-expanded', 'true');
        }
        row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    // On mobile, scroll to the detail panel
    if (window.innerWidth <= 1024) {
        const panel = document.getElementById('comp-detail-panel');
        if (panel) setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }
}

function selectCompetitor(name) {
    _activeCompetitor = name;
    // Update list: set aria-current on selected row
    document.querySelectorAll('.comp-list-row').forEach(row => {
        row.setAttribute('aria-current', row.dataset.comp === name ? 'true' : 'false');
    });
    // Render detail panel
    renderCompetitorDetail(name);
}

function renderCompetitorDetail(name) {
    const panel = document.getElementById('comp-detail-panel');
    if (!panel) return;
    const dd = _compDetailData[name];
    if (!dd) { panel.innerHTML = '<div class="comp-detail-empty">Competitor not found.</div>'; return; }

    const { meta, data, related, mtCounts, recencyText, color, type, typeLabel, isCanonical } = dd;
    const safeName = esc(name).replace(/'/g, "\\'");
    let h = '';

    // Back to list (mobile)
    h += '<button class="comp-back-link" onclick="document.querySelector(\'.comp-list-col\').scrollIntoView({behavior:\'smooth\',block:\'start\'})">&larr; Back to list</button>';

    // Header
    h += '<div class="comp-detail-panel-name" style="border-left:4px solid ' + color + ';padding-left:0.75rem">';
    h += esc(name);
    h += ' <span class="comp-type-badge type-' + esc(type) + '">' + esc(typeLabel) + '</span>';
    h += '</div>';
    if (meta.short_description) {
        h += '<div class="comp-detail-panel-desc">' + esc(meta.short_description) + '</div>';
    }

    // Battlecard
    if (isCanonical) {
        h += '<div class="comp-battlecard" style="border-left:3px solid ' + color + '">';
        if (meta.description) {
            h += '<div class="battlecard-section"><div class="battlecard-label">What they do</div>';
            h += '<div class="battlecard-text">' + esc(meta.description) + '</div></div>';
        }
        if (meta.differentiator) {
            h += '<div class="battlecard-section"><div class="battlecard-label">Key differentiator</div>';
            h += '<div class="battlecard-text">' + esc(meta.differentiator) + '</div></div>';
        }
        if (meta.positioning) {
            h += '<div class="battlecard-section battlecard-positioning"><div class="battlecard-label">Why we win</div>';
            h += '<div class="battlecard-text">' + esc(meta.positioning) + '</div></div>';
        }
        // Mention type distribution
        h += '<div class="battlecard-section"><div class="battlecard-label">How prospects bring them up</div>';
        h += '<div class="comp-mention-type-summary">';
        const MT_CHIP = { switching_from: ['mt-switching', 'switching from'], currently_using: ['mt-using', 'currently using'], evaluated: ['mt-evaluated', 'evaluated'], compared_to: ['mt-compared', 'compared to'], asked_about: ['mt-asked', 'asked about'] };
        Object.entries(MT_CHIP).forEach(([mt, [cls, label]]) => {
            if (mtCounts[mt]) h += '<span class="mt-chip ' + cls + '">' + mtCounts[mt] + ' ' + label + '</span>';
        });
        h += '</div></div>';
        h += '</div>'; // close battlecard
    } else {
        h += '<div class="comp-unrecognized-msg">Not in competitor database. Dismiss if not a real competitor.</div>';
    }

    // Related features (direct links)
    if (related.direct.length > 0) {
        h += '<div class="comp-related-features">';
        h += '<div class="comp-related-label">Features mentioned alongside ' + esc(name) + ':</div>';
        h += '<div class="comp-related-list">';
        related.direct.forEach(([feat, cnt]) => {
            h += '<span class="comp-related-feat">' + esc(feat) + ' (' + cnt + ')</span>';
        });
        h += '</div></div>';
    }

    // Co-occurring features
    if (related.cooccurring.length > 0) {
        h += '<div class="comp-cooccur-features">';
        h += '<div class="comp-cooccur-label">Also discussed in these calls:</div>';
        h += '<div class="comp-related-list">';
        related.cooccurring.forEach(([feat]) => {
            h += '<span class="comp-cooccur-feat">' + esc(feat) + '</span>';
        });
        h += '</div></div>';
    }

    // Mentions
    h += '<div class="comp-card-mentions">';
    const sortedMentions = [...data.mentions].sort((a, b) => (b.call_date || '').localeCompare(a.call_date || ''));
    sortedMentions.forEach(cm => {
        h += '<div class="comp-mention">';
        h += '<div class="comp-mention-meta">';
        h += '<span class="comp-mention-company">' + esc(cm.company || 'Unknown') + '</span>';
        if (cm.segment) {
            const sc = segColor(cm.segment);
            h += '<span class="comp-mention-seg" style="background:' + sc + '22;color:' + sc + '">' + esc(cm.segment) + '</span>';
        }
        h += '<span class="comp-mention-type ' + esc(cm.mention_type) + '">' + esc(MENTION_TYPE_LABELS[cm.mention_type] || cm.mention_type) + '</span>';
        if (cm.call_date) {
            const d = cm.call_date.slice(5, 10).replace('-', '/');
            h += '<span class="comp-mention-ts">' + d + '</span>';
            if (isNewMention(cm)) h += '<span class="new-badge">New</span>';
        }
        h += '</div>';
        if (cm.context) {
            h += '<div class="comp-mention-context">' + esc(cm.context) + '</div>';
        }
        h += '</div>';
    });
    h += '</div>';

    // Dismiss action
    h += '<div class="comp-card-actions">';
    h += '<button class="comp-dismiss-btn" onclick="dismissCompetitor(\'' + safeName + '\')">Dismiss competitor</button>';
    h += '</div>';

    panel.innerHTML = h;
}

// Keyboard navigation for competitor list rows
function compListKeydown(e) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const allRows = Array.from(document.querySelectorAll('.comp-list-row'));
        const idx = allRows.indexOf(e.target);
        if (idx < 0) return;
        const next = e.key === 'ArrowDown'
            ? (idx + 1 < allRows.length ? idx + 1 : idx)
            : (idx - 1 >= 0 ? idx - 1 : idx);
        allRows[next].focus();
    } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.target.click();
    }
}

async function dismissCompetitor(name) {
    if (!await checkActionPassword('Dismiss competitor')) return;
    // Fade out the list row
    const row = document.querySelector('.comp-list-row[data-comp="' + CSS.escape(name) + '"]');
    if (row) { row.style.opacity = '0.3'; row.style.transition = 'opacity 0.3s'; }
    await new Promise(r => setTimeout(r, 300));
    try {
        const res = await fetch('/api/exclude-competitor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, action: 'exclude' })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            excludedCompetitors = new Set((data.excluded_competitors || []).map(n => n.toLowerCase()));
            buildCompetitors();
        } else {
            alert('Error: ' + (data.error || 'unknown'));
        }
    } catch (e) {
        excludedCompetitors.add(name.toLowerCase());
        buildCompetitors();
    }
}

async function restoreCompetitor(name) {
    if (!await checkActionPassword('Restore competitor')) return;
    try {
        const res = await fetch('/api/exclude-competitor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, action: 'restore' })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            excludedCompetitors = new Set((data.excluded_competitors || []).map(n => n.toLowerCase()));
            buildCompetitors();
        } else {
            alert('Error: ' + (data.error || 'unknown'));
        }
    } catch (e) {
        // Static file mode — restore in-memory only
        excludedCompetitors.delete(name.toLowerCase());
        buildCompetitors();
    }
}

function switchTab(tab) {
    currentTab = tab;
    updateHash();
    const isReport = (tab === 'reports');
    const isProsp  = (tab === 'prospecting');
    const isPerf   = (tab === 'performance');
    const isWL     = (tab === 'winloss');
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('features-view').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('calls-view').style.display = tab === 'calls' ? '' : 'none';
    document.getElementById('personas-view').style.display = tab === 'personas' ? '' : 'none';
    document.getElementById('competitors-view').style.display = tab === 'competitors' ? '' : 'none';
    document.getElementById('reports-view').style.display = tab === 'reports' ? '' : 'none';
    document.getElementById('prospecting-view').style.display = isProsp ? '' : 'none';
    document.getElementById('performance-view').style.display = isPerf ? '' : 'none';
    document.getElementById('winloss-view').style.display     = isWL  ? '' : 'none';
    document.getElementById('filter-row').style.display = (isProsp || isPerf || isWL) ? 'none' : '';
    document.querySelector('.search-box').style.display = (isReport || isProsp || isPerf || isWL || tab === 'personas' || tab === 'competitors') ? 'none' : '';
    document.getElementById('co-dd').style.display = (tab === 'features' || tab === 'personas' || tab === 'reports') ? '' : 'none';
    document.getElementById('seg-dd').style.display = (tab === 'features' || tab === 'calls' || tab === 'personas' || tab === 'competitors' || tab === 'reports') ? '' : 'none';
    document.getElementById('comp-filter-dd').style.display = tab === 'competitors' ? '' : 'none';
    document.getElementById('comp-type-dd').style.display = tab === 'competitors' ? '' : 'none';
    document.getElementById('expand-btn').style.display = 'none';
    document.getElementById('sync-sheets-btn').style.display = tab === 'features' ? '' : 'none';
    if (tab !== 'features') closeFeatPanel();
    if (tab !== 'personas') closePersonaPanel();
    document.getElementById('analyze-btn').style.display = tab === 'calls' ? '' : 'none';
    if (tab !== 'calls') showExcludedOnly = false;
    updateExcludedChip();
    document.getElementById('q').value = '';
    closeAllDD();
    filter('');
    if (tab === 'personas') buildPersonas();
    if (tab === 'competitors') buildCompetitors();
    if (tab === 'reports') buildInsights();
    if (tab === 'prospecting') buildProspecting();
    if (tab === 'performance') buildPerformance();
    if (tab === 'winloss')     buildWinLoss();
}

function filter(q) {
    const low = q.toLowerCase();
    const countEl = document.getElementById('search-result-count');
    const clearBtn = document.getElementById('search-clear');
    if (currentTab === 'features') {
        rebuildFeatureView();
    } else {

    }
    document.getElementById('hdr-stats').innerHTML = pillsHTML;

    // Tagline: compute date range from visible calls
    const dates = DATA.calls
        .filter(c => callIds.has(c.id) && c.date)
        .map(c => c.date.slice(0, 10))
        .sort();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let tagline = '';
    if (dates.length) {
        const d0 = new Date(dates[0] + 'T00:00:00');
        const d1 = new Date(dates[dates.length - 1] + 'T00:00:00');
        const fmt = d => months[d.getMonth()] + ' ' + d.getDate();
        if (d0.getTime() === d1.getTime()) {
            tagline = fmt(d0) + ', ' + d0.getFullYear();
        } else if (d0.getFullYear() === d1.getFullYear() && d0.getMonth() === d1.getMonth()) {
            tagline = months[d0.getMonth()] + ' ' + d0.getDate() + '\u2013' + d1.getDate() + ', ' + d0.getFullYear();
        } else {
            tagline = fmt(d0) + ' \u2013 ' + fmt(d1) + ', ' + d1.getFullYear();
        }
        tagline += ' \u00b7 ' + callIds.size + ' call' + (callIds.size !== 1 ? 's' : '') + ' analyzed';
    }
    document.getElementById('hdr-tagline').textContent = tagline;
}

function _perfFmt(n, type) {
    if (n == null) return '--';
    if (type === 'pct') return (n * 100).toFixed(1) + '%';
    if (type === 'dollar') return '$' + n.toLocaleString(undefined, {maximumFractionDigits: 0});
    if (type === 'min') return n.toFixed(1) + ' min';
    return n.toLocaleString();
}

function _perfDelta(current, prior, type) {
    if (current == null || prior == null) return '';
    if (prior === 0 && current === 0) return '<span class="perf-delta neutral">\u2014</span>';
    let diff, label;
    if (type === 'pct') {
        diff = current - prior;
        label = (diff >= 0 ? '+' : '') + (diff * 100).toFixed(1) + 'pp';
    } else {
        if (prior === 0) return '<span class="perf-delta neutral">\u2014</span>';
        diff = (current - prior) / prior;
        label = (diff >= 0 ? '+' : '') + (diff * 100).toFixed(0) + '%';
    }
    const cls = diff > 0.005 ? 'up' : diff < -0.005 ? 'down' : 'neutral';
    return `<span class="perf-delta ${cls}">${label}</span>`;
}

function _perfSparkline(byDay, metric, periodKey, repEmail) {
    const source = repEmail && PERF.by_day_by_rep && PERF.by_day_by_rep[repEmail]
        ? PERF.by_day_by_rep[repEmail]
        : byDay;
    if (!source || source.length === 0) return '';
    const now = new Date();
    let daysBack = 30;
    if (periodKey === '7d') daysBack = 7;
    else if (periodKey === '90d') daysBack = 90;
    else if (periodKey === 'this_month') daysBack = now.getDate();
    else if (periodKey === 'last_month') daysBack = 31;

    const cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - daysBack);
    const pts = source.filter(d => new Date(d.date) >= cutoff).map(d => d[metric] || 0);
    if (pts.length < 2) return '';

    // Trend color: green for up, red for down, blue for flat
    const first = pts.slice(0, Math.ceil(pts.length / 2)).reduce((a, b) => a + b, 0);
    const second = pts.slice(Math.ceil(pts.length / 2)).reduce((a, b) => a + b, 0);
    const trendColor = second > first * 1.05 ? '#4ade80' : second < first * 0.95 ? '#ff6b6b' : '#4a6cf7';

    const w = 80, h = 28;
    const max = Math.max(...pts, 1);
    const min = Math.min(...pts);
    const range = max - min || 1;
    const step = w / (pts.length - 1);
    const coords = pts.map((v, i) =>
        `${(i * step).toFixed(1)},${(h - 2 - ((v - min) / range) * (h - 4)).toFixed(1)}`
    );

    const areaCoords = [
        `0,${h}`,
        ...coords,
        `${w},${h}`
    ].join(' ');

    return `<div class="perf-card-spark">
        <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"
             role="img" aria-label="Trend for ${metric}">
            <polygon points="${areaCoords}" fill="${trendColor}" opacity="0.08"/>
            <polyline points="${coords.join(' ')}" fill="none"
                stroke="${trendColor}" stroke-width="1.5"
                stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
    </div>`;
}

function _perfFilteredSlice(slice) {
    if (!slice) return slice;
    const allReps = (slice.by_rep || []).filter(r => r.email !== 'unassigned');
    const allEmails = new Set(allReps.map(r => r.email));
    // If all reps are selected, return unfiltered
    const isAllSelected = allReps.every(r => _perfActiveReps.has(r.email));
    if (isAllSelected) return slice;

    const selected = allReps.filter(r => _perfActiveReps.has(r.email));
    if (selected.length === 0) return slice;

    // Single rep: backward-compat path
    if (selected.length === 1) {
        const rep = selected[0];
        return {
            ...slice,
            team: {
                ...slice.team,
                emails_sent: rep.emails_sent ?? 0,
                emails_sent_prior: rep.emails_sent_prior ?? null,
                reply_rate: rep.reply_rate ?? null,
                reply_rate_prior: rep.reply_rate_prior ?? null,
                replies: rep.replies ?? 0,
                open_rate: rep.open_rate ?? null,
                open_rate_prior: rep.open_rate_prior ?? null,
                tracking_coverage: rep.tracking_coverage ?? null,
                bounces: rep.bounces ?? 0,
                recorded_calls: rep.recorded_calls ?? 0,
                recorded_calls_prior: rep.recorded_calls_prior ?? null,
                avg_call_duration_min: rep.avg_call_duration_min ?? null,
                calls_with_transcript: rep.calls_with_transcript ?? 0,
                transcript_coverage: rep.recorded_calls > 0
                    ? (rep.calls_with_transcript || 0) / rep.recorded_calls
                    : null,
                meetings_booked: rep.meetings_booked ?? 0,
                meetings_booked_prior: rep.meetings_booked_prior ?? null,
                deals_created: rep.deals_created ?? 0,
                deals_created_prior: rep.deals_created_prior ?? null,
                deals_won: rep.deals_won ?? 0,
                deals_won_prior: rep.deals_won_prior ?? null,
                attainment_pct: rep.attainment_pct ?? null,
                sequence_list: (slice.team.sequence_list || [])
                    .filter(s => s.rep_email === rep.email),
                sequences_active: (slice.team.sequence_list || [])
                    .filter(s => s.rep_email === rep.email).length,
            },
            by_rep: slice.by_rep,
            _filtered_rep_email: rep.email,
            _filtered_rep_name: rep.name || rep.email,
        };
    }

    // Multi-rep: sum across selected reps
    const sum = (arr, key) => arr.reduce((s, r) => s + (r[key] || 0), 0);
    const totalEmails = sum(selected, 'emails_sent');
    const totalReplies = sum(selected, 'replies');
    const totalCalls = sum(selected, 'recorded_calls');
    const totalTranscript = sum(selected, 'calls_with_transcript');
    const seqList = (slice.team.sequence_list || []).filter(s => _perfActiveReps.has(s.rep_email));
    return {
        ...slice,
        team: {
            ...slice.team,
            emails_sent: totalEmails,
            emails_sent_prior: sum(selected, 'emails_sent_prior') || null,
            reply_rate: totalEmails > 0 ? totalReplies / totalEmails : null,
            reply_rate_prior: null, // too complex to aggregate rate priors correctly
            replies: totalReplies,
            open_rate: null,
            open_rate_prior: null,
            tracking_coverage: null,
            bounces: sum(selected, 'bounces'),
            recorded_calls: totalCalls,
            recorded_calls_prior: sum(selected, 'recorded_calls_prior') || null,
            avg_call_duration_min: null,
            calls_with_transcript: totalTranscript,
            transcript_coverage: totalCalls > 0 ? totalTranscript / totalCalls : null,
            meetings_booked: sum(selected, 'meetings_booked'),
            meetings_booked_prior: sum(selected, 'meetings_booked_prior') || null,
            deals_created: sum(selected, 'deals_created'),
            deals_created_prior: sum(selected, 'deals_created_prior') || null,
            deals_won: sum(selected, 'deals_won'),
            deals_won_prior: sum(selected, 'deals_won_prior') || null,
            attainment_pct: null,
            sequence_list: seqList,
            sequences_active: seqList.length,
        },
        by_rep: slice.by_rep,
    };
}

function _perfTimeAgo(isoStr) {
    if (!isoStr) return '';
    const diff = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + ' min ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + (hrs === 1 ? ' hour ago' : ' hours ago');
    const days = Math.floor(hrs / 24);
    return days + (days === 1 ? ' day ago' : ' days ago');
}

async function _perfRefresh() {
    const btn = document.getElementById('perf-refresh-btn');
    const status = document.getElementById('perf-refresh-status');
    if (!btn || btn.disabled) return;

    btn.disabled = true;
    btn.textContent = 'Refreshing\u2026';
    if (status) {
        status.textContent = 'Fetching from HubSpot, Mixmax & Fireflies\u2026';
        status.style.display = 'inline';
    }

    try {
        const res = await fetch('/.netlify/functions/refresh', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-refresh-secret': REFRESH_SECRET,
            },
        });

        const data = await res.json();

        if (res.ok) {
            btn.textContent = 'Triggered \u2713';
            if (status) status.textContent = 'Data refreshing \u2014 reload in ~2 min';
        } else {
            btn.disabled = false;
            btn.textContent = 'Refresh Data';
            if (status) status.textContent = 'Error: ' + (data.error || 'Unknown error');
        }
    } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Refresh Data';
        if (status) status.textContent = 'Request failed \u2014 check connection';
    }
}

            <div class="ov-attain-fill" style="width:${(pct*100).toFixed(1)}%;background:${color}"></div>
        </div>
        <div class="perf-card-sub ov-attain-label" style="color:${color}">${sublabel} · ${label}</div>`;
    }

    // Pacing helper
    function _paceNote(actual) {
        if (_perfActivePeriod !== 'this_month') return '';
        const now = new Date();
        const daysElapsed = now.getDate();
        if (daysElapsed < 3) return '';
        const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        const pace = Math.round((actual / daysElapsed) * daysInMonth);
        return `<div class="perf-card-sub ov-pace-note">pace: ${pace} by month end</div>`;
    }

    // Pipeline Value card (stock, not period-based)
    let pipeVal, pipeCount;
    if (_perfIsRepFiltered()) {
        const matchedPipeReps = (p.by_rep || []).filter(r => _perfRepIncluded(r.email));
        pipeVal = matchedPipeReps.reduce((s, r) => s + (r.value || 0), 0);
        pipeCount = matchedPipeReps.reduce((s, r) => s + (r.count || 0), 0);
    } else {
        pipeVal = p.total_value || 0;
        pipeCount = p.deal_count || 0;
    }
    const asOf = p.as_of
        ? new Date(p.as_of).toLocaleDateString('en-US', {month:'short', day:'numeric'})
        : '';

    // Deals Won
    const dealsWon      = team.deals_won       || 0;
    const dealsWonPrior = team.deals_won_prior || null;
    const dealsWonPaceSub = _paceNote(dealsWon).replace(/^<div class="perf-card-sub ov-pace-note">|<\/div>$/g, '');

    // Meetings Booked
    const meetings      = team.meetings_booked       || 0;
    const meetingsPrior = team.meetings_booked_prior || null;
    const meetingsTarget = _teamTarget('meetings_booked');

    // Reply Rate
    const replyRate      = team.reply_rate       ?? null;
    const replyRatePrior = team.reply_rate_prior ?? null;

    const wonClickable = !_perfIsRepFiltered();
    const clickAttr = wonClickable
        ? `onclick="_perfSwitchView('reps')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')_perfSwitchView('reps')" aria-label="View rep breakdown"`
        : '';

    const emailsSent      = team.emails_sent       || 0;
    const emailsSentPrior = team.emails_sent_prior || null;
    const calls      = team.recorded_calls       || 0;
    const callsPrior = team.recorded_calls_prior || null;

    let html = '<div class="perf-cards">';

    // Pipeline Value — stock metric, no prior, no sparkline, tooltip
    html += _perfCard(
        'Pipeline Value',
        pipeVal, 'dollar',
        null,
        `${pipeCount} open deals${asOf ? ' · as of ' + asOf : ''}`,
        null,
        'pipeline_value'
    );

    // Deals Won — no sparkline (deals_won not in by_day), pace note as sub
    html += _perfCard(
        'Deals Won',
        dealsWon, 'num',
        dealsWonPrior,
        dealsWonPaceSub || 'view rep breakdown →',
        null,
        'deals_won'
    ).replace('<div class="perf-card">', `<div class="perf-card${wonClickable ? ' ov-card-clickable' : ''}" ${clickAttr}>`);

    // Meetings Booked — sparkline + attainment bar when applicable
    // _perfCard doesn't support the attainment bar slot, so keep inline
    // but add tooltip icon manually to match the other cards
    const mtgTip = _perfTooltip('meetings');
    html += `<div class="perf-card${wonClickable ? ' ov-card-clickable' : ''}" ${clickAttr}>
        <div>
            <div class="perf-card-label">Meetings Booked</div>
            <div class="perf-card-value">${_perfFmt(meetings, 'num')}${_perfDelta(meetings, meetingsPrior, 'num')}</div>
            ${_perfSparkline(byDay, 'meetings', _perfActivePeriod)}
            ${_attainmentBar(meetings, meetingsTarget)}
            ${!showAttainment ? _paceNote(meetings) : ''}
        </div>
        ${mtgTip}
    </div>`;

    // Reply Rate
    html += _perfCard(
        'Reply Rate',
        replyRate, 'pct',
        replyRatePrior,
        `${team.replies || 0} replies`,
        _perfSparkline(byDay, 'replies', _perfActivePeriod),
        'reply_rate'
    );

    // Emails Sent — reply rate as sub-label for context
    html += _perfCard(
        'Emails Sent',
        emailsSent, 'num',
        emailsSentPrior,
        team.reply_rate != null ? `${_perfFmt(team.reply_rate, 'pct')} reply rate` : null,
        _perfSparkline(byDay, 'emails_sent', _perfActivePeriod),
        'emails_sent'
    );

    // Recorded Calls — transcript coverage as sub-label
    html += _perfCard(
        'Recorded Calls',
        calls, 'num',
        callsPrior,
        team.transcript_coverage != null
            ? `${_perfFmt(team.transcript_coverage, 'pct')} with transcript`
            : null,
        _perfSparkline(byDay, 'recorded_calls', _perfActivePeriod),
        'recorded_calls'
    );

    html += '</div>';
    return html;
}

function _ovEmptyAttention() {
