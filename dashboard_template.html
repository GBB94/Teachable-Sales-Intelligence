function copyIntelligenceBrief() {
    if (!_prospSnapshotData || !_prospSnapshotData.seed_companies) return;
    if (!_prospSelectedSeeds.size) { showToast('Select one or more seeds first.'); return; }

    var allSeeds = _prospSnapshotData.seed_companies;
    var seeds = [];
    _prospSelectedSeeds.forEach(function(id) {
        var s = allSeeds.find(function(x) { return (x.company_id || x.company) === id; });
        if (s) seeds.push(s);
    });
    if (!seeds.length) { showToast('No matching seeds found.'); return; }

    var mentions = (typeof DATA !== 'undefined' && DATA.mentions) || [];
    var calls = (typeof DATA !== 'undefined' && DATA.calls) || [];
    var summaries = (typeof DATA !== 'undefined' && DATA.company_summaries) || {};
    var isMulti = seeds.length > 1;

    // ── Feature-to-problem map ──
    var problemMap = {
        'Certificate Automation': 'scaling credential delivery without manual bottlenecks / automating certificate issuance with verification and expiration tracking',
        'Compliance Reporting': 'proving learner completion to accreditation bodies / pulling audit-ready completion data without manual assembly',
        'Video Scrub Prevention': 'ensuring learners actually complete required content, not just click through it',
        'SCORM Compliance': 'content that works across LMS platforms without breaking',
        'Custom Branding & White Labeling': 'delivering training under your own brand, not your vendor\'s',
        'White Label Platform': 'delivering training under your own brand, not your vendor\'s',
        'Headless / API Access': 'integrating the learning platform into existing systems and workflows',
        'Third-party Integration': 'connecting training data to CRMs, payment systems, and websites already in place',
        'Organization Hierarchy / Nesting': 'managing thousands of client organizations without creating admin overhead',
        'Supervisor Role Access': 'letting managers assign and track training for their teams without admin involvement',
        'Completion Tracking': 'tracking who completed what, when, and making that data actionable',
        'Seat Management': 'letting organizations buy seats in bulk and rotate learners through without gaming the system',
        'Custom Checkout Fields': 'capturing industry-specific data (license numbers, org IDs) at the point of purchase',
        'Guest Checkout': 'reducing friction so buyers don\'t abandon at the signup wall',
        'Affiliate / Referral Program': 'building distribution through partner referrals',
        'Cart / Bundle Checkout': 'letting buyers purchase multiple courses or seats in one transaction',
        'Organization-level Reporting': 'giving each client org visibility into their own learner progress without admin help',
        'Multi-language Support': 'delivering the same training in multiple languages without rebuilding courses',
        'Embedded Course Widget': 'embedding training directly into existing portals without a separate login',
        'AI Tutor / Copilot Integration': 'scaling personalized learner support without adding headcount',
        'Hybrid Scheduling': 'coordinating live sessions alongside self-paced content in one place',
        'Student-Counselor Assignment': 'matching learners with the right coach or counselor automatically',
        'Landing Pages / Site Builder': 'building sales pages without needing a separate website tool',
        'Quiz / Assessment Reporting': 'getting question-level performance data across cohorts',
        'Community Features': 'giving learners a space to discuss and connect without leaving the platform',
        'Payment Plans / Installments': 'offering flexible payment without third-party billing tools',
        'Learning Paths': 'guiding learners through multi-course sequences in the right order',
        'Drip / Timed Content Release': 'releasing content on a controlled timeline instead of all at once',
        'SSO / SAML': 'letting learners sign in with their existing corporate credentials',
        'Learner File Upload to Coaches': 'letting learners submit work for review without email back-and-forth',
        'Reporting Dashboard': 'seeing learner progress and completion data in one place without manual exports',
        'Reporting Data Export (CSV)': 'pulling raw data for custom analysis or compliance reporting',
        'Certificate Customization': 'matching certificates to your brand with custom fields and verification',
        'Continuing Education Credits': 'tracking and awarding CE/CPD credits automatically on completion',
        'Access Duration / Expiration': 'controlling how long learners have access to training content',
        'Course Sequencing / Completion Gating': 'requiring learners to finish prerequisites before advancing',
    };

    // ── Helper: find calls relevant to a company via mentions ──
    function findRelevantCalls(companyName) {
        var callIds = {};
        mentions.forEach(function(m) {
            if ((m.company || '').toLowerCase() === companyName.toLowerCase()) callIds[m.call_id] = true;
        });
        return calls.filter(function(c) { return callIds[c.id]; });
    }

    // ── Collect features across all seeds with quotes and frequency ──
    var featureData = {}; // { featureName: { count, quotes: [{company, text}] } }
    seeds.forEach(function(seed) {
        var cn = seed.company_name || seed.company || '';
        (seed.features_requested || []).forEach(function(f) {
            if (!featureData[f]) featureData[f] = { count: 0, quotes: [] };
            featureData[f].count++;
            var quote = mentions.find(function(m) {
                return m.keyword === f && m.text && (m.company || '').toLowerCase() === cn.toLowerCase();
            });
            featureData[f].quotes.push({ company: cn, text: quote ? quote.text.substring(0, 200) : null });
        });
    });

    // Sort by frequency desc
    var sortedFeatures = Object.keys(featureData).map(function(k) {
        return [k, featureData[k]];
    }).sort(function(a, b) { return b[1].count - a[1].count; });

    // ── Build feature block ──
    var featureBlock;
    if (isMulti) {
        featureBlock = sortedFeatures.map(function(pair) {
            var feature = pair[0], data = pair[1];
            var tag = '[' + data.count + '/' + seeds.length + ' seeds]';
            var quoteLines = data.quotes.map(function(q) {
                return q.text
                    ? '  - ' + q.company + ': "' + q.text + '"'
                    : '  - ' + q.company + ': (mentioned, no direct quote)';
            }).join('\n');
            return '\n' + tag + ' ' + feature + ':\n' + quoteLines;
        }).join('\n');
    } else {
        featureBlock = sortedFeatures.map(function(pair) {
            var q = pair[1].quotes[0];
            return '- ' + pair[0] + (q && q.text ? ': "' + q.text + '"' : '');
        }).join('\n');
    }

    // ── Collect competitor data across all seeds ──
    var competitorData = {};
    seeds.forEach(function(seed) {
        var cn = seed.company_name || seed.company || '';
        var relCalls = findRelevantCalls(cn);
        var seenForSeed = {};
        relCalls.forEach(function(call) {
            (call.competitor_mentions || []).forEach(function(cm) {
                var name = cm.competitor || '';
                if (!name) return;
                if (!competitorData[name]) competitorData[name] = { count: 0, seedNames: {}, mentions: [] };
                if (!competitorData[name].seedNames[cn]) {
                    competitorData[name].count++;
                    competitorData[name].seedNames[cn] = true;
                }
                if (!seenForSeed[name + '|' + (cm.context || '')]) {
                    seenForSeed[name + '|' + (cm.context || '')] = true;
                    competitorData[name].mentions.push({
                        company: cn, context: (cm.context || '').substring(0, 200), type: cm.mention_type || 'mentioned'
                    });
                }
            });
            // Also check marketing_data.competitors_mentioned
            var mkt = call.marketing_data;
            if (mkt && mkt.competitors_mentioned) {
                mkt.competitors_mentioned.forEach(function(mcm) {
                    var mcname = (typeof mcm === 'object' ? (mcm.name || mcm.competitor || '') : String(mcm));
                    if (!mcname) return;
                    if (!competitorData[mcname]) competitorData[mcname] = { count: 0, seedNames: {}, mentions: [] };
                    if (!competitorData[mcname].seedNames[cn]) {
                        competitorData[mcname].count++;
                        competitorData[mcname].seedNames[cn] = true;
                    }
                    var mctx = (typeof mcm === 'object' && mcm.context) ? mcm.context.substring(0, 200) : '';
                    if (!seenForSeed[mcname + '|' + mctx]) {
                        seenForSeed[mcname + '|' + mctx] = true;
                        competitorData[mcname].mentions.push({ company: cn, context: mctx, type: 'mentioned' });
                    }
                });
            }
        });
    });

    var sortedCompetitors = Object.keys(competitorData).map(function(k) {
        return [k, competitorData[k]];
    }).sort(function(a, b) { return b[1].count - a[1].count; });

    var competitorBlock;
    if (isMulti) {
        competitorBlock = sortedCompetitors.map(function(pair) {
            var comp = pair[0], data = pair[1];
            var header = '\n' + comp + ' (' + data.count + (data.count === 1 ? ' seed' : ' seeds') + '):';
            var mentionLines = data.mentions.map(function(m) {
                return m.context ? '  - ' + m.company + ': "' + m.context + '"' : '  - ' + m.company + ': (mentioned)';
            }).join('\n');
            var patternLine = data.count >= 2 ? '\n  Patterns: (review quotes above for recurring themes)' : '';
            return header + '\n' + mentionLines + patternLine;
        }).join('\n');
    } else {
        competitorBlock = sortedCompetitors.map(function(pair) {
            var m = pair[1].mentions[0];
            return '- ' + pair[0] + ' (' + (m ? m.type : 'mentioned') + ')' + (m && m.context ? ': "' + m.context + '"' : '');
        }).join('\n');
    }

    // ── Company summaries ──
    var summaryBlock;
    if (isMulti) {
        var sumLines = seeds.map(function(seed) {
            var cn = seed.company_name || seed.company || '';
            var relCalls = findRelevantCalls(cn);

            }
            return '  - ' + cn + ': ' + (sumText || '(no summary available)');
        }).join('\n');
        summaryBlock = 'COMPANY SUMMARIES (for segment context, do not reference specific companies in emails):\n' + sumLines;
    } else {
        var cn0 = seeds[0].company_name || seeds[0].company || '';
        var relCalls0 = findRelevantCalls(cn0);

    // ── Feature-to-problem mapping lines (filtered to selected features) ──

    // ── Opening line ──

        ? 'Generate a 3-email cold outreach sequence using the merged prospect intelligence at the bottom of this message. The intelligence comes from ' + seeds.length + ' real sales calls with companies in this segment. Features are ranked by how many companies mentioned them. Prioritize the highest-frequency features as your primary email angle. Follow every rule below exactly.'
        : 'Generate a 3-email cold outreach sequence for the prospect profile at the bottom of this message. Follow every rule below exactly.';

        : '';

    // ── Assemble prompt ──
    var prompt = openingLine + '\n\n' +
        'CONTEXT:\n' +
        'You are writing cold outreach emails for Zach, who works in sales at Teachable. Teachable is a learning management platform (LMS) for creating, selling, and managing online courses and training programs. It handles course hosting, student management, payments, certificates, and compliance tracking.\n\n' +
        'These emails target lookalike prospects. The intelligence below comes from real sales calls with SIMILAR companies, not from the recipient\'s company. You must never imply you know anything specific about the recipient. Everything is framed as patterns observed across the segment.' + confidenceNote + '\n\n' +
        'WRITING RULES:\n' +

        '"I noticed your team," "I noticed you," "I see you\'re using," "I see that you," "I saw your," "I saw that," "I know you," "I know your team," "your team is struggling with," "you\'re currently using," "you recently," "based on your," "looking at your," "I checked out your," "after reviewing your"\n\n' +
        'EMAIL STRUCTURE:\n' +

        '- Stage 2 (Day 3): Provide value. Go deeper on the strongest capability from the highest-frequency feature. Something specific not on the marketing site. If competitor data exists (especially competitors mentioned by multiple sources), subtle displacement angle using category language ("most LMS platforms," "platforms built for course creators, not compliance teams"), never the competitor\'s name.\n' +

        sourceLine + '\n' +
        (isMulti ? 'COMBINED CALLS: ' + totalCalls + '\n' : '') + '\n' +

    navigator.clipboard.writeText(prompt).then(function() {

// Parse hash: #calls&exclude=id1,id2 or #features&exclude=id1,id2
function parseHash() {
    const raw = location.hash.replace('#', '');
    const parts = raw.split('&');
    let tab = '';
    parts.forEach(p => {
        if (p.startsWith('exclude=')) {
            p.slice(8).split(',').filter(Boolean).forEach(id => excludedCalls.add(id));
        } else if (p.startsWith('range=')) {
            activeDateRange = p.slice(6);
        } else if (['features', 'calls', 'personas', 'competitors', 'reports', 'prospecting'].includes(p)) {
            tab = p;
        } else if (p === 'product' || p === 'marketing') {
            tab = 'reports';
        }
    });
    return tab;
}

function updateHash() {
    let h = currentTab;
    if (activeDateRange !== 'all') h += '&range=' + activeDateRange;
    if (excludedCalls.size) h += '&exclude=' + [...excludedCalls].join(',');
    location.hash = h;
}

// Date range filter — returns {start, end} Date objects or null for "all"
function getDateRange() {
    if (activeDateRange === 'all') return null;
    if (activeDateRange === 'new') {
        if (!_lastVisitDate) return null; // no previous visit, show all
        return { start: new Date(_lastVisitDate + 'T00:00:00'), end: new Date(Date.now() + 86400000) };
    }
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const day = today.getDay(); // 0=Sun
    const diffToMon = day === 0 ? 6 : day - 1;
    const thisMonday = new Date(today);
    thisMonday.setDate(today.getDate() - diffToMon);
    if (activeDateRange === 'this-week') return { start: thisMonday, end: new Date(now.getTime() + 86400000) };
    if (activeDateRange === 'last-week') {
        const lastMon = new Date(thisMonday);
        lastMon.setDate(thisMonday.getDate() - 7);
        return { start: lastMon, end: thisMonday };
    }
    if (activeDateRange === 'last-2-weeks') {
        const twoWeeksAgo = new Date(thisMonday);
        twoWeeksAgo.setDate(thisMonday.getDate() - 7);
        return { start: twoWeeksAgo, end: new Date(now.getTime() + 86400000) };
    }
    if (activeDateRange === 'last-30-days') {
        const thirtyAgo = new Date(today);
        thirtyAgo.setDate(today.getDate() - 30);
        return { start: thirtyAgo, end: new Date(now.getTime() + 86400000) };
    }
    return null;
}

function isCallInRange(callDate) {
    const range = getDateRange();
    if (!range) return true;
    const d = new Date(callDate + 'T00:00:00');
    return d >= range.start && d < range.end;
}

// Set of call IDs that pass the date filter
function activeCallIds() {
    const ids = new Set();
    DATA.calls.forEach(c => {
        if (isCallInRange(c.date || '2000-01-01')) ids.add(c.id);

}

// ---- Toast system ----
function showToast(message, undoCallback, durationMs) {
    durationMs = durationMs || 5000;
    var id = ++toastIdCounter;
    var container = document.getElementById('toast-container');

    var el = document.createElement('div');
    el.className = 'toast';
    el.dataset.toastId = id;
    el.innerHTML =
        '<div class="toast-msg">' + message + '</div>' +
        '<button class="toast-undo" data-tid="' + id + '">Undo</button>' +
        '<button class="toast-dismiss" data-tid="' + id + '">&times;</button>' +
        '<div class="toast-progress" style="animation:toastCountdown ' + durationMs + 'ms linear forwards"></div>';

    el.querySelector('.toast-undo').addEventListener('click', function() {
        if (undoCallback) undoCallback();
        dismissToast(id);
    });
    el.querySelector('.toast-dismiss').addEventListener('click', function() {
        dismissToast(id);
    });

    container.appendChild(el);

    var timer = setTimeout(function() { dismissToast(id); }, durationMs);
    toastStack.push({ id: id, el: el, timer: timer });

    // Cap visible toasts at 4
    while (toastStack.length > 4) {
        dismissToast(toastStack[0].id);
    }
    return id;
}

function dismissToast(id) {
    var idx = toastStack.findIndex(function(t) { return t.id === id; });
    if (idx === -1) return;
    var entry = toastStack[idx];
    clearTimeout(entry.timer);
    toastStack.splice(idx, 1);
    entry.el.classList.add('toast-exiting');
    entry.el.addEventListener('animationend', function() {
        if (entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
    }, { once: true });
}

function getCapabilityTier(featureName) {

                  coverage_notes: 'Not yet classified', confidence: 'low' };
    if (!featureName || !CAPABILITY_MAP || Object.keys(CAPABILITY_MAP).length === 0) return def;
    if (CAPABILITY_MAP[featureName]) return CAPABILITY_MAP[featureName];
    const normalized = featureName.trim().toLowerCase();
    for (const [key, val] of Object.entries(CAPABILITY_MAP)) {

    return def;
}

const GENERIC_TITLE_RE = /^connect\s+with\s+teachable$/i;
const FOLLOWUP_TITLE_RE = /^teachable\s+followup$/i;
function getProspectTitle(call) {
    const t = (call.title || '').trim();
    if (!GENERIC_TITLE_RE.test(t) && !FOLLOWUP_TITLE_RE.test(t)) return null;
    // Try marketing_data.company
    if (call.marketing_data && call.marketing_data.company && !isTeachableInternal(call.marketing_data.company)) {
        return call.marketing_data.company;
    }
    // Try hubspot_note COMPANY line
    if (call.hubspot_note) {
        const cm = call.hubspot_note.match(/^COMPANY:\s*(.+)/m);
        if (cm && cm[1].trim() && !isTeachableInternal(cm[1].trim())) return cm[1].trim();
    }
    // Try attendees
    const ext = extractCompany(call.attendees);
    if (ext) return ext;
    // Try marketing_data contacts
    if (call.marketing_data && call.marketing_data.contacts && call.marketing_data.contacts.length > 0) {
        return call.marketing_data.contacts[0].name;
    }
    return null;
}

function extractCompany(attendeeStr) {
    if (!attendeeStr) return '';
    const parts = attendeeStr.split(',').map(s => s.trim()).filter(Boolean);
    const external = parts.filter(p => !p.toLowerCase().includes('teachable'));
    return external.join(', ');
}

function tsLink(m) {

// ---- Features view (grouped by category) ----
function isTeachableInternal(name) {
    if (!name) return true;
    const low = name.toLowerCase().trim();
    return low === 'teachable' || low === 'unknown' || low === '';
}

function companyFromTitle(title) {
    if (!title) return '';
    const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
    if (chevron) return chevron[1].split(':')[0].trim();
    return '';
}

function companyFromAttendees(attendees) {
    if (!attendees) return '';
    // Extract company from parenthetical in attendee names, skipping Teachable
    const parts = attendees.split(',').map(s => s.trim()).filter(Boolean);
    for (const p of parts) {
        const paren = p.match(/\(([^)]+)\)/);
        if (paren) {
            const co = paren[1].trim();
            if (!isTeachableInternal(co)) return co;
        }
    }
    return '';
}

function getCompany(m, callMap) {
    // Prefer explicit company field from features.json (if not internal)
    if (m.company && !isTeachableInternal(m.company)) return m.company;
    // Fall back to reportGetCompany (parses speaker/call_title)
    const co = reportGetCompany(m, callMap);
    if (co && !isTeachableInternal(co)) return co;
    // Try call title
    const call = callMap[m.call_id];
    if (call) {
        const fromTitle = companyFromTitle(call.title);
        if (fromTitle && !isTeachableInternal(fromTitle)) return fromTitle;
        // Try attendees field
        const fromAttendees = companyFromAttendees(call.attendees);
        if (fromAttendees) return fromAttendees;
    }
    return '';
}

            '<div class="feat-detail-meta">' + esc(callTitle) + ' <span class="sep">&middot;</span> ' + esc(callDate) + '</div>' +
            '<div class="feat-detail-quote"><span class="spk">' + esc(m.speaker || '') + ':</span> ' + quoteHTML + '</div>' +
        '</div>';
    }

    let html = '';
    visible.forEach(m => { html += entryHTML(m); });

    if (extra.length > 0) {
        html += '<div class="feat-detail-extra">';
        extra.forEach(m => { html += entryHTML(m); });
        html += '</div>';
        html += '<button class="feat-detail-more" onclick="toggleFeatMoreMentions(this)">Show ' + extra.length + ' more mention' + (extra.length > 1 ? 's' : '') + '</button>';
    }

    return html;
}

function buildFeatureCard(kw, mentions, callMap, companies, maxMentions, featIdx) {
    const mSorted = mentions.sort((a, b) => (b.call_date || '').localeCompare(a.call_date || ''));

    // Group mentions by company
    const coMap = {}; // company -> { contacts: Set, count: number }
    const INTERNAL_SPEAKERS = ['zach mccall', 'kevin', 'kevin codde', 'jerome', 'jerome olaloye', 'lennie zhu', 'sarah'];
    mentions.forEach(m => {
        const co = getCompany(m, callMap);
        if (!co) return; // Skip mentions with no identifiable prospect company
        if (!coMap[co]) coMap[co] = { contacts: new Set(), count: 0 };
        const spk = m.speaker || '';
        const spkLow = spk.toLowerCase();
        const spkName = spk.replace(/\s*\([^)]*\)/, '').trim();
        // Skip internal Teachable reps from contact lists
        const isInternal = spkLow.includes('teachable') ||
            INTERNAL_SPEAKERS.some(s => spkLow.includes(s));
        if (spkName && !isInternal) {
            coMap[co].contacts.add(spkName);
        }
        coMap[co].count++;
    });

    // Sort by mention count desc, then alphabetical
    const coEntries = Object.entries(coMap)
        .sort((a, b) => b[1].count - a[1].count || a[0].localeCompare(b[0]));

    // Build company pills (cap at 2 visible, inline expand for overflow)
    const MAX_PILLS = 2;
    const visible = coEntries.slice(0, MAX_PILLS);
    const overflow = coEntries.slice(MAX_PILLS);

    let pillsHTML = '';
    const buildPill = ([co, data]) => {
        const cntBadge = data.count > 1 ? '<span class="co-cnt">(' + data.count + ')</span>' : '';
        const contacts = [...data.contacts];
        const tooltip = contacts.length > 0
            ? '<span class="co-tooltip">' + contacts.map(c => esc(c)).join(', ') + '</span>'
            : '';
        return '<span class="co-pill-wrap"><span class="co-pill">' + esc(co) + cntBadge + '</span>' + tooltip + '</span>';
    };
    visible.forEach(entry => { pillsHTML += buildPill(entry); });

    if (overflow.length > 0) {
        let extraPills = '';
        overflow.forEach(entry => { extraPills += buildPill(entry); });
        pillsHTML += '<span class="co-extra">' + extraPills + '</span>';
        pillsHTML += '<button class="co-more" onclick="event.stopPropagation();toggleCoMore(this)">+' + overflow.length + ' more</button>';
    }

    // Store mentions for detail panel (no inline mentions HTML)
    _featMentions[featIdx] = mSorted;

    const count = mentions.length;
    const countWord = count === 1 ? 'mention' : 'mentions';
    const barPct = (count >= 2 && maxMentions > 0) ? Math.round((count / maxMentions) * 100) : 0;
    const barHTML = barPct > 0 ? '<span class="cnt-bar" style="width:' + barPct + '%"></span>' : '';
    const countLabel = '<span class="cnt-num">' + count + '</span> <span class="cnt-label">' + countWord + '</span>' + barHTML;

    const callIds = [...new Set(mentions.map(m => m.call_id))];
    const capTier = getCapabilityTier(kw).tier;
    const tierClass = ' tier-' + capTier;
    const badge = renderTierBadge(kw);
    return '<div class="card feature-card' + tierClass + '" data-feat-idx="' + featIdx + '" data-companies="' + esc((companies || []).join(',').toLowerCase()) + '" data-callids="' + esc(callIds.join(',')) + '" data-search="' + esc(kw.toLowerCase()) + ' ' + esc(mentions.map(m => m.speaker + ' ' + m.call_title + ' ' + m.text).join(' ').toLowerCase()) + ' ' + esc(Object.keys(coMap).join(' ').toLowerCase()) + '">' +
        '<div class="card-hdr" onclick="toggleFeatureDetail(this)">' +
            '<div class="left"><span class="arrow">&#9654;</span>' +
                '<div class="name-block">' +
                    '<div class="name">' + esc(kw) + badge + '</div>' +
                    (pillsHTML ? '<div class="hdr-tags">' + pillsHTML + '</div>' : '') +
                '</div>' +
            '</div>' +
            '<div class="right"><span class="cnt-pill">' + countLabel + '</span></div>' +
        '</div>' +
    '</div>';
}

function buildFeatures() {
    // Reset feature detail globals
    _featMentions = {};
    _featIdx = 0;

    // Pending analysis banner
    const pendingCalls = DATA.calls.filter(c => c.pending_analysis);
    const oldBanner = document.getElementById('pending-banner');
    if (oldBanner) oldBanner.remove();
    if (pendingCalls.length > 0) {
        const banner = document.createElement('div');
        banner.id = 'pending-banner';
        banner.className = 'pending-banner';
        banner.innerHTML = '<span class="pending-badge">' + pendingCalls.length + '</span> new call' + (pendingCalls.length > 1 ? 's' : '') + ' pending feature analysis. Run analysis to update.';
        const fv = document.getElementById('features-view');
        fv.parentNode.insertBefore(banner, fv);
    }

    // Group mentions by feature (filtered by exclusions)
    const mentions = activeMentions();
    const featureGroups = {};
    mentions.forEach(m => {
        if (!featureGroups[m.keyword]) featureGroups[m.keyword] = { mentions: [], category: m.category || 'Other' };
        featureGroups[m.keyword].mentions.push(m);
    });

    // Apply tier filter (scoped to By Feature tab only)
    if (!activeTierFilters.has('all')) {
        Object.keys(featureGroups).forEach(kw => {
            if (!activeTierFilters.has(getCapabilityTier(kw).tier)) {
                delete featureGroups[kw];
            }
        });
    }

    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    _featCallMap = callMap;

    // Collect all companies for filter and tag each mention
    const allCompanies = new Set();
    mentions.forEach(m => {
        const co = getCompany(m, callMap);
        if (co) {
            allCompanies.add(co);
            m._company = co;
        }
    });

    // Build company dropdown
    buildCompanyDropdown(allCompanies);

    // Group features by category
    const categories = {};
    Object.entries(featureGroups).forEach(([kw, data]) => {
        const cat = data.category;
        if (!categories[cat]) categories[cat] = { features: [], totalMentions: 0 };
        categories[cat].features.push({ keyword: kw, mentions: data.mentions });
        categories[cat].totalMentions += data.mentions.length;
    });

    // Sort categories by total mentions descending, NEEDS_REVIEW always last
    const sortedCats = Object.entries(categories).sort((a, b) => {
        if (a[0] === 'NEEDS_REVIEW') return 1;
        if (b[0] === 'NEEDS_REVIEW') return -1;
        return b[1].totalMentions - a[1].totalMentions;
    });

    // Tier stats bar + filter toggle (only if capability map has data)
    let html = '';
    if (Object.keys(CAPABILITY_MAP).length > 0) {
        // Stats bar
        const allKws = Object.keys(featureGroups);
        const allMentionKws = Object.keys(activeMentions().reduce(function(acc, m) { acc[m.keyword] = true; return acc; }, {}));
        const tierCounts = { native: 0, workaround: 0, roadmap: 0, gap: 0, unknown: 0 };
        allMentionKws.forEach(function(kw) { var t = getCapabilityTier(kw).tier; tierCounts[t] = (tierCounts[t] || 0) + 1; });
        var total = allMentionKws.length;
        var pct = function(n) { return total > 0 ? Math.round(n / total * 100) : 0; };
        html += '<div class="tier-stats-bar">';
        html += '<div class="tier-stats-total">' + total + ' unique features across ' + DATA.stats.unique_calls + ' analyzed calls</div>';
        html += '<div class="tier-stats-breakdown">';
        html += '<span>\u274c ' + tierCounts.gap + ' Gaps (' + pct(tierCounts.gap) + '%)</span>';
        html += '<span class="tier-stat-sep">\u00b7</span>';
        html += '<span>\ud83d\udd27 ' + tierCounts.workaround + ' Workarounds (' + pct(tierCounts.workaround) + '%)</span>';
        html += '<span class="tier-stat-sep">\u00b7</span>';
        html += '<span>\u2705 ' + tierCounts.native + ' Native (' + pct(tierCounts.native) + '%)</span>';
        html += '<span class="tier-stat-sep">\u00b7</span>';
        html += '<span>\ud83d\uddfa\ufe0f ' + tierCounts.roadmap + ' Roadmap (' + pct(tierCounts.roadmap) + '%)</span>';
        html += '<span class="tier-stat-sep">\u00b7</span>';
        html += '<span>\u2753 ' + tierCounts.unknown + ' Review (' + pct(tierCounts.unknown) + '%)</span>';
        html += '</div></div>';

        // Tier filter buttons
        var btnActive = function(t) { return activeTierFilters.has(t) ? ' active' : ''; };
        html += '<div class="tier-filter-group">';
        html += '<span class="tier-filter-label">Show:</span>';
        html += '<button class="tier-filter-btn' + btnActive('all') + '" data-tier="all" onclick="toggleTierFilter(this)">All</button>';
        html += '<button class="tier-filter-btn' + btnActive('gap') + '" data-tier="gap" onclick="toggleTierFilter(this)">\u274c Gaps</button>';
        html += '<button class="tier-filter-btn' + btnActive('native') + '" data-tier="native" onclick="toggleTierFilter(this)">\u2705 Native</button>';
        html += '<button class="tier-filter-btn' + btnActive('workaround') + '" data-tier="workaround" onclick="toggleTierFilter(this)">\ud83d\udd27 Workaround</button>';
        html += '<button class="tier-filter-btn' + btnActive('roadmap') + '" data-tier="roadmap" onclick="toggleTierFilter(this)">\ud83d\uddfa\ufe0f Roadmap</button>';
        html += '<button class="tier-filter-btn' + btnActive('unknown') + '" data-tier="unknown" onclick="toggleTierFilter(this)">\u2753 Review</button>';
        html += '</div>';
    }

    sortedCats.forEach(([catName, catData], idx) => {
        catData.features.sort((a, b) => b.mentions.length - a.mentions.length);

        const isNR = catName === 'NEEDS_REVIEW';
        const featCount = catData.features.length;
        const mentionCount = catData.totalMentions;
        const statsText = featCount + ' feature' + (featCount > 1 ? 's' : '') +
            ' &middot; ' + mentionCount + ' mention' + (mentionCount > 1 ? 's' : '');

        // Collect companies in this category for filtering
        const catCompanies = new Set();
        catData.features.forEach(f => f.mentions.forEach(m => { if (m._company) catCompanies.add(m._company); }));

        // Compute max mentions in this category for proportional bar
        const maxMentions = Math.max(...catData.features.map(f => f.mentions.length));

        // Build individual card HTML strings
        const cards = catData.features.map(f => {
            const cardCompanies = new Set(f.mentions.map(m => m._company).filter(Boolean));
            return buildFeatureCard(f.keyword, f.mentions, callMap, [...cardCompanies], maxMentions, _featIdx++);
        });

        // Pair into row groups of 2 with a shared detail panel
        let cardsHTML = '';
        for (let i = 0; i < cards.length; i += 2) {
            cardsHTML += '<div class="feat-row-group"><div class="feat-row">';
            cardsHTML += cards[i];
            if (cards[i + 1]) cardsHTML += cards[i + 1];
            cardsHTML += '</div><div class="feat-detail"></div></div>';
        }

        const displayName = isNR ? 'Needs Review' : catName;
        const nrClass = isNR ? ' needs-review' : '';
        const nrIcon = isNR ? '<span style="color:#f0c040;margin-right:4px">&#9888;</span>' : '';

        html += '<div class="cat-section' + nrClass + '" data-idx="' + (isNR ? 'nr' : idx % 8) + '" data-cat="' + esc(catName.toLowerCase()) + '" data-companies="' + esc([...catCompanies].join(',').toLowerCase()) + '">' +
            '<div class="cat-hdr" onclick="toggleCat(this)">' +
                '<span class="cat-arrow">&#9654;</span>' +
                nrIcon +
                '<span class="cat-name">' + esc(displayName) + '</span>' +
                '<span class="cat-count">' + statsText + '</span>' +
            '</div>' +
            '<div class="cat-cards">' + cardsHTML + '</div>' +
        '</div>';
    });

    document.getElementById('features-view').innerHTML = html || '<div style="padding:2rem;color:#3a3d4e;text-align:center">No feature requests found.</div>';
}

// ---- Week grouping helpers ----
function getWeekStart(dateStr) {
    // Returns Monday 00:00 of the week containing dateStr
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDay(); // 0=Sun
    const diff = day === 0 ? 6 : day - 1; // shift so Mon=0
    d.setDate(d.getDate() - diff);
    return d;
}

function fmtShortDate(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
}

function weekLabel(weekStart) {
    const now = new Date();
    const thisWeekStart = getWeekStart(now.toISOString().slice(0,10));
    const lastWeekStart = new Date(thisWeekStart);
    lastWeekStart.setDate(lastWeekStart.getDate() - 7);

    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 4); // Friday

    const range = fmtShortDate(weekStart) + ' – ' + fmtShortDate(weekEnd);

    if (weekStart.getTime() === thisWeekStart.getTime()) return 'This Week (' + range + ')';
    if (weekStart.getTime() === lastWeekStart.getTime()) return 'Last Week (' + range + ')';
    return range;
}

function buildCalls() {
    const mentions = activeMentions();
    const byCall = {};
    mentions.forEach(m => {
        if (!byCall[m.call_id]) byCall[m.call_id] = [];
        byCall[m.call_id].push(m);
    });

    const dateIds = activeCallIds();
    // In excluded-only mode, show only excluded calls; otherwise hide excluded
    let callList;
    if (showExcludedOnly) {
        // Show all excluded calls that pass date filter (even without mentions for pending)
        const allByCall = {};
        DATA.mentions.forEach(m => {
            if (!allByCall[m.call_id]) allByCall[m.call_id] = [];
            allByCall[m.call_id].push(m);
        });
        callList = DATA.calls
            .filter(c => excludedCalls.has(c.id) && dateIds.has(c.id) && (allByCall[c.id] || c.pending_analysis))
            .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        // Use allByCall for card rendering in excluded mode
        Object.assign(byCall, allByCall);
    } else {
        callList = DATA.calls
            .filter(c => (byCall[c.id] || c.pending_analysis) && dateIds.has(c.id) && !excludedCalls.has(c.id))
            .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }

    // Group into weeks
    const weeks = new Map(); // weekKey -> { start, calls[] }
    callList.forEach(c => {
        const ws = getWeekStart(c.date || '2000-01-01');
        const key = ws.toISOString().slice(0,10);
        if (!weeks.has(key)) weeks.set(key, { start: ws, calls: [] });
        weeks.get(key).calls.push(c);
    });

    let html = '';
    for (const [, week] of weeks) {
        const totalFeatures = week.calls.reduce((sum, c) => sum + (byCall[c.id] || []).length, 0);
        // Segment breakdown for week header
        const weekSegs = {};
        week.calls.forEach(c => {
            if (c.segment) {
                const sl = c.segment.toLowerCase();
                if (!weekSegs[sl]) weekSegs[sl] = { count: 0, name: c.segment };
                weekSegs[sl].count++;
            }
        });
        let segDotsHTML = '';
        const segEntries = Object.values(weekSegs).sort((a, b) => b.count - a.count);
        if (segEntries.length > 0) {
            segDotsHTML = '<span class="week-seg-dots">';
            segEntries.forEach(s => {
                const abbr = SEG_ABBREV[s.name.toLowerCase()] || s.name.split(' ').slice(0, 2).join(' ');
                const color = segColor(s.name);
                segDotsHTML += '<span class="week-seg-dot" style="--dot-color:' + color + '">' + s.count + ' ' + esc(abbr) + '</span>';
            });
            segDotsHTML += '</span>';
        }
        html += '<div class="week-hdr">' +
            '<span class="week-label">' + esc(weekLabel(week.start)) + '</span>' +
            '<span class="week-meta">' + week.calls.length + ' call' + (week.calls.length > 1 ? 's' : '') +
            ' &middot; ' + totalFeatures + ' feature' + (totalFeatures > 1 ? 's' : '') + '</span>' +

// ---- Shared report helpers ----
function reportGetCompany(m, callMap) {
    const spk = m.speaker || '';
    const spkLow = spk.toLowerCase();
    const call = callMap[m.call_id];
    const title = call ? call.title : '';
    const paren = spk.match(/\(([^)]+)\)/);

    // Known speaker → company mappings (works with or without parenthetical)
    if (spkLow.includes('hui ching') || spkLow.includes('kai shan')) return 'LTA';
    if (spkLow.includes('simon davey')) return 'Simon Davey';
    if (spkLow.includes('simon smith') || spkLow.includes('sabine') || spkLow.includes('katrina welch')) return 'Simon & Sabine (Coaching)';
    if (spkLow.includes('ibrahim') || spkLow.includes('bryan') || spkLow.includes('oghenetejiri')) return 'Dot Compliance';

    if (paren) {
        const raw = paren[1].split('/')[0].trim();
        const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
        if (chevron) return chevron[1].trim();
        if (title.toLowerCase().includes('speravita')) return 'Speravita';
        if (title.toLowerCase().includes('dot compliance')) return 'Dot Compliance';
        if (title.toLowerCase().includes('lta') || raw.toLowerCase().includes('lta')) return 'LTA';
        // Never return Teachable or Unknown as a company
        if (!isTeachableInternal(raw)) return raw;
        // Fall through: internal speaker, try extracting from title
        if (title) return companyFromTitle(title);
    }
    return '';
}
function reportFmtTs(sec) {
    if (sec == null) return '';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}
function reportWeekRange(weekStart) {
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 4);
    return fmtShortDate(weekStart) + ' \u2013 ' + fmtShortDate(end) + ', ' + weekStart.getFullYear();
}

let mktSections = { insights: true, signals: true, terminology: true };

const MKT_SECTION_LABELS = { insights: 'Insights', signals: 'Signals', terminology: 'Terminology' };

function buildPanelConfigBar(panelId, sections, labels) {

    });

        '<div class="report-export-row">' +

function togglePanelSection(panelId, key) {
    const sections = panelId === 'product-panel' ? prodSections : mktSections;

}

// ---- Split Report builder (two panels on one page) ----
function buildReport() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();
    const coSummaries = DATA.company_summaries || {};

    // Tag each mention with company
    mentions.forEach(m => { m._co = reportGetCompany(m, callMap); });

    // Active calls (non-excluded, with mentions or marketing_data)
    function isInternalCall(c) { return /\bsales\b/i.test((c.title || '')); }
    const mentionCallIds = new Set(mentions.map(m => m.call_id));
    const activeCalls = DATA.calls.filter(c =>
        !excludedCalls.has(c.id) && !c.pending_analysis && !isInternalCall(c) &&
        (mentionCallIds.has(c.id) || c.marketing_data)
    );
    const dates = activeCalls.map(c => c.date).filter(Boolean).sort();
    const dateRange = dates.length
        ? fmtShortDate(new Date(dates[0] + 'T00:00:00')) + ' \u2013 ' +
          fmtShortDate(new Date(dates[dates.length - 1] + 'T00:00:00')) + ', ' + dates[0].slice(0, 4)
        : '';

    // Companies map
    const coMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        if (!coMap[co]) coMap[co] = { features: new Set(), calls: new Map() };
        coMap[co].features.add(m.keyword);
        if (!coMap[co].calls.has(m.call_id)) coMap[co].calls.set(m.call_id, callMap[m.call_id]);
    });
    const companies = Object.entries(coMap).sort((a, b) => b[1].features.size - a[1].features.size);

    // Features by category
    const catMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        const cat = m.category || 'Other';
        if (!catMap[cat]) catMap[cat] = {};
        if (!catMap[cat][m.keyword]) catMap[cat][m.keyword] = [];
        catMap[cat][m.keyword].push({ company: co, tsDisplay: reportFmtTs(m.ts_sec), link: m.link || '' });
    });
    const catEntries = Object.entries(catMap).map(([cat, feats]) => {
        let total = 0;
        const coSet = new Set();
        Object.values(feats).forEach(arr => { total += arr.length; arr.forEach(e => coSet.add(e.company)); });
        return { cat, feats, total, coCount: coSet.size };
    }).sort((a, b) => b.total - a.total);
    const topTheme = catEntries.length ? catEntries[0] : null;

    // Marketing data aggregation
    const allMktData = activeCalls.map(c => ({ call: c, md: c.marketing_data || {} })).filter(x => Object.keys(x.md).length > 0);
    const allQuotes = [], allTerminology = [], allQuestions = [];
    const allObjections = [], allMktCompetitors = [], allBarriers = [];
    const allSignals = [], allTimelines = [];

    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        (md.quotes || []).forEach(q => allQuotes.push({ ...q, _co: co, _call: call }));
        (md.terminology || []).forEach(t => allTerminology.push({ ...t, _co: co }));
        (md.questions_asked || []).forEach(q => allQuestions.push({ ...q, _co: co, _call: call }));
        (md.objections || []).forEach(o => allObjections.push({ ...o, _co: co, _call: call }));
        (md.competitors_mentioned || []).forEach(c => allMktCompetitors.push({ ...c, _co: co, _call: call }));
        (md.barriers_to_adoption || []).forEach(b => {
            const existing = allBarriers.find(x => x.barrier === b);
            if (existing) { if (!existing.companies.includes(co)) existing.companies.push(co); }
            else allBarriers.push({ barrier: b, companies: [co] });
        });
        (md.buying_signals || []).forEach(s => allSignals.push({ ...s, _co: co, _call: call }));
        allTimelines.push({ company: co, timeline: md.timeline || null, call: call });
    });

    // Competitor mentions (merged from structured + legacy)
    const compMentionsByName = {};
    const compMeta = {};
    if (DATA.competitors) {
        DATA.competitors.forEach(c => { compMeta[c.name.toLowerCase()] = c; });
    }
    const _rptCompAliases = { 'wap': 'wapcrm' };
    function rptGetCompMeta(name) {
        const lower = name.toLowerCase();
        if (compMeta[lower]) return compMeta[lower];
        if (_rptCompAliases[lower] && compMeta[_rptCompAliases[lower]]) return compMeta[_rptCompAliases[lower]];
        const stripped = lower.replace(/[\s\-()]/g, '');
        for (const [k, v] of Object.entries(compMeta)) {
            if (k.replace(/[\s\-()]/g, '') === stripped) return v;
        }
        return null;
    }

    activeCalls.forEach(c => {
        (c.competitor_mentions || []).forEach(cm => {
            const name = cm.competitor || cm.name || '';
            if (!name) return;
            if (!compMentionsByName[name]) compMentionsByName[name] = [];
            const co = c.marketing_data ? (c.marketing_data.company || '') : '';
            compMentionsByName[name].push({
                context: cm.context || '', mention_type: cm.mention_type || 'asked_about',
                company: co, segment: c.segment || '', call_date: c.date || ''
            });
        });
    });
    allMktCompetitors.forEach(cm => {
        const name = cm.name || '';
        if (!name) return;
        if (!compMentionsByName[name]) compMentionsByName[name] = [];
        compMentionsByName[name].push({
            context: cm.context || '', mention_type: cm.mention_type || 'asked_about',
            company: cm._co || '', segment: '', call_date: cm._call ? cm._call.date || '' : ''
        });
    });
    const compNames = Object.keys(compMentionsByName).sort((a, b) => compMentionsByName[b].length - compMentionsByName[a].length);

    // Prospect aggregation
    const prospectMap = {};
    companies.forEach(([name, d]) => {
        if (!prospectMap[name]) prospectMap[name] = { features: [], calls: [], contacts: [], segment: '', description: '', quote: '' };
        d.features.forEach(f => { if (!prospectMap[name].features.includes(f)) prospectMap[name].features.push(f); });
        d.calls.forEach(c => { if (c) prospectMap[name].calls.push(c); });
    });
    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        if (!prospectMap[co]) prospectMap[co] = { features: [], calls: [], contacts: [], segment: '', description: '', quote: '' };
        if (call.segment && !prospectMap[co].segment) prospectMap[co].segment = call.segment;
        if (md.company_description && !prospectMap[co].description) prospectMap[co].description = md.company_description;
        (md.contacts || []).forEach(ct => {
            if (!prospectMap[co].contacts.find(x => x.name === ct.name)) prospectMap[co].contacts.push(ct);
        });
        if (!prospectMap[co].calls.find(x => x.id === call.id)) prospectMap[co].calls.push(call);
        if (!prospectMap[co].quote && md.quotes && md.quotes.length) {
            prospectMap[co].quote = md.quotes[0].text || '';

    const prospects = Object.entries(prospectMap).sort((a, b) => b[1].features.length - a[1].features.length);

    // Segment breakdown
    const segMap = {};
    activeCalls.forEach(c => {
        const seg = c.segment || 'Unclassified';

    const segEntries = Object.entries(segMap).sort((a, b) => b[1].length - a[1].length);

    // Helpers
    function rptTsLink(call, tsSec, tsDisplay) {
        if (tsSec != null && call && call.transcript) {
            const url = call.transcript.split('?')[0] + '?t=' + Math.floor(tsSec);

        }
        if (tsDisplay) return '<span style="color:#6b7280">' + esc(tsDisplay) + '</span>';
        return '';
    }
    function emailTsLink(call, tsSec, tsDisplay) {
        if (tsSec != null && call && call.transcript) {
            const url = call.transcript.split('?')[0] + '?t=' + Math.floor(tsSec);
            return '<a href="' + esc(url) + '" target="_blank" style="color:#4a7cff;text-decoration:none">' + esc(tsDisplay || reportFmtTs(tsSec)) + '</a>';
        }
        if (tsDisplay) return '<span style="color:#8b8fa3">' + esc(tsDisplay) + '</span>';

    }
    function emailCallLink(call) {
        if (!call) return '';
        const label = esc(call.title || '') + ' (' + (call.date || '').slice(5) + ')';
        if (call.transcript) return '<a href="' + esc(call.transcript) + '" target="_blank" style="color:#4a7cff;text-decoration:none">' + label + '</a>';
        return label;
    }
    const _ctc = { 'direct': '#4a9eff', 'lms': '#a78bfa', 'diy': '#fbbf24', 'adjacent': '#fb923c', 'marketplace': '#34d399' };

    // ==================== PRODUCT PANEL ====================
    let prodH = '';

    // Summary
    prodH += '<div class="rpt-section' + (prodSections.summary ? '' : ' hidden') + '" id="product-panel-summary">';
    prodH += '<div class="rpt-section-hdr">Summary</div>';
    prodH += '<div class="rpt-stat-grid">';
    prodH += '<div class="rpt-stat"><div class="rpt-stat-n">' + activeCalls.length + '</div><div class="rpt-stat-l">Calls</div></div>';
    prodH += '<div class="rpt-stat"><div class="rpt-stat-n">' + mentions.length + '</div><div class="rpt-stat-l">Feature Mentions</div></div>';
    if (topTheme) prodH += '<div class="rpt-stat"><div class="rpt-stat-n">' + esc(topTheme.cat) + '</div><div class="rpt-stat-l">Top Theme (' + topTheme.total + ')</div></div>';
    prodH += '<div class="rpt-stat"><div class="rpt-stat-n">' + companies.length + '</div><div class="rpt-stat-l">Prospects</div></div>';

    } else if (catEntries.length) {

    prodH += '</div>';

    prodH += '<div class="rpt-section-hdr">Competitor Intelligence</div>';

    // ==================== MARKETING PANEL ====================
    let mktH = '';
    const problemQuotes = allQuotes.filter(q => q.theme === 'problem_description');

    if (otherQuotes.length) {
        mktH += '<div class="rpt-subhead">Notable quotes</div>';
        otherQuotes.forEach(q => {

            mktH += '<div class="rpt-quote-attr">\u2014 ' + esc(q.speaker || '') + ', ' + esc(q._co);

    if (allObjections.length) {

    if (!problemQuotes.length && !workaroundQuotes.length && !otherQuotes.length && !allObjections.length) {

    // Signals (buying signals, timelines)
    mktH += '<div class="rpt-section' + (mktSections.signals ? '' : ' hidden') + '" id="marketing-panel-signals">';

    prodEmail += '<h2>Customers</h2>';
    companies.forEach(([name, d]) => {

        d.calls.forEach(c => { if (c && c.transcript) { links.push('<a href="' + esc(c.transcript) + '" target="_blank">Call (' + (c.date || '').slice(5).replace('-', '/') + ')</a>'); } });

    prodEmail += '<h2>Feature Themes</h2>';
    catEntries.forEach(ce => {
        prodEmail += '<div class="cat-group"><div class="cat-title">' + esc(ce.cat) + ' <span class="cat-co">(' + ce.coCount + ' compan' + (ce.coCount !== 1 ? 'ies' : 'y') + ')</span></div>';
        Object.entries(ce.feats).sort((a, b) => b[1].length - a[1].length).forEach(([feat, entries]) => {
            const byCompany = {};
            entries.forEach(e => { if (!byCompany[e.company]) byCompany[e.company] = []; byCompany[e.company].push(e); });
            const parts = Object.entries(byCompany).map(([co, es]) => {

    if (compNames.length) {
        prodPlain += '\nCOMPETITOR INTELLIGENCE\n';
        compNames.forEach(name => {
            prodPlain += name + ' (' + compMentionsByName[name].length + ' mentions)\n';
            compMentionsByName[name].forEach(cm => { prodPlain += '  - ' + (cm.company ? cm.company + ': ' : '') + (cm.context || cm.mention_type) + '\n'; });

    }

    let mktPlain = 'MARKETING INTELLIGENCE REPORT\nWeek of ' + dateRange + '\n';
    mktPlain += '\nWHAT THEY\'RE SAYING\n';
    allQuotes.forEach(q => { mktPlain += '  "' + (q.text || '') + '" -- ' + (q.speaker || '') + ', ' + q._co + '\n'; });
    allObjections.forEach(o => { mktPlain += '  Objection: ' + (o.objection || o.quote || '') + ' -- ' + (o.speaker || o._co) + '\n'; });
    mktPlain += '\nBUYING SIGNALS & TIMELINE\n';
    allSignals.forEach(s => { mktPlain += '  - ' + (s.signal || '') + (s.interpretation ? ' (' + s.interpretation + ')' : '') + ' -- ' + s._co + '\n'; });
    allTimelines.filter(t => t.timeline).forEach(t => { mktPlain += '  ' + t.company + ': ' + t.timeline + '\n'; });
    if (allTerminology.length) {
        mktPlain += '\nTERMINOLOGY\n';
        allTerminology.forEach(t => {
            if (typeof t === 'string') mktPlain += '  - ' + t + '\n';
            else mktPlain += '  - "' + (t.prospect_term || '') + '" not "' + (t.standard_term || '') + '" (' + (t._co || '') + ')\n';
        });
    }

    // ==================== RENDER ====================
    const wrap = document.getElementById('reports-view');
    wrap.innerHTML =
        '<div class="rpt-panel" id="product-panel">' +
            '<div class="rpt-panel-hdr">Product Intelligence Report</div>' +

            prodH +
            '<div class="email-card" style="display:none">' + prodEmail + '</div>' +

            '<div class="rpt-panel-hdr">Marketing Intelligence Report</div>' +
            buildPanelConfigBar('marketing-panel', mktSections, MKT_SECTION_LABELS) +
            mktH +
            '<div class="email-card" style="display:none">' + mktEmail + '</div>' +
        '</div>';
    document.getElementById('product-panel').dataset.plainText = prodPlain;
    document.getElementById('marketing-panel').dataset.plainText = mktPlain;
}

// ---- Report actions ----
async function generatePanel(panelId, btn) {
    if (!await checkActionPassword('Generate report')) return;
    buildReport();
    btn.textContent = 'Updated!';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Generate'; btn.classList.remove('done'); }, 2000);
}

function copyReportHTML(panelId, btn) {
    const card = document.querySelector('#' + panelId + ' .email-card');
    if (!card) return;
    const html = card.innerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const plainBlob = new Blob([card.innerText], { type: 'text/plain' });
    const item = new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob });
    navigator.clipboard.write([item]).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Email HTML'; btn.classList.remove('copied'); }, 2000);
    });
}

function copyReportPlain(panelId, btn) {
    const plain = document.getElementById(panelId).dataset.plainText;
    if (!plain) return;
    navigator.clipboard.writeText(plain).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Plain Text'; btn.classList.remove('copied'); }, 2000);
    });
}

let allExpanded = true;
let activeCompanyFilters = new Set();
let activeSegmentFilters = new Set();

// ---- Dropdown logic ----
const DATE_OPTIONS = [
    { value: 'all', label: 'All Time' },
    { value: 'new', label: 'New Since Last Visit' },
    { value: 'this-week', label: 'This Week' },
    { value: 'last-week', label: 'Last Week' },
    { value: 'last-2-weeks', label: 'Last 2 Weeks' },
    { value: 'last-30-days', label: 'Last 30 Days' },
];

function buildDateDropdown() {
    const panel = document.getElementById('date-panel');
    panel.innerHTML = DATE_OPTIONS.map(o =>
        '<div class="dd-item' + (activeDateRange === o.value ? ' selected' : '') + '" data-val="' + o.value + '" onclick="selectDate(this)">' +
        '<span class="dd-check">&#10003;</span>' + esc(o.label) + '</div>'
    ).join('');
    syncDateLabel();
}

function selectDate(el) {
    activeDateRange = el.dataset.val;
    document.querySelectorAll('#date-panel .dd-item').forEach(d => d.classList.toggle('selected', d.dataset.val === activeDateRange));
    syncDateLabel();
    closeAllDD();
    updateHash();
    buildFeatures();
    buildCalls();
    buildPersonas();
    if (currentTab === 'competitors') buildCompetitors();
    buildReport();
    updateStats();
}

function syncDateLabel() {
    const opt = DATE_OPTIONS.find(o => o.value === activeDateRange) || DATE_OPTIONS[0];
    const label = document.getElementById('date-label');
    label.textContent = opt.label;
    document.querySelector('#date-dd .dd-btn').classList.toggle('has-filter', activeDateRange !== 'all');
}

function buildCompanyDropdown(companies) {
    const sorted = [...companies].sort();
    const panel = document.getElementById('co-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectCompany(this)"><span class="dd-check">&#10003;</span>All Companies</div>';
    html += '<div class="dd-sep"></div>';
    sorted.forEach(co => {
        const sel = activeCompanyFilters.size === 0 || activeCompanyFilters.has(co.toLowerCase());
        html += '<div class="dd-item' + (sel && activeCompanyFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(co) + '" onclick="selectCompany(this)">' +
            '<span class="dd-check">&#10003;</span>' + esc(co) + '</div>';
    });
    panel.innerHTML = html;
    syncCompanyLabel();
}

function selectCompany(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeCompanyFilters.clear();
        document.querySelectorAll('#co-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        // Deselect "All"
        document.querySelector('#co-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const co = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeCompanyFilters.add(co);
        } else {
            activeCompanyFilters.delete(co);
        }
        if (activeCompanyFilters.size === 0) {
            document.querySelector('#co-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncCompanyLabel();
    applyCompanyFilter();
    if (currentTab === 'personas') buildPersonas();
}

function syncCompanyLabel() {
    const label = document.getElementById('co-label');
    const btn = document.querySelector('#co-dd .dd-btn');
    if (activeCompanyFilters.size === 0) {
        label.textContent = 'Companies';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeCompanyFilters.size + ' selected';
        btn.classList.add('has-filter');
    }
}

function toggleDD(id) {
    const wrap = document.getElementById(id);
    const btn = wrap.querySelector('.dd-btn');
    const panel = wrap.querySelector('.dd-panel');
    const opening = !panel.classList.contains('open');
    closeAllDD();
    if (opening) {
        btn.classList.add('open');
        panel.classList.add('open');
    }
}

// ---- Segment dropdown ----
// All defined segments (from segments.json) — always show in dropdown
const ALL_SEGMENT_NAMES = [
    'Continuing Education & Credentialing',
    'Professional Training & Development',
    'Coaches & Consultants',
    'Industry Associations & Membership Orgs',
    'Course Creators & Digital Educators',
    'Academic & Higher Education',
    'Corporate Education & Customer Training',
    'Health, Wellness & Fitness',
    'Government & Public Sector Education'
];

function buildSegmentDropdown() {
    // Count calls per segment
    const segCounts = {};
    DATA.calls.forEach(c => { if (c.segment) segCounts[c.segment] = (segCounts[c.segment] || 0) + 1; });

    const panel = document.getElementById('seg-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectSegment(this)"><span class="dd-check">&#10003;</span>All Segments</div>';
    html += '<div class="dd-sep"></div>';
    ALL_SEGMENT_NAMES.forEach(seg => {
        const count = segCounts[seg] || 0;
        const sel = activeSegmentFilters.size === 0 || activeSegmentFilters.has(seg.toLowerCase());
        const dimmed = count === 0 ? ' style="opacity:0.4"' : '';
        html += '<div class="dd-item' + (sel && activeSegmentFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(seg) + '" onclick="selectSegment(this)"' + dimmed + '>' +
            '<span class="dd-check">&#10003;</span>' + esc(seg) + ' <span style="color:#555a6e;font-size:0.85em">(' + count + ')</span></div>';
    });
    // Also include any segments from data not in the canonical list
    Object.keys(segCounts).forEach(seg => {
        if (!ALL_SEGMENT_NAMES.includes(seg)) {
            const count = segCounts[seg];
            const sel = activeSegmentFilters.has(seg.toLowerCase());
            html += '<div class="dd-item' + (sel ? ' selected' : '') + '" data-val="' + esc(seg) + '" onclick="selectSegment(this)">' +
                '<span class="dd-check">&#10003;</span>' + esc(seg) + ' <span style="color:#555a6e;font-size:0.85em">(' + count + ')</span></div>';
        }
    });
    panel.innerHTML = html;
    syncSegmentLabel();
}

function selectSegment(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeSegmentFilters.clear();
        document.querySelectorAll('#seg-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        document.querySelector('#seg-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const seg = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeSegmentFilters.add(seg);
        } else {
            activeSegmentFilters.delete(seg);
        }
        if (activeSegmentFilters.size === 0) {
            document.querySelector('#seg-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncSegmentLabel();
    applySegmentFilter();
    if (currentTab === 'personas') buildPersonas();
    if (currentTab === 'competitors') buildCompetitors();
}

function syncSegmentLabel() {
    const label = document.getElementById('seg-label');
    const btn = document.querySelector('#seg-dd .dd-btn');
    if (activeSegmentFilters.size === 0) {
        label.textContent = 'Segments';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeSegmentFilters.size + ' selected';
        btn.classList.add('has-filter');
    }
}

function applySegmentFilter() {
    const noFilter = activeSegmentFilters.size === 0;
    // Filter By Call cards
    document.querySelectorAll('#calls-view .card').forEach(card => {
        const seg = card.dataset.segment || '';
        const vis = noFilter || activeSegmentFilters.has(seg);
        card.style.display = vis ? '' : 'none';
    });
    // Filter By Feature cards: show only features from calls matching segment
    const matchingCallIds = new Set();
    if (!noFilter) {
        DATA.calls.forEach(c => {
            if (c.segment && activeSegmentFilters.has(c.segment.toLowerCase())) {
                matchingCallIds.add(c.id);
            }
        });
    }
    document.querySelectorAll('#features-view .cat-section').forEach(sec => {
        let anyVisible = false;
        sec.querySelectorAll('.card').forEach(card => {
            const cardCallIds = (card.dataset.callids || '').split(',').filter(Boolean);
            const vis = noFilter || cardCallIds.some(id => matchingCallIds.has(id));
            card.style.display = vis ? '' : 'none';
            if (vis) anyVisible = true;
        });
        sec.style.display = anyVisible ? '' : 'none';
    });
}

function toggleFeatureDetail(hdr) {
    const card = hdr.parentElement;
    const idx = card.dataset.featIdx;
    const rowGroup = card.closest('.feat-row-group');
    if (!rowGroup) return;
    const detail = rowGroup.querySelector('.feat-detail');
    if (!detail) return;

    const isActive = card.classList.contains('feat-active');

    // Check for any currently open detail panel on the page
    const openDetail = document.querySelector('.feat-detail.open');
    const openCard = document.querySelector('.card.feat-active');

    if (isActive) {
        // Same card re-clicked — collapse
        card.classList.remove('feat-active');
        detail.classList.remove('open');
        detail.innerHTML = '';
        return;
    }

    // Check if the open panel is in a different row group
    if (openDetail && openDetail !== detail) {
        // Different row — collapse old
        openDetail.classList.remove('open');
        openDetail.innerHTML = '';
        if (openCard) openCard.classList.remove('feat-active');
    } else if (openCard && openCard !== card) {
        // Same row, different card — just swap active state (no collapse animation)
        openCard.classList.remove('feat-active');
    }

    // Expand new
    card.classList.add('feat-active');
    detail.innerHTML = buildFeatDetailHTML(idx);
    detail.classList.add('open');
}

// ---- Analysis wizard (CC-prep: triage → copy → done) ----
let _analyzeStep = 1;
let _analyzeCCCommand = '';

const _INTERNAL_SPEAKERS = new Set([
    'zach mccall', 'kevin codde', 'jerome olaloye',
    'lennie zhu', 'sarah dean', 'jonathan corvin-blackburn',
    'jonathan corvin blackburn', 'luke easley'
]);

function renderAnalyzeSteps(current) {
    const labels = ['Triage', 'Copy', 'Done'];
    return '<div class="analyze-steps">' + labels.map((l, i) => {
        const n = i + 1;
        const cls = n < current ? 'done' : n === current ? 'active' : '';
        const icon = n < current ? '&#10003;' : n;
        return '<div class="analyze-step ' + cls + '"><span class="analyze-step-num">' + icon + '</span><span class="analyze-step-label">' + l + '</span></div>';
    }).join('') + '</div>';
}

function _triageCalls() {
    const analyzed = new Set(DATA.mentions.map(m => m.call_id));
    const pending = DATA.calls.filter(c => c.pending_analysis || !analyzed.has(c.id));
    const analyze = [];
    const junk = [];
    for (const c of pending) {
        const text = c.transcript_text || '';
        const words = text.split(/\s+/).filter(Boolean).length;

        // Auto-junk: under 100 words (empty/failed recordings)
        if (words < 100) {
            junk.push({ ...c, _words: words, _reason: words + ' words' });
            continue;
        }

        // Extract speakers from transcript lines ("Speaker Name: text")
        const speakerSet = new Set();
        for (const line of text.split('\n')) {
            const m = line.match(/^([^:]+):\s/);
            if (m) speakerSet.add(m[1].trim().toLowerCase());
        }
        const hasProspect = [...speakerSet].some(name => !_INTERNAL_SPEAKERS.has(name));

        // Title signals for prospect calls — internal calls won't have "teachable" in the name
        const title = c.title || '';
        const titleLower = title.toLowerCase();
        const _REP_NAMES = ['zach mccall', 'jerome olaloye', 'kevin codde'];
        const hasProspectTitle = titleLower.includes('teachable')
            || _REP_NAMES.some(n => titleLower.includes(n));

        let warn = '';
        if (!hasProspect && words >= 300 && !hasProspectTitle) {
            warn = '\u26A0 speakers look internal, verify';
        } else if (words < 300) {
            warn = '\u26A0 short transcript, review';
        }

        analyze.push({ ...c, _words: words, _warn: warn });
    }
    return { analyze, junk };
}

async function showAnalyzeModal() {
    if (!await checkActionPassword('Run analysis')) return;
    _analyzeStep = 1;
    _analyzeCCCommand = '';
    const body = document.getElementById('analyze-modal-body');
    const footer = document.getElementById('analyze-modal-footer');
    const info = document.getElementById('analyze-modal-info');
    const btn = document.getElementById('analyze-action-btn');

    document.getElementById('analyze-overlay').classList.add('open');

    const { analyze, junk } = _triageCalls();

    let html = renderAnalyzeSteps(1);

    if (analyze.length === 0 && junk.length === 0) {
        html += '<div style="color:#4ade80;font-weight:600;font-size:0.95rem;margin-bottom:0.75rem">All calls analyzed</div>';
        body.innerHTML = html;
        info.textContent = 'Nothing to do';
        btn.textContent = 'Close';
        btn.disabled = false;
        btn.className = 'scan-process-btn';
        btn.onclick = function() { closeAnalyzeModal(); };
        footer.style.display = 'flex';
        return;
    }

    // Build triage summary
    if (analyze.length > 0) {
        html += '<div style="font-weight:600;color:#4ade80;font-size:0.85rem;margin-bottom:0.4rem">ANALYZE (' + analyze.length + ')</div>';
        html += '<div style="margin-bottom:0.75rem;font-size:0.82rem;color:#c5c8d6;max-height:120px;overflow-y:auto">';
        analyze.forEach(c => {
            html += '<div style="padding:0.2rem 0">[' + c.id + '] ' + esc(c.title) + ' <span style="color:#8b8fa3">\u2014 ' + c._words + 'w</span>';
            if (c._warn) html += ' <span style="color:#f0a030;font-size:0.78rem">' + esc(c._warn) + '</span>';
            html += '</div>';
        });
        html += '</div>';
    }
    if (junk.length > 0) {
        html += '<div style="font-weight:600;color:#f0a030;font-size:0.85rem;margin-bottom:0.4rem">JUNK / SKIP (' + junk.length + ')</div>';
        html += '<div style="margin-bottom:0.75rem;font-size:0.82rem;color:#8b8fa3;max-height:120px;overflow-y:auto">';
        junk.forEach(c => {
            html += '<div style="padding:0.2rem 0">[' + c.id + '] ' + esc(c.title) + ' <span style="color:#555a6e">\u2014 ' + c._reason + '</span></div>';
        });
        html += '</div>';
    }

    body.innerHTML = html;

    // Build CC command
    let cmd = 'Run the analysis workflow per CLAUDE.md.\nTriage already done \u2014 here are the calls:\n\n';
    if (analyze.length > 0) {
        cmd += 'ANALYZE (one at a time):\n';
        analyze.forEach(c => {
            cmd += '[' + c.id + '] ' + c.title + ' \u2014 ' + c._words + ' words';
            if (c._warn) cmd += ' (' + c._warn + ')';
            cmd += '\n';
        });
        cmd += '\n';
    }
    if (junk.length > 0) {
        cmd += 'JUNK (mark as processed, no analysis):\n';
        junk.forEach(c => { cmd += '[' + c.id + '] ' + c.title + ' \u2014 ' + c._words + ' words (' + c._reason + ')\n'; });
        cmd += '\n';
    }
    cmd += 'Process one call at a time. After each: validate --fix, inject, confirm dashboard updated.';
    _analyzeCCCommand = cmd;

    // Footer
    const total = analyze.length + junk.length;
    info.textContent = total + ' pending call' + (total === 1 ? '' : 's');
    btn.textContent = 'Copy CC Command';
    btn.disabled = false;
    btn.className = 'scan-process-btn';
    btn.onclick = function() {
        navigator.clipboard.writeText(_analyzeCCCommand).then(() => {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => analyzeGoToStep2(), 600);
        });
    };
    footer.style.display = 'flex';
}

async function syncToSheets(btn) {
    btn.disabled = true;
    btn.textContent = 'Syncing...';
    btn.classList.add('scanning');
    try {
        const res = await fetch('/api/sync-sheets', { method: 'POST' });
        const data = await res.json();
        if (data.status === 'ok') {
            btn.textContent = 'Synced: ' + data.rows_added + ' added, ' + data.rows_updated + ' updated';
            btn.classList.remove('scanning');
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.classList.remove('copied'); btn.disabled = false; }, 3000);
        } else {
            btn.textContent = 'Error: ' + (data.message || 'unknown');
            btn.classList.remove('scanning');
            setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.disabled = false; }, 3000);
        }
    } catch (e) {
        btn.textContent = 'Sync failed';
        btn.classList.remove('scanning');
        setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.disabled = false; }, 3000);
    }
}

async function startScan(btn) {
    if (!await checkActionPassword('Scan for calls')) return;
    // Static file mode: fall back to clipboard
    if (location.protocol === 'file:') {
        const cmd = document.getElementById('calls-view').dataset.scanCmd;
        navigator.clipboard.writeText(cmd).then(() => {
            btn.textContent = 'Command Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Scan for More Calls'; btn.classList.remove('copied'); }, 2000);
        });
        return;
    }

    // Server mode: open modal, start preview fetch
    btn.textContent = 'Scanning...';
    btn.classList.add('scanning');
    btn.disabled = true;

    const overlay = document.getElementById('scan-overlay');
    const body = document.getElementById('scan-modal-body');
    const footer = document.getElementById('scan-modal-footer');
    const title = document.getElementById('scan-modal-title');

    title.textContent = 'Fetching calls from Fireflies...';
    body.innerHTML = '<div class="scan-empty" style="padding:3rem"><span class="scanning" style="display:inline-block;animation:scanPulse 1.2s ease-in-out infinite">Scanning...</span></div>';
    footer.style.display = 'none';
    overlay.classList.add('open');

    try {
        const resp = await fetch('/api/scan/preview');
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Preview failed (' + resp.status + ')');
        }
        const data = await resp.json();
        _scanPreviewCalls = data.calls || [];

        if (_scanPreviewCalls.length === 0) {
            title.textContent = 'No Calls Found';
            body.innerHTML = '<div class="scan-empty">No matching calls found in the last 14 days.</div>';
            footer.style.display = 'none';
        } else {
            title.textContent = 'Select Calls to Process';
            renderScanCallList();
            footer.style.display = 'flex';
            updateScanFooter();
        }
    } catch (err) {
        title.textContent = 'Scan Failed';
        body.innerHTML = '<div class="scan-error">' + esc(err.message) + '</div>';
        footer.style.display = 'none';
    }

    btn.textContent = 'Scan for More Calls';
    btn.classList.remove('scanning');
    btn.disabled = false;
}

function renderScanCallList() {
    const body = document.getElementById('scan-modal-body');
    let html = '';
    _scanPreviewCalls.forEach((c, i) => {
        const checked = !c.already_exists ? 'checked' : '';
        const dupeNote = c.already_exists
            ? '<div class="scan-call-dupe">Already in dashboard</div>' : '';
        html += '<div class="scan-call">' +
            '<input type="checkbox" id="scan-cb-' + i + '" data-call-id="' + esc(c.id) + '" ' + checked +
            ' onchange="updateScanFooter()">' +
            '<label class="scan-call-info" for="scan-cb-' + i + '">' +
                '<div class="scan-call-title">' + esc(c.title) + '</div>' +
                '<div class="scan-call-meta">' + c.date + ' &middot; ' + c.duration + ' min &middot; ' + esc(c.attendees || c.organizer) + '</div>' +
                dupeNote +
            '</label>' +
        '</div>';
    });
    body.innerHTML = html;
}

function updateScanFooter() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const info = document.getElementById('scan-modal-info');
    const btn = document.getElementById('scan-process-btn');
    info.textContent = checks.length + ' of ' + _scanPreviewCalls.length + ' selected';
    btn.disabled = checks.length === 0;
}

async function processSelectedCalls() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const ids = Array.from(checks).map(cb => cb.dataset.callId);

    if (ids.length === 0) return;

    const btn = document.getElementById('scan-process-btn');
    const info = document.getElementById('scan-modal-info');
    btn.textContent = 'Processing...';
    btn.classList.add('processing');
    btn.disabled = true;
    info.textContent = 'Running feature scan on ' + ids.length + ' call' + (ids.length > 1 ? 's' : '') + '...';

    try {
        const resp = await fetch('/api/scan/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ call_ids: ids }),
        });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Processing failed (' + resp.status + ')');
        }
        const newData = await resp.json();

        // Merge new calls into global DATA (dedup by ID)
        const existCallIds = new Set(DATA.calls.map(c => c.id));
        let addedCount = 0;
        (newData.calls || []).forEach(c => {
            if (!existCallIds.has(c.id)) {
                DATA.calls.push(c);
                existCallIds.add(c.id);
                addedCount++;
            }
        });
        // Preserve existing mentions unchanged
        if (newData.mentions) {
            const existMentionKeys = new Set(DATA.mentions.map(m => m.call_id + '|' + m.keyword + '|' + m.ts));
            newData.mentions.forEach(m => {
                const k = m.call_id + '|' + m.keyword + '|' + m.ts;
                if (!existMentionKeys.has(k)) { DATA.mentions.push(m); existMentionKeys.add(k); }
            });
        }

        // Rebuild everything
        updateStats();
        buildFeatures();
        buildCalls();
        if (typeof buildReport === 'function') buildReport();

        btn.textContent = 'Done!';
        btn.classList.remove('processing');
        info.textContent = addedCount + ' call' + (addedCount > 1 ? 's' : '') + ' added (pending analysis).';

        setTimeout(() => { closeScanModal(); }, 1200);
    } catch (err) {
        btn.textContent = 'Failed';
        btn.classList.remove('processing');
        info.textContent = err.message;
        setTimeout(() => {
            btn.textContent = 'Process Selected';
            btn.disabled = false;
        }, 3000);
    }
}

function copyNote(btn, callId) {
    const call = DATA.calls.find(c => c.id === callId);
    if (!call || !call.hubspot_note) return;
    navigator.clipboard.writeText(call.hubspot_note).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    });
}

function copyTranscript(btn, callId) {
    const call = DATA.calls.find(c => c.id === callId);
    if (!call || !call.transcript_text) {
        const orig = btn.textContent;
        btn.textContent = 'No transcript available';
        setTimeout(() => { btn.textContent = orig; }, 2000);
        return;
    }
    navigator.clipboard.writeText(call.transcript_text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    });
}
