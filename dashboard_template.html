    kpiH += '<button class="kpi-action" aria-label="' + mktCompanies.size + ' active prospects with qualitative data.">';
    kpiH += '<div class="kpi-value">' + mktCompanies.size + '</div>';
    kpiH += '<div class="kpi-label">Active Prospects</div>';
    kpiH += '</button></article>';
    kpiH += '</div>';

    // ==================== SECTION TABS (Component 2) ====================
    const problemQuotes = allQuotes.filter(q => q.theme === 'problem_description');
    const workaroundQuotes = allQuotes.filter(q => q.theme === 'workaround');
    const otherQuotes = allQuotes.filter(q => q.theme !== 'problem_description' && q.theme !== 'workaround');

    // Enablement data
    var fMentionCounts = {};
    mentions.forEach(function(m) { fMentionCounts[m.keyword] = (fMentionCounts[m.keyword] || 0) + 1; });
    var nativeFeats = Object.entries(fMentionCounts)
        .filter(function(e) { return getCapabilityTier(e[0]).tier === 'native'; })
        .sort(function(a, b) { return b[1] - a[1]; });
    var waFeats = Object.entries(fMentionCounts)
        .filter(function(e) { return getCapabilityTier(e[0]).tier === 'workaround'; })
        .sort(function(a, b) { return b[1] - a[1]; });
    var enableCount = nativeFeats.length + waFeats.length;

    const insTabs = [
        { id: 'voc', label: 'Voice of Customer', count: allQuotes.length },
        { id: 'questions', label: 'Open Questions', count: allQuestions.length },
        { id: 'objections', label: 'Objections & Barriers', count: allObjections.length + allBarriers.length },
        { id: 'signals', label: 'Buying Signals', count: allSignals.length },
        { id: 'terminology', label: 'Terminology', count: allTerminology.length },
        { id: 'enablement', label: 'Enablement', count: enableCount }
    ];

    let tabsH = '<div role="tablist" aria-label="Insights sections" class="ins-tablist" onkeydown="insTablistKeydown(event)">';
    insTabs.forEach((t, i) => {
        const sel = t.id === _insActiveTab;
        tabsH += '<button role="tab" id="ins-tab-' + t.id + '" aria-selected="' + sel + '"';
        tabsH += ' aria-controls="ins-panel-' + t.id + '" tabindex="' + (sel ? '0' : '-1') + '"';
        tabsH += ' class="ins-tab" onclick="switchInsTab(\'' + t.id + '\')">';
        tabsH += esc(t.label) + ' <span class="tab-count">' + t.count + '</span>';
        tabsH += '</button>';
    });
    tabsH += '</div>';

    // ==================== TAB PANELS (Components 3-7) ====================

    // Helper: render a list of quote-like items with top-N + show more
    function renderQuoteGroup(items, cssClass, maxInitial, groupId, renderFn) {
        if (!items.length) return '<div class="ins-empty">No data available.</div>';
        let h = '';
        items.forEach((item, i) => {
            h += '<div' + (i >= maxInitial ? ' class="ins-overflow" style="display:none" data-group="' + groupId + '"' : '') + '>';
            h += renderFn(item);
            h += '</div>';
        });
        if (items.length > maxInitial) {
            h += '<button class="ins-show-more" onclick="insShowMore(this, \'' + groupId + '\')" aria-expanded="false">';
            h += 'Show all ' + items.length + ' items</button>';
        }
        return h;
    }

    // --- VoC Panel ---
    let vocH = '<div role="tabpanel" id="ins-panel-voc" aria-labelledby="ins-tab-voc"' + (_insActiveTab !== 'voc' ? ' hidden' : '') + '>';
    vocH += '<div class="ins-controls">';
    vocH += '<button class="ins-sort-btn' + (_insVocSort === 'company' ? ' active' : '') + '" onclick="insToggleVocSort(\'company\', this)">By company</button>';
    vocH += '<button class="ins-sort-btn' + (_insVocSort === 'date' ? ' active' : '') + '" onclick="insToggleVocSort(\'date\', this)">By date</button>';
    vocH += '</div>';

    function renderQuoteCard(q, extraClass) {
        let h = '<div class="insight-quote' + (extraClass ? ' ' + extraClass : '') + '">';
        h += '<div class="quote-text">\u201c' + esc(q.text || q.quote || q.objection || '') + '\u201d</div>';
        h += '<div class="quote-attr">';
        if (q.speaker) h += '<span class="quote-speaker">' + esc(q.speaker) + '</span>';
        h += '<span class="quote-company">' + esc(q._co) + '</span>';
        if (q._call && q._call.segment) {
            const sc = segColor(q._call.segment);
            h += '<span class="quote-seg" style="--seg-color:' + sc + ';--seg-bg:' + sc + '22">' + esc(q._call.segment) + '</span>';
        }
        h += insTsLink(q._call, q.ts_seconds, q.timestamp);
        h += '</div></div>';
        return h;
    }

    // Sort quotes
    let sortedProblem = [...problemQuotes];
    let sortedWorkaround = [...workaroundQuotes];
    let sortedOther = [...otherQuotes];
    if (_insVocSort === 'date') {
        const byDate = (a, b) => ((b._call && b._call.date) || '').localeCompare((a._call && a._call.date) || '');
        sortedProblem.sort(byDate);
        sortedWorkaround.sort(byDate);
        sortedOther.sort(byDate);
    } else {
        const byCo = (a, b) => (a._co || '').localeCompare(b._co || '');
        sortedProblem.sort(byCo);
        sortedWorkaround.sort(byCo);
        sortedOther.sort(byCo);
    }

    if (sortedProblem.length) {
        vocH += '<div class="ins-section-hdr">How they describe their problems</div>';
        vocH += renderQuoteGroup(sortedProblem, '', 5, 'voc-problems', q => renderQuoteCard(q, ''));
    }
    if (sortedWorkaround.length) {
        vocH += '<div class="ins-section-hdr">Current workarounds</div>';
        vocH += renderQuoteGroup(sortedWorkaround, '', 5, 'voc-workarounds', q => renderQuoteCard(q, 'workaround'));
    }
    if (sortedOther.length) {
        vocH += '<div class="ins-section-hdr">Notable quotes</div>';
        vocH += renderQuoteGroup(sortedOther, '', 5, 'voc-notable', q => renderQuoteCard(q, 'signal'));
    }
    if (!allQuotes.length) {
        vocH += '<div class="ins-empty">No quotes captured in this period.</div>';
    }
    vocH += '</div>';

    // --- Questions Panel ---
    let questH = '<div role="tabpanel" id="ins-panel-questions" aria-labelledby="ins-tab-questions"' + (_insActiveTab !== 'questions' ? ' hidden' : '') + '>';
    if (allQuestions.length) {
        // Group by company
        const qByCompany = {};
        allQuestions.forEach(q => {
            const co = q._co || 'Unknown';
            if (!qByCompany[co]) qByCompany[co] = [];
            qByCompany[co].push(q);
        });
        const qCompanies = Object.entries(qByCompany).sort((a, b) => b[1].length - a[1].length);
        let qIdx = 0;
        qCompanies.forEach(([co, qs]) => {
            questH += '<div class="ins-section-hdr">' + esc(co) + ' (' + qs.length + ')</div>';
            qs.forEach((q, i) => {
                const hidden = qIdx >= 5;
                questH += '<div' + (hidden ? ' class="ins-overflow" style="display:none" data-group="questions-all"' : '') + '>';
                questH += '<div class="insight-question">';
                questH += '<div class="question-text">\u201c' + esc(q.question || q.text || '') + '\u201d</div>';
                questH += '<div class="question-attr">';
                questH += '<span class="question-company">' + esc(co) + '</span>';
                if (q.speaker) questH += '<span>' + esc(q.speaker) + '</span>';
                questH += insTsLink(q._call, q.ts_seconds, q.timestamp);
                questH += '</div></div></div>';
                qIdx++;
            });
        });
        if (allQuestions.length > 5) {
            questH += '<button class="ins-show-more" onclick="insShowMore(this, \'questions-all\')" aria-expanded="false">';
            questH += 'Show all ' + allQuestions.length + ' questions</button>';
        }
    } else {
        questH += '<div class="ins-empty">No questions captured in this period.</div>';
    }
    questH += '</div>';

    // --- Objections & Barriers Panel ---
    let objH = '<div role="tabpanel" id="ins-panel-objections" aria-labelledby="ins-tab-objections"' + (_insActiveTab !== 'objections' ? ' hidden' : '') + '>';
    if (allObjections.length) {
        objH += '<div class="ins-section-hdr">Objections (' + allObjections.length + ')</div>';
        objH += renderQuoteGroup(allObjections, 'objection', 5, 'obj-quotes', o => {
            return renderQuoteCard({ text: o.quote || o.objection || '', speaker: o.speaker, _co: o._co, _call: o._call, ts_seconds: o.ts_seconds, timestamp: o.timestamp }, 'objection');
        });
    }
    if (allBarriers.length) {
        const sortedB = [...allBarriers].sort((a, b) => b.companies.length - a.companies.length);
        objH += '<div class="ins-section-hdr">Barriers to Adoption (' + allBarriers.length + ')</div>';
        sortedB.forEach(b => {
            objH += '<div class="ins-barrier">';
            objH += esc(b.barrier);
            objH += '<span class="ins-barrier-cos">' + esc(b.companies.join(', ')) + '</span>';
            objH += '</div>';
        });
    }
    if (!allObjections.length && !allBarriers.length) {
        objH += '<div class="ins-empty">No objections or barriers in this period.</div>';
    }
    objH += '</div>';

    // --- Buying Signals Panel ---
    let sigH = '<div role="tabpanel" id="ins-panel-signals" aria-labelledby="ins-tab-signals"' + (_insActiveTab !== 'signals' ? ' hidden' : '') + '>';
    if (allSignals.length) {
        allSignals.forEach((s, i) => {
            const hidden = i >= 5;
            sigH += '<div' + (hidden ? ' class="ins-overflow" style="display:none" data-group="signals-all"' : '') + '>';
            sigH += '<div class="insight-signal">';
            sigH += '<div class="signal-text">' + esc(s.signal || '') + '</div>';
            if (s.interpretation) sigH += '<div class="signal-interp">' + esc(s.interpretation) + '</div>';
            sigH += '<div class="signal-attr">';
            sigH += '<span class="signal-company">' + esc(s._co) + '</span>';
            sigH += insTsLink(s._call, s.ts_seconds, s.timestamp);
            sigH += '</div></div></div>';
        });
        if (allSignals.length > 5) {
            sigH += '<button class="ins-show-more" onclick="insShowMore(this, \'signals-all\')" aria-expanded="false">';
            sigH += 'Show all ' + allSignals.length + ' signals</button>';
        }
    }
    if (allTimelines.some(t => t.timeline)) {
        sigH += '<div class="ins-timeline">';
        sigH += '<div class="ins-section-hdr">Timeline Indicators</div>';
        allTimelines.filter(t => t.timeline).forEach(t => {
            sigH += '<div class="ins-timeline-item"><strong>' + esc(t.company) + ':</strong> \u201c' + esc(t.timeline) + '\u201d</div>';
        });
        sigH += '</div>';
    }
    if (!allSignals.length && !allTimelines.some(t => t.timeline)) {
        sigH += '<div class="ins-empty">No buying signals in this period.</div>';
    }
    sigH += '</div>';

    // --- Terminology Panel ---
    let termH = '<div role="tabpanel" id="ins-panel-terminology" aria-labelledby="ins-tab-terminology"' + (_insActiveTab !== 'terminology' ? ' hidden' : '') + '>';
    if (allTerminology.length) {
        // Filter to structured entries with prospect_term + standard_term
        const structured = allTerminology.filter(t => typeof t !== 'string' && t.prospect_term && t.standard_term);
        const unstructured = allTerminology.filter(t => typeof t === 'string' || !t.prospect_term || !t.standard_term);
        if (structured.length) {
            termH += '<table class="ins-term-table"><thead><tr>';
            termH += '<th>Prospect says</th><th>We say</th><th>Company</th>';
            termH += '</tr></thead><tbody>';
            structured.forEach(t => {
                termH += '<tr><td>\u201c' + esc(t.prospect_term) + '\u201d</td>';
                termH += '<td>\u201c' + esc(t.standard_term) + '\u201d</td>';
                termH += '<td>' + esc(t._co || '') + '</td></tr>';
            });
            termH += '</tbody></table>';
        }
        if (unstructured.length) {
            termH += '<div class="ins-section-hdr" style="margin-top:1rem">Other terminology notes</div>';
            unstructured.forEach(t => {
                if (typeof t === 'string') {
                    termH += '<div style="padding:0.2rem 0;color:#9ca3af;font-size:0.85rem">' + esc(t) + '</div>';
                } else {
                    termH += '<div style="padding:0.2rem 0;color:#9ca3af;font-size:0.85rem">' + esc(t.prospect_term || t.standard_term || JSON.stringify(t)) + ' <span style="color:#6b7084">(' + esc(t._co || '') + ')</span></div>';
                }
            });
        }
    } else {
        termH += '<div class="ins-empty">No terminology data in this period.</div>';
    }
    termH += '</div>';

    // --- Enablement Panel ---
    let enableH = '<div role="tabpanel" id="ins-panel-enablement" aria-labelledby="ins-tab-enablement"' + (_insActiveTab !== 'enablement' ? ' hidden' : '') + '>';
    if (Object.keys(CAPABILITY_MAP).length > 0 && (nativeFeats.length || waFeats.length)) {
        if (nativeFeats.length) {
            enableH += '<div class="ins-section-hdr">Features prospects didn\'t know we have (' + nativeFeats.length + ')</div>';
            nativeFeats.forEach(function(e) {
                var cap = getCapabilityTier(e[0]);
                var plan = cap.plan_required ? ' (' + cap.plan_required + ')' : '';
                var notes = cap.coverage_notes ? ' ' + cap.coverage_notes : '';
                enableH += '<div class="ins-enable-item">';
                enableH += '<strong>' + esc(e[0]) + '</strong> (' + e[1] + ' mention' + (e[1] !== 1 ? 's' : '') + ')' + plan;
                if (notes) enableH += ' <span class="ins-enable-notes">' + esc(notes) + '</span>';
                enableH += '</div>';
            });
        }
        if (waFeats.length) {
            enableH += '<div class="ins-section-hdr" style="margin-top:1.25rem">Workaround opportunities (' + waFeats.length + ')</div>';
            waFeats.forEach(function(e) {
                var cap = getCapabilityTier(e[0]);
                var notes = cap.coverage_notes ? ' ' + cap.coverage_notes : '';
                enableH += '<div class="ins-enable-item">';
                enableH += '<strong>' + esc(e[0]) + '</strong> (' + e[1] + ' mention' + (e[1] !== 1 ? 's' : '') + ')';
                if (notes) enableH += ' <span class="ins-enable-notes">' + esc(notes) + '</span>';
                enableH += '</div>';
            });
        }
    } else {
        enableH += '<div class="ins-empty">No enablement data available. Requires capability map.</div>';
    }
    enableH += '</div>';

    // ==================== EXPORT DATA (generate on build, copy on click) ====================
    let prodEmail = '<h1>PRODUCT INTELLIGENCE REPORT</h1>';
    prodEmail += '<div class="email-date">Week of ' + esc(dateRange) + '</div>';
    prodEmail += '<h2>Summary</h2><ul class="summary-list">';
    prodEmail += '<li>' + activeCalls.length + ' sales call' + (activeCalls.length !== 1 ? 's' : '') + '</li>';
    prodEmail += '<li>' + mentions.length + ' feature request' + (mentions.length !== 1 ? 's' : '') + ' across ' + companies.length + ' prospect' + (companies.length !== 1 ? 's' : '') + '</li>';
    if (topTheme) prodEmail += '<li>Top theme: <strong>' + esc(topTheme.cat) + '</strong> (' + topTheme.total + ' mentions)</li>';
    prodEmail += '</ul>';
    if (segEntries.length && segEntries.some(([s]) => s !== 'Unclassified')) {
        prodEmail += '<h2>Calls by Segment</h2>';
        segEntries.forEach(([seg, names]) => { prodEmail += '<div class="co-line"><strong>' + esc(seg) + ':</strong> ' + names.length + ' (' + esc(names.join(', ')) + ')</div>'; });
    }
    prodEmail += '<h2>Feature Recap</h2>';
    prodEmail += '<div class="recap-block">' + (DATA.recap ? DATA.recap.replace(/\n/g, '<br>') : '<em>Not yet generated.</em>') + '</div>';
    prodEmail += '<h2>Customers</h2>';
    companies.forEach(([name, d]) => {
        const summary = coSummaries[name] || '';
        let links = [];
        d.calls.forEach(c => { if (c && c.transcript) { links.push('<a href="' + esc(c.transcript) + '" target="_blank">Call (' + (c.date || '').slice(5).replace('-', '/') + ')</a>'); } });
        prodEmail += '<div class="co-line"><strong>' + esc(name) + '</strong>';
        if (summary) prodEmail += ' \u2014 ' + esc(summary);
        if (links.length) prodEmail += ' \u2192 ' + links.join(', ');
        prodEmail += '</div>';
    });
    prodEmail += '<h2>Feature Themes</h2>';
    catEntries.forEach(ce => {
        prodEmail += '<div class="cat-group"><div class="cat-title">' + esc(ce.cat) + ' <span class="cat-co">(' + ce.coCount + ' compan' + (ce.coCount !== 1 ? 'ies' : 'y') + ')</span></div>';
        Object.entries(ce.feats).sort((a, b) => b[1].length - a[1].length).forEach(([feat, entries]) => {
            const byCompany = {};
            entries.forEach(e => { if (!byCompany[e.company]) byCompany[e.company] = []; byCompany[e.company].push(e); });
            const parts = Object.entries(byCompany).map(([co, es]) => {
                const e = es[0];
                if (e.link && e.tsDisplay) return esc(co) + ' (<a href="' + esc(e.link) + '" target="_blank">' + esc(e.tsDisplay) + '</a>)';
                return e.tsDisplay ? esc(co) + ' (' + esc(e.tsDisplay) + ')' : esc(co);
            });
            prodEmail += '<div class="feat-line">\u2013 <strong>' + esc(feat) + '</strong> \u2014 ' + parts.join(' \u00b7 ') + '</div>';
        });
        prodEmail += '</div>';
    });

    let mktEmail = '<h1>MARKETING INTELLIGENCE REPORT</h1>';
    mktEmail += '<div class="email-date">Week of ' + esc(dateRange) + '</div>';
    if (allQuotes.length || allObjections.length) {
        mktEmail += '<h2>What They\u2019re Saying</h2>';
        allQuotes.forEach(q => {
            mktEmail += '<div style="margin-bottom:0.5em;padding-left:0.8rem;border-left:3px solid #4a7cff">';
            mktEmail += '\u201c' + esc(q.text || '') + '\u201d';
            mktEmail += '<br><span style="color:#666;font-size:13px">\u2014 ' + esc(q.speaker || '') + ', ' + esc(q._co);
            if (q.ts_seconds != null) mktEmail += ' ' + emailTsLink(q._call, q.ts_seconds, q.timestamp);
            mktEmail += '</span></div>';
        });
        if (allObjections.length) {
            mktEmail += '<div style="font-size:13px;font-weight:600;color:#888;margin:1rem 0 0.4rem;text-transform:uppercase">Hesitations</div>';
            allObjections.forEach(o => {
                mktEmail += '<div style="margin-bottom:0.5em;padding-left:0.8rem;border-left:3px solid #f472b6">';
                mktEmail += (o.quote ? '\u201c' + esc(o.quote) + '\u201d' : esc(o.objection || ''));
                mktEmail += '<br><span style="color:#666;font-size:13px">\u2014 ' + esc(o.speaker || '') + ', ' + esc(o._co) + '</span></div>';
            });
        }
    }
    if (allSignals.length) {
        mktEmail += '<h2>Buying Signals</h2>';
        allSignals.forEach(s => {
            mktEmail += '<div style="margin-bottom:0.4em">\u2022 ' + esc(s.signal || '');
            if (s.interpretation) mktEmail += ' \u2014 <em>' + esc(s.interpretation) + '</em>';
            mktEmail += ' (' + esc(s._co) + ')</div>';
        });
    }

    let prodPlain = 'PRODUCT INTELLIGENCE REPORT\nWeek of ' + dateRange + '\n';
    prodPlain += '\nSUMMARY\n- ' + activeCalls.length + ' sales calls\n- ' + mentions.length + ' feature requests across ' + companies.length + ' prospects\n';
    if (topTheme) prodPlain += '- Top theme: ' + topTheme.cat + ' (' + topTheme.total + ' mentions)\n';
    if (segEntries.length && segEntries.some(([s]) => s !== 'Unclassified')) {
        prodPlain += '\nCALLS BY SEGMENT\n';
        segEntries.forEach(([seg, names]) => { prodPlain += '- ' + seg + ': ' + names.length + ' (' + names.join(', ') + ')\n'; });
    }
    prodPlain += '\nFEATURE RECAP\n' + (DATA.recap || '(Not yet generated)') + '\n';
    prodPlain += '\nCUSTOMERS\n';
    companies.forEach(([name]) => { prodPlain += '- ' + name + (coSummaries[name] ? ' \u2014 ' + coSummaries[name] : '') + '\n'; });
    prodPlain += '\nFEATURE THEMES\n';
    catEntries.forEach(ce => {
        prodPlain += ce.cat + ' (' + ce.coCount + ' companies)\n';
        Object.entries(ce.feats).sort((a, b) => b[1].length - a[1].length).forEach(([feat, entries]) => {
            const byCompany = {};
            entries.forEach(e => { if (!byCompany[e.company]) byCompany[e.company] = []; byCompany[e.company].push(e); });
            const parts = Object.entries(byCompany).map(([co, es]) => (es[0].tsDisplay ? co + ' (' + es[0].tsDisplay + ')' : co));
            prodPlain += '  - ' + feat + ' \u2014 ' + parts.join(' \u00b7 ') + '\n';
        });
    });
    if (compNames.length) {
        prodPlain += '\nCOMPETITOR INTELLIGENCE\n';
        compNames.forEach(name => {
            prodPlain += name + ' (' + compMentionsByName[name].length + ' mentions)\n';
            compMentionsByName[name].forEach(cm => { prodPlain += '  - ' + (cm.company ? cm.company + ': ' : '') + (cm.context || cm.mention_type) + '\n'; });
        });
    }

    let mktPlain = 'MARKETING INTELLIGENCE REPORT\nWeek of ' + dateRange + '\n';
    mktPlain += '\nWHAT THEY\'RE SAYING\n';
    allQuotes.forEach(q => { mktPlain += '  "' + (q.text || '') + '" -- ' + (q.speaker || '') + ', ' + q._co + '\n'; });
    allObjections.forEach(o => { mktPlain += '  Objection: ' + (o.objection || o.quote || '') + ' -- ' + (o.speaker || o._co) + '\n'; });
    mktPlain += '\nBUYING SIGNALS & TIMELINE\n';
    allSignals.forEach(s => { mktPlain += '  - ' + (s.signal || '') + (s.interpretation ? ' (' + s.interpretation + ')' : '') + ' -- ' + s._co + '\n'; });
    allTimelines.filter(t => t.timeline).forEach(t => { mktPlain += '  ' + t.company + ': ' + t.timeline + '\n'; });
    if (allTerminology.length) {
        mktPlain += '\nTERMINOLOGY\n';
        allTerminology.forEach(t => {
            if (typeof t === 'string') mktPlain += '  - ' + t + '\n';
            else mktPlain += '  - "' + (t.prospect_term || '') + '" not "' + (t.standard_term || '') + '" (' + (t._co || '') + ')\n';
        });
    }

    // Store for export
    _insExportData = { prodEmail, mktEmail, prodPlain, mktPlain };

    // ==================== RENDER ====================
    const wrap = document.getElementById('reports-view');
    let html = '<div style="position:relative">';
    // Export toolbar (top-right)
    html += '<div class="ins-export-wrap">';
    html += '<button class="ins-export-btn" aria-haspopup="menu" aria-expanded="false" aria-controls="ins-export-menu"';
    html += ' onclick="insToggleExportMenu(this)" onkeydown="insExportBtnKeydown(event, this)">Export \u25be</button>';
    html += '<ul role="menu" id="ins-export-menu" hidden>';
    html += '<li role="menuitem" tabindex="-1" onclick="insExport(\'product\',\'html\')" onkeydown="insMenuItemKeydown(event)">Product Report \u2192 Email HTML</li>';
    html += '<li role="menuitem" tabindex="-1" onclick="insExport(\'product\',\'plain\')" onkeydown="insMenuItemKeydown(event)">Product Report \u2192 Plain Text</li>';
    html += '<li role="menuitem" tabindex="-1" onclick="insExport(\'marketing\',\'html\')" onkeydown="insMenuItemKeydown(event)">Marketing Report \u2192 Email HTML</li>';
    html += '<li role="menuitem" tabindex="-1" onclick="insExport(\'marketing\',\'plain\')" onkeydown="insMenuItemKeydown(event)">Marketing Report \u2192 Plain Text</li>';
    html += '</ul></div>';
    html += coverageH;
    html += kpiH;
    html += tabsH;
    html += vocH + questH + objH + sigH + termH + enableH;
    html += '</div>';
    wrap.innerHTML = html;
}

// ---- Insights Hub actions ----

// Switch insight section tab (WAI Tabs Pattern)
function switchInsTab(tabId) {
    _insActiveTab = tabId;
    const tablist = document.querySelector('#reports-view .ins-tablist');
    if (!tablist) return;
    tablist.querySelectorAll('[role="tab"]').forEach(t => {
        const sel = t.id === 'ins-tab-' + tabId;
        t.setAttribute('aria-selected', sel ? 'true' : 'false');
        t.tabIndex = sel ? 0 : -1;
    });
    document.querySelectorAll('#reports-view [role="tabpanel"]').forEach(p => {
        p.hidden = p.id !== 'ins-panel-' + tabId;
    });
}

// Tablist keyboard navigation
function insTablistKeydown(e) {
    const tabs = Array.from(e.currentTarget.querySelectorAll('[role="tab"]'));
    const idx = tabs.indexOf(e.target);
    if (idx < 0) return;
    let next = -1;
    if (e.key === 'ArrowRight') next = (idx + 1) % tabs.length;
    else if (e.key === 'ArrowLeft') next = (idx - 1 + tabs.length) % tabs.length;
    else if (e.key === 'Home') next = 0;
    else if (e.key === 'End') next = tabs.length - 1;
    else return;
    e.preventDefault();
    tabs[next].focus();
    // Automatic activation
    const tabId = tabs[next].id.replace('ins-tab-', '');
    switchInsTab(tabId);
}

// Export menu toggle (WAI Menu Button Pattern)
function insToggleExportMenu(btn) {

}

// Close export menu
function insCloseExportMenu() {
    const menu = document.getElementById('ins-export-menu');
    const btn = menu ? menu.previousElementSibling : null;
    if (menu) menu.hidden = true;
    if (btn) {
        btn.setAttribute('aria-expanded', 'false');
        btn.focus();
    }
}

// Export button keydown
function insExportBtnKeydown(e, btn) {
    if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        const menu = document.getElementById('ins-export-menu');
        menu.hidden = false;
        btn.setAttribute('aria-expanded', 'true');
        const first = menu.querySelector('[role="menuitem"]');
        if (first) first.focus();
    }
}

// Menu item keyboard navigation
function insMenuItemKeydown(e) {
    const menu = e.target.closest('[role="menu"]');
    const items = Array.from(menu.querySelectorAll('[role="menuitem"]'));
    const idx = items.indexOf(e.target);
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        items[(idx + 1) % items.length].focus();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        items[(idx - 1 + items.length) % items.length].focus();
    } else if (e.key === 'Escape') {
        e.preventDefault();
        insCloseExportMenu();
    } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.target.click();
    }
}

// Export clipboard action
async function insExport(type, format) {
    if (!await checkActionPassword('Generate report')) { insCloseExportMenu(); return; }
    const btn = document.querySelector('.ins-export-btn');
    insCloseExportMenu();
    if (type === 'product' && format === 'html') {
        const html = _insExportData.prodEmail;
        const blob = new Blob([html], { type: 'text/html' });
        const plainBlob = new Blob([html.replace(/<[^>]+>/g, '')], { type: 'text/plain' });
        await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })]);
    } else if (type === 'product' && format === 'plain') {
        await navigator.clipboard.writeText(_insExportData.prodPlain);
    } else if (type === 'marketing' && format === 'html') {
        const html = _insExportData.mktEmail;
        const blob = new Blob([html], { type: 'text/html' });
        const plainBlob = new Blob([html.replace(/<[^>]+>/g, '')], { type: 'text/plain' });
        await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })]);
    } else if (type === 'marketing' && format === 'plain') {
        await navigator.clipboard.writeText(_insExportData.mktPlain);
    }
    if (btn) {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Export \u25be'; btn.classList.remove('copied'); }, 2000);
    }
}

// ---- Analysis wizard (CC-prep: triage → copy → done) ----
let _analyzeStep = 1;
let _analyzeCCCommand = '';

const _INTERNAL_SPEAKERS = new Set([
    'zach mccall', 'kevin codde', 'jerome olaloye',
    'lennie zhu', 'sarah dean', 'jonathan corvin-blackburn',
    'jonathan corvin blackburn', 'luke easley'
]);

function renderAnalyzeSteps(current) {
    const labels = ['Triage', 'Copy', 'Done'];
    return '<div class="analyze-steps">' + labels.map((l, i) => {
        const n = i + 1;
        const cls = n < current ? 'done' : n === current ? 'active' : '';
        const icon = n < current ? '&#10003;' : n;
        return '<div class="analyze-step ' + cls + '"><span class="analyze-step-num">' + icon + '</span><span class="analyze-step-label">' + l + '</span></div>';
    }).join('') + '</div>';
}

function _triageCalls() {
    const analyzed = new Set(DATA.mentions.map(m => m.call_id));
    const pending = DATA.calls.filter(c => c.pending_analysis || !analyzed.has(c.id));
    const analyze = [];
    const junk = [];
    for (const c of pending) {
        const text = c.transcript_text || '';
        const words = text.split(/\s+/).filter(Boolean).length;

        // Auto-junk: under 100 words (empty/failed recordings)
        if (words < 100) {
            junk.push({ ...c, _words: words, _reason: words + ' words' });
            continue;
        }

        // Extract speakers from transcript lines ("Speaker Name: text")
        const speakerSet = new Set();
        for (const line of text.split('\n')) {
            const m = line.match(/^([^:]+):\s/);
            if (m) speakerSet.add(m[1].trim().toLowerCase());
        }
        const hasProspect = [...speakerSet].some(name => !_INTERNAL_SPEAKERS.has(name));

        // Title signals for prospect calls — internal calls won't have "teachable" in the name
        const title = c.title || '';
        const titleLower = title.toLowerCase();
        const _REP_NAMES = ['zach mccall', 'jerome olaloye', 'kevin codde'];
        const hasProspectTitle = titleLower.includes('teachable')
            || _REP_NAMES.some(n => titleLower.includes(n));

        let warn = '';
        if (!hasProspect && words >= 300 && !hasProspectTitle) {
            warn = '\u26A0 speakers look internal, verify';
        } else if (words < 300) {
            warn = '\u26A0 short transcript, review';
        }

        analyze.push({ ...c, _words: words, _warn: warn });
    }
    return { analyze, junk };
}

async function showAnalyzeModal() {
    // password gate removed for now
    _analyzeStep = 1;
    _analyzeCCCommand = '';
    const body = document.getElementById('analyze-modal-body');
    const footer = document.getElementById('analyze-modal-footer');
    const info = document.getElementById('analyze-modal-info');
    const btn = document.getElementById('analyze-action-btn');

    document.getElementById('analyze-overlay').classList.add('open');

    const { analyze, junk } = _triageCalls();

    let html = renderAnalyzeSteps(1);

    if (analyze.length === 0 && junk.length === 0) {
        html += '<div style="color:#4ade80;font-weight:600;font-size:0.95rem;margin-bottom:0.75rem">All calls analyzed</div>';
        body.innerHTML = html;
        info.textContent = 'Nothing to do';
        btn.textContent = 'Close';
        btn.disabled = false;
        btn.className = 'scan-process-btn';
        btn.onclick = function() { closeAnalyzeModal(); };
        footer.style.display = 'flex';
        return;
    }

    // Build triage summary
    if (analyze.length > 0) {
        html += '<div style="font-weight:600;color:#4ade80;font-size:0.85rem;margin-bottom:0.4rem">ANALYZE (' + analyze.length + ')</div>';
        html += '<div style="margin-bottom:0.75rem;font-size:0.82rem;color:#c5c8d6;max-height:120px;overflow-y:auto">';
        analyze.forEach(c => {
            html += '<div style="padding:0.2rem 0">[' + c.id + '] ' + esc(c.title) + ' <span style="color:#8b8fa3">\u2014 ' + c._words + 'w</span>';
            if (c._warn) html += ' <span style="color:#f0a030;font-size:0.78rem">' + esc(c._warn) + '</span>';
            html += '</div>';
        });
        html += '</div>';
    }
    if (junk.length > 0) {
        html += '<div style="font-weight:600;color:#f0a030;font-size:0.85rem;margin-bottom:0.4rem">JUNK / SKIP (' + junk.length + ')</div>';
        html += '<div style="margin-bottom:0.75rem;font-size:0.82rem;color:#8b8fa3;max-height:120px;overflow-y:auto">';
        junk.forEach(c => {
            html += '<div style="padding:0.2rem 0">[' + c.id + '] ' + esc(c.title) + ' <span style="color:#555a6e">\u2014 ' + c._reason + '</span></div>';
        });
        html += '</div>';
    }

    body.innerHTML = html;

    // Build CC command
    let cmd = 'Run the analysis workflow per CLAUDE.md.\nTriage already done \u2014 here are the calls:\n\n';
    if (analyze.length > 0) {
        cmd += 'ANALYZE (one at a time):\n';
        analyze.forEach(c => {
            cmd += '[' + c.id + '] ' + c.title + ' \u2014 ' + c._words + ' words';
            if (c._warn) cmd += ' (' + c._warn + ')';
            cmd += '\n';
        });
        cmd += '\n';
    }
    if (junk.length > 0) {
        cmd += 'JUNK (mark as processed, no analysis):\n';
        junk.forEach(c => { cmd += '[' + c.id + '] ' + c.title + ' \u2014 ' + c._words + ' words (' + c._reason + ')\n'; });
        cmd += '\n';
    }
    cmd += 'Process one call at a time. After each: validate --fix, inject, confirm dashboard updated.';
    _analyzeCCCommand = cmd;

    // Footer
    const total = analyze.length + junk.length;
    info.textContent = total + ' pending call' + (total === 1 ? '' : 's');
    btn.textContent = 'Copy CC Command';
    btn.disabled = false;
    btn.className = 'scan-process-btn';
    btn.onclick = function() {
        navigator.clipboard.writeText(_analyzeCCCommand).then(() => {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => analyzeGoToStep2(), 600);
        });
    };
    footer.style.display = 'flex';
}

function analyzeGoToStep2() {
    _analyzeStep = 2;
    const body = document.getElementById('analyze-modal-body');
    const info = document.getElementById('analyze-modal-info');
    const btn = document.getElementById('analyze-action-btn');

    let html = renderAnalyzeSteps(2);

    info.textContent = '';
    btn.textContent = 'Done \u2014 Refresh Dashboard';

    btn.className = 'scan-process-btn';
    btn.classList.remove('copied');

    btn.classList.add('scanning');
    try {
        const res = await fetch('/api/sync-sheets', { method: 'POST' });

            btn.textContent = 'Synced: ' + data.rows_added + ' added, ' + data.rows_updated + ' updated';
            btn.classList.remove('scanning');
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.classList.remove('copied'); btn.disabled = false; }, 3000);

        setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.disabled = false; }, 3000);
    }
}

async function startScan(btn) {
    // password gate removed for now
    // Static file mode: fall back to clipboard
    if (location.protocol === 'file:') {
        const cmd = document.getElementById('calls-view').dataset.scanCmd;
        navigator.clipboard.writeText(cmd).then(() => {
            btn.textContent = 'Command Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Scan for More Calls'; btn.classList.remove('copied'); }, 2000);
        });
        return;
    }

    // Server mode: open modal, start preview fetch
    btn.textContent = 'Scanning...';
    btn.classList.add('scanning');
    btn.disabled = true;

    const overlay = document.getElementById('scan-overlay');
    const body = document.getElementById('scan-modal-body');
    const footer = document.getElementById('scan-modal-footer');
    const title = document.getElementById('scan-modal-title');

    title.textContent = 'Fetching calls from Fireflies...';
    body.innerHTML = '<div class="scan-empty" style="padding:3rem"><span class="scanning" style="display:inline-block;animation:scanPulse 1.2s ease-in-out infinite">Scanning...</span></div>';
    footer.style.display = 'none';
    overlay.classList.add('open');

    try {
        const resp = await fetch('/api/scan/preview');
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Preview failed (' + resp.status + ')');
        }
        const data = await resp.json();
        _scanPreviewCalls = data.calls || [];
        const meta = data.meta || {};

        if (_scanPreviewCalls.length === 0) {
            title.textContent = 'No Calls Found';
            let emptyMsg = 'No matching calls found.';
            if (meta.skipped_known) emptyMsg += ' (' + meta.skipped_known + ' already imported or rejected)';
            body.innerHTML = '<div class="scan-empty">' + esc(emptyMsg) + '</div>';
            footer.style.display = 'none';
        } else {
            title.textContent = 'Select Calls to Process';
            renderScanCallList(meta);
            footer.style.display = 'flex';
            updateScanFooter();
        }
    } catch (err) {
        title.textContent = 'Scan Failed';
        body.innerHTML = '<div class="scan-error">' + esc(err.message) + '</div>';
        footer.style.display = 'none';
    }

    btn.textContent = 'Scan for More Calls';
    btn.classList.remove('scanning');
    btn.disabled = false;
}

async function processSelectedCalls() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const ids = Array.from(checks).map(cb => cb.dataset.callId);

    if (ids.length === 0) return;

    const btn = document.getElementById('scan-process-btn');
    const info = document.getElementById('scan-modal-info');
    btn.textContent = 'Processing...';
    btn.classList.add('processing');
    btn.disabled = true;
    info.textContent = 'Running feature scan on ' + ids.length + ' call' + (ids.length > 1 ? 's' : '') + '...';

    try {
        const resp = await fetch('/api/scan/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ call_ids: ids }),
        });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Processing failed (' + resp.status + ')');
        }
        const newData = await resp.json();

        // Merge new calls into global DATA (dedup by ID)
        const existCallIds = new Set(DATA.calls.map(c => c.id));
        let addedCount = 0;
        (newData.calls || []).forEach(c => {
            if (!existCallIds.has(c.id)) {
                DATA.calls.push(c);
                existCallIds.add(c.id);
                addedCount++;
            }
        });
        // Preserve existing mentions unchanged
        if (newData.mentions) {
            const existMentionKeys = new Set(DATA.mentions.map(m => m.call_id + '|' + m.keyword + '|' + m.ts));
            newData.mentions.forEach(m => {
                const k = m.call_id + '|' + m.keyword + '|' + m.ts;
                if (!existMentionKeys.has(k)) { DATA.mentions.push(m); existMentionKeys.add(k); }
            });
        }

        // Rebuild everything
        updateStats();
        buildFeatures();
        buildCalls();
        if (typeof buildReport === 'function') buildReport();

        // Reject unselected calls so they don't re-appear in future scans
        const allPreviewIds = _scanPreviewCalls.map(c => c.id);
        const rejectedIds = allPreviewIds.filter(id => !ids.includes(id));
        if (rejectedIds.length > 0) {
            fetch('/api/scan/reject', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ call_ids: rejectedIds })
            }).catch(err => console.warn('Failed to record rejections:', err));
        }

        btn.textContent = 'Done!';
        btn.classList.remove('processing');
        info.textContent = addedCount + ' call' + (addedCount > 1 ? 's' : '') + ' added (pending analysis).';

        setTimeout(() => { closeScanModal(); }, 1200);
    } catch (err) {
        btn.textContent = 'Failed';
        btn.classList.remove('processing');
        info.textContent = err.message;
        setTimeout(() => {
            btn.textContent = 'Process Selected';
            btn.disabled = false;
        }, 3000);
    }
}

function copyNote(btn, callId) {

    navigator.clipboard.writeText(call.hubspot_note).then(() => {

// ---- Personas tab ----
const SEG_COLORS = {
    'continuing education & credentialing': '#4a9eff',
    'professional training & development': '#4ade80',
    'coaches & consultants': '#a78bfa',
    'industry associations & membership orgs': '#fbbf24',
    'course creators & digital educators': '#f472b6',
    'academic & higher education': '#2dd4bf',
    'corporate education & customer training': '#fb923c',
    'health, wellness & fitness': '#34d399',
    'government & public sector education': '#94a3b8',
    'needs_review': '#f0c040'
};

function segColor(segName) {
    return SEG_COLORS[(segName || '').toLowerCase()] || '#4a7cff';
}

function buildPersonas() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();

    // Check if any segment data exists
    const hasSegmentData = DATA.calls.some(c => c.segment);
    if (!hasSegmentData) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">Segment data not available. Re-run analysis with persona categorization enabled to populate this tab.</div>';
        return;
    }

    // Tag mentions with company
    mentions.forEach(m => { m._co = m._co || getCompany(m, callMap) || reportGetCompany(m, callMap) || ''; });

    // Active date-filtered + non-excluded calls with segments
    const dateIds = activeCallIds();
    const noCoFilter = activeCompanyFilters.size === 0;
    const activeCalls = DATA.calls.filter(c =>
        c.segment && !excludedCalls.has(c.id) && dateIds.has(c.id)
    );

    // Apply segment filter
    const noSegFilter = activeSegmentFilters.size === 0;
    let filteredCalls = activeCalls.filter(c =>
        noSegFilter || activeSegmentFilters.has(c.segment.toLowerCase())
    );

    // Fix A: Apply company filter to filteredCalls before building overview cards
    if (!noCoFilter) {
        filteredCalls = filteredCalls.filter(c => {
            // Check if call has mentions from any active company
            const callMentions = mentions.filter(m => m.call_id === c.id);
            const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
            if (cos.size === 0) {
                const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
                if (chevron) cos.add(chevron[1].split(':')[0].trim());
            }
            return [...cos].some(co => activeCompanyFilters.has(co.toLowerCase()));
        });
    }

    if (filteredCalls.length === 0) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">No calls match the selected filters.</div>';
        return;
    }

    // Group calls by segment
    const segGroups = {};
    filteredCalls.forEach(c => {
        const seg = c.segment;
        if (!segGroups[seg]) segGroups[seg] = { calls: [], companies: new Set(), features: {} };
        segGroups[seg].calls.push(c);
    });

    // Cross-ref mentions with calls to get features per segment and per company
    const filteredCallIds = new Set(filteredCalls.map(c => c.id));
    let filteredMentions = mentions.filter(m => filteredCallIds.has(m.call_id));

    // Apply company filter to mentions
    if (!noCoFilter) {
        filteredMentions = filteredMentions.filter(m => activeCompanyFilters.has((m._co || '').toLowerCase()));
    }

    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        const seg = call.segment;
        if (!segGroups[seg]) return;
        const co = m._co || 'Unknown';
        segGroups[seg].companies.add(co);
        if (!segGroups[seg].features[m.keyword]) segGroups[seg].features[m.keyword] = 0;
        segGroups[seg].features[m.keyword]++;
    });

    // Also add companies from calls (even if no feature mentions)
    filteredCalls.forEach(c => {
        const seg = c.segment;
        const callMentions = filteredMentions.filter(m => m.call_id === c.id);
        const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
        if (cos.size === 0 && noCoFilter) {
            // Fallback: extract from call title (only when no company filter active)
            const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
            if (chevron) cos.add(chevron[1].split(':')[0].trim());
        }
        cos.forEach(co => {
            if (noCoFilter || activeCompanyFilters.has(co.toLowerCase())) {
                segGroups[seg].companies.add(co);
            }
        });
    });

    // Sort segments by call count desc, NEEDS_REVIEW always last
    const sortedSegs = Object.entries(segGroups).sort((a, b) => {
        if (a[0] === 'NEEDS_REVIEW') return 1;
        if (b[0] === 'NEEDS_REVIEW') return -1;
        return b[1].calls.length - a[1].calls.length;
    });

    let html = '';

    // ========== SECTION 1: Segment Overview Cards ==========
    html += '<div class="seg-section-title">Segment Overview</div>';
    html += '<div class="seg-overview">';
    sortedSegs.forEach(([seg, data]) => {
        const isNR = seg === 'NEEDS_REVIEW';
        const color = segColor(seg);
        const displaySeg = isNR ? 'Unclassified' : seg;
        const topFeats = Object.entries(data.features)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3);
        let featsHTML = '';
        if (topFeats.length > 0) {
            featsHTML = '<ul class="seg-card-feats">';
            topFeats.forEach(([f]) => { featsHTML += '<li>' + esc(f) + '</li>'; });
            featsHTML += '</ul>';
        }
        const nrIcon = isNR ? '<span style="margin-right:4px">&#9888;</span>' : '';
        const safeSeg = esc(seg).replace(/'/g, "\\'");
        const callLabel = data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '');
        const coLabel = data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y');

        // Check if segment has a definition for the back face
        const def = (typeof SEGMENT_DEFS !== 'undefined') ? SEGMENT_DEFS[seg] : null;
        const hasDef = def && def.description;

        if (hasDef) {
            // Flippable card with front + back
            const examples = (def.examples || []).slice(0, 4).join(', ');
            const signals = (def.signals || []).slice(0, 6);
            let backHTML = '<button class="seg-back-close" aria-label="Flip back" onclick="event.stopPropagation();flipSegCard(this)">&times;</button>';
            backHTML += '<div class="seg-back-name">' + nrIcon + esc(displaySeg) + '</div>';
            backHTML += '<div class="seg-back-desc">' + esc(def.description) + '</div>';
            if (examples) {
                backHTML += '<div class="seg-back-examples"><span class="seg-back-label">Examples: </span>' + esc(examples) + '</div>';
            }
            if (signals.length) {
                backHTML += '<div class="seg-back-signals"><span class="seg-back-label">Signals: </span>';
                signals.forEach(function(s) { backHTML += '<span class="seg-back-tag">' + esc(s) + '</span>'; });
                backHTML += '</div>';
            }
            backHTML += '<div class="seg-back-stats">' + esc(callLabel) + ' \u00b7 ' + esc(coLabel) + '</div>';
            backHTML += '<button class="seg-back-action" onclick="event.stopPropagation();flipSegCard(this);scrollToSegGroup(\'' + safeSeg + '\')">View prospects \u2192</button>';

            html += '<div class="seg-card-flip" style="--seg-color:' + color + '">' +
                '<div class="seg-card-inner">' +
                    '<div class="seg-card seg-card-front" onclick="flipSegCard(this)">' +
                        '<div class="seg-card-name">' + nrIcon + esc(displaySeg) + '</div>' +
                        '<div class="seg-card-stat">' + callLabel + '</div>' +
                        '<div class="seg-card-sub">' + coLabel + '</div>' +
                        featsHTML +
                    '</div>' +
                    '<div class="seg-card-back" onclick="flipSegCard(this)">' + backHTML + '</div>' +
                '</div>' +
            '</div>';
        } else {
            // No definition — plain card, direct scroll
            html += '<div class="seg-card" style="--seg-color:' + color + ';flex:0 0 auto;min-width:240px;max-width:300px;scroll-snap-align:start" onclick="scrollToSegGroup(\'' + safeSeg + '\')">' +
                '<div class="seg-card-name">' + nrIcon + esc(displaySeg) + '</div>' +
                '<div class="seg-card-stat">' + callLabel + '</div>' +
                '<div class="seg-card-sub">' + coLabel + '</div>' +
                featsHTML +
            '</div>';
        }
    });
    html += '</div>';

    // ========== SEGMENT MIX BAR ==========
    if (sortedSegs.length > 0) {
        const totalCalls = filteredCalls.length;
        html += '<div class="seg-mix">';
        html += '<div class="seg-section-title">Segment Mix</div>';
        html += '<div class="seg-mix-bar">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? (data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            const label = pct >= 12 ? (displaySeg.split(' ').slice(0, 3).join(' ') + ' ' + Math.round(pct) + '%') : (pct >= 6 ? Math.round(pct) + '%' : '');
            html += '<div class="seg-mix-seg" data-pct="' + pct.toFixed(1) + '" style="background:' + color + '" title="' + esc(displaySeg) + ': ' + Math.round(pct) + '% (' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + ')">';
            html += '<span>' + esc(label) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        html += '<div class="seg-mix-legend">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? Math.round(data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            html += '<div class="seg-mix-legend-item">' +
                '<span class="seg-mix-dot" style="background:' + color + '"></span>' +
                esc(displaySeg) + ' ' + pct + '%' +
            '</div>';
        });
        html += '</div>';
        html += '</div>';
    }

    // ========== SECTION 2: Segment Comparison Table ==========
    // Collect all features with 2+ total mentions across ALL segments
    const allFeatureCounts = {};
    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        if (!allFeatureCounts[m.keyword]) allFeatureCounts[m.keyword] = { total: 0, bySegment: {} };
        allFeatureCounts[m.keyword].total++;
        if (!allFeatureCounts[m.keyword].bySegment[call.segment]) allFeatureCounts[m.keyword].bySegment[call.segment] = 0;
        allFeatureCounts[m.keyword].bySegment[call.segment]++;
    });

    const tableFeatures = Object.entries(allFeatureCounts)
        .filter(([, v]) => v.total >= 2)
        .sort((a, b) => b[1].total - a[1].total);

    if (tableFeatures.length > 0 && sortedSegs.length > 1) {
        // Fix D: Compute distinctiveness score for each feature
        // Distinctiveness = how concentrated a feature is in one segment vs evenly spread
        const segNames = sortedSegs.map(([seg]) => seg);
        tableFeatures.forEach(([, data]) => {
            const counts = segNames.map(seg => data.bySegment[seg] || 0);
            const total = counts.reduce((a, b) => a + b, 0);
            if (total === 0) { data.distinctiveness = 0; return; }
            // Gini coefficient as distinctiveness measure
            const n = counts.length;
            const mean = total / n;
            const sumAbsDiff = counts.reduce((acc, c) => acc + Math.abs(c - mean), 0);
            data.distinctiveness = sumAbsDiff / (2 * n * mean);
        });

        html += '<div style="display:flex;align-items:center;gap:0.5rem;margin-top:1rem">';
        html += '<div class="seg-section-title" style="margin:0">Segment Comparison</div>';
        html += '<button class="seg-compare-sort-toggle" id="distinctiveness-sort-btn" onclick="toggleDistinctivenessSort(this)">Sort by distinctiveness</button>';
        html += '</div>';
        html += '<div class="seg-compare-wrap"><table class="seg-compare" id="seg-compare-table">';
        html += '<tr><th>Feature</th>';
        sortedSegs.forEach(([seg]) => {
            const label = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg.split(' ').slice(0, 3).join(' ');
            html += '<th>' + esc(label) + '</th>';
        });
        html += '</tr>';

        // Find max count for heat map scaling
        let heatMax = 1;
        tableFeatures.forEach(([, data]) => {
            sortedSegs.forEach(([seg]) => {
                const c = data.bySegment[seg] || 0;
                if (c > heatMax) heatMax = c;
            });
        });

        // Store for re-sort
        window._segCompareData = { tableFeatures, segNames, heatMax, sortedSegs };

        const INITIAL_ROWS = 15;
        tableFeatures.forEach(([feat, data], idx) => {
            const hidden = idx >= INITIAL_ROWS ? ' style="display:none" class="seg-compare-extra"' : '';
            // Mark most distinctive cell per feature
            const counts = segNames.map(seg => data.bySegment[seg] || 0);
            const maxCount = Math.max(...counts);
            html += '<tr' + hidden + ' data-feat="' + esc(feat) + '" data-dist="' + (data.distinctiveness || 0).toFixed(4) + '"><td>' + esc(feat) + '</td>';
            sortedSegs.forEach(([seg]) => {
                const count = data.bySegment[seg] || 0;
                if (count === 0) {
                    html += '<td></td>';
                } else {
                    const opacity = Math.min(0.15 + (count / heatMax) * 0.6, 0.75);
                    const distinctive = data.distinctiveness > 0.3 && count === maxCount ? ' distinctive' : '';
                    html += '<td class="heat' + distinctive + '" style="background:rgba(59,130,246,' + opacity.toFixed(2) + ')">' + count + '</td>';
                }
            });
            html += '</tr>';
        });
        html += '</table>';
        // Heat map legend
        html += '<div class="seg-heat-legend">';
        html += '<span>Mentions:</span>';
        [1, 2, 3].forEach(n => {
            const op = Math.min(0.15 + (n / heatMax) * 0.6, 0.75);
            html += '<span><span class="seg-heat-swatch" style="background:rgba(59,130,246,' + op.toFixed(2) + ')"></span>' + n + '</span>';
        });
        html += '</div>';
        if (tableFeatures.length > INITIAL_ROWS) {
            html += '<button class="seg-show-all" onclick="toggleCompareRows(this)">Show all ' + tableFeatures.length + ' features</button>';
        }
        html += '</div>';
    }

    // ========== SECTION 3: Prospect Cards by Segment (progressive disclosure) ==========
    // Build per-segment company data
    _personaData = {};
    const today = new Date();
    sortedSegs.forEach(([seg, data]) => {
        const coData = {};
        data.calls.forEach(c => {
            const callMentions = filteredMentions.filter(m => m.call_id === c.id);
            const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
            if (cos.size === 0) {
                const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
                if (chevron) cos.add(chevron[1].split(':')[0].trim());
                else cos.add(c.title || 'Unknown');
            }
            cos.forEach(co => {
                if (!coData[co]) coData[co] = { contacts: [], calls: [], features: [], mentionMap: {}, competitors: {}, contactTitles: {} };
                coData[co].calls.push(c);
                callMentions.forEach(m => {
                    if (!coData[co].mentionMap[m.keyword]) {
                        coData[co].mentionMap[m.keyword] = m;
                        coData[co].features.push(m);
                    }
                    // Enhancement 5: Competitor context from mentions
                    if (m.competitor_context) {
                        const compName = typeof m.competitor_context === 'string' ? m.competitor_context : (m.competitor_context.name || '');
                        const compType = typeof m.competitor_context === 'object' ? (m.competitor_context.mention_type || '') : '';
                        if (compName && !coData[co].competitors[compName]) {
                            coData[co].competitors[compName] = compType;
                        }
                    }
                    // Enhancement 1: Contact titles from mentions
                    if (m.contact_title && m._co === co) {
                        coData[co].contactTitles[m.contact_title] = true;
                    }
                });
                // Enhancement 5: Competitor mentions from calls
                if (c.competitor_mentions && Array.isArray(c.competitor_mentions)) {
                    c.competitor_mentions.forEach(cm => {
                        const name = cm.name || cm.competitor || '';
                        const type = cm.mention_type || cm.type || '';
                        if (name && !coData[co].competitors[name]) {
                            coData[co].competitors[name] = type;
                        }
                    });
                }
            });
        });
        // Extract contacts + titles
        Object.entries(coData).forEach(([co, d]) => {
            d.calls.forEach(c => {
                if (c.marketing_data && c.marketing_data.contacts) {
                    c.marketing_data.contacts.forEach(ct => {
                        if (!d.contacts.find(x => x.name === ct.name)) d.contacts.push(ct);
                    });
                }
            });
            // Enhancement 2: Compute recency
            const sortedCalls = [...d.calls].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            d.lastCallDate = sortedCalls[0] && sortedCalls[0].date ? sortedCalls[0].date : null;
            if (d.lastCallDate) {
                const diff = Math.floor((today - new Date(d.lastCallDate)) / (1000 * 60 * 60 * 24));
                d.daysSinceLastCall = diff;
            } else {
                d.daysSinceLastCall = 9999;
            }
            // Enhancement 3: Engagement score
            const mentionCount = d.features.length;
            const callCount = d.calls.length;
            const recencyBonus = d.daysSinceLastCall <= 30 ? 10 : (d.daysSinceLastCall <= 60 ? 5 : 0);
            const compBonus = Object.keys(d.competitors).length > 0 ? 5 : 0;
            d.engagementScore = mentionCount * 2 + callCount * 5 + recencyBonus + compBonus;
            // Enhancement 4: Feature fit ratio
            let gapCount = 0, nativeCount = 0, workaroundCount = 0, roadmapCount = 0;
            d.features.forEach(m => {
                const tier = getCapabilityTier(m.keyword).tier;
                if (tier === 'gap') gapCount++;
                else if (tier === 'native') nativeCount++;
                else if (tier === 'workaround') workaroundCount++;
                else if (tier === 'roadmap') roadmapCount++;
            });
            d.fit = { gap: gapCount, native: nativeCount, workaround: workaroundCount, roadmap: roadmapCount };
            // Enhancement 6: Segment confidence
            d.segConfidence = null;
            d.calls.forEach(c => {
                if (c.segment_confidence !== undefined && c.segment_confidence !== null) {
                    if (d.segConfidence === null || c.segment_confidence < d.segConfidence) {
                        d.segConfidence = c.segment_confidence;
                    }
                }
            });
        });
        _personaData[seg] = coData;
    });

    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem">' +
        '<div class="seg-section-title" style="margin:0">Prospects by Segment</div>' +
        '<button class="expand-btn" onclick="togglePersonasExpand(this)">' + (allExpanded ? 'Collapse All' : 'Expand All') + '</button>' +
        '</div>';

    sortedSegs.forEach(([seg, data], idx) => {
        const color = segColor(seg);
        const coData = _personaData[seg];
        const coEntries = Object.entries(coData)
            .filter(([co]) => noCoFilter || activeCompanyFilters.has(co.toLowerCase()))
            // Enhancement 2: Sort by recency (most recent first)
            .sort((a, b) => (a[1].daysSinceLastCall || 9999) - (b[1].daysSinceLastCall || 9999));
        if (coEntries.length === 0) return;
        const defaultExpanded = allExpanded || idx === 0;

        const isNR = seg === 'NEEDS_REVIEW';
        const displaySeg = isNR ? 'Unclassified' : seg;
        const nrClass = isNR ? ' seg-section-nr' : '';
        const groupId = 'seg-group-' + seg.replace(/[^a-z0-9]/gi, '-').toLowerCase();
        const cardsId = groupId + '-cards';
        // Fix C: Use <button> with aria-expanded/aria-controls
        html += '<div class="seg-group' + (defaultExpanded ? '' : ' collapsed') + nrClass + '" id="' + esc(groupId) + '" style="--seg-color:' + color + '">';
        html += '<button class="seg-group-hdr" aria-expanded="' + (defaultExpanded ? 'true' : 'false') + '" aria-controls="' + cardsId + '" onclick="toggleSegGroup(this)">';
        html += '<span class="seg-group-arrow">&#9654;</span>';
        html += (isNR ? '<span style="color:#f0c040;margin-right:4px">&#9888;</span>' : '');
        html += '<span class="seg-group-name">' + esc(displaySeg) + '</span>';
        html += '<span class="seg-group-count">' + coEntries.length + ' compan' + (coEntries.length !== 1 ? 'ies' : 'y') + ' &middot; ' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</span>';
        html += '</button>';
        html += '<div class="seg-group-cards" id="' + cardsId + '">';

        coEntries.forEach(([co, d], idx) => {
            const cardId = 'prospect-' + (seg + '-' + co).replace(/[^a-z0-9]/gi, '-').toLowerCase();
            const detailId = cardId + '-detail';

            // Engagement level
            const engLevel = d.engagementScore >= 25 ? 'high' : (d.engagementScore >= 12 ? 'med' : 'low');

            // Recency label
            let recencyLabel = '';
            let recencyClass = '';
            if (d.daysSinceLastCall <= 7) { recencyLabel = d.daysSinceLastCall + 'd ago'; }
            else if (d.daysSinceLastCall <= 30) { recencyLabel = Math.ceil(d.daysSinceLastCall / 7) + 'w ago'; }
            else if (d.daysSinceLastCall <= 365) { recencyLabel = Math.round(d.daysSinceLastCall / 30) + 'mo ago'; recencyClass = d.daysSinceLastCall > 90 ? ' stale' : ''; }
            else if (d.daysSinceLastCall < 9999) { recencyLabel = '1y+ ago'; recencyClass = ' stale'; }

            // Contact title summary (first title found)
            let titleSummary = '';
            if (d.contacts.length > 0 && d.contacts[0].title) {
                titleSummary = d.contacts[0].title;
            } else {
                const inferredTitles = Object.keys(d.contactTitles);
                if (inferredTitles.length > 0) titleSummary = inferredTitles[0];
            }

            // Collapsed summary: keep to a short, scannable disclosure row.
            const summaryParts = [];
            summaryParts.push(d.features.length + ' feature' + (d.features.length !== 1 ? 's' : ''));
            summaryParts.push(d.calls.length + ' call' + (d.calls.length !== 1 ? 's' : ''));
            if (titleSummary) summaryParts.push(titleSummary);

            const compEntries = Object.entries(d.competitors);
            const signalParts = [];
            if (d.fit.gap > 0) signalParts.push('<span class="prospect-signal-gap">' + d.fit.gap + ' gap' + (d.fit.gap !== 1 ? 's' : '') + '</span>');
            if (d.fit.workaround > 0) signalParts.push('<span class="prospect-signal-workaround">' + d.fit.workaround + ' workaround' + (d.fit.workaround !== 1 ? 's' : '') + '</span>');
            if (d.fit.roadmap > 0) signalParts.push('<span class="prospect-signal-roadmap">' + d.fit.roadmap + ' roadmap</span>');
            if (signalParts.length === 0 && d.fit.native > 0) signalParts.push('<span class="prospect-signal-ok">Native-only signal</span>');
            if (signalParts.length === 0 && compEntries.length > 0) signalParts.push('<span class="prospect-signal-muted">' + compEntries.length + ' competitor' + (compEntries.length !== 1 ? 's' : '') + ' mentioned</span>');

            const hiddenStyle = idx >= INITIAL_PROSPECTS_PER_SEGMENT ? ';display:none' : '';

            html += '<div class="prospect-card' + (idx >= INITIAL_PROSPECTS_PER_SEGMENT ? ' prospect-extra' : '') + '" style="--seg-color:' + color + hiddenStyle + '" id="' + cardId + '">';
            // Header (button for accessibility)
            html += '<button class="prospect-card-header" aria-expanded="false" aria-controls="' + detailId + '" onclick="toggleProspectCard(this)">';
            html += '<span class="prospect-collapse-arrow">&#9654;</span>';
            html += '<span class="prospect-main">';
            html += '<span class="prospect-co">' + esc(co) + '</span>';
            html += '<span class="prospect-primary">' + esc(summaryParts.join(' · ')) + '</span>';
            if (signalParts.length > 0) html += '<span class="prospect-secondary">' + signalParts.join('') + '</span>';
            html += '</span>';
            if (recencyLabel) html += '<span class="prospect-recency' + recencyClass + '">' + recencyLabel + '</span>';
            html += '<span class="prospect-score engagement-' + engLevel + '">' + d.engagementScore + '</span>';
            html += '</button>';

            // Detail section (collapsed by default)
            html += '<div class="prospect-card-detail" id="' + detailId + '">';

            html += '<div class="prospect-detail-meta">';
            html += '<span class="prospect-inline-chip score">Engagement ' + d.engagementScore + '</span>';
            html += '<span class="prospect-inline-chip">' + d.features.length + ' feature' + (d.features.length !== 1 ? 's' : '') + '</span>';
            html += '<span class="prospect-inline-chip">' + d.calls.length + ' call' + (d.calls.length !== 1 ? 's' : '') + '</span>';
            if (recencyLabel) html += '<span class="prospect-inline-chip">' + esc(recencyLabel) + '</span>';
            html += '</div>';

            if (d.features.length > 0) {
                html += '<div class="prospect-fit-detail">';
                if (d.fit.native > 0) html += '<span class="prospect-inline-chip fit-native">' + d.fit.native + ' native</span>';
                if (d.fit.workaround > 0) html += '<span class="prospect-inline-chip fit-workaround">' + d.fit.workaround + ' workaround' + (d.fit.workaround !== 1 ? 's' : '') + '</span>';
                if (d.fit.gap > 0) html += '<span class="prospect-inline-chip fit-gap">' + d.fit.gap + ' gap' + (d.fit.gap !== 1 ? 's' : '') + '</span>';
                if (d.fit.roadmap > 0) html += '<span class="prospect-inline-chip fit-roadmap">' + d.fit.roadmap + ' roadmap</span>';
                html += '</div>';
            }

            if (compEntries.length > 0) {
                html += '<div class="prospect-section-label">Competitors</div>';
                html += '<div class="prospect-competitors-detail">';
                compEntries.forEach(([name, type]) => {
                    const typeClass = type ? ' ' + type.toLowerCase().replace(/\s+/g, '_') : '';
                    html += '<span class="prospect-comp-badge' + typeClass + '">' + esc(name) + '</span>';
                });
                html += '</div>';
            }

            // Contacts
            if (d.contacts.length > 0) {
                html += '<div class="prospect-section-label">Contacts</div>';
                d.contacts.forEach(ct => {
                    html += '<div class="prospect-contact">' + esc(ct.name || '');
                    if (ct.title) html += ' <span class="contact-title">' + esc(ct.title) + '</span>';
                    else if (d.contactTitles && Object.keys(d.contactTitles).length > 0) {
                        html += ' <span class="contact-title inferred">' + esc(Object.keys(d.contactTitles)[0]) + '</span>';
                    }
                    if (ct.email) html += ' <span class="contact-title">' + esc(ct.email) + '</span>';
                    html += '</div>';
                });
            }

            // Calls
            html += '<div class="prospect-section-label">Calls (' + d.calls.length + ')</div>';
            const sortedCalls = [...d.calls].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            sortedCalls.forEach(c => {
                const dateStr = c.date ? c.date.slice(5).replace('-', '/') : '';
                html += '<div class="prospect-call">';
                if (c.transcript) {
                    html += '<a href="' + esc(c.transcript) + '" target="_blank">' + esc(c.title || 'Call') + '</a>';
                } else {
                    html += esc(c.title || 'Call');
                }
                if (dateStr) html += ' <span style="color:#555a6e;font-size:0.78rem">' + dateStr + '</span>';
                html += '</div>';
            });

            // Features
            if (d.features.length > 0) {
                html += '<div class="prospect-section-label">Features (' + d.features.length + ')</div>';
                html += '<ul class="prospect-feats">';
                d.features.forEach(m => {
                    const cap = getCapabilityTier(m.keyword);
                    const tierColor = { gap:'#ef4444', native:'#22c55e', workaround:'#eab308', roadmap:'#3b82f6', unknown:'#6b7280' }[cap.tier] || '#6b7280';
                    html += '<li style="list-style-color:' + tierColor + '">' + esc(m.keyword);
                    if (m.link) html += '<a href="' + esc(m.link) + '" target="_blank">' + esc(m.ts || 'view') + '</a>';
                    html += '</li>';
                });
                html += '</ul>';
            }

            // Segment confidence warning
            if (d.segConfidence !== null && d.segConfidence < 0.7) {
                html += '<div class="prospect-seg-conf">Segment confidence: ' + Math.round(d.segConfidence * 100) + '%</div>';
            }

            html += '</div>'; // end detail
            html += '</div>'; // end card
        });

        if (coEntries.length > INITIAL_PROSPECTS_PER_SEGMENT) {
            html += '<button class="prospect-show-more" data-expanded="false" data-total="' + coEntries.length + '" onclick="toggleProspectGroupLimit(this)">Show all ' + coEntries.length + ' prospects</button>';
        }

        html += '</div></div>';
    });

    document.getElementById('personas-view').innerHTML = html;

    // Animate segment mix bar widths
    requestAnimationFrame(() => {
        document.querySelectorAll('.seg-mix-seg').forEach(el => {
            el.style.width = el.dataset.pct + '%';
        });
    });
}

// Legacy stub: collapse all expanded prospect cards when switching tabs
function closePersonaPanel() {
    document.querySelectorAll('.prospect-card-header[aria-expanded="true"]').forEach(btn => {

        if (detail) detail.classList.remove('open');
    });

// Fix B: Toggle prospect card expand/collapse
function toggleProspectCard(btn) {
    const expanded = btn.getAttribute('aria-expanded') === 'true';
    if (!expanded) {
        const groupCards = btn.closest('.seg-group-cards');
        if (groupCards) {
            groupCards.querySelectorAll('.prospect-card-header[aria-expanded="true"]').forEach(otherBtn => {
                if (otherBtn === btn) return;
                otherBtn.setAttribute('aria-expanded', 'false');
                const otherDetail = document.getElementById(otherBtn.getAttribute('aria-controls'));
                if (otherDetail) otherDetail.classList.remove('open');
            });
        }
    }
    btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    const detailId = btn.getAttribute('aria-controls');
    const detail = document.getElementById(detailId);
    if (detail) detail.classList.toggle('open', !expanded);
}

function toggleProspectGroupLimit(btn) {
    const expanded = btn.dataset.expanded === 'true';
    const groupCards = btn.closest('.seg-group-cards');
    if (!groupCards) return;
    groupCards.querySelectorAll('.prospect-card.prospect-extra').forEach(card => {
        card.style.display = expanded ? 'none' : '';
    });
    btn.dataset.expanded = expanded ? 'false' : 'true';
    const total = btn.dataset.total || groupCards.querySelectorAll('.prospect-card').length;
    btn.textContent = expanded ? 'Show all ' + total + ' prospects' : 'Show fewer';
}

// Fix C: Toggle segment group via button
function toggleSegGroup(btn) {
    const group = btn.closest('.seg-group');
    if (!group) return;
    const collapsed = group.classList.toggle('collapsed');
    btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
}

function togglePersonasExpand(btn) {
    const groups = document.querySelectorAll('#personas-view .seg-group');
    const anyCollapsed = [...groups].some(g => g.classList.contains('collapsed'));
    allExpanded = anyCollapsed; // sync render state so rebuilds preserve user choice
    groups.forEach(g => {
        g.classList.toggle('collapsed', !anyCollapsed);
        const hdr = g.querySelector('.seg-group-hdr');
        if (hdr) hdr.setAttribute('aria-expanded', anyCollapsed ? 'true' : 'false');
    });
    btn.textContent = anyCollapsed ? 'Collapse All' : 'Expand All';
}

function scrollToSegGroup(seg) {
    const id = 'seg-group-' + seg.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    const el = document.getElementById(id);
    if (el) {
        el.classList.remove('collapsed');
        const hdr = el.querySelector('.seg-group-hdr');
        if (hdr) hdr.setAttribute('aria-expanded', 'true');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

}

function toggleCompareRows(btn) {
    const rows = document.querySelectorAll('.seg-compare-extra');
    const showing = rows[0] && rows[0].style.display !== 'none';
    rows.forEach(r => { r.style.display = showing ? 'none' : ''; });
    btn.textContent = showing ? 'Show all' : 'Show less';
}

// Fix D: Toggle distinctiveness sort on comparison table
function toggleDistinctivenessSort(btn) {
    const active = btn.classList.toggle('active');
    const table = document.getElementById('seg-compare-table');
    if (!table) return;
    const rows = [...table.querySelectorAll('tr[data-feat]')];
    if (active) {
        rows.sort((a, b) => parseFloat(b.dataset.dist) - parseFloat(a.dataset.dist));
    } else {
        // Restore original order (by total mentions, stored in data)
        const d = window._segCompareData;
        if (d) {
            const order = {};
            d.tableFeatures.forEach(([feat], i) => { order[feat] = i; });
            rows.sort((a, b) => (order[a.dataset.feat] || 0) - (order[b.dataset.feat] || 0));
        }
    }
    const tbody = table.querySelector('tbody') || table;
    rows.forEach(r => tbody.appendChild(r));
    btn.textContent = active ? 'Sort by total' : 'Sort by distinctiveness';
}

// ---- Competitor filter dropdowns ----
function buildCompFilterDropdown(allCompNames) {
    const sorted = [...allCompNames].sort();
    const panel = document.getElementById('comp-filter-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectCompFilter(this)"><span class="dd-check">&#10003;</span>All Competitors</div>';
    html += '<div class="dd-sep"></div>';
    sorted.forEach(name => {
        const sel = activeCompNameFilters.size === 0 || activeCompNameFilters.has(name.toLowerCase());
        html += '<div class="dd-item' + (sel && activeCompNameFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(name) + '" onclick="selectCompFilter(this)">' +
            '<span class="dd-check">&#10003;</span>' + esc(name) + '</div>';
    });
    panel.innerHTML = html;
    syncCompFilterLabel();
}

function selectCompFilter(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeCompNameFilters.clear();
        document.querySelectorAll('#comp-filter-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        document.querySelector('#comp-filter-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const name = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeCompNameFilters.add(name);
        } else {
            activeCompNameFilters.delete(name);
        }
        if (activeCompNameFilters.size === 0) {
            document.querySelector('#comp-filter-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncCompFilterLabel();
    buildCompetitors();
}

function syncCompFilterLabel() {
    const label = document.getElementById('comp-filter-label');
    const btn = document.querySelector('#comp-filter-dd .dd-btn');
    if (activeCompNameFilters.size === 0) {
        label.textContent = 'Competitors';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeCompNameFilters.size + ' selected';
        btn.classList.add('has-filter');
    }
}
