  <div class="gate-box">
    <h2>Sales Intelligence Dashboard</h2>
    <div>
      <input id="pw-input" type="password" placeholder="Enter password">
      <button onclick="checkPw()">Enter</button>
    </div>
    <p class="gate-err" id="pw-error">Incorrect password</p>
  </div>
</div>
<script>
(function(){
  var PW="Teachable2026";
  if(sessionStorage.getItem("si_authed")==="1"){document.body.classList.remove("locked");}
  document.getElementById("pw-input").addEventListener("keydown",function(e){if(e.key==="Enter")checkPw();});
  window.checkPw=function(){
    if(document.getElementById("pw-input").value===PW){
      sessionStorage.setItem("si_authed","1");
      document.body.classList.remove("locked");
    }else{
      document.getElementById("pw-error").style.display="block";
      document.getElementById("pw-input").value="";
    }
  };
})();
</script>
<div id="tier-tooltip"></div>
<div class="wrap">
    <div class="hdr">
        <div class="hdr-left">
            <h1>Sales Intelligence</h1>
            <div class="hdr-tagline" id="hdr-tagline"></div>
        </div>
        <div class="hdr-stats" id="hdr-stats"></div>
    </div>
    <div class="nr-banner" id="nr-banner" style="display:none">
        <span class="nr-banner-icon">&#9888;</span>
        <span><span class="nr-banner-count" id="nr-count">0</span> items need manual categorization</span>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="features" onclick="switchTab('features')">By Feature</div>
        <div class="tab" data-tab="calls" onclick="switchTab('calls')">By Call</div>
        <div class="tab" data-tab="personas" onclick="switchTab('personas')">Personas</div>
        <div class="tab" data-tab="competitors" onclick="switchTab('competitors')">Competitors</div>
        <div class="tab" data-tab="reports" onclick="switchTab('reports')">Reports</div>
        <div class="tab" data-tab="prospecting" onclick="switchTab('prospecting')">Prospecting <svg class="tab-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
    </div>
    <div class="filter-row" id="filter-row">
        <div class="search-box"><input id="q" placeholder="Search..." oninput="filter(this.value)"><span class="search-result-count" id="search-result-count"></span><button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none">&times;</button></div>
        <div class="dd-wrap" id="date-dd">
            <button class="dd-btn" onclick="toggleDD('date-dd')"><span id="date-label">All Time</span><span class="dd-arrow">&#9660;</span></button>
            <div class="dd-panel" id="date-panel"></div>
        </div>
        <div class="dd-wrap" id="co-dd" style="display:none">
            <button class="dd-btn" onclick="toggleDD('co-dd')"><span id="co-label">Companies</span><span class="dd-arrow">&#9660;</span></button>
            <div class="dd-panel" id="co-panel"></div>
        </div>
        <div class="dd-wrap" id="seg-dd" style="display:none">
            <button class="dd-btn" onclick="toggleDD('seg-dd')"><span id="seg-label">Segments</span><span class="dd-arrow">&#9660;</span></button>
            <div class="dd-panel" id="seg-panel"></div>
        </div>
        <div class="dd-wrap" id="comp-filter-dd" style="display:none">
            <button class="dd-btn" onclick="toggleDD('comp-filter-dd')"><span id="comp-filter-label">Competitors</span><span class="dd-arrow">&#9660;</span></button>
            <div class="dd-panel" id="comp-filter-panel"></div>
        </div>
        <div class="dd-wrap" id="comp-type-dd" style="display:none">
            <button class="dd-btn" onclick="toggleDD('comp-type-dd')"><span id="comp-type-label">All Types</span><span class="dd-arrow">&#9660;</span></button>
            <div class="dd-panel" id="comp-type-panel"></div>
        </div>
        <button class="excluded-chip" id="excluded-chip" onclick="toggleExcludedFilter()" style="display:none"><span class="excluded-count" id="excluded-count">0</span> Excluded</button>
        <button class="expand-btn" id="expand-btn" onclick="toggleExpandAll()" style="display:none">Collapse All</button>
        <button class="scan-btn" id="sync-sheets-btn" onclick="syncToSheets(this)" style="display:none">Sync to Sheets</button>
        <div style="flex:1"></div>
        <button class="scan-btn" id="analyze-btn" onclick="showAnalyzeModal()" style="display:none">Run Analysis</button>
    </div>
    <div id="features-view"></div>
    <div id="calls-view" style="display:none"></div>
    <div id="personas-view" style="display:none"></div>
    <div id="competitors-view" style="display:none"></div>
    <div id="reports-view" style="display:none"></div>
    <div id="prospecting-view" style="display:none"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<!-- Scan modal -->

    <div class="scan-modal">
        <div class="scan-modal-hdr">
            <h2 id="scan-modal-title">Scan for More Calls</h2>
            <button class="scan-modal-close" onclick="closeScanModal()">&times;</button>
        </div>
        <div class="scan-modal-body" id="scan-modal-body">
        </div>
        <div class="scan-modal-footer" id="scan-modal-footer" style="display:none">
            <div class="scan-modal-info" id="scan-modal-info"></div>

        </div>

</div>

<!-- Analysis wizard modal -->
<div class="scan-overlay" id="analyze-overlay" onclick="if(event.target===this)closeAnalyzeModal()">
    <div class="scan-modal">
        <div class="scan-modal-hdr">
            <h2 id="analyze-modal-title">Run Analysis</h2>
            <button class="scan-modal-close" onclick="closeAnalyzeModal()">&times;</button>
        </div>
        <div class="scan-modal-body" id="analyze-modal-body">
        </div>
        <div class="scan-modal-footer" id="analyze-modal-footer" style="display:none">
            <div class="scan-modal-info" id="analyze-modal-info"></div>
            <button class="scan-process-btn" id="analyze-action-btn" disabled>Next</button>
        </div>
    </div>
</div>
<div class="pw-overlay" id="pw-overlay">
    <div class="pw-modal" id="pw-modal">
        <div class="pw-lock-circle"><span class="pw-lock">&#128274;</span></div>
        <div class="pw-hdr">Password required</div>
        <div class="pw-sub" id="pw-sub">This action requires authentication.</div>
        <div class="pw-row">
            <input type="password" class="pw-input" id="pw-input" placeholder="Enter password" autocomplete="off">
            <button class="pw-confirm" id="pw-confirm">Confirm</button>
        </div>
        <div class="pw-error" id="pw-error"></div>
    </div>
</div>

<script>
let DATA = {{DATA_JSON}};
const CAPABILITY_MAP = (DATA && DATA.capability_map) ? DATA.capability_map : {};
const SEGMENT_DEFS = {{SEGMENT_DEFS_JSON}};
const ACTION_PASSWORD = 'sdflkjei';
let _pwResolve = null;
function checkActionPassword(actionLabel) {
    return new Promise(resolve => {
        _pwResolve = resolve;
        const sub = document.getElementById('pw-sub');
        sub.textContent = actionLabel
            ? actionLabel + ' requires authentication to continue.'
            : 'This action requires authentication.';
        const input = document.getElementById('pw-input');
        const error = document.getElementById('pw-error');
        input.value = '';
        error.textContent = '';
        input.classList.remove('pw-input-error');
        const overlay = document.getElementById('pw-overlay');
        overlay.classList.add('open');
        setTimeout(() => input.focus(), 50);
    });
}
function _pwSubmit() {
    const input = document.getElementById('pw-input');
    const error = document.getElementById('pw-error');
    if (input.value === ACTION_PASSWORD) {
        document.getElementById('pw-overlay').classList.remove('open');
        if (_pwResolve) { _pwResolve(true); _pwResolve = null; }
    } else {
        input.classList.add('pw-input-error');
        error.textContent = 'Incorrect password. Try again.';
        document.getElementById('pw-modal').classList.add('pw-shake');
        setTimeout(() => document.getElementById('pw-modal').classList.remove('pw-shake'), 350);
        input.value = '';
        input.focus();
    }
}
function _pwCancel() {
    document.getElementById('pw-overlay').classList.remove('open');
    if (_pwResolve) { _pwResolve(false); _pwResolve = null; }
}
document.getElementById('pw-overlay').addEventListener('click', function(e) { if (e.target === this) _pwCancel(); });
document.getElementById('pw-confirm').addEventListener('click', _pwSubmit);
document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') _pwSubmit();
    else if (e.key === 'Escape') _pwCancel();
    else this.classList.remove('pw-input-error');
});

// ---- Prospecting tab state & logic ----
let _prospSnapshotData = null;
let _prospSeedData = null;
let _prospSelectedSeeds = new Set();
let _prospSortCol = 'score';
let _prospSortAsc = false;
window._clayToken = null;

function renderProspPasswordGate(msg) {
    const errMsg = msg || '';
    return '<div style="display:flex;align-items:center;justify-content:center;min-height:320px">' +
        '<div style="background:#16181f;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:2.5rem;width:340px;text-align:center">' +
        '<svg style="width:32px;height:32px;margin-bottom:12px;opacity:0.4" viewBox="0 0 24 24" fill="none" stroke="#e5e7eb" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>' +
        '<div style="color:#e5e7eb;font-weight:600;margin-bottom:4px">This view is protected</div>' +
        '<div style="color:#4b5563;font-size:0.82rem;margin-bottom:1.25rem">Enter the dashboard password to continue</div>' +
        '<input type="password" id="prosp-pw-input" placeholder="Enter password" autocomplete="off" ' +
        'style="width:100%;box-sizing:border-box;background:#0f1117;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:#e5e7eb;font-size:0.9rem;font-family:\'DM Sans\',sans-serif;outline:none;margin-bottom:8px" ' +
        'onkeydown="if(event.key===\'Enter\')prospSubmitPassword()">' +
        '<div id="prosp-pw-error" style="font-size:0.78rem;min-height:1.2rem;margin-bottom:8px;color:rgba(220,80,80,0.9)">' + errMsg + '</div>' +
        '<button onclick="prospSubmitPassword()" style="width:100%;padding:10px;border-radius:8px;border:none;background:#e5e7eb;color:#0f1117;font-weight:600;font-size:0.88rem;cursor:pointer;font-family:\'DM Sans\',sans-serif">Confirm</button>' +
        '</div></div>';
}

async function prospSubmitPassword() {
    const input = document.getElementById('prosp-pw-input');
    const error = document.getElementById('prosp-pw-error');
    if (!input || !input.value) return;
    try {
        const res = await fetch('/api/clay/verify-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: input.value})
        });
        const data = await res.json();
        if (res.ok && data.valid) {
            window._clayToken = data.token;
            buildProspecting();
        } else if (res.status === 503) {
            document.getElementById('prospecting-view').innerHTML =
                '<div class="prosp-empty" style="padding:3rem">Prospecting is not configured. Set CLAY_DASHBOARD_PASSWORD in .env.</div>';
        } else {
            error.textContent = 'Incorrect password. Try again.';
            input.style.borderColor = 'rgba(220,80,80,0.4)';
            input.value = '';
            input.focus();
            // shake
            const card = input.closest('div[style*="background:#16181f"]');
            if (card) { card.style.animation = 'pwShake 0.35s ease'; setTimeout(() => card.style.animation = '', 350); }
        }
    } catch(e) {
        error.textContent = 'Connection error.';
    }
}

async function buildProspecting() {
    const view = document.getElementById('prospecting-view');
    view.innerHTML = '<div class="prosp-empty" style="padding:3rem;text-align:center"><span style="display:inline-block;animation:scanPulse 1.2s ease-in-out infinite;color:#6b7084">Loading...</span></div>';
    try {
        const [snapRes, seedRes] = await Promise.all([
            fetch('/api/clay/snapshot').then(r => r.ok ? r.json() : null).catch(() => null),
            fetch('/api/clay/seeds').then(r => r.ok ? r.json() : null).catch(() => null)
        ]);
        _prospSnapshotData = snapRes;
        _prospSeedData = seedRes;
    } catch(e) {
        _prospSnapshotData = null;
        _prospSeedData = null;
    }
    // Fall back to baked-in DATA for static deploys (Netlify)
    if (!_prospSnapshotData && typeof DATA !== 'undefined' && DATA.prospecting_snapshot) {
        _prospSnapshotData = DATA.prospecting_snapshot;
    }
    if (!_prospSeedData && typeof DATA !== 'undefined' && DATA.prospecting_seeds) {
        _prospSeedData = DATA.prospecting_seeds;
    }
    let staleBanner = '';
    const snap = _prospSnapshotData;
    if (snap && !snap.error && snap.generated_at && snap.data_generated_at) {
        const snapDate = new Date(snap.generated_at);
        const dataDate = new Date(snap.data_generated_at);
        if (dataDate > snapDate) {
            staleBanner = '<div class="prosp-stale-banner"><span>&#9888;</span> Call data has been updated since the last snapshot. Generate a new snapshot to see updated seeds.</div>';
        }
    }
    view.innerHTML = staleBanner +
        '<div class="prosp-section">' + renderSnapshotControls() + '</div>' +
        '<div class="prosp-section">' + renderSeedTable() + '</div>' +
        '<div class="prosp-section">' + renderStatusPanel() + '</div>';
}

function renderSnapshotControls() {
    const snap = _prospSnapshotData;
    if (!snap || snap.error) {
        return '<div class="prosp-card"><div class="prosp-card-hdr"><h3>ICP Snapshot</h3></div>' +
            '<div class="prosp-empty">No snapshot generated yet.</div>' +
            '<div style="margin-top:1rem"><button class="prosp-generate-btn" onclick="generateSnapshot(this)">Generate Snapshot</button></div></div>';
    }
    const seeds = snap.seed_companies || [];
    const segments = snap.segments || [];
    const features = snap.feature_rankings || [];
    const ts = snap.generated_at ? new Date(snap.generated_at).toLocaleString() : '';
    return '<div class="prosp-card"><div class="prosp-card-hdr"><h3>ICP Snapshot</h3><span class="prosp-ts">' + ts + '</span></div>' +
        '<div class="prosp-stats-row">' +
        '<div class="prosp-stat"><span class="n">' + seeds.length + '</span><span class="l">Seed Companies</span></div>' +
        '<div class="prosp-stat"><span class="n">' + segments.length + '</span><span class="l">Segments</span></div>' +
        '<div class="prosp-stat"><span class="n">' + features.length + '</span><span class="l">Features Tracked</span></div>' +
        '</div>' +
        '<button class="prosp-generate-btn" onclick="generateSnapshot(this)">Regenerate Snapshot</button></div>';
}

function renderSeedTable() {
    const data = _prospSeedData;
    if (!data || data.error || !data.seeds || !data.seeds.length) {
        return '<div class="prosp-card"><div class="prosp-card-hdr"><h3>Seed Companies</h3></div>' +
            '<div class="prosp-empty">Generate a snapshot first to see seed companies.</div></div>';
    }
    const seeds = sortSeeds(data.seeds);
    const totalCredits = data.credit_estimate || 0;
    const totalSeeds = data.seed_count || seeds.length;
    const allChecked = seeds.every(s => _prospSelectedSeeds.has(s.company_id || s.company));
    let rows = '';
    seeds.forEach(s => {
        const id = s.company_id || s.company;
        const checked = _prospSelectedSeeds.has(id) ? 'checked' : '';
        const score = s.score || 0;
        const barColor = score >= 70 ? '#34c759' : score >= 40 ? '#d9ab48' : '#555a6e';
        const barWidth = Math.min(100, Math.max(0, score)) + '%';
        const badge = s.previously_exported
            ? '<span class="prosp-status-badge exported">Exported</span>'
            : '<span class="prosp-status-badge new">New</span>';
        const conf = s.domain_confidence || 'unresolved';
        let domainDisplay;
        if (s.domain && s.domain !== '(unknown)') {
            const confColor = conf === 'high' ? '#d0d3db' : conf === 'low' ? '#d9ab48' : '#d0d3db';
            domainDisplay = '<span style="color:' + confColor + '">' + s.domain + '</span>' +
                (conf === 'low' ? '<span style="color:#d9ab48;font-size:0.65rem;margin-left:4px" title="Inferred from context">\u26a0</span>' : '');
        } else {
            domainDisplay = '<span style="color:rgba(220,80,80,0.5)">(unresolved)</span>';
        }
        rows += '<tr>' +
            '<td class="cb-cell"><input type="checkbox" ' + checked + ' onchange="prospToggleSeed(\'' + id.replace(/'/g, "\\'") + '\', this.checked)"></td>' +
            '<td>' + (s.company || '') + '</td>' +
            '<td style="color:#6b7084">' + domainDisplay + '</td>' +
            '<td>' + (s.segment || '') + '</td>' +
            '<td><span class="prosp-score-track"><span class="prosp-score-fill" style="width:' + barWidth + ';background:' + barColor + '"></span></span><span class="prosp-score-val" style="color:' + barColor + '">' + score + '</span></td>' +
            '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-size:0.8rem">' + (s.call_count || 0) + '</td>' +
            '<td>' + badge + '</td></tr>';
    });
    const selCount = _prospSelectedSeeds.size;
    const estCredits = totalSeeds > 0 ? Math.round(selCount * (totalCredits / totalSeeds)) : 0;
    return '<div class="prosp-card"><div class="prosp-card-hdr"><h3>Seed Companies</h3></div>' +
        '<table class="prosp-table"><thead><tr>' +
        '<th class="cb-cell"><input type="checkbox" ' + (allChecked && seeds.length ? 'checked' : '') + ' onchange="prospToggleAll(this.checked)"></th>' +
        '<th onclick="prospSort(\'company\')">Company ' + sortArrow('company') + '</th>' +
        '<th onclick="prospSort(\'domain\')">Domain ' + sortArrow('domain') + '</th>' +
        '<th onclick="prospSort(\'segment\')">Segment ' + sortArrow('segment') + '</th>' +
        '<th onclick="prospSort(\'score\')">Score ' + sortArrow('score') + '</th>' +
        '<th onclick="prospSort(\'call_count\')">Calls ' + sortArrow('call_count') + '</th>' +
        '<th>Status</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>' +
        '<div class="prosp-table-footer"><span id="prosp-sel-info">' + selCount + ' of ' + totalSeeds + ' selected' + (selCount ? ' &middot; ~' + estCredits + ' credits' : '') + '</span>' +
        '<div style="display:flex;gap:8px">' +
        '<button class="prosp-brief-btn" ' + (selCount ? '' : 'disabled') + ' onclick="copyIntelligenceBrief()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Copy Brief</button>' +
        '<button class="prosp-export-btn" ' + (selCount ? '' : 'disabled') + ' onclick="prospExportSeeds()">Export to Clay</button></div></div>' +
        '<div id="prosp-confirm-area"></div></div>';
}

function renderStatusPanel() {
    const snap = _prospSnapshotData;
    if (!snap || snap.error) {
        return '<div class="prosp-status-cards">' +
            '<div class="prosp-status-card"><h4>Exclude List</h4><div class="prosp-status-num">&mdash;</div></div>' +
            '<div class="prosp-status-card"><h4>Re-engagement Alerts</h4><div class="prosp-status-num">&mdash;</div></div>' +
            '<div class="prosp-status-card"><h4>Credit Estimate</h4><div class="prosp-status-num">&mdash;</div></div></div>';
    }
    const excludes = snap.exclude_list || [];
    const reengagements = snap.re_engagement_alerts || [];
    const credits = snap.estimated_credit_impact || {};
    const stages = credits.stages || {};
    let stageHtml = '';
    Object.entries(stages).forEach(([k, v]) => {
        stageHtml += '<div style="display:flex;justify-content:space-between;font-size:0.78rem;color:#9ea2b4;margin-top:4px"><span>' + k.replace(/_/g, ' ') + '</span><span style="font-family:\'JetBrains Mono\',monospace">' + v + '</span></div>';
    });
    const budget = credits.warning ? '<div style="font-size:0.75rem;color:#d4a017;margin-top:6px">' + credits.warning + '</div>' : '';
    return '<div class="prosp-status-cards">' +
        '<div class="prosp-status-card"><h4>Exclude List</h4><div class="prosp-status-num">' + excludes.length + '</div><div class="prosp-status-label">domains to exclude</div>' +
        '<button class="prosp-push-btn" onclick="prospPushExcludes(this)" ' + (excludes.length ? '' : 'disabled') + '>Push to Clay</button></div>' +
        '<div class="prosp-status-card"><h4>Re-engagement Alerts</h4><div class="prosp-status-num">' + reengagements.length + '</div><div class="prosp-status-label">companies flagged</div>' +
        '<button class="prosp-push-btn" onclick="prospPushReengagements(this)" ' + (reengagements.length ? '' : 'disabled') + '>Push to Clay</button></div>' +
        '<div class="prosp-status-card"><h4>Credit Estimate</h4><div class="prosp-status-num">' + (credits.total_estimated || 0) + '</div><div class="prosp-status-label">total credits</div>' +
        stageHtml + budget + '</div></div>';
}

function sortSeeds(seeds) {
    const col = _prospSortCol;
    const asc = _prospSortAsc;
    return [...seeds].sort((a, b) => {
        let va = a[col] ?? '', vb = b[col] ?? '';
        if (typeof va === 'number' && typeof vb === 'number') return asc ? va - vb : vb - va;
        va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
        return asc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
}

function sortArrow(col) {
    if (_prospSortCol !== col) return '';
    return _prospSortAsc ? ' &#9650;' : ' &#9660;';
}

function prospSort(col) {
    if (_prospSortCol === col) _prospSortAsc = !_prospSortAsc;
    else { _prospSortCol = col; _prospSortAsc = col === 'company' || col === 'domain' || col === 'segment'; }
    buildProspecting();
}

function prospToggleAll(checked) {
    if (!_prospSeedData || !_prospSeedData.seeds) return;
    _prospSeedData.seeds.forEach(s => {
        const id = s.company_id || s.company;
        if (checked) _prospSelectedSeeds.add(id); else _prospSelectedSeeds.delete(id);
    });
    // Sync all row checkboxes
    document.querySelectorAll('.prosp-table tbody input[type="checkbox"]').forEach(cb => {
        cb.checked = checked;
    });
    updateProspSelectionInfo();
}

function prospToggleSeed(id, checked) {
    if (checked) _prospSelectedSeeds.add(id); else _prospSelectedSeeds.delete(id);
    updateProspSelectionInfo();
}

function updateProspSelectionInfo() {
    const selCount = _prospSelectedSeeds.size;
    const totalSeeds = (_prospSeedData && _prospSeedData.seed_count) || 0;
    const totalCredits = (_prospSeedData && _prospSeedData.credit_estimate) || 0;
    const estCredits = totalSeeds > 0 ? Math.round(selCount * (totalCredits / totalSeeds)) : 0;
    const info = document.getElementById('prosp-sel-info');
    if (info) info.innerHTML = selCount + ' of ' + totalSeeds + ' selected' + (selCount ? ' &middot; ~' + estCredits + ' credits' : '');
    const btn = document.querySelector('.prosp-export-btn');
    if (btn) btn.disabled = !selCount;

function ensureClayToken(actionLabel) {
    if (window._clayToken) return Promise.resolve(true);
    const label = actionLabel || 'This action';
    return new Promise(resolve => {
        // Remove any existing gate
        const old = document.getElementById('clay-pw-overlay');
        if (old) old.remove();
        // Build overlay + card
        const overlay = document.createElement('div');
        overlay.id = 'clay-pw-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center';
        overlay.innerHTML =
            '<div style="width:460px;background:#16181f;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:36px;box-shadow:0 16px 40px rgba(0,0,0,0.4);text-align:center;font-family:\'DM Sans\',sans-serif;animation:pwFadeIn 0.2s ease">' +
                '<div class="pw-lock-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#e5e7eb"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>' +
                '<div style="font-size:18px;font-weight:600;color:#e5e7eb">Password required</div>' +
                '<div style="font-size:14px;color:#6b7084;margin:6px 0 24px">' + label + ' requires authentication to continue.</div>' +
                '<div style="display:flex;gap:0.5rem">' +
                    '<input type="password" id="clay-pw-input" placeholder="Enter password" autocomplete="off" class="pw-input">' +
                    '<button id="clay-pw-confirm" class="pw-confirm">Confirm</button>' +
                '</div>' +
                '<div id="clay-pw-err" style="font-size:13px;color:#8c5555;margin-top:10px;min-height:1.2em"></div>' +
            '</div>';
        document.body.appendChild(overlay);
        const inp = document.getElementById('clay-pw-input');
        const btn = document.getElementById('clay-pw-confirm');
        const errEl = document.getElementById('clay-pw-err');
        setTimeout(() => inp.focus(), 50);
        // Close on backdrop click
        overlay.addEventListener('click', function(e) { if (e.target === overlay) { overlay.remove(); resolve(false); } });
        // Close on Escape
        const escHandler = function(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); resolve(false); } };
        document.addEventListener('keydown', escHandler);
        // Enter to submit
        inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') btn.click(); });
        btn.onclick = async function() {
            const pw = inp.value;
            if (!pw) return;
            btn.disabled = true; btn.textContent = '...';
            try {
                const res = await fetch('/api/clay/verify-password', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: pw})
                });
                const data = await res.json();
                if (res.ok && data.valid) {
                    window._clayToken = data.token;
                    overlay.remove();
                    document.removeEventListener('keydown', escHandler);
                    resolve(true);
                } else {
                    errEl.textContent = res.status === 503 ? 'Not configured on server.' : 'Incorrect password.';
                    inp.value = ''; inp.focus();
                    btn.disabled = false; btn.textContent = 'Confirm';
                }
            } catch(e) {
                errEl.textContent = 'Connection error.';
                btn.disabled = false; btn.textContent = 'Confirm';
            }
        };
    });
}

    // ── Helper: find calls relevant to a company via mentions ──
    function findRelevantCalls(companyName) {
        var callIds = {};
        mentions.forEach(function(m) {

    // Sort by frequency desc

let currentTab = 'features';
let excludedCalls = new Set();
let excludedCompetitors = new Set((DATA.excluded_competitors || []).map(n => n.toLowerCase()));

// Parse hash: #calls&exclude=id1,id2 or #features&exclude=id1,id2
function parseHash() {
    const raw = location.hash.replace('#', '');
    const parts = raw.split('&');
    let tab = '';
    parts.forEach(p => {
        if (p.startsWith('exclude=')) {
            p.slice(8).split(',').filter(Boolean).forEach(id => excludedCalls.add(id));
        } else if (p.startsWith('range=')) {
            activeDateRange = p.slice(6);
        } else if (['features', 'calls', 'personas', 'competitors', 'reports', 'prospecting'].includes(p)) {
            tab = p;
        } else if (p === 'product' || p === 'marketing') {
            tab = 'reports';
        }
    });
    return tab;
}

function updateHash() {
    let h = currentTab;
    if (activeDateRange !== 'all') h += '&range=' + activeDateRange;
    if (excludedCalls.size) h += '&exclude=' + [...excludedCalls].join(',');
    location.hash = h;
}

// Date range filter — returns {start, end} Date objects or null for "all"
function getDateRange() {
    if (activeDateRange === 'all') return null;
    if (activeDateRange === 'new') {
        if (!_lastVisitDate) return null; // no previous visit, show all
        return { start: new Date(_lastVisitDate + 'T00:00:00'), end: new Date(Date.now() + 86400000) };
    }
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const day = today.getDay(); // 0=Sun
    const diffToMon = day === 0 ? 6 : day - 1;
    const thisMonday = new Date(today);
    thisMonday.setDate(today.getDate() - diffToMon);
    if (activeDateRange === 'this-week') return { start: thisMonday, end: new Date(now.getTime() + 86400000) };
    if (activeDateRange === 'last-week') {
        const lastMon = new Date(thisMonday);
        lastMon.setDate(thisMonday.getDate() - 7);
        return { start: lastMon, end: thisMonday };
    }
    if (activeDateRange === 'last-2-weeks') {
        const twoWeeksAgo = new Date(thisMonday);
        twoWeeksAgo.setDate(thisMonday.getDate() - 7);
        return { start: twoWeeksAgo, end: new Date(now.getTime() + 86400000) };
    }
    if (activeDateRange === 'last-30-days') {
        const thirtyAgo = new Date(today);
        thirtyAgo.setDate(today.getDate() - 30);
        return { start: thirtyAgo, end: new Date(now.getTime() + 86400000) };
    }
    return null;
}

function isCallInRange(callDate) {
    const range = getDateRange();
    if (!range) return true;
    const d = new Date(callDate + 'T00:00:00');
    return d >= range.start && d < range.end;
}

// Set of call IDs that pass the date filter
function activeCallIds() {
    const ids = new Set();
    DATA.calls.forEach(c => {
        if (isCallInRange(c.date || '2000-01-01')) ids.add(c.id);
    });
    return ids;
}

// Get active (non-excluded, date-filtered) mentions
function activeMentions() {
    const dateIds = activeCallIds();
    return DATA.mentions.filter(m => !excludedCalls.has(m.call_id) && dateIds.has(m.call_id));
}

function toggleExclude(callId) {
    if (excludedCalls.has(callId)) {
        // Restore path
        restoreCall(callId);
    } else {
        // Exclude path
        excludeCall(callId);
    }
}

function excludeCall(callId) {
    excludedCalls.add(callId);
    updateHash();
    buildFeatures();
    buildReport();
    updateStats();

    const card = document.querySelector('#calls-view .card[data-callid="' + callId + '"]');
    if (card) {
        card.classList.add('card-exiting');
        card.addEventListener('animationend', function handler() {
            card.removeEventListener('animationend', handler);
            buildCalls();
            updateExcludedChip();
        }, { once: true });
    } else {
        buildCalls();
        updateExcludedChip();
    }

    // Find call title for toast
    const call = DATA.calls.find(c => c.id === callId);
    const title = call ? (call.title || 'Untitled') : 'call';
    const truncTitle = title.length > 40 ? title.slice(0, 37) + '...' : title;
    showToast('Excluded <span>"' + esc(truncTitle) + '"</span>', function() {
        restoreCall(callId);
    });
}

function restoreCall(callId) {
    excludedCalls.delete(callId);
    updateHash();
    buildFeatures();
    buildReport();
    updateStats();
    buildCalls();
    updateExcludedChip();

    // Animate restored card in
    const card = document.querySelector('#calls-view .card[data-callid="' + callId + '"]');
    if (card) {
        card.classList.add('card-entering');
        card.addEventListener('animationend', function handler() {
            card.removeEventListener('animationend', handler);
            card.classList.remove('card-entering');
        }, { once: true });
    }
}

// ---- Toast system ----
function showToast(message, undoCallback, durationMs) {
    durationMs = durationMs || 5000;
    var id = ++toastIdCounter;
    var container = document.getElementById('toast-container');

    var el = document.createElement('div');
    el.className = 'toast';
    el.dataset.toastId = id;
    el.innerHTML =
        '<div class="toast-msg">' + message + '</div>' +
        '<button class="toast-undo" data-tid="' + id + '">Undo</button>' +
        '<button class="toast-dismiss" data-tid="' + id + '">&times;</button>' +
        '<div class="toast-progress" style="animation:toastCountdown ' + durationMs + 'ms linear forwards"></div>';

    el.querySelector('.toast-undo').addEventListener('click', function() {
        if (undoCallback) undoCallback();
        dismissToast(id);
    });
    el.querySelector('.toast-dismiss').addEventListener('click', function() {
        dismissToast(id);
    });

    container.appendChild(el);

    var timer = setTimeout(function() { dismissToast(id); }, durationMs);
    toastStack.push({ id: id, el: el, timer: timer });

    // Cap visible toasts at 4
    while (toastStack.length > 4) {
        dismissToast(toastStack[0].id);
    }
    return id;
}

function dismissToast(id) {
    var idx = toastStack.findIndex(function(t) { return t.id === id; });
    if (idx === -1) return;
    var entry = toastStack[idx];
    clearTimeout(entry.timer);
    toastStack.splice(idx, 1);
    entry.el.classList.add('toast-exiting');
    entry.el.addEventListener('animationend', function() {
        if (entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
    }, { once: true });
}

// ---- Capability tier overlay ----
function getCapabilityTier(featureName) {
    const def = { tier: 'unknown', plan_required: null, expert_ref: null,
                  coverage_notes: 'Not yet classified', confidence: 'low' };
    if (!featureName || !CAPABILITY_MAP || Object.keys(CAPABILITY_MAP).length === 0) return def;
    if (CAPABILITY_MAP[featureName]) return CAPABILITY_MAP[featureName];
    const normalized = featureName.trim().toLowerCase();
    for (const [key, val] of Object.entries(CAPABILITY_MAP)) {
        if (key.trim().toLowerCase() === normalized) return val;
    }
    return def;
}

const TIER_LABELS = {
    native: 'AVAILABLE', workaround: 'WORKAROUND',
    roadmap: 'ROADMAP', gap: 'GAP', unknown: 'REVIEW'
};

function renderTierBadge(featureName) {
    const cap = getCapabilityTier(featureName);
    const label = TIER_LABELS[cap.tier] || TIER_LABELS.unknown;
    const parts = [
        cap.expert_ref,
        cap.plan_required ? 'Plan: ' + cap.plan_required : null,
        cap.coverage_notes,
        cap.confidence !== 'high' ? 'Confidence: ' + cap.confidence : null
    ].filter(Boolean).join(' \u00b7 ');
    const confClass = cap.confidence === 'low' ? ' low-confidence' : '';
    return '<span class="tier-badge ' + cap.tier + confClass + '" data-tip="' + esc(parts) + '" onmouseenter="showTierTip(this)" onmouseleave="hideTierTip()">' + label + '</span>';
}

var _tierTipEl = null;
function showTierTip(el) {
    if (!_tierTipEl) { _tierTipEl = document.getElementById('tier-tooltip'); }

    if (!text) return;
    _tierTipEl.textContent = text;

    var left = r.left + r.width / 2 - tw / 2;

    if (left + tw > window.innerWidth - 8) left = window.innerWidth - 8 - tw;
    _tierTipEl.style.left = left + 'px';
    _tierTipEl.style.top = (r.top - _tierTipEl.offsetHeight - 8) + 'px';
}
function hideTierTip() {

let activeTierFilters = new Set(['all']);
function tierFilteredFeatures(features) {

const GENERIC_TITLE_RE = /^connect\s+with\s+teachable$/i;
const FOLLOWUP_TITLE_RE = /^teachable\s+followup$/i;
function getProspectTitle(call) {
    const t = (call.title || '').trim();
    if (!GENERIC_TITLE_RE.test(t) && !FOLLOWUP_TITLE_RE.test(t)) return null;
    // Try marketing_data.company
    if (call.marketing_data && call.marketing_data.company && !isTeachableInternal(call.marketing_data.company)) {
        return call.marketing_data.company;
    }
    // Try hubspot_note COMPANY line
    if (call.hubspot_note) {
        const cm = call.hubspot_note.match(/^COMPANY:\s*(.+)/m);
        if (cm && cm[1].trim() && !isTeachableInternal(cm[1].trim())) return cm[1].trim();
    }
    // Try attendees
    const ext = extractCompany(call.attendees);
    if (ext) return ext;
    // Try marketing_data contacts
    if (call.marketing_data && call.marketing_data.contacts && call.marketing_data.contacts.length > 0) {
        return call.marketing_data.contacts[0].name;
    }
    return null;
}

function extractCompany(attendeeStr) {
    if (!attendeeStr) return '';
    const parts = attendeeStr.split(',').map(s => s.trim()).filter(Boolean);
    const external = parts.filter(p => !p.toLowerCase().includes('teachable'));
    return external.join(', ');
}

function tsLink(m) {
    if (m.link) return '<a href="' + esc(m.link) + '" target="_blank" title="Jump to this moment in the recording">' + esc(m.ts || '0:00') + '</a>';
    if (m.transcript) return '<a href="' + esc(m.transcript) + '" target="_blank">' + (m.ts || 'open') + '</a>';
    return '<span>' + esc(m.ts || '--') + '</span>';
}

function mentionHTML(m, showFeature) {
    let tag = showFeature ? '<span class="feat-tag">' + esc(m.keyword) + '</span> ' : '';
    return '<div class="m-row">' +
        '<div class="m-ts">' + tsLink(m) + '</div>' +
        '<div class="m-body">' +
            '<div class="m-call">' + tag + esc(m.call_title) + ' &middot; ' + m.call_date + '</div>' +
            '<div class="m-quote"><span class="m-spk">' + esc(m.speaker) + ':</span> "' + esc(m.text.slice(0, 160)) + '"</div>' +
        '</div></div>';
}

// ---- Features view (grouped by category) ----
function isTeachableInternal(name) {
    if (!name) return true;
    const low = name.toLowerCase().trim();
    return low === 'teachable' || low === 'unknown' || low === '';
}

function companyFromTitle(title) {
    if (!title) return '';
    const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
    if (chevron) return chevron[1].split(':')[0].trim();
    return '';
}

function companyFromAttendees(attendees) {
    if (!attendees) return '';
    // Extract company from parenthetical in attendee names, skipping Teachable
    const parts = attendees.split(',').map(s => s.trim()).filter(Boolean);
    for (const p of parts) {
        const paren = p.match(/\(([^)]+)\)/);
        if (paren) {
            const co = paren[1].trim();
            if (!isTeachableInternal(co)) return co;
        }
    }
    return '';
}

function getCompany(m, callMap) {
    // Prefer explicit company field from features.json (if not internal)
    if (m.company && !isTeachableInternal(m.company)) return m.company;
    // Fall back to reportGetCompany (parses speaker/call_title)
    const co = reportGetCompany(m, callMap);
    if (co && !isTeachableInternal(co)) return co;
    // Try call title
    const call = callMap[m.call_id];
    if (call) {
        const fromTitle = companyFromTitle(call.title);
        if (fromTitle && !isTeachableInternal(fromTitle)) return fromTitle;
        // Try attendees field
        const fromAttendees = companyFromAttendees(call.attendees);
        if (fromAttendees) return fromAttendees;
    }
    return '';
}

// ---- Feature detail panel globals ----
let _featMentions = {};  // kept for compatibility with other tabs

/* ====== By Feature: Data-Driven Table + Panel ====== */

// Feature view state
var _featAllData = [];          // All feature summary objects (unfiltered)
var _featFilteredData = [];     // Currently filtered/sorted feature array
var _featSortCol = 'mentions';  // Current sort column
var _featSortDir = -1;          // -1 = desc, 1 = asc
var _featGroupByCat = false;    // Group by category toggle
var _featCatFilter = '';        // Category dropdown filter
var _activeFeatureKey = null;   // Keyword of currently open panel feature
var _featCallMap = {};          // Call lookup map
var _featAllCategories = [];    // All category names for dropdown
var _featInitialized = false;   // Whether the scaffold (KPI bar, filters, table) is in the DOM

// ---- Data pipeline: getFilteredFeatures() ----
function getFilteredFeatures() {
    let data = [..._featAllData];
    const q = (document.getElementById('q') ? document.getElementById('q').value : '').toLowerCase();

    // Segment filter: narrow each feature's mentions to matching segments,
    // then recompute aggregates; drop features with zero remaining mentions
    if (activeSegmentFilters.size > 0) {
        data = data.map(f => {
            const filtered = f.mentions.filter(m => {
                const call = _featCallMap[m.call_id];
                return call && call.segment && activeSegmentFilters.has(call.segment.toLowerCase());
            });
            if (filtered.length === 0) return null;
            // Rebuild aggregates from filtered mentions
            const coMap = {};
            filtered.forEach(m => {
                const co = m._company || '';
                if (!co) return;
                if (!coMap[co]) coMap[co] = { contacts: new Set(), count: 0 };
                coMap[co].count++;
            });
            const coEntries = Object.entries(coMap).sort((a, b) => b[1].count - a[1].count || a[0].localeCompare(b[0]));
            const dates = filtered.map(m => m.call_date || '').filter(Boolean).sort();
            const confs = filtered.map(m => m.confidence).filter(c => c != null);
            const avgConf = confs.length > 0 ? confs.reduce((s, c) => s + c, 0) / confs.length : null;
            return Object.assign({}, f, {
                mentions: filtered,
                mentionCount: filtered.length,
                companyCount: coEntries.length,
                coEntries: coEntries,
                topCompany: coEntries.length > 0 ? coEntries[0][0] : '',
                lastDate: dates.length > 0 ? dates[dates.length - 1] : '',
                avgConf: avgConf,
            });
        }).filter(Boolean);
    }

    // Tier filter
    if (!activeTierFilters.has('all')) {
        data = data.filter(f => activeTierFilters.has(f.tier));
    }
    // Category filter
    if (_featCatFilter) {
        data = data.filter(f => f.category === _featCatFilter);
    }
    // Search
    if (q) {
        data = data.filter(f => f.searchText.includes(q));
    }
    // Company filter
    if (activeCompanyFilters.size > 0) {
        data = data.filter(f => {
            return f.coEntries.some(([co]) => activeCompanyFilters.has(co.toLowerCase()));
        });
    }
    // Sort — when grouping by category, force category as primary sort
    const col = _featSortCol;
    const dir = _featSortDir;
    const sortFn = {
        tier: (a, b) => { const order = { gap:0, unknown:1, roadmap:2, workaround:3, native:4 }; return ((order[a.tier]||5) - (order[b.tier]||5)) * dir; },
        feature: (a, b) => a.keyword.localeCompare(b.keyword) * dir,
        mentions: (a, b) => (a.mentionCount - b.mentionCount) * dir,
        companies: (a, b) => (a.companyCount - b.companyCount) * dir,
        recency: (a, b) => (a.lastDate || '').localeCompare(b.lastDate || '') * dir,
        confidence: (a, b) => ((a.avgConf || 0) - (b.avgConf || 0)) * dir,
        category: (a, b) => a.category.localeCompare(b.category) * dir,
    };
    if (_featGroupByCat) {
        // Primary sort: category alphabetical, secondary: user's selected column
        const secondary = sortFn[col] || sortFn.mentions;
        data.sort((a, b) => {
            const catCmp = a.category.localeCompare(b.category);
            return catCmp !== 0 ? catCmp : secondary(a, b);
        });
    } else {
        data.sort(sortFn[col] || sortFn.mentions);
    }
    return data;
}

// ---- Render: Interactive KPI rail from filtered data ----
function renderSummaryBar(features) {
    const totalFeats = features.length;
    const gapFeats = features.filter(f => f.tier === 'gap');
    const gapCount = gapFeats.length;
    const topGap = [...gapFeats].sort((a, b) => b.companyCount - a.companyCount)[0];
    const uniqueCos = new Set();
    features.forEach(f => f.coEntries.forEach(([co]) => uniqueCos.add(co)));

    // Most active prospect (last 30 days)
    const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    const thirtyDaysStr = thirtyDaysAgo.toISOString().slice(0, 10);
    const recentCoCounts = {};
    features.forEach(f => {
        f.mentions.forEach(m => {
            if ((m.call_date || '') >= thirtyDaysStr && m._company) {
                recentCoCounts[m._company] = (recentCoCounts[m._company] || 0) + 1;
            }
        });
    });
    const mostActiveCo = Object.entries(recentCoCounts).sort((a, b) => b[1] - a[1])[0];

    // Active states
    const isAllActive = activeTierFilters.has('all');
    const isGapActive = !activeTierFilters.has('all') && activeTierFilters.has('gap') && activeTierFilters.size === 1;
    const isCoSorted = _featSortCol === 'companies' && _featSortDir === -1;

    const el = document.getElementById('feat-kpi-bar');
    if (!el) return;

    // 1. Total Features (numeric) — resets all filters
    let html = '<article class="kpi-card kpi-numeric' + (isAllActive && !_featCatFilter ? ' kpi-active' : '') + '" data-tooltip="Click to show all features">' +
        '<button class="kpi-action" aria-label="Total features: ' + totalFeats + '. Click to reset all filters" onclick="kpiResetFilters()">' +
        '<div class="kpi-value">' + totalFeats + '</div>' +
        '<div class="kpi-label">Total Features</div>' +
        '</button></article>';

    // 2. Gap Features (numeric) — applies gap tier filter
    html += '<article class="kpi-card kpi-numeric kpi-gap-border' + (isGapActive ? ' kpi-active' : '') + '" data-tooltip="Click to filter to gaps">' +
        '<button class="kpi-action" aria-label="Gap features: ' + gapCount + '. Click to filter to gaps" onclick="kpiFilterGaps()">' +
        '<div class="kpi-value">' + gapCount + '</div>' +
        '<div class="kpi-label">Gap Features</div>' +
        '</button></article>';

    // 3. Top Gap (entity) — opens detail panel for that feature
    const topGapKey = topGap ? esc(topGap.keyword).replace(/'/g, "\\'") : '';
    html += '<article class="kpi-card kpi-entity kpi-gap-bg" data-tooltip="Click to open detail">' +
        '<button class="kpi-action" aria-label="Top gap: ' + (topGap ? esc(topGap.keyword) : 'none') + '. Click to open detail panel" onclick="' + (topGap ? "kpiOpenTopGap('" + topGapKey + "')" : '') + '">' +
        '<div class="kpi-value">' + (topGap ? esc(topGap.keyword) : '--') + '</div>' +
        '<div class="kpi-label">Top Gap</div>' +
        (topGap ? '<div class="kpi-sub">' + topGap.companyCount + ' companies &middot; Gap</div>' : '') +
        '</button></article>';

    // 4. Most Active 30d (entity) — navigates to Personas
    const safeActiveCo = mostActiveCo ? esc(mostActiveCo[0]).replace(/'/g, "\\'") : '';
    html += '<article class="kpi-card kpi-entity kpi-active-co" data-tooltip="Click to view in Personas">' +
        '<button class="kpi-action" aria-label="Most active company: ' + (mostActiveCo ? esc(mostActiveCo[0]) : 'none') + '. Click to view in Personas" onclick="' + (mostActiveCo ? "filterPersonasByCompany('" + safeActiveCo + "')" : '') + '">' +
        '<div class="kpi-value">' + (mostActiveCo ? esc(mostActiveCo[0]) : '--') + '</div>' +
        '<div class="kpi-label">Most Active (30d)</div>' +
        (mostActiveCo ? '<div class="kpi-sub">' + mostActiveCo[1] + ' mentions</div>' : '') +
        '</button></article>';

    // 5. Unique Companies (numeric) — sorts table by companies desc
    html += '<article class="kpi-card kpi-numeric' + (isCoSorted ? ' kpi-active' : '') + '" data-tooltip="Click to sort by companies">' +
        '<button class="kpi-action" aria-label="Unique companies: ' + uniqueCos.size + '. Click to sort by companies" onclick="kpiSortCompanies()">' +
        '<div class="kpi-value">' + uniqueCos.size + '</div>' +
        '<div class="kpi-label">Unique Companies</div>' +
        '</button></article>';

    el.innerHTML = html;
}

// ---- Render: Table rows from filtered data ----
function renderTable(features) {
    _featFilteredData = features;
    const maxMentions = features.length > 0 ? Math.max(...features.map(f => f.mentionCount)) : 1;
    let rows = '';
    let lastCat = '';

    features.forEach(f => {
        // Category group header

    document.querySelectorAll('.feat-table th').forEach(th => {

        th.classList.toggle('sorted', c === _featSortCol);

    if (q && countEl) countEl.textContent = features.length + ' of ' + _featAllData.length;

// ---- Panel open/close ----
var _featPanelTriggerRow = null; // row that opened the panel, for focus return

function openFeatureDetail(keyword) {
    const feat = _featFilteredData.find(f => f.keyword === keyword);
    if (!feat) return;

    // Highlight active row
    document.querySelectorAll('.feat-table tr.feat-row.active').forEach(r => r.classList.remove('active'));
    const row = document.querySelector('.feat-table tr.feat-row[data-feat-key="' + CSS.escape(keyword) + '"]');
    if (row) row.classList.add('active');

    _activeFeatureKey = keyword;
    _featPanelTriggerRow = row;

    // Populate and open panel
    renderDetailPanel(feat);
    const panel = document.getElementById('feat-panel');
    const overlay = document.getElementById('feat-panel-overlay');
    if (panel) {
        panel.classList.add('open');
        // Focus transfer: move focus to close button inside panel
        requestAnimationFrame(() => {
            const closeBtn = panel.querySelector('.feat-panel-close');
            if (closeBtn) closeBtn.focus();
        });
        // Focus trap
        panel.removeEventListener('keydown', _featPanelFocusTrap);
        panel.addEventListener('keydown', _featPanelFocusTrap);
    }
    if (overlay) overlay.classList.add('open');
}

function _featPanelFocusTrap(e) {
    if (e.key !== 'Tab') return;
    const panel = document.getElementById('feat-panel');
    if (!panel) return;
    const focusable = panel.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
    if (focusable.length === 0) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
}

function closeDetailPanel() {
    const panel = document.getElementById('feat-panel');
    const overlay = document.getElementById('feat-panel-overlay');
    if (panel) {
        panel.classList.remove('open');
        panel.removeEventListener('keydown', _featPanelFocusTrap);
    }
    if (overlay) overlay.classList.remove('open');
    _activeFeatureKey = null;
    document.querySelectorAll('.feat-table tr.feat-row.active').forEach(r => r.classList.remove('active'));
    // Focus return: move focus back to the row that triggered the panel
    if (_featPanelTriggerRow) {
        _featPanelTriggerRow.focus();
        _featPanelTriggerRow = null;
    }
}

// Keep old name as alias for cross-tab close calls
function closeFeatPanel() { closeDetailPanel(); }

function featPanelKeyNav(e) {
    if (!_activeFeatureKey) return;
    if (e.key === 'Escape') { closeDetailPanel(); return; }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const dir = e.key === 'ArrowDown' ? 1 : -1;
        const idx = _featFilteredData.findIndex(f => f.keyword === _activeFeatureKey);
        if (idx < 0) return;
        const nextIdx = idx + dir;
        if (nextIdx >= 0 && nextIdx < _featFilteredData.length) {
            openFeatureDetail(_featFilteredData[nextIdx].keyword);
        }
    }
}

function formatRecency(dateStr) {
    if (!dateStr) return '--';
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return '1d ago';
    if (diff < 14) return diff + 'd ago';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
}

// ---- Cross-tab navigation: company -> Personas ----
function filterPersonasByCompany(companyName) {
    if (!companyName) return;
    closeDetailPanel();
    switchTab('personas');
    // Find the best segment for this company (highest engagement score)
    setTimeout(function() {
        let bestSeg = null;
        let bestScore = -1;
        for (const seg of Object.keys(_personaData)) {
            const d = _personaData[seg][companyName];
            if (d && d.engagementScore > bestScore) {
                bestScore = d.engagementScore;
                bestSeg = seg;
            }
        }
        // Build expected card ID from best segment
        let targetCard = null;
        if (bestSeg) {
            const expectedId = 'prospect-' + (bestSeg + '-' + companyName).replace(/[^a-z0-9]/gi, '-').toLowerCase();
            targetCard = document.getElementById(expectedId);
        }
        // Fallback: scan all cards by header text
        if (!targetCard) {
            const cards = document.querySelectorAll('.prospect-card');
            for (const card of cards) {
                const coEl = card.querySelector('.prospect-co');
                if (coEl && coEl.textContent.trim() === companyName) { targetCard = card; break; }
            }
        }
        if (targetCard) {
            // Expand parent segment group if collapsed
            const group = targetCard.closest('.seg-group');
            if (group && group.classList.contains('collapsed')) {
                group.classList.remove('collapsed');
                const hdr = group.querySelector('.seg-group-hdr');
                if (hdr) hdr.setAttribute('aria-expanded', 'true');
            }
            const groupCards = targetCard.closest('.seg-group-cards');
            const showMoreBtn = groupCards ? groupCards.querySelector('.prospect-show-more[data-expanded="false"]') : null;
            if (showMoreBtn && targetCard.classList.contains('prospect-extra')) {
                toggleProspectGroupLimit(showMoreBtn);
            }
            // Expand the card
            const btn = targetCard.querySelector('.prospect-card-header');
            if (btn && btn.getAttribute('aria-expanded') !== 'true') {
                toggleProspectCard(btn);
            }
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 200);
}

// ---- rebuildFeatureView: single entry point for all filter/sort/search ----
function rebuildFeatureView() {
    const features = getFilteredFeatures();
    renderSummaryBar(features);
    renderTable(features);
    // If detail panel is open, check if active feature is still visible
    if (_activeFeatureKey) {
        const stillVisible = features.find(f => f.keyword === _activeFeatureKey);
        if (stillVisible) {
            renderDetailPanel(stillVisible);
        } else {
            closeDetailPanel();
        }
    }
}

// ---- buildFeatures: initial setup (builds data + scaffold, then calls rebuildFeatureView) ----
function buildFeatures() {
    _featAllData = [];
    _activeFeatureKey = null;
    _featInitialized = false;

    // Pending analysis banner
    const pendingCalls = DATA.calls.filter(c => c.pending_analysis);
    const oldBanner = document.getElementById('pending-banner');
    if (oldBanner) oldBanner.remove();
    if (pendingCalls.length > 0) {
        const banner = document.createElement('div');
        banner.id = 'pending-banner';
        banner.className = 'pending-banner';
        banner.innerHTML = '<span class="pending-badge">' + pendingCalls.length + '</span> new call' + (pendingCalls.length > 1 ? 's' : '') + ' pending feature analysis. Run analysis to update.';
        const fv = document.getElementById('features-view');
        fv.parentNode.insertBefore(banner, fv);
    }

    // Group mentions by feature
    const mentions = activeMentions();
    const featureGroups = {};
    mentions.forEach(m => {
        if (!featureGroups[m.keyword]) featureGroups[m.keyword] = { mentions: [], category: m.category || 'Other' };
        featureGroups[m.keyword].mentions.push(m);
    });

    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    _featCallMap = callMap;

    // Tag companies on mentions
    const allCompanies = new Set();
    mentions.forEach(m => {
        const co = getCompany(m, callMap);
        if (co) { allCompanies.add(co); m._company = co; }
    });
    buildCompanyDropdown(allCompanies);

    // Build feature data objects
    const INTERNAL_SPEAKERS = ['zach mccall', 'kevin', 'kevin codde', 'jerome', 'jerome olaloye', 'lennie zhu', 'sarah'];
    const allCategories = new Set();

    Object.entries(featureGroups).forEach(([kw, data]) => {
        const ms = data.mentions;
        const cap = getCapabilityTier(kw);

        // Company breakdown
        const coMap = {};
        ms.forEach(m => {
            const co = m._company || '';
            if (!co) return;
            if (!coMap[co]) coMap[co] = { contacts: new Set(), count: 0 };
            const spk = m.speaker || '';
            const spkLow = spk.toLowerCase();
            const spkName = spk.replace(/\s*\([^)]*\)/, '').trim();
            const isInternal = spkLow.includes('teachable') || INTERNAL_SPEAKERS.some(s => spkLow.includes(s));
            if (spkName && !isInternal) coMap[co].contacts.add(spkName);
            coMap[co].count++;
        });
        const coEntries = Object.entries(coMap).sort((a, b) => b[1].count - a[1].count || a[0].localeCompare(b[0]));

        // Dates
        const dates = ms.map(m => m.call_date || '').filter(Boolean).sort();
        const lastDate = dates.length > 0 ? dates[dates.length - 1] : '';

        // Avg confidence
        const confs = ms.map(m => m.confidence).filter(c => c != null);
        const avgConf = confs.length > 0 ? confs.reduce((s, c) => s + c, 0) / confs.length : null;

        // Search text
        const searchText = [kw, data.category, ...ms.map(m => [m.speaker, m.call_title, m.text, m._company].join(' '))].join(' ').toLowerCase();

        allCategories.add(data.category);

        _featAllData.push({
            keyword: kw,
            category: data.category,
            tier: cap.tier,
            mentions: ms,
            mentionCount: ms.length,
            companyCount: coEntries.length,
            coEntries: coEntries,
            topCompany: coEntries.length > 0 ? coEntries[0][0] : '',
            lastDate: lastDate,
            avgConf: avgConf,
            searchText: searchText,
        });
    });

    _featAllCategories = [...allCategories].sort();

    // === Build scaffold HTML (KPI bar, filters, table skeleton) ===
    let html = '<div class="feat-summary-bar" id="feat-kpi-bar"></div>';

    // Tier filter buttons
    if (Object.keys(CAPABILITY_MAP).length > 0) {
        var btnActive = function(t) { return activeTierFilters.has(t) ? ' active' : ''; };
        html += '<div class="tier-filter-group" style="align-items:center;flex-wrap:wrap">';
        html += '<span class="tier-filter-label">Show:</span>';
        html += '<button class="tier-filter-btn' + btnActive('all') + '" data-tier="all" onclick="toggleTierFilter(this)">All</button>';
        html += '<button class="tier-filter-btn' + btnActive('gap') + '" data-tier="gap" onclick="toggleTierFilter(this)">Gaps</button>';
        html += '<button class="tier-filter-btn' + btnActive('native') + '" data-tier="native" onclick="toggleTierFilter(this)">Native</button>';
        html += '<button class="tier-filter-btn' + btnActive('workaround') + '" data-tier="workaround" onclick="toggleTierFilter(this)">Workaround</button>';
        html += '<button class="tier-filter-btn' + btnActive('roadmap') + '" data-tier="roadmap" onclick="toggleTierFilter(this)">Roadmap</button>';
        html += '<button class="tier-filter-btn' + btnActive('unknown') + '" data-tier="unknown" onclick="toggleTierFilter(this)">Review</button>';
        html += '<span style="margin-left:auto;display:flex;gap:6px;align-items:center">';

        // Category dropdown
        html += '<div class="feat-cat-dd"><button class="feat-cat-btn" onclick="event.stopPropagation();toggleFeatCatDD()">' + (_featCatFilter || 'Category \u25BE') + '</button>';
        html += '<div class="feat-cat-menu">';
        html += '<button class="feat-sort-opt' + (!_featCatFilter ? ' active' : '') + '" onclick="setFeatCatFilter(\'\')">All Categories</button>';
        _featAllCategories.forEach(cat => {
            html += '<button class="feat-sort-opt' + (_featCatFilter === cat ? ' active' : '') + '" onclick="setFeatCatFilter(\'' + esc(cat).replace(/'/g, "\\'") + '\')">' + esc(cat) + '</button>';
        });
        html += '</div></div>';

        // Group toggle
        html += '<button class="feat-group-toggle' + (_featGroupByCat ? ' active' : '') + '" onclick="toggleFeatGroupBy()">Group</button>';

        html += '</span>';
        html += '</div>';
    }

    // Table skeleton
    html += '<div class="feat-table-wrap"><table class="feat-table">';
    html += '<thead><tr>';
    const _sortCols = [
        ['tier', '40px', 'Tier', true],
        ['feature', null, 'Feature', true],
        ['mentions', '100px', 'Mentions', true],
        ['companies', '80px', 'Cos', true],
        ['recency', '90px', 'Recent', true, 'col-recency'],
        ['topco', '140px', 'Top Company', false, 'col-topco'],
        ['confidence', '50px', 'Conf', true, 'col-conf']
    ];
    _sortCols.forEach(([col, w, label, sortable, cls]) => {
        const ariaSort = col === _featSortCol ? (_featSortDir > 0 ? 'ascending' : 'descending') : 'none';
        const wAttr = w ? ' style="width:' + w + '"' : '';
        const clsAttr = cls ? ' class="' + cls + '"' : '';
        if (sortable) {
            html += '<th data-col="' + col + '"' + wAttr + clsAttr + ' aria-sort="' + ariaSort + '"><button onclick="sortFeatTable(\'' + col + '\')">' + label + '<span class="sort-arrow"></span></button></th>';
        } else {
            html += '<th data-col="' + col + '"' + wAttr + clsAttr + '>' + label + '</th>';
        }
    });
    html += '</tr></thead>';
    html += '<tbody id="feat-table-body"></tbody>';
    html += '</table></div>';

    document.getElementById('features-view').innerHTML = html;

    // Ensure panel + overlay exist in DOM
    if (!document.getElementById('feat-panel')) {
        const panelHTML = '<div id="feat-panel-overlay" class="feat-panel-overlay" onclick="closeDetailPanel()"></div>' +
            '<div id="feat-panel" class="feat-panel" role="dialog" aria-modal="true" aria-labelledby="feat-panel-title-heading"></div>';
        document.body.insertAdjacentHTML('beforeend', panelHTML);
    }

    // Keyboard nav
    document.removeEventListener('keydown', featPanelKeyNav);
    document.addEventListener('keydown', featPanelKeyNav);

    _featInitialized = true;

    // Run the data pipeline
    rebuildFeatureView();
}

// ---- Week grouping helpers ----
function getWeekStart(dateStr) {
    // Returns Monday 00:00 of the week containing dateStr
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDay(); // 0=Sun
    const diff = day === 0 ? 6 : day - 1; // shift so Mon=0
    d.setDate(d.getDate() - diff);
    return d;
}

function fmtShortDate(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
}

function weekLabel(weekStart) {
    const now = new Date();
    const thisWeekStart = getWeekStart(now.toISOString().slice(0,10));
    const lastWeekStart = new Date(thisWeekStart);
    lastWeekStart.setDate(lastWeekStart.getDate() - 7);

    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 4); // Friday

    const range = fmtShortDate(weekStart) + ' – ' + fmtShortDate(weekEnd);

    if (weekStart.getTime() === thisWeekStart.getTime()) return 'This Week (' + range + ')';
    if (weekStart.getTime() === lastWeekStart.getTime()) return 'Last Week (' + range + ')';
    return range;
}

// ---- Shared report helpers ----
function reportGetCompany(m, callMap) {
    const spk = m.speaker || '';
    const spkLow = spk.toLowerCase();
    const call = callMap[m.call_id];
    const title = call ? call.title : '';
    const paren = spk.match(/\(([^)]+)\)/);

    // Known speaker → company mappings (works with or without parenthetical)
    if (spkLow.includes('hui ching') || spkLow.includes('kai shan')) return 'LTA';
    if (spkLow.includes('simon davey')) return 'Simon Davey';
    if (spkLow.includes('simon smith') || spkLow.includes('sabine') || spkLow.includes('katrina welch')) return 'Simon & Sabine (Coaching)';
    if (spkLow.includes('ibrahim') || spkLow.includes('bryan') || spkLow.includes('oghenetejiri')) return 'Dot Compliance';

    if (paren) {
        const raw = paren[1].split('/')[0].trim();
        const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
        if (chevron) return chevron[1].trim();
        if (title.toLowerCase().includes('speravita')) return 'Speravita';
        if (title.toLowerCase().includes('dot compliance')) return 'Dot Compliance';
        if (title.toLowerCase().includes('lta') || raw.toLowerCase().includes('lta')) return 'LTA';
        // Never return Teachable or Unknown as a company
        if (!isTeachableInternal(raw)) return raw;
        // Fall through: internal speaker, try extracting from title
        if (title) return companyFromTitle(title);
    }
    return '';
}
function reportFmtTs(sec) {
    if (sec == null) return '';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}
function reportWeekRange(weekStart) {
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 4);
    return fmtShortDate(weekStart) + ' \u2013 ' + fmtShortDate(end) + ', ' + weekStart.getFullYear();
}

// ---- Insights Hub builder (replaces old two-panel report) ----
function buildInsights() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();
    const coSummaries = DATA.company_summaries || {};

    // Tag each mention with company
    mentions.forEach(m => { m._co = reportGetCompany(m, callMap); });

    // Active calls (non-excluded, with mentions or marketing_data)
    function isInternalCall(c) { return /\bsales\b/i.test((c.title || '')); }
    const mentionCallIds = new Set(mentions.map(m => m.call_id));
    const activeCalls = DATA.calls.filter(c =>
        !excludedCalls.has(c.id) && !c.pending_analysis && !isInternalCall(c) &&
        (mentionCallIds.has(c.id) || c.marketing_data)
    );
    const dates = activeCalls.map(c => c.date).filter(Boolean).sort();
    const dateRange = dates.length
        ? fmtShortDate(new Date(dates[0] + 'T00:00:00')) + ' \u2013 ' +
          fmtShortDate(new Date(dates[dates.length - 1] + 'T00:00:00')) + ', ' + dates[0].slice(0, 4)
        : '';

    // Companies map
    const coMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        if (!coMap[co]) coMap[co] = { features: new Set(), calls: new Map() };
        coMap[co].features.add(m.keyword);
        if (!coMap[co].calls.has(m.call_id)) coMap[co].calls.set(m.call_id, callMap[m.call_id]);
    });
    const companies = Object.entries(coMap).sort((a, b) => b[1].features.size - a[1].features.size);

    // Features by category
    const catMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        const cat = m.category || 'Other';
        if (!catMap[cat]) catMap[cat] = {};
        if (!catMap[cat][m.keyword]) catMap[cat][m.keyword] = [];
        catMap[cat][m.keyword].push({ company: co, tsDisplay: reportFmtTs(m.ts_sec), link: m.link || '' });
    });
    const catEntries = Object.entries(catMap).map(([cat, feats]) => {
        let total = 0;
        const coSet = new Set();
        Object.values(feats).forEach(arr => { total += arr.length; arr.forEach(e => coSet.add(e.company)); });
        return { cat, feats, total, coCount: coSet.size };
    }).sort((a, b) => b.total - a.total);
    const topTheme = catEntries.length ? catEntries[0] : null;

    // Marketing data aggregation
    const allMktData = activeCalls.map(c => ({ call: c, md: c.marketing_data || {} })).filter(x => Object.keys(x.md).length > 0);
    const allQuotes = [], allTerminology = [], allQuestions = [];
    const allObjections = [], allMktCompetitors = [], allBarriers = [];
    const allSignals = [], allTimelines = [];

    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        (md.quotes || []).forEach(q => allQuotes.push({ ...q, _co: co, _call: call }));
        (md.terminology || []).forEach(t => allTerminology.push({ ...t, _co: co }));
        (md.questions_asked || []).forEach(q => allQuestions.push({ ...q, _co: co, _call: call }));
        (md.objections || []).forEach(o => allObjections.push({ ...o, _co: co, _call: call }));
        (md.competitors_mentioned || []).forEach(c => allMktCompetitors.push({ ...c, _co: co, _call: call }));
        (md.barriers_to_adoption || []).forEach(b => {
            const existing = allBarriers.find(x => x.barrier === b);

            else allBarriers.push({ barrier: b, companies: [co] });
        });
        (md.buying_signals || []).forEach(s => allSignals.push({ ...s, _co: co, _call: call }));
        allTimelines.push({ company: co, timeline: md.timeline || null, call: call });

        const stripped = lower.replace(/[\s\-()]/g, '');
