    'health, wellness & fitness': '#34d399',
    'government & public sector education': '#94a3b8',
    'needs_review': '#f0c040'
};

function segColor(segName) {
    return SEG_COLORS[(segName || '').toLowerCase()] || '#4a7cff';
}

function buildPersonas() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();

    // Check if any segment data exists
    const hasSegmentData = DATA.calls.some(c => c.segment);
    if (!hasSegmentData) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">Segment data not available. Re-run analysis with persona categorization enabled to populate this tab.</div>';
        return;
    }

    // Tag mentions with company
    mentions.forEach(m => { m._co = m._co || getCompany(m, callMap) || reportGetCompany(m, callMap) || ''; });

    // Active date-filtered + non-excluded calls with segments
    const dateIds = activeCallIds();
    const activeCalls = DATA.calls.filter(c =>
        c.segment && !excludedCalls.has(c.id) && dateIds.has(c.id)
    );

    // Apply segment filter
    const noSegFilter = activeSegmentFilters.size === 0;
    const filteredCalls = activeCalls.filter(c =>
        noSegFilter || activeSegmentFilters.has(c.segment.toLowerCase())
    );

    if (filteredCalls.length === 0) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">No calls match the selected filters.</div>';
        return;
    }

    // Group calls by segment
    const segGroups = {};
    filteredCalls.forEach(c => {
        const seg = c.segment;
        if (!segGroups[seg]) segGroups[seg] = { calls: [], companies: new Set(), features: {} };
        segGroups[seg].calls.push(c);
    });

    // Cross-ref mentions with calls to get features per segment and per company
    const filteredCallIds = new Set(filteredCalls.map(c => c.id));
    let filteredMentions = mentions.filter(m => filteredCallIds.has(m.call_id));

    // Apply company filter
    const noCoFilter = activeCompanyFilters.size === 0;
    if (!noCoFilter) {
        filteredMentions = filteredMentions.filter(m => activeCompanyFilters.has((m._co || '').toLowerCase()));
    }

    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        const seg = call.segment;
        if (!segGroups[seg]) return;
        const co = m._co || 'Unknown';
        segGroups[seg].companies.add(co);
        if (!segGroups[seg].features[m.keyword]) segGroups[seg].features[m.keyword] = 0;
        segGroups[seg].features[m.keyword]++;
    });

    // Also add companies from calls (even if no feature mentions)
    filteredCalls.forEach(c => {
        const seg = c.segment;
        const callMentions = filteredMentions.filter(m => m.call_id === c.id);
        const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
        if (cos.size === 0 && noCoFilter) {
            // Fallback: extract from call title (only when no company filter active)
            const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
            if (chevron) cos.add(chevron[1].split(':')[0].trim());
        }
        cos.forEach(co => {
            if (noCoFilter || activeCompanyFilters.has(co.toLowerCase())) {
                segGroups[seg].companies.add(co);
            }
        });
    });

    // Sort segments by call count desc, NEEDS_REVIEW always last
    const sortedSegs = Object.entries(segGroups).sort((a, b) => {
        if (a[0] === 'NEEDS_REVIEW') return 1;
        if (b[0] === 'NEEDS_REVIEW') return -1;
        return b[1].calls.length - a[1].calls.length;
    });

    let html = '';

    // ========== SECTION 1: Segment Overview Cards ==========
    html += '<div class="seg-section-title">Segment Overview</div>';
    html += '<div class="seg-overview">';
    sortedSegs.forEach(([seg, data]) => {
        const isNR = seg === 'NEEDS_REVIEW';
        const color = segColor(seg);
        const displaySeg = isNR ? 'Unclassified' : seg;
        const topFeats = Object.entries(data.features)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3);
        let featsHTML = '';
        if (topFeats.length > 0) {
            featsHTML = '<ul class="seg-card-feats">';
            topFeats.forEach(([f]) => { featsHTML += '<li>' + esc(f) + '</li>'; });
            featsHTML += '</ul>';
        }
        const nrIcon = isNR ? '<span style="margin-right:4px">&#9888;</span>' : '';
        html += '<div class="seg-card" style="--seg-color:' + color + '" onclick="scrollToSegGroup(\'' + esc(seg) + '\')">' +
            '<div class="seg-card-name">' + nrIcon + esc(displaySeg) + '</div>' +
            '<div class="seg-card-stat">' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</div>' +
            '<div class="seg-card-sub">' + data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y') + '</div>' +
            featsHTML +
        '</div>';
    });
    html += '</div>';

    // ========== SEGMENT MIX BAR ==========
    if (sortedSegs.length > 0) {
        const totalCalls = filteredCalls.length;
        html += '<div class="seg-mix">';
        html += '<div class="seg-section-title">Segment Mix</div>';
        html += '<div class="seg-mix-bar">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? (data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            const label = pct >= 12 ? (displaySeg.split(' ').slice(0, 3).join(' ') + ' ' + Math.round(pct) + '%') : (pct >= 6 ? Math.round(pct) + '%' : '');
            html += '<div class="seg-mix-seg" data-pct="' + pct.toFixed(1) + '" style="background:' + color + '" title="' + esc(displaySeg) + ': ' + Math.round(pct) + '% (' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + ')">';
            html += '<span>' + esc(label) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        html += '<div class="seg-mix-legend">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? Math.round(data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            html += '<div class="seg-mix-legend-item">' +
                '<span class="seg-mix-dot" style="background:' + color + '"></span>' +
                esc(displaySeg) + ' ' + pct + '%' +
            '</div>';
        });
        html += '</div>';
        html += '</div>';
    }

    // ========== SECTION 2: Segment Comparison Table ==========
    // Collect all features with 2+ total mentions across ALL segments
    const allFeatureCounts = {};
    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        if (!allFeatureCounts[m.keyword]) allFeatureCounts[m.keyword] = { total: 0, bySegment: {} };
        allFeatureCounts[m.keyword].total++;
        if (!allFeatureCounts[m.keyword].bySegment[call.segment]) allFeatureCounts[m.keyword].bySegment[call.segment] = 0;
        allFeatureCounts[m.keyword].bySegment[call.segment]++;
    });

    const tableFeatures = Object.entries(allFeatureCounts)
        .filter(([, v]) => v.total >= 2)
        .sort((a, b) => b[1].total - a[1].total);

    if (tableFeatures.length > 0 && sortedSegs.length > 1) {
        html += '<div class="seg-section-title" style="margin-top:1rem">Segment Comparison</div>';
        html += '<div class="seg-compare-wrap"><table class="seg-compare">';
        html += '<tr><th>Feature</th>';
        sortedSegs.forEach(([seg]) => {
            const label = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg.split(' ').slice(0, 3).join(' ');
            html += '<th>' + esc(label) + '</th>';
        });
        html += '</tr>';

        // Find max count for heat map scaling
        let heatMax = 1;
        tableFeatures.forEach(([, data]) => {
            sortedSegs.forEach(([seg]) => {
                const c = data.bySegment[seg] || 0;
                if (c > heatMax) heatMax = c;
            });
        });

        const INITIAL_ROWS = 15;
        tableFeatures.forEach(([feat, data], idx) => {
            const hidden = idx >= INITIAL_ROWS ? ' style="display:none" class="seg-compare-extra"' : '';
            html += '<tr' + hidden + '><td>' + esc(feat) + '</td>';
            sortedSegs.forEach(([seg]) => {
                const count = data.bySegment[seg] || 0;
                if (count === 0) {
                    html += '<td></td>';
                } else {
                    const opacity = Math.min(0.15 + (count / heatMax) * 0.6, 0.75);
                    html += '<td class="heat" style="background:rgba(59,130,246,' + opacity.toFixed(2) + ')">' + count + '</td>';
                }
            });
            html += '</tr>';
        });
        html += '</table>';
        // Heat map legend
        html += '<div class="seg-heat-legend">';
        html += '<span>Mentions:</span>';
        [1, 2, 3].forEach(n => {
            const op = Math.min(0.15 + (n / heatMax) * 0.6, 0.75);
            html += '<span><span class="seg-heat-swatch" style="background:rgba(59,130,246,' + op.toFixed(2) + ')"></span>' + n + '</span>';
        });
        html += '</div>';
        if (tableFeatures.length > INITIAL_ROWS) {
            html += '<button class="seg-show-all" onclick="toggleCompareRows(this)">Show all ' + tableFeatures.length + ' features</button>';
        }
        html += '</div>';
    }

    // ========== SECTION 3: Prospect Cards by Segment ==========
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem">' +
        '<div class="seg-section-title" style="margin:0">Prospects by Segment</div>' +
        '<button class="expand-btn" onclick="togglePersonasExpand(this)">' + (allExpanded ? 'Collapse All' : 'Expand All') + '</button>' +
        '</div>';

    sortedSegs.forEach(([seg, data], idx) => {
        const color = segColor(seg);
        // Group by company
        const coData = {};
        data.calls.forEach(c => {
            const callMentions = filteredMentions.filter(m => m.call_id === c.id);
            const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
            if (cos.size === 0) {
                const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
                if (chevron) cos.add(chevron[1].split(':')[0].trim());
                else cos.add(c.title || 'Unknown');
            }
            cos.forEach(co => {
                if (!coData[co]) coData[co] = { contacts: [], calls: [], features: [], mentionMap: {} };
                coData[co].calls.push(c);
                callMentions.forEach(m => {
                    if (!coData[co].mentionMap[m.keyword]) {
                        coData[co].mentionMap[m.keyword] = m;
                        coData[co].features.push(m);
                    }
                });
            });
        });

        // Extract contacts from marketing_data
        Object.entries(coData).forEach(([co, d]) => {
            d.calls.forEach(c => {
                if (c.marketing_data && c.marketing_data.contacts) {
                    c.marketing_data.contacts.forEach(ct => {
                        if (!d.contacts.find(x => x.name === ct.name)) d.contacts.push(ct);
                    });
                }
            });
        });

        // Apply company filter to prospect cards
        const coEntries = Object.entries(coData)
            .filter(([co]) => noCoFilter || activeCompanyFilters.has(co.toLowerCase()))
            .sort((a, b) => a[0].localeCompare(b[0]));
        if (coEntries.length === 0) return; // Skip segment if no companies match
        const defaultExpanded = allExpanded || sortedSegs.length <= 3 || idx === 0;

        const isNR = seg === 'NEEDS_REVIEW';
        const displaySeg = isNR ? 'Unclassified' : seg;
        const nrClass = isNR ? ' seg-section-nr' : '';
        html += '<div class="seg-group' + (defaultExpanded ? '' : ' collapsed') + nrClass + '" id="seg-group-' + esc(seg.replace(/[^a-z0-9]/gi, '-').toLowerCase()) + '" style="--seg-color:' + color + '">';
        html += '<div class="seg-group-hdr" onclick="this.parentElement.classList.toggle(\'collapsed\')">';
        html += '<span class="seg-group-arrow">&#9654;</span>';
        html += (isNR ? '<span style="color:#f0c040;margin-right:4px">&#9888;</span>' : '');
        html += '<span class="seg-group-name">' + esc(displaySeg) + '</span>';
        html += '<span class="seg-group-count">' + coEntries.length + ' compan' + (coEntries.length !== 1 ? 'ies' : 'y') + ' &middot; ' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</span>';
        html += '</div>';
        html += '<div class="seg-group-cards">';

        coEntries.forEach(([co, d]) => {
            html += '<div class="prospect-card" style="--seg-color:' + color + '">';
            html += '<div class="prospect-co">' + esc(co) + '</div>';

            // Contacts
            d.contacts.forEach(ct => {
                html += '<div class="prospect-contact">' + esc(ct.name || '');
                if (ct.title) html += ', ' + esc(ct.title);
                html += '</div>';
            });

            // Calls
            const sortedCalls = d.calls.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            sortedCalls.forEach(c => {
                const dateStr = c.date ? c.date.slice(5).replace('-', '/') : '';
                html += '<div class="prospect-call">';
                if (c.transcript) {
                    html += '<a href="' + esc(c.transcript) + '" target="_blank">' + esc(c.title || 'Call') + '</a>';
                } else {
                    html += esc(c.title || 'Call');
                }
                if (dateStr) html += ' &middot; ' + dateStr;
                html += '</div>';
            });

            // Features
            if (d.features.length > 0) {
                html += '<ul class="prospect-feats">';
                d.features.forEach(m => {
                    html += '<li>' + esc(m.keyword);
                    if (m.link) html += '<a href="' + esc(m.link) + '" target="_blank">' + esc(m.ts || '') + '</a>';
                    html += '</li>';
                });
                html += '</ul>';
            } else {
                html += '<div style="font-size:0.82rem;color:#555a6e;margin-top:0.3rem">No feature requests extracted from this call.</div>';
            }

            html += '</div>';
        });

        html += '</div></div>';
    });

    document.getElementById('personas-view').innerHTML = html;

    // Animate segment mix bar widths
    requestAnimationFrame(() => {
        document.querySelectorAll('.seg-mix-seg').forEach(el => {
            el.style.width = el.dataset.pct + '%';
        });
    });
}

function togglePersonasExpand(btn) {
    const groups = document.querySelectorAll('#personas-view .seg-group');
    const anyCollapsed = [...groups].some(g => g.classList.contains('collapsed'));
    groups.forEach(g => g.classList.toggle('collapsed', !anyCollapsed));
    btn.textContent = anyCollapsed ? 'Collapse All' : 'Expand All';
}

function scrollToSegGroup(seg) {
    const id = 'seg-group-' + seg.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    const el = document.getElementById(id);
    if (el) {
        el.classList.remove('collapsed');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function toggleCompareRows(btn) {
    const rows = document.querySelectorAll('.seg-compare-extra');
    const showing = rows[0] && rows[0].style.display !== 'none';
    rows.forEach(r => { r.style.display = showing ? 'none' : ''; });
    btn.textContent = showing ? 'Show all' : 'Show less';
}

    'direct': '#4a9eff',
    'lms': '#a78bfa',
    'diy': '#fbbf24',
    'adjacent': '#fb923c',
    'marketplace': '#34d399'
};
const COMP_PALETTE = [
    '#4a9eff', '#f472b6', '#fbbf24', '#4ade80', '#a78bfa',
    '#fb923c', '#34d399', '#f87171', '#38bdf8', '#c084fc',
    '#facc15', '#2dd4bf', '#e879f9', '#94a3b8'
];
const _compColorCache = {};
function compColor(name) {
    if (!_compColorCache[name]) {
        const idx = Object.keys(_compColorCache).length % COMP_PALETTE.length;
        _compColorCache[name] = COMP_PALETTE[idx];
    }
    return _compColorCache[name];
}
const MENTION_TYPE_LABELS = {
    'currently_using': 'Currently Using',
    'switching_from': 'Switching From',
    'evaluated': 'Evaluated',
    'asked_about': 'Asked About',
    'compared_to': 'Compared To'
};

let activeCompTypeFilter = null; // null = show all
let activeCompNameFilters = new Set(); // empty = show all
let compAllExpanded = false; // false = not all expanded (initial: top 3 open); toggled by button

function buildCompFilterDropdown(allCompNames) {
    const sorted = [...allCompNames].sort();
    const panel = document.getElementById('comp-filter-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectCompFilter(this)"><span class="dd-check">&#10003;</span>All Competitors</div>';
    html += '<div class="dd-sep"></div>';
    sorted.forEach(name => {
        const sel = activeCompNameFilters.size === 0 || activeCompNameFilters.has(name.toLowerCase());
        html += '<div class="dd-item' + (sel && activeCompNameFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(name) + '" onclick="selectCompFilter(this)">' +
            '<span class="dd-check">&#10003;</span>' + esc(name) + '</div>';
    });
    panel.innerHTML = html;
    syncCompFilterLabel();
}

function selectCompFilter(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeCompNameFilters.clear();
        document.querySelectorAll('#comp-filter-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        document.querySelector('#comp-filter-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const name = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeCompNameFilters.add(name);
        } else {
            activeCompNameFilters.delete(name);
        }
        if (activeCompNameFilters.size === 0) {
            document.querySelector('#comp-filter-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncCompFilterLabel();
    buildCompetitors();
}

function syncCompFilterLabel() {
    const label = document.getElementById('comp-filter-label');
    const btn = document.querySelector('#comp-filter-dd .dd-btn');
    if (activeCompNameFilters.size === 0) {
        label.textContent = 'Competitors';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeCompNameFilters.size + ' selected';
        btn.classList.add('has-filter');

}

function buildCompetitors() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });

    // Collect all competitor mentions from calls (date-filtered, segment-filtered, non-excluded)
    const dateIds = activeCallIds();
    const noSegFilter = activeSegmentFilters.size === 0;
    const activeCalls = DATA.calls.filter(c =>
        !excludedCalls.has(c.id) && dateIds.has(c.id) &&
        (noSegFilter || (c.segment && activeSegmentFilters.has(c.segment.toLowerCase()))) &&
        ((c.competitor_mentions && c.competitor_mentions.length > 0) ||
         (c.marketing_data && c.marketing_data.competitors_mentioned && c.marketing_data.competitors_mentioned.length > 0))
    );

    // Flatten all mentions from new format (competitor_mentions) and legacy (marketing_data.competitors_mentioned)
    const allMentions = [];
    const seen = new Set(); // deduplicate
    activeCalls.forEach(c => {
        (c.competitor_mentions || []).forEach(cm => {
            const key = c.id + '|' + (cm.competitor || cm.name || '') + '|' + (cm.timestamp || '');
            if (seen.has(key)) return;
            seen.add(key);
            allMentions.push({
                competitor: cm.competitor || cm.name || '?',
                context: cm.context || '',
                timestamp: cm.timestamp || '',
                mention_type: cm.mention_type || 'asked_about',
                call_id: c.id,
                call_title: c.title || '',
                call_date: c.date || '',
                company: '',
                segment: c.segment || ''
            });
        });
        // Legacy: marketing_data.competitors_mentioned
        if (c.marketing_data && c.marketing_data.competitors_mentioned) {
            c.marketing_data.competitors_mentioned.forEach(cm => {
                const name = cm.name || cm.competitor || '?';
                const key = c.id + '|' + name + '|' + (cm.timestamp || '');
                if (seen.has(key)) return;
                seen.add(key);
                allMentions.push({
                    competitor: name,
                    context: cm.context || '',
                    timestamp: cm.timestamp || '',
                    mention_type: cm.mention_type || 'asked_about',
                    call_id: c.id,
                    call_title: c.title || '',
                    call_date: c.date || '',
                    company: '',
                    segment: c.segment || ''
                });
            });
        }
    });

    // Infer company for each mention
    const mentions = activeMentions();
    mentions.forEach(m => { m._co = m._co || getCompany(m, callMap) || reportGetCompany(m, callMap) || ''; });
    const callCompanyMap = {};
    activeCalls.forEach(c => {
        const callMentions = mentions.filter(m => m.call_id === c.id);
        const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
        if (cos.size === 0) {
            const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
            if (chevron) cos.add(chevron[1].split(':')[0].trim());
        }
        callCompanyMap[c.id] = [...cos][0] || '';
    });
    allMentions.forEach(cm => { cm.company = callCompanyMap[cm.call_id] || ''; });

    if (allMentions.length === 0) {
        document.getElementById('competitors-view').innerHTML =
            '<div class="comp-empty">No competitor mentions found. Competitor data is extracted during call analysis — re-analyze calls to populate this tab.</div>';
        return;
    }

    // Build competitor lookup from competitors.json data embedded in DATA (or fallback)
    const compMeta = {};
    const _compMetaLower = {}; // lowercase name -> meta
    const _compMetaStrip = {}; // stripped (no spaces, lowercase) -> meta
    if (DATA.competitors) {
        DATA.competitors.forEach(c => {
            const entry = { type: c.type || 'direct', description: c.description || '', differentiator: c.differentiator || '', short_description: c.short_description || '' };
            compMeta[c.name] = entry;
            _compMetaLower[c.name.toLowerCase()] = entry;
            _compMetaStrip[c.name.toLowerCase().replace(/[\s\-()]/g, '')] = entry;
        });
    }
    // Fallback descriptions for competitors not in competitors.json
    const _unknownCompDesc = {
        'fiducare': 'Financial compliance and fiduciary management platform.'
    };
    // Aliases for legacy/abbreviated competitor names in call data
    const _compAliases = { 'wap': 'wapcrm' };
    function getCompMeta(name) {
        if (compMeta[name]) return compMeta[name];
        const lower = name.toLowerCase();
        if (_compMetaLower[lower]) return _compMetaLower[lower];
        if (_compAliases[lower] && _compMetaLower[_compAliases[lower]]) return _compMetaLower[_compAliases[lower]];
        const stripped = lower.replace(/[\s\-()]/g, '');
        if (_compMetaStrip[stripped]) return _compMetaStrip[stripped];
        // Check if name contains a canonical name in parentheses, e.g. "School (Skool)" -> "Skool"
        const paren = name.match(/\(([^)]+)\)/);
        if (paren) {
            const inner = paren[1].toLowerCase();
            if (_compMetaLower[inner]) return _compMetaLower[inner];
            if (_compMetaStrip[inner.replace(/[\s\-()]/g, '')]) return _compMetaStrip[inner.replace(/[\s\-()]/g, '')];
        }
        // Fallback for known unknowns
        const lk = name.toLowerCase();
        if (_unknownCompDesc[lk]) return { short_description: _unknownCompDesc[lk] };
        return { short_description: 'Description not available.' };
    }

    function isNeedsReview(name) {
        return name.toUpperCase() === 'NEEDS_REVIEW';
    }

    function compTier(name, mentionCount) {
        if (getCompMeta(name).type) return 'verified';
        if (mentionCount >= 2) return 'notable';
        return 'noise';
    }

    // Group by competitor (separate active vs excluded)
    const byComp = {};
    const byCompExcluded = {};
    allMentions.forEach(cm => {
        const name = cm.competitor;
        if (isNeedsReview(name)) return;
        const isExcluded = excludedCompetitors.has(name.toLowerCase());
        const target = isExcluded ? byCompExcluded : byComp;
        if (!target[name]) target[name] = { mentions: [], types: new Set(), companies: new Set() };
        target[name].mentions.push(cm);
        target[name].types.add(cm.mention_type);
        if (cm.company) target[name].companies.add(cm.company);
    });

    // Build filter dropdowns (always show all non-excluded competitors, even if filtered out by type)
    buildCompFilterDropdown(Object.keys(byComp));
    const availableTypes = new Set();
    Object.entries(byComp).forEach(([name]) => {
        const type = getCompMeta(name).type || 'unknown';
        availableTypes.add(type);
    });
    buildCompTypeDropdown(availableTypes);

    // Apply competitor name filter and type filter
    let filteredComps = Object.entries(byComp);
    if (activeCompNameFilters.size > 0) {
        filteredComps = filteredComps.filter(([name]) => activeCompNameFilters.has(name.toLowerCase()));
    }
    if (activeCompTypeFilter) {
        filteredComps = filteredComps.filter(([name]) => {
            const type = getCompMeta(name).type || 'unknown';
            return type === activeCompTypeFilter;
        });
    }

    // In default mode, filter out noise (unverified + 1 mention)
    if (!compShowAll) {
        filteredComps = filteredComps.filter(([name, data]) =>
            compTier(name, data.mentions.length) !== 'noise'
        );
    }

    // Sort competitors: verified → notable → noise, then by mention count desc
    const tierRank = { verified: 0, notable: 1, noise: 2 };
    const sortedComps = filteredComps.sort((a, b) => {
        const aTier = compTier(a[0], a[1].mentions.length);
        const bTier = compTier(b[0], b[1].mentions.length);
        if (aTier !== bTier) return tierRank[aTier] - tierRank[bTier];
        return b[1].mentions.length - a[1].mentions.length;
    });
    const activeMentionCount = sortedComps.reduce((sum, [, d]) => sum + d.mentions.length, 0);

    if (sortedComps.length === 0 && Object.keys(byCompExcluded).length > 0) {
        let html = '<div class="comp-empty">All competitor mentions are excluded or filtered out.</div>';
        html += buildExcludedSection(byCompExcluded, 0);
        document.getElementById('competitors-view').innerHTML = html;
        return;
    }

    if (sortedComps.length === 0) {
        document.getElementById('competitors-view').innerHTML =
            '<div class="comp-empty">No competitors match the current filters.</div>';
        return;
    }

    let html = '';

    // Assign stable per-competitor colors (sorted order = color assignment order)
    sortedComps.forEach(([name]) => compColor(name));

    // ========== COMPETITOR OVERVIEW CARDS ==========
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">';
    html += '<div class="seg-section-title" style="margin:0;border:0;padding:0">Competitor Overview</div>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="comp-toggle-btn' + (compShowAll ? '' : ' active') + '" onclick="setCompShowAll(false)">Verified &amp; Notable</button>';
    html += '<button class="comp-toggle-btn' + (compShowAll ? ' active' : '') + '" onclick="setCompShowAll(true)">Show All</button>';
    html += '</div></div>';
    html += '<div class="seg-overview">';
    sortedComps.forEach(([name, data]) => {
        const meta = getCompMeta(name);
        const color = compColor(name);
        const tier = compTier(name, data.mentions.length);
        const tierClass = tier === 'verified' ? ' comp-verified' : tier === 'notable' ? ' comp-notable' : ' comp-noise';
        const descHTML = meta.short_description
            ? '<div class="seg-card-sub" style="margin-top:0.5rem;padding-top:0.4rem;border-top:1px solid #1e2130">' + esc(meta.short_description) + '</div>'
            : '';
        const badge = tier === 'noise' ? '<span class="seg-card-unverified-badge">Unverified</span>' : '';
        const dismissX = '<button class="seg-card-dismiss" onclick="event.stopPropagation();dismissCompetitor(\'' + esc(name).replace(/'/g, "\\'") + '\')" title="Dismiss competitor">&#10005;</button>';
        const hasNewMentions = data.mentions.some(cm => isNewMention(cm));
        html += '<div class="seg-card clickable' + tierClass + '" style="--seg-color:' + color + '" onclick="scrollToCompDetail(\'' + esc(name).replace(/'/g, "\\'") + '\')">' +
            (hasNewMentions ? '<span class="new-dot"></span>' : '') +
            dismissX +
            '<div class="seg-card-name">' + esc(name) + badge + '</div>' +
            '<div class="seg-card-stat">' + data.mentions.length + ' mention' + (data.mentions.length !== 1 ? 's' : '') + '</div>' +
            '<div class="seg-card-sub">from ' + data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y') + '</div>' +
            descHTML +
        '</div>';
    });
    html += '</div>';

    // ========== COLLAPSED NOISE SECTION (default mode only) ==========
    if (!compShowAll) {
        const allComps = Object.entries(byComp);
        const noiseComps = allComps.filter(([name, data]) => compTier(name, data.mentions.length) === 'noise');
        if (noiseComps.length > 0) {
            html += '<div class="comp-noise-section">';
            html += '<button class="comp-noise-toggle" onclick="toggleNoiseSection()">';
            html += '<span id="noise-chevron" style="font-size:0.7rem;transition:transform 0.15s">&#9654;</span>';
            html += 'Other mentions (' + noiseComps.length + ')';
            html += '</button>';
            html += '<div class="comp-noise-grid" id="noise-grid">';
            noiseComps.sort((a, b) => b[1].mentions.length - a[1].mentions.length).forEach(([name, data]) => {
                const color = compColor(name);
                const meta = getCompMeta(name);
                const descHTML = meta.short_description
                    ? '<div class="seg-card-sub" style="margin-top:0.5rem;padding-top:0.4rem;border-top:1px solid #1e2130">' + esc(meta.short_description) + '</div>'
                    : '';
                html += '<div class="seg-card comp-noise" style="--seg-color:' + color + '">' +
                    '<div class="seg-card-name">' + esc(name) + '<span class="seg-card-unverified-badge">Unverified</span></div>' +
                    '<div class="seg-card-stat">' + data.mentions.length + ' mention' + (data.mentions.length !== 1 ? 's' : '') + '</div>' +
                    '<div class="seg-card-sub">from ' + data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y') + '</div>' +
                    descHTML +
                '</div>';
            });
            html += '</div>';
            html += '</div>';
        }
    }

    // ========== COMPETITOR MIX BAR ==========
    if (sortedComps.length > 0) {
        html += '<div class="seg-mix">';
        html += '<div class="seg-section-title">Competitor Mix</div>';
        html += '<div class="seg-mix-bar">';
        sortedComps.forEach(([name, data]) => {
            const pct = activeMentionCount > 0 ? (data.mentions.length / activeMentionCount * 100) : 0;
            const color = compColor(name);
            const shortName = name.split(' ').slice(0, 2).join(' ');
            const label = pct >= 12 ? (shortName + ' ' + Math.round(pct) + '%') : (pct >= 6 ? Math.round(pct) + '%' : '');
            html += '<div class="seg-mix-seg" data-pct="' + pct.toFixed(1) + '" style="background:' + color + '" title="' + esc(name) + ': ' + Math.round(pct) + '% (' + data.mentions.length + ' mention' + (data.mentions.length !== 1 ? 's' : '') + ')">';
            html += '<span>' + esc(label) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        html += '<div class="seg-mix-legend">';
        sortedComps.forEach(([name, data]) => {
            const pct = activeMentionCount > 0 ? Math.round(data.mentions.length / activeMentionCount * 100) : 0;
            const color = compColor(name);
            html += '<div class="seg-mix-legend-item">' +
                '<span class="seg-mix-dot" style="background:' + color + '"></span>' +
                esc(name) + ' ' + pct + '%' +
            '</div>';
        });
        html += '</div>';
        html += '</div>';
    }

    // ========== DETAIL CARDS ==========
    html += '<div>';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">' +
        '<div class="seg-section-title" style="margin:0;border:0;padding:0">Competitor Details</div>' +
        '<button class="expand-btn" onclick="toggleCompExpandAll(this)">' + (compAllExpanded ? 'Collapse All' : 'Expand All') + '</button>' +
        '</div>';
    sortedComps.forEach(([name, data], idx) => {
        const meta = getCompMeta(name);
        const isCanonical = !!meta.type;
        const type = meta.type || 'unknown';
        const color = compColor(name);
        const detailTier = compTier(name, data.mentions.length);
        const detailTierClass = detailTier === 'notable' ? ' comp-notable-detail' : detailTier === 'noise' ? ' comp-noise-detail' : '';
        // If user manually toggled, respect that. Otherwise: top 3 expanded, rest collapsed
        const isCollapsed = compExpandUserSet ? !compAllExpanded : idx >= 3;

        html += '<div class="comp-detail-card' + (isCanonical ? '' : ' comp-unrecognized') + detailTierClass + (isCollapsed ? ' collapsed' : '') + '" data-comp-type="' + esc(type) + '" data-comp-name="' + esc(name) + '" style="--comp-color:' + color + '">';
        html += '<div class="comp-detail-hdr" onclick="toggleCompCard(this)">';
        html += '<span class="comp-collapse-arrow">&#9654;</span>';
        html += '<div class="comp-detail-name">' + esc(name) + '</div>';
        if (isCanonical) {
            const typeLabel = type === 'lms' ? 'LMS' : type === 'diy' ? 'DIY' : type.charAt(0).toUpperCase() + type.slice(1);
            html += '<div class="comp-detail-type type-' + esc(type) + '">' + esc(typeLabel) + '</div>';
        }
        html += '<span style="font-size:0.82rem;color:#555a6e;margin-left:0.5rem">' + data.mentions.length + ' mention' + (data.mentions.length !== 1 ? 's' : '') + '</span>';
        html += '<button class="comp-dismiss-inline" onclick="event.stopPropagation();dismissCompetitor(\'' + esc(name).replace(/'/g, "\\'") + '\')" title="Exclude this competitor">Dismiss</button>';
        html += '</div>';

        // ===== Collapsible body =====
        html += '<div class="comp-detail-body">';

        // Intel section for recognized competitors
        if (isCanonical) {
            html += '<div class="comp-intel">';
            if (meta.description) {
                html += '<div class="comp-intel-desc">' + esc(meta.description) + '</div>';
            }
            if (meta.differentiator) {
                html += '<div class="comp-intel-diff">' + esc(meta.differentiator) + '</div>';
            }
            const typeLabel = type === 'lms' ? 'LMS' : type === 'diy' ? 'DIY' : type.charAt(0).toUpperCase() + type.slice(1);
            html += '<span class="comp-intel-type">' + esc(typeLabel) + '</span>';
            html += '</div>';
        } else {
            html += '<div class="comp-unrecognized-msg">Not in competitor database. Dismiss if not a real competitor.</div>';
        }

        // Sort mentions by date desc
        const sorted = data.mentions.sort((a, b) => (b.call_date || '').localeCompare(a.call_date || ''));
        sorted.forEach(cm => {
            html += '<div class="comp-mention">';
            html += '<div class="comp-mention-meta">';
            html += '<span class="comp-mention-company">' + esc(cm.company || 'Unknown') + '</span>';
            if (cm.segment) {
                const sc = segColor(cm.segment);
                html += '<span class="comp-mention-seg" style="background:' + sc + '22;color:' + sc + '">' + esc(cm.segment) + '</span>';
            }
            html += '<span class="comp-mention-type ' + esc(cm.mention_type) + '">' + esc(MENTION_TYPE_LABELS[cm.mention_type] || cm.mention_type) + '</span>';
            if (cm.call_date) {
                const d = cm.call_date.slice(5, 10).replace('-', '/');
                html += '<span class="comp-mention-ts">' + d + '</span>';
                if (isNewMention(cm)) html += '<span class="new-badge">New</span>';
            }
            html += '</div>';
            if (cm.context) {
                html += '<div class="comp-mention-context">' + esc(cm.context) + '</div>';
            }
            html += '</div>';
        });

        html += '</div>'; // close comp-detail-body
        html += '</div>'; // close comp-detail-card
    });

    // ========== EXCLUDED SECTION ==========
    html += buildExcludedSection(byCompExcluded, sortedComps.length);
    html += '</div>'; // close detail cards wrapper

    document.getElementById('competitors-view').innerHTML = html;

    // Animate mix bar widths (uses same seg-mix-seg class as Personas tab)
    requestAnimationFrame(() => {
        document.querySelectorAll('#competitors-view .seg-mix-seg').forEach(el => {
            el.style.width = el.dataset.pct + '%';
        });
    });
}

function buildExcludedSection(byCompExcluded, visibleCount) {
    const excludedNames = Object.keys(byCompExcluded).sort();
    if (excludedNames.length === 0) return '';
    const total = (visibleCount || 0) + excludedNames.length;
    let html = '<div class="comp-excluded-section">';
    html += '<span class="comp-excluded-summary">Showing ' + (visibleCount || 0) + ' of ' + total + ' competitors. </span>';
    html += '<button class="comp-excluded-toggle" onclick="toggleExcludedList()">' + excludedNames.length + ' hidden.</button>';
    html += '<div class="comp-excluded-list" id="comp-excluded-list">';
    excludedNames.forEach(name => {
        const count = byCompExcluded[name].mentions.length;
        html += '<div class="comp-excluded-item">';
        html += '<span>' + esc(name) + ' <span style="color:#3a3d4e">(' + count + ' mention' + (count !== 1 ? 's' : '') + ')</span></span>';
        html += '<button class="comp-restore-btn" onclick="restoreCompetitor(\'' + esc(name).replace(/'/g, "\\'") + '\')">Restore</button>';
        html += '</div>';
    });
    html += '</div></div>';
    return html;
}

function toggleExcludedList() {
    const list = document.getElementById('comp-excluded-list');
    if (list) list.classList.toggle('open');
}

function scrollToCompDetail(name) {
    const card = document.querySelector('.comp-detail-card[data-comp-name="' + CSS.escape(name) + '"]');
    if (!card) return;
    // Expand if collapsed
    if (card.classList.contains('collapsed')) {
        card.classList.remove('collapsed');
    }
    // Smooth scroll with 20px offset above the card
    const y = card.getBoundingClientRect().top + window.scrollY - 20;
    window.scrollTo({ top: y, behavior: 'smooth' });
    // Flash highlight after scroll settles
    setTimeout(() => {
        card.style.animation = 'compDetailFlash 0.6s ease-out';
        card.addEventListener('animationend', () => { card.style.animation = ''; }, { once: true });
    }, 400);
}

async function dismissCompetitor(name) {
    if (!await checkActionPassword('Dismiss competitor')) return;
    // Fade out the card
    const card = document.querySelector('.comp-detail-card[data-comp-name="' + CSS.escape(name) + '"]');
    if (card) card.classList.add('dismissing');
    await new Promise(r => setTimeout(r, 300));
    try {
        const res = await fetch('/api/exclude-competitor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, action: 'exclude' })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            excludedCompetitors = new Set((data.excluded_competitors || []).map(n => n.toLowerCase()));
            buildCompetitors();
        } else {
            alert('Error: ' + (data.error || 'unknown'));
        }
    } catch (e) {
        excludedCompetitors.add(name.toLowerCase());
        buildCompetitors();
    }
}

async function restoreCompetitor(name) {
    if (!await checkActionPassword('Restore competitor')) return;
    try {
        const res = await fetch('/api/exclude-competitor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, action: 'restore' })
        });
        const data = await res.json();
        if (data.status === 'ok') {
            excludedCompetitors = new Set((data.excluded_competitors || []).map(n => n.toLowerCase()));
            buildCompetitors();
        } else {
            alert('Error: ' + (data.error || 'unknown'));
        }
    } catch (e) {
        // Static file mode — restore in-memory only
        excludedCompetitors.delete(name.toLowerCase());
        buildCompetitors();
    }
}

function switchTab(tab) {
    currentTab = tab;
    updateHash();
    const isReport = (tab === 'reports');
    const isProsp = (tab === 'prospecting');
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('features-view').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('calls-view').style.display = tab === 'calls' ? '' : 'none';
    document.getElementById('personas-view').style.display = tab === 'personas' ? '' : 'none';
    document.getElementById('competitors-view').style.display = tab === 'competitors' ? '' : 'none';
    document.getElementById('reports-view').style.display = tab === 'reports' ? '' : 'none';
    document.getElementById('prospecting-view').style.display = isProsp ? '' : 'none';
    document.getElementById('filter-row').style.display = isProsp ? 'none' : '';
    document.querySelector('.search-box').style.display = (isReport || isProsp || tab === 'personas' || tab === 'competitors') ? 'none' : '';
    document.getElementById('co-dd').style.display = (tab === 'features' || tab === 'personas') ? '' : 'none';
    document.getElementById('seg-dd').style.display = (tab === 'features' || tab === 'calls' || tab === 'personas' || tab === 'competitors') ? '' : 'none';
    document.getElementById('comp-filter-dd').style.display = tab === 'competitors' ? '' : 'none';
    document.getElementById('comp-type-dd').style.display = tab === 'competitors' ? '' : 'none';
    document.getElementById('expand-btn').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('sync-sheets-btn').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('analyze-btn').style.display = tab === 'calls' ? '' : 'none';
    if (tab !== 'calls') showExcludedOnly = false;
    updateExcludedChip();
    document.getElementById('q').value = '';
    closeAllDD();
    filter('');
    if (tab === 'personas') buildPersonas();
    if (tab === 'competitors') buildCompetitors();
    if (tab === 'prospecting') buildProspecting();
}

function filter(q) {
    const low = q.toLowerCase();
    const countEl = document.getElementById('search-result-count');
    const clearBtn = document.getElementById('search-clear');
    if (currentTab === 'features') {
        let visibleCount = 0;
        let totalCount = 0;
        document.querySelectorAll('#features-view .cat-section').forEach(sec => {
            const catMatch = !low || (sec.dataset.cat || '').includes(low);
            let anyCardVisible = false;
            sec.querySelectorAll('.card').forEach(c => {
                totalCount++;
                const vis = !low || catMatch || c.dataset.search.includes(low);
                c.classList.toggle('search-dimmed', !vis);
                c.style.display = '';
                if (vis) { anyCardVisible = true; visibleCount++; }
            });
            sec.classList.toggle('search-dimmed', !anyCardVisible);
            sec.style.display = '';
        });
        if (low && countEl) countEl.textContent = visibleCount + ' of ' + totalCount;
        else if (countEl) countEl.textContent = '';
    } else {
        document.querySelectorAll('#calls-view .card').forEach(c => {
            c.style.display = !low || c.dataset.search.includes(low) ? '' : 'none';
        });
        if (countEl) countEl.textContent = '';
    }
    if (clearBtn) clearBtn.style.display = low ? '' : 'none';
}

function clearSearch() {
    const input = document.getElementById('q');
    input.value = '';
    filter('');
    input.focus();
}

function updateNeedsReviewBanner() {
    const nrFeatures = DATA.mentions.filter(m => m.category === 'NEEDS_REVIEW').length;
    const nrSegments = DATA.calls.filter(c => c.segment === 'NEEDS_REVIEW').length;
    const total = nrFeatures + nrSegments;
    const banner = document.getElementById('nr-banner');
    if (total > 0) {
        document.getElementById('nr-count').textContent = total;
        banner.style.display = '';
    } else {
        banner.style.display = 'none';
    }
}

function updateStats() {
    const m = activeMentions();
    const callIds = new Set(m.map(x => x.call_id));
    const featureNames = new Set(m.map(x => x.keyword));
    const pendingCount = DATA.calls.filter(c => c.pending_analysis).length;
    let pillsHTML =
        '<span class="hdr-pill"><span class="n">' + m.length + '</span><span class="l">mentions</span></span>' +
        '<span class="hdr-pill"><span class="n">' + callIds.size + '</span><span class="l">calls</span></span>' +
        '<span class="hdr-pill"><span class="n">' + featureNames.size + '</span><span class="l">features</span></span>';
    if (pendingCount > 0) {
        pillsHTML += '<span class="hdr-pill" style="border-color:#5a4a20"><span class="n" style="color:#fb923c">' + pendingCount + '</span><span class="l" style="color:#fb923c">pending</span></span>';
    }
    const newCount = getNewCallCount();
    if (newCount > 0) {
        pillsHTML += '<span class="hdr-pill" style="border-color:#1e3a5f"><span class="n" style="color:#60a5fa">' + newCount + '</span><span class="l" style="color:#60a5fa">new</span></span>';
    }
    document.getElementById('hdr-stats').innerHTML = pillsHTML;

    // Tagline: compute date range from visible calls
    const dates = DATA.calls
        .filter(c => callIds.has(c.id) && c.date)
        .map(c => c.date.slice(0, 10))
        .sort();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let tagline = '';
    if (dates.length) {
        const d0 = new Date(dates[0] + 'T00:00:00');
        const d1 = new Date(dates[dates.length - 1] + 'T00:00:00');
        const fmt = d => months[d.getMonth()] + ' ' + d.getDate();
        if (d0.getTime() === d1.getTime()) {
            tagline = fmt(d0) + ', ' + d0.getFullYear();
        } else if (d0.getFullYear() === d1.getFullYear() && d0.getMonth() === d1.getMonth()) {
            tagline = months[d0.getMonth()] + ' ' + d0.getDate() + '\u2013' + d1.getDate() + ', ' + d0.getFullYear();
        } else {
            tagline = fmt(d0) + ' \u2013 ' + fmt(d1) + ', ' + d1.getFullYear();
        }
        tagline += ' \u00b7 ' + callIds.size + ' call' + (callIds.size !== 1 ? 's' : '') + ' analyzed';
    }
    document.getElementById('hdr-tagline').textContent = tagline;
}

// ---- Last visit tracking ----
const TSI_LAST_VISIT_KEY = 'tsi_last_visit';
const _lastVisitRaw = localStorage.getItem(TSI_LAST_VISIT_KEY);
const _lastVisitDate = _lastVisitRaw ? _lastVisitRaw.slice(0, 10) : null;
function isNewCall(call) {
    if (!_lastVisitDate) return false;
    return (call.date || '') > _lastVisitDate;
}
function isNewMention(cm) {
    if (!_lastVisitDate) return false;
    return (cm.call_date || '') > _lastVisitDate;
}
function getNewCallCount() {
    if (!_lastVisitDate) return 0;
    return DATA.calls.filter(c => !c.pending_analysis && isNewCall(c)).length;
}
// Update last visit timestamp after rendering
function recordVisit() { localStorage.setItem(TSI_LAST_VISIT_KEY, new Date().toISOString().slice(0, 10)); }

// Init — parse hash for exclusions, date range, and tab, then build
const initTab = parseHash();
buildDateDropdown();
buildSegmentDropdown();
updateNeedsReviewBanner();
updateStats();
buildFeatures();
buildCalls();
buildPersonas();
buildReport();
switchTab(initTab || 'features');
// Record visit after rendering so "new" indicators are computed against previous visit
setTimeout(recordVisit, 2000);
</script>
