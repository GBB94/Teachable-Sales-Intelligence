        document.getElementById('seg-dd').style.display = 'none';
        return;
    }
    const sorted = [...segs].sort();
    const panel = document.getElementById('seg-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectSegment(this)"><span class="dd-check">&#10003;</span>All Segments</div>';
    html += '<div class="dd-sep"></div>';
    sorted.forEach(seg => {
        const sel = activeSegmentFilters.size === 0 || activeSegmentFilters.has(seg.toLowerCase());
        html += '<div class="dd-item' + (sel && activeSegmentFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(seg) + '" onclick="selectSegment(this)">' +
            '<span class="dd-check">&#10003;</span>' + esc(seg) + '</div>';
    });
    panel.innerHTML = html;
    syncSegmentLabel();
}

function selectSegment(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeSegmentFilters.clear();
        document.querySelectorAll('#seg-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        document.querySelector('#seg-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const seg = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeSegmentFilters.add(seg);
        } else {
            activeSegmentFilters.delete(seg);
        }
        if (activeSegmentFilters.size === 0) {
            document.querySelector('#seg-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncSegmentLabel();
    applySegmentFilter();
    if (currentTab === 'personas') buildPersonas();
}

function syncSegmentLabel() {
    const label = document.getElementById('seg-label');
    const btn = document.querySelector('#seg-dd .dd-btn');
    if (activeSegmentFilters.size === 0) {
        label.textContent = 'Segments';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeSegmentFilters.size + ' selected';
        btn.classList.add('has-filter');
    }
}

function applySegmentFilter() {
    const noFilter = activeSegmentFilters.size === 0;
    // Filter By Call cards
    document.querySelectorAll('#calls-view .card').forEach(card => {
        const seg = card.dataset.segment || '';
        const vis = noFilter || activeSegmentFilters.has(seg);
        card.style.display = vis ? '' : 'none';
    });
    // Filter By Feature cards: show only features from calls matching segment
    const matchingCallIds = new Set();
    if (!noFilter) {
        DATA.calls.forEach(c => {
            if (c.segment && activeSegmentFilters.has(c.segment.toLowerCase())) {
                matchingCallIds.add(c.id);
            }
        });
    }
    document.querySelectorAll('#features-view .cat-section').forEach(sec => {
        let anyVisible = false;
        sec.querySelectorAll('.card').forEach(card => {
            const cardCallIds = (card.dataset.callids || '').split(',').filter(Boolean);
            const vis = noFilter || cardCallIds.some(id => matchingCallIds.has(id));
            card.style.display = vis ? '' : 'none';
            if (vis) anyVisible = true;
        });
        sec.style.display = anyVisible ? '' : 'none';
    });
}

function toggleCard(el) {

}

function toggleSection(el) {

}

async function syncToSheets(btn) {
    btn.disabled = true;
    btn.textContent = 'Syncing...';
    btn.classList.add('scanning');
    try {
        const res = await fetch('/api/sync-sheets', { method: 'POST' });
        const data = await res.json();
        if (data.status === 'ok') {
            btn.textContent = 'Synced: ' + data.rows_added + ' added, ' + data.rows_updated + ' updated';
            btn.classList.remove('scanning');
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.classList.remove('copied'); btn.disabled = false; }, 3000);
        } else {
            btn.textContent = 'Error: ' + (data.message || 'unknown');
            btn.classList.remove('scanning');
            setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.disabled = false; }, 3000);
        }
    } catch (e) {
        btn.textContent = 'Sync failed';
        btn.classList.remove('scanning');
        setTimeout(() => { btn.textContent = 'Sync to Sheets'; btn.disabled = false; }, 3000);
    }
}

async function startScan(btn) {
    // Static file mode: fall back to clipboard
    if (location.protocol === 'file:') {
        const cmd = document.getElementById('calls-view').dataset.scanCmd;
        navigator.clipboard.writeText(cmd).then(() => {
            btn.textContent = 'Command Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Scan for More Calls'; btn.classList.remove('copied'); }, 2000);
        });
        return;
    }

    // Server mode: open modal, start preview fetch
    btn.textContent = 'Scanning...';
    btn.classList.add('scanning');
    btn.disabled = true;

    const overlay = document.getElementById('scan-overlay');
    const body = document.getElementById('scan-modal-body');
    const footer = document.getElementById('scan-modal-footer');
    const title = document.getElementById('scan-modal-title');

    title.textContent = 'Fetching calls from Fireflies...';
    body.innerHTML = '<div class="scan-empty" style="padding:3rem"><span class="scanning" style="display:inline-block;animation:scanPulse 1.2s ease-in-out infinite">Scanning...</span></div>';
    footer.style.display = 'none';
    overlay.classList.add('open');

    try {
        const resp = await fetch('/api/scan/preview');
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Preview failed (' + resp.status + ')');
        }
        const data = await resp.json();
        _scanPreviewCalls = data.calls || [];

        if (_scanPreviewCalls.length === 0) {
            title.textContent = 'No Calls Found';
            body.innerHTML = '<div class="scan-empty">No matching calls found in the last 14 days.</div>';
            footer.style.display = 'none';
        } else {
            title.textContent = 'Select Calls to Process';
            renderScanCallList();
            footer.style.display = 'flex';
            updateScanFooter();
        }
    } catch (err) {
        title.textContent = 'Scan Failed';
        body.innerHTML = '<div class="scan-error">' + esc(err.message) + '</div>';
        footer.style.display = 'none';
    }

    btn.textContent = 'Scan for More Calls';
    btn.classList.remove('scanning');
    btn.disabled = false;
}

function renderScanCallList() {
    const body = document.getElementById('scan-modal-body');
    let html = '';
    _scanPreviewCalls.forEach((c, i) => {
        const checked = !c.already_exists ? 'checked' : '';
        const dupeNote = c.already_exists
            ? '<div class="scan-call-dupe">Already in dashboard</div>' : '';
        html += '<div class="scan-call">' +
            '<input type="checkbox" id="scan-cb-' + i + '" data-call-id="' + esc(c.id) + '" ' + checked +
            ' onchange="updateScanFooter()">' +
            '<label class="scan-call-info" for="scan-cb-' + i + '">' +
                '<div class="scan-call-title">' + esc(c.title) + '</div>' +
                '<div class="scan-call-meta">' + c.date + ' &middot; ' + c.duration + ' min &middot; ' + esc(c.attendees || c.organizer) + '</div>' +
                dupeNote +
            '</label>' +
        '</div>';
    });
    body.innerHTML = html;
}

function updateScanFooter() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const info = document.getElementById('scan-modal-info');
    const btn = document.getElementById('scan-process-btn');
    info.textContent = checks.length + ' of ' + _scanPreviewCalls.length + ' selected';
    btn.disabled = checks.length === 0;
}

async function processSelectedCalls() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const ids = Array.from(checks).map(cb => cb.dataset.callId);

    if (ids.length === 0) return;

    const btn = document.getElementById('scan-process-btn');
    const info = document.getElementById('scan-modal-info');
    btn.textContent = 'Processing...';
    btn.classList.add('processing');
    btn.disabled = true;
    info.textContent = 'Running feature scan on ' + ids.length + ' call' + (ids.length > 1 ? 's' : '') + '...';

    try {
        const resp = await fetch('/api/scan/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ call_ids: ids }),
        });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Processing failed (' + resp.status + ')');
        }
        const newData = await resp.json();

        // Merge new calls into global DATA (dedup by ID)
        const existCallIds = new Set(DATA.calls.map(c => c.id));
        let addedCount = 0;
        (newData.calls || []).forEach(c => {
            if (!existCallIds.has(c.id)) {
                DATA.calls.push(c);
                existCallIds.add(c.id);
                addedCount++;
            }
        });
        // Preserve existing mentions unchanged
        if (newData.mentions) {
            const existMentionKeys = new Set(DATA.mentions.map(m => m.call_id + '|' + m.keyword + '|' + m.ts));
            newData.mentions.forEach(m => {
                const k = m.call_id + '|' + m.keyword + '|' + m.ts;
                if (!existMentionKeys.has(k)) { DATA.mentions.push(m); existMentionKeys.add(k); }
            });
        }

        // Rebuild everything
        updateStats();
        buildFeatures();
        buildCalls();
        if (typeof buildProductReport === 'function') buildProductReport();
        if (typeof buildMarketingReport === 'function') buildMarketingReport();

        btn.textContent = 'Done!';
        btn.classList.remove('processing');
        info.textContent = addedCount + ' call' + (addedCount > 1 ? 's' : '') + ' added (pending analysis).';

        setTimeout(() => { closeScanModal(); }, 1200);
    } catch (err) {
        btn.textContent = 'Failed';
        btn.classList.remove('processing');
        info.textContent = err.message;
        setTimeout(() => {
            btn.textContent = 'Process Selected';
            btn.disabled = false;
        }, 3000);
    }
}

function copyNote(btn, callId) {
    const call = DATA.calls.find(c => c.id === callId);
    if (!call || !call.hubspot_note) return;
    navigator.clipboard.writeText(call.hubspot_note).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    });
}

// ---- Personas tab ----
const SEG_COLORS = {
    'continuing education & credentialing': '#4a9eff',
    'professional training & development': '#4ade80',
    'coaches & consultants': '#a78bfa',
    'industry associations & membership orgs': '#fbbf24',
    'course creators & digital educators': '#f472b6',
    'academic & higher education': '#2dd4bf',
    'corporate education & customer training': '#fb923c',
    'health, wellness & fitness': '#34d399',
    'government & public sector education': '#94a3b8'
};

function segColor(segName) {
    return SEG_COLORS[(segName || '').toLowerCase()] || '#4a7cff';
}

function buildPersonas() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();

    // Check if any segment data exists
    const hasSegmentData = DATA.calls.some(c => c.segment);
    if (!hasSegmentData) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">Segment data not available. Re-run analysis with persona categorization enabled to populate this tab.</div>';
        return;
    }

    // Tag mentions with company
    mentions.forEach(m => { m._co = m._co || getCompany(m, callMap) || reportGetCompany(m, callMap) || ''; });

    // Active date-filtered + non-excluded calls with segments
    const dateIds = activeCallIds();
    const activeCalls = DATA.calls.filter(c =>
        c.segment && !excludedCalls.has(c.id) && dateIds.has(c.id)
    );

    // Apply segment filter
    const noSegFilter = activeSegmentFilters.size === 0;
    const filteredCalls = activeCalls.filter(c =>
        noSegFilter || activeSegmentFilters.has(c.segment.toLowerCase())
    );

    if (filteredCalls.length === 0) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">No calls match the selected filters.</div>';
        return;
    }

    // Group calls by segment
    const segGroups = {};
    filteredCalls.forEach(c => {
        const seg = c.segment;
        if (!segGroups[seg]) segGroups[seg] = { calls: [], companies: new Set(), features: {} };
        segGroups[seg].calls.push(c);
    });

    // Cross-ref mentions with calls to get features per segment and per company
    const filteredCallIds = new Set(filteredCalls.map(c => c.id));
    const filteredMentions = mentions.filter(m => filteredCallIds.has(m.call_id));

    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        const seg = call.segment;
        if (!segGroups[seg]) return;
        const co = m._co || 'Unknown';
        segGroups[seg].companies.add(co);
        if (!segGroups[seg].features[m.keyword]) segGroups[seg].features[m.keyword] = 0;
        segGroups[seg].features[m.keyword]++;
    });

    // Also add companies from calls (even if no feature mentions)
    filteredCalls.forEach(c => {
        const seg = c.segment;
        const callMentions = filteredMentions.filter(m => m.call_id === c.id);
        const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
        if (cos.size === 0) {
            // Fallback: extract from call title
            const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
            if (chevron) cos.add(chevron[1].split(':')[0].trim());
        }
        cos.forEach(co => segGroups[seg].companies.add(co));
    });

    // Sort segments by call count desc
    const sortedSegs = Object.entries(segGroups).sort((a, b) => b[1].calls.length - a[1].calls.length);

    let html = '';

    // ========== SECTION 1: Segment Overview Cards ==========
    html += '<div class="seg-section-title">Segment Overview</div>';
    html += '<div class="seg-overview">';
    sortedSegs.forEach(([seg, data]) => {
        const color = segColor(seg);
        const topFeats = Object.entries(data.features)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3);
        let featsHTML = '';
        if (topFeats.length > 0) {
            featsHTML = '<ul class="seg-card-feats">';
            topFeats.forEach(([f]) => { featsHTML += '<li>' + esc(f) + '</li>'; });
            featsHTML += '</ul>';
        }
        html += '<div class="seg-card" style="--seg-color:' + color + '" onclick="scrollToSegGroup(\'' + esc(seg) + '\')">' +
            '<div class="seg-card-name">' + esc(seg) + '</div>' +
            '<div class="seg-card-stat">' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</div>' +
            '<div class="seg-card-sub">' + data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y') + '</div>' +
            featsHTML +
        '</div>';
    });
    html += '</div>';

    // ========== SECTION 2: Segment Comparison Table ==========
    // Collect all features with 2+ total mentions across ALL segments
    const allFeatureCounts = {};
    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        if (!allFeatureCounts[m.keyword]) allFeatureCounts[m.keyword] = { total: 0, bySegment: {} };
        allFeatureCounts[m.keyword].total++;
        if (!allFeatureCounts[m.keyword].bySegment[call.segment]) allFeatureCounts[m.keyword].bySegment[call.segment] = 0;
        allFeatureCounts[m.keyword].bySegment[call.segment]++;
    });

    const tableFeatures = Object.entries(allFeatureCounts)
        .filter(([, v]) => v.total >= 2)
        .sort((a, b) => b[1].total - a[1].total);

    if (tableFeatures.length > 0 && sortedSegs.length > 1) {
        html += '<div class="seg-section-title" style="margin-top:1rem">Segment Comparison</div>';
        html += '<div class="seg-compare-wrap"><table class="seg-compare">';
        html += '<tr><th>Feature</th>';
        sortedSegs.forEach(([seg]) => {
            html += '<th>' + esc(seg.replace(/ & /g, ' &amp; ').split(' ').slice(0, 3).join(' ')) + '</th>';
        });
        html += '</tr>';

        const INITIAL_ROWS = 15;
        tableFeatures.forEach(([feat, data], idx) => {
            const hidden = idx >= INITIAL_ROWS ? ' style="display:none" class="seg-compare-extra"' : '';
            html += '<tr' + hidden + '><td>' + esc(feat) + '</td>';
            sortedSegs.forEach(([seg]) => {
                const count = data.bySegment[seg] || 0;
                let dots = '';
                if (count >= 3) dots = '<span class="seg-dots">\u25CF\u25CF\u25CF</span>';
                else if (count === 2) dots = '<span class="seg-dots">\u25CF\u25CF</span>';
                else if (count === 1) dots = '<span class="seg-dots">\u25CF</span>';
                html += '<td>' + dots + '</td>';
            });
            html += '</tr>';
        });
        html += '</table>';
        if (tableFeatures.length > INITIAL_ROWS) {
            html += '<button class="seg-show-all" onclick="toggleCompareRows(this)">Show all ' + tableFeatures.length + ' features</button>';
        }
        html += '</div>';
    }

    // ========== SECTION 3: Prospect Cards by Segment ==========
    html += '<div class="seg-section-title" style="margin-top:1rem">Prospects by Segment</div>';

    sortedSegs.forEach(([seg, data], idx) => {
        const color = segColor(seg);
        // Group by company
        const coData = {};
        data.calls.forEach(c => {
            const callMentions = filteredMentions.filter(m => m.call_id === c.id);
            const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
            if (cos.size === 0) {
                const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
                if (chevron) cos.add(chevron[1].split(':')[0].trim());
                else cos.add(c.title || 'Unknown');
            }
            cos.forEach(co => {
                if (!coData[co]) coData[co] = { contacts: [], calls: [], features: [], mentionMap: {} };
                coData[co].calls.push(c);
                callMentions.forEach(m => {
                    if (!coData[co].mentionMap[m.keyword]) {
                        coData[co].mentionMap[m.keyword] = m;
                        coData[co].features.push(m);
                    }
                });
            });
        });

        // Extract contacts from marketing_data
        Object.entries(coData).forEach(([co, d]) => {
            d.calls.forEach(c => {
                if (c.marketing_data && c.marketing_data.contacts) {
                    c.marketing_data.contacts.forEach(ct => {
                        if (!d.contacts.find(x => x.name === ct.name)) d.contacts.push(ct);
                    });
                }
            });
        });

        const coEntries = Object.entries(coData).sort((a, b) => a[0].localeCompare(b[0]));
        const defaultExpanded = sortedSegs.length <= 3 || idx === 0;

        html += '<div class="seg-group' + (defaultExpanded ? '' : ' collapsed') + '" id="seg-group-' + esc(seg.replace(/[^a-z0-9]/gi, '-').toLowerCase()) + '" style="--seg-color:' + color + '">';
        html += '<div class="seg-group-hdr" onclick="this.parentElement.classList.toggle(\'collapsed\')">';
        html += '<span class="seg-group-arrow">&#9654;</span>';
        html += '<span class="seg-group-name">' + esc(seg) + '</span>';
        html += '<span class="seg-group-count">' + coEntries.length + ' compan' + (coEntries.length !== 1 ? 'ies' : 'y') + ' &middot; ' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</span>';
        html += '</div>';
        html += '<div class="seg-group-cards">';

        coEntries.forEach(([co, d]) => {
            html += '<div class="prospect-card" style="--seg-color:' + color + '">';
            html += '<div class="prospect-co">' + esc(co) + '</div>';

            // Contacts
            d.contacts.forEach(ct => {
                html += '<div class="prospect-contact">' + esc(ct.name || '');
                if (ct.title) html += ', ' + esc(ct.title);
                html += '</div>';
            });

            // Calls
            const sortedCalls = d.calls.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            sortedCalls.forEach(c => {
                const dateStr = c.date ? c.date.slice(5).replace('-', '/') : '';
                html += '<div class="prospect-call">';
                if (c.transcript) {
                    html += '<a href="' + esc(c.transcript) + '" target="_blank">' + esc(c.title || 'Call') + '</a>';
                } else {
                    html += esc(c.title || 'Call');
                }
                if (dateStr) html += ' &middot; ' + dateStr;
                html += '</div>';
            });

            // Features
            if (d.features.length > 0) {
                html += '<ul class="prospect-feats">';
                d.features.forEach(m => {
                    html += '<li>' + esc(m.keyword);
                    if (m.link) html += '<a href="' + esc(m.link) + '" target="_blank">' + esc(m.ts || '') + '</a>';
                    html += '</li>';
                });
                html += '</ul>';
            } else {
                html += '<div style="font-size:0.82rem;color:#555a6e;margin-top:0.3rem">No feature requests extracted from this call.</div>';
            }

            html += '</div>';
        });

        html += '</div></div>';
    });

    document.getElementById('personas-view').innerHTML = html;
}

function scrollToSegGroup(seg) {
    const id = 'seg-group-' + seg.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    const el = document.getElementById(id);
    if (el) {
        el.classList.remove('collapsed');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function toggleCompareRows(btn) {
    const rows = document.querySelectorAll('.seg-compare-extra');
    const showing = rows[0] && rows[0].style.display !== 'none';
    rows.forEach(r => { r.style.display = showing ? 'none' : ''; });
    btn.textContent = showing ? 'Show all' : 'Show less';
}

function switchTab(tab) {
    currentTab = tab;
    updateHash();
    const isReport = (tab === 'product' || tab === 'marketing');
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('features-view').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('calls-view').style.display = tab === 'calls' ? '' : 'none';
    document.getElementById('personas-view').style.display = tab === 'personas' ? '' : 'none';
    document.getElementById('product-view').style.display = tab === 'product' ? '' : 'none';
    document.getElementById('marketing-view').style.display = tab === 'marketing' ? '' : 'none';
    document.querySelector('.search-box').style.display = (isReport || tab === 'personas') ? 'none' : '';
    document.getElementById('co-dd').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('seg-dd').style.display = (tab === 'features' || tab === 'calls' || tab === 'personas') ? '' : 'none';
    document.getElementById('expand-btn').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('sync-sheets-btn').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('q').value = '';
    closeAllDD();
    filter('');
    if (tab === 'personas') buildPersonas();
}

function filter(q) {
    const low = q.toLowerCase();
    if (currentTab === 'features') {
        document.querySelectorAll('#features-view .cat-section').forEach(sec => {
            const catMatch = !low || (sec.dataset.cat || '').includes(low);
            let anyCardVisible = false;
            sec.querySelectorAll('.card').forEach(c => {
                const vis = !low || catMatch || c.dataset.search.includes(low);
                c.style.display = vis ? '' : 'none';
                if (vis) anyCardVisible = true;
            });
            sec.style.display = anyCardVisible ? '' : 'none';
        });
    } else {
        document.querySelectorAll('#calls-view .card').forEach(c => {
            c.style.display = !low || c.dataset.search.includes(low) ? '' : 'none';
        });
    }
}

function updateStats() {
    const m = activeMentions();
    const callIds = new Set(m.map(x => x.call_id));
    const featureNames = new Set(m.map(x => x.keyword));
    const pendingCount = DATA.calls.filter(c => c.pending_analysis).length;
    let pillsHTML =
        '<span class="hdr-pill"><span class="n">' + m.length + '</span><span class="l">mentions</span></span>' +
        '<span class="hdr-pill"><span class="n">' + callIds.size + '</span><span class="l">calls</span></span>' +
        '<span class="hdr-pill"><span class="n">' + featureNames.size + '</span><span class="l">features</span></span>';
    if (pendingCount > 0) {
        pillsHTML += '<span class="hdr-pill" style="border-color:#5a4a20"><span class="n" style="color:#fb923c">' + pendingCount + '</span><span class="l" style="color:#fb923c">pending</span></span>';
    }
    document.getElementById('hdr-stats').innerHTML = pillsHTML;

    // Tagline: compute date range from visible calls
    const dates = DATA.calls
        .filter(c => callIds.has(c.id) && c.date)
        .map(c => c.date.slice(0, 10))
        .sort();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let tagline = '';
    if (dates.length) {
        const d0 = new Date(dates[0] + 'T00:00:00');
        const d1 = new Date(dates[dates.length - 1] + 'T00:00:00');
        const fmt = d => months[d.getMonth()] + ' ' + d.getDate();
        if (d0.getTime() === d1.getTime()) {
            tagline = fmt(d0) + ', ' + d0.getFullYear();
        } else if (d0.getFullYear() === d1.getFullYear() && d0.getMonth() === d1.getMonth()) {
            tagline = months[d0.getMonth()] + ' ' + d0.getDate() + '\u2013' + d1.getDate() + ', ' + d0.getFullYear();
        } else {
            tagline = fmt(d0) + ' \u2013 ' + fmt(d1) + ', ' + d1.getFullYear();
        }
        tagline += ' \u00b7 ' + callIds.size + ' call' + (callIds.size !== 1 ? 's' : '') + ' analyzed';
    }
    document.getElementById('hdr-tagline').textContent = tagline;
}

buildDateDropdown();

updateStats();
buildFeatures();

switchTab(initTab || 'features');
