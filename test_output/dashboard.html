<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Request Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    font-size: clamp(16px, 1.1vw, 18px);
    background: #0c0e14;
    color: #d0d3db;
    min-height: 100vh;
}

/* Layout — full width, fluid padding */
.wrap { padding: 2rem clamp(1rem, 4vw, 4rem); }

/* Header */
.hdr {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 1.75rem; flex-wrap: wrap; gap: 0.75rem;
}
.hdr-left { display: flex; flex-direction: column; gap: 0.25rem; }
.hdr h1 { font-size: 2rem; font-weight: 800; color: #ffffff; white-space: nowrap; letter-spacing: -0.02em; }
.hdr-tagline { font-size: 0.85rem; color: #6b7084; }
.hdr-stats {
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
.hdr-pill {
    display: inline-flex; align-items: center; gap: 0.3rem;
    background: #14161e; border: 1px solid #1e2130; border-radius: 20px;
    padding: 0.25rem 0.7rem; font-size: 0.82rem;
}
.hdr-pill .n {
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    color: #f0f1f4;
}
.hdr-pill .l { color: #555a6e; }

/* Tabs */
.tabs {
    display: flex; gap: 0.25rem; margin-bottom: 1rem;
    border-bottom: 1px solid #1e2130;
}
.tab {
    padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 600;
    color: #8b8fa3; cursor: pointer; border-bottom: 2px solid transparent;
    border-radius: 8px 8px 0 0;
    transition: all 0.15s; user-select: none;
}
.tab:hover { color: #c8cad2; background: rgba(255,255,255,0.02); }
.tab.active { color: #f0f1f4; background: #1a1d2e; border-bottom-color: #4a7cff; }

/* Filter row */
.filter-row {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 1.25rem;
}
.filter-row .search-box { width: 280px; min-width: 160px; flex-shrink: 1; }
.filter-row input {
    width: 100%; padding: 0.4rem 0.65rem;
    background: #14161e; border: 1px solid #2a2d40; border-radius: 6px;
    color: #d0d3db; font-family: 'DM Sans', sans-serif; font-size: max(0.82rem, 13px);
    outline: none; transition: border-color 0.15s;
}
.filter-row input:focus { border-color: #4a7cff; }
.filter-row input::placeholder { color: #555a6e; }

/* Dropdown triggers + panels */
.dd-wrap { position: relative; }
.dd-btn {
    display: inline-flex; align-items: center; gap: 0.35rem;
    font-size: 0.82rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 0.4rem 0.7rem; border-radius: 6px;
    background: #14161e; border: 1px solid #2a2d40; color: #9a9db0;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; user-select: none;
}
.dd-btn:hover { border-color: #3a3f5c; color: #c8cad2; }
.dd-btn.open, .dd-btn.has-filter { border-color: #4a7cff; color: #c8cad2; }
.dd-btn .dd-arrow { font-size: 0.65rem; color: #555a6e; transition: transform 0.15s; }
.dd-btn.open .dd-arrow { transform: rotate(180deg); }
.dd-panel {
    display: none; position: absolute; top: calc(100% + 4px); left: 0;
    min-width: 180px; max-height: 320px; overflow-y: auto;
    background: #14161e; border: 1px solid #2a2d40; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45); z-index: 100;
    padding: 0.3rem 0;
}
.dd-panel.open { display: block; }
.dd-item {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.75rem; font-size: 0.82rem; color: #9a9db0;
    cursor: pointer; transition: background 0.1s; user-select: none;
}
.dd-item:hover { background: #1a1d2e; color: #d0d3db; }
.dd-item.selected { color: #f0f1f4; }
.dd-item .dd-check {
    width: 14px; height: 14px; border-radius: 3px;
    border: 1px solid #3a3d50; background: transparent;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 0.65rem; color: transparent; transition: all 0.12s;
}
.dd-item.selected .dd-check {
    background: #4a7cff; border-color: #4a7cff; color: #fff;
}
.dd-sep { height: 1px; background: #1e2130; margin: 0.25rem 0; }
.expand-btn {
    font-size: 0.82rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 0.4rem 0.7rem; border-radius: 6px; margin-left: auto;
    background: #14161e; border: 1px solid #2a2d40; color: #9a9db0;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.expand-btn:hover { border-color: #3a3f5c; color: #c8cad2; }

/* ---- Features view ---- */
#features-view {
    display: flex; flex-direction: column; gap: 0;
}

/* Category accent colors */
.cat-section { --cat-color: #4a7cff; }
.cat-section[data-idx="0"] { --cat-color: #4a7cff; }
.cat-section[data-idx="1"] { --cat-color: #4ade80; }
.cat-section[data-idx="2"] { --cat-color: #a78bfa; }
.cat-section[data-idx="3"] { --cat-color: #fb923c; }
.cat-section[data-idx="4"] { --cat-color: #2dd4bf; }
.cat-section[data-idx="5"] { --cat-color: #f472b6; }
.cat-section[data-idx="6"] { --cat-color: #60a5fa; }
.cat-section[data-idx="7"] { --cat-color: #86efac; }

/* Category section — big gap between sections, tight cards within */
.cat-section { padding-bottom: 1rem; }
.cat-section + .cat-section {
    margin-top: 1.5rem;
    border-top: 1px solid #1e2130;
    padding-top: 1.5rem;
}
.cat-hdr {
    display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.55rem 0.9rem 0.55rem 0.9rem;
    background: #12141c;
    border-left: 5px solid var(--cat-color);
    border-radius: 4px;
    cursor: pointer; user-select: none;
}
.cat-hdr .cat-arrow {
    font-size: 0.55rem; color: #555a6e; transition: transform 0.15s;
    display: inline-block;
}
.cat-section.collapsed .cat-arrow { transform: rotate(0deg); }
.cat-section:not(.collapsed) .cat-arrow { transform: rotate(90deg); }
.cat-name {
    font-size: max(1rem, 13px); font-weight: 600; color: #d0d3db;
}
.cat-count {
    font-size: max(0.8rem, 13px); color: #555a6e;
    font-family: 'JetBrains Mono', monospace; margin-left: auto;
}
.cat-cards {
    columns: 2 480px;
    column-gap: 0.5rem;
    padding: 0.6rem 0 0 1rem;
}
.cat-section.collapsed .cat-cards { display: none; }
.cat-cards .card {
    break-inside: avoid;
    margin-bottom: 0.5rem;
}

/* ---- Calls list (single column, generous padding) ---- */
#calls-view {
    display: flex; flex-direction: column; gap: 0.5rem;
}

/* Week group headers */
.week-hdr {
    display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.6rem 0 0.3rem 0; margin-top: 0.75rem;
    border-bottom: 1px solid #1a1c28;
}
.week-hdr:first-child { margin-top: 0; }
.week-label {
    font-size: max(1rem, 13px); font-weight: 600; color: #d0d3db;
}
.week-meta {
    font-size: max(0.85rem, 13px); color: #8b8fa3;
    font-family: 'JetBrains Mono', monospace;
}

/* Cards (shared) */
.card {
    background: #14161e; border: 1px solid #1e2130; border-radius: 10px;
    overflow: hidden; transition: border-color 0.15s;
}
.card:hover { border-color: #2a2d40; }

.card-hdr {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 0.85rem 1.1rem; cursor: pointer; user-select: none; gap: 1rem;
}
.card-hdr .left { display: flex; align-items: flex-start; gap: 0.5rem; flex: 1; min-width: 0; }
.card-hdr .arrow {
    font-size: 0.55rem; color: #555a6e; transition: transform 0.15s;
    display: inline-block; margin-top: 0.35rem; flex-shrink: 0;
}
.card.open .card-hdr .arrow { transform: rotate(90deg); }
.card-hdr .name-block { flex: 1; min-width: 0; }
.card-hdr .name { font-weight: 700; font-size: max(1.15rem, 13px); color: #f0f1f4; line-height: 1.35; }
.card-hdr .right {
    display: flex; align-items: flex-start; gap: 0.6rem; flex-shrink: 0;
}

/* Count pill (replaces tiny bar chart) */
.cnt-pill {
    font-family: 'JetBrains Mono', monospace; font-size: max(0.85rem, 13px);
    font-weight: 600; color: #b0b4c8;
    background: #1a1d30; border: 1px solid #252a4a; border-radius: 12px;
    padding: 0.2rem 0.65rem; white-space: nowrap;
}

/* Header tags (visible without expanding) */
.hdr-tags {
    display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.35rem;
}

/* Feature tag pills */
.feat-tag {
    display: inline-block; font-size: max(0.85rem, 13px); font-weight: 500;
    padding: 0.2rem 0.6rem; border-radius: 10px;
    background: #1a1d35; color: #7c8aff;
    border: 1px solid #252a4a;
}
/* Requester tag (for By Feature view) */
.req-tag {
    display: inline-block; font-size: max(0.85rem, 13px); font-weight: 500;
    padding: 0.2rem 0.6rem; border-radius: 10px;
    background: #1a2a1e; color: #6bc77a;
    border: 1px solid #254a30;
}

/* Call card right-side meta (date + duration) */
.card-date {
    font-family: 'JetBrains Mono', monospace; font-size: max(0.85rem, 13px);
    color: #8b8fa3; text-align: right; white-space: nowrap;
    line-height: 1.5;
}

/* Mention list */
.mentions { display: none; padding: 0 1.5rem 1rem 2.2rem; }
.card.open .mentions { display: block; }

/* Call cards get extra horizontal breathing room */
#calls-view .mentions { padding: 0 2rem 1.2rem 2.5rem; }

.m-row {
    padding: 0.65rem 0; border-top: 1px solid #1a1c28;
    display: flex; align-items: flex-start; gap: 0.75rem;
}
.m-ts {
    flex-shrink: 0; min-width: 4.2rem; padding-top: 0.05rem;
}
.m-ts a {
    font-family: 'JetBrains Mono', monospace; font-size: max(0.85rem, 13px);
    font-weight: 500;
    padding: 0.2rem 0.5rem; border-radius: 4px;
    color: #4a7cff; text-decoration: none;
    background: #141830; border: 1px solid #253060;
    transition: all 0.12s; display: inline-block;
}
.m-ts a:hover { background: #4a7cff; color: #fff; border-color: #4a7cff; }
.m-ts span {
    font-family: 'JetBrains Mono', monospace; font-size: max(0.85rem, 13px);
    color: #555a6e; padding: 0.2rem 0.5rem;
}

.m-body { flex: 1; min-width: 0; }
.m-call {
    font-size: max(0.9rem, 13px); font-weight: 500; color: #9a9db0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.m-quote {
    font-size: max(0.85rem, 13px); color: #8b8fa3; line-height: 1.5; margin-top: 0.3rem;
    padding-left: 0.75rem;
    border-left: 2px solid #2a2d50;
}
.m-spk { color: #9a9db0; font-weight: 600; }

/* Call card extras */
/* Action bar (top of expanded card content) */
.action-bar {
    display: flex; justify-content: flex-end; gap: 0.4rem;
    padding-bottom: 0.6rem; margin-bottom: 0.2rem;
    border-bottom: 1px solid #1a1c28;
}
.action-btn {
    font-size: max(0.82rem, 13px); font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 0.2rem 0.6rem; border-radius: 6px;
    background: #14161e; border: 1px solid #1e2130; color: #6b7084;
    cursor: pointer; text-decoration: none; white-space: nowrap;
    transition: all 0.12s; line-height: 1.4;
}
.action-btn:hover { background: #1e2130; color: #d0d3db; border-color: #2a2d40; }
.action-btn.copied { background: #1a3a2a; border-color: #2d5a3d; color: #4ade80; }
.call-link {
    font-size: max(0.85rem, 13px); color: #4a7cff; text-decoration: none;
}
.call-link:hover { text-decoration: underline; }

/* Collapsible sections (HubSpot note, transcript) */
.sections-wrap {
    margin-top: 0.75rem; padding-top: 0.6rem;
    border-top: 1px solid #1a1c28;
    display: flex; gap: 0.5rem; flex-direction: column;
}

.section-toggle {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: max(0.85rem, 13px); font-weight: 500; color: #6b7084;
    cursor: pointer; user-select: none; padding: 0.3rem 0;
    transition: color 0.12s;
}
.section-toggle:hover { color: #8b8fa3; }
.section-toggle .arrow {
    font-size: 0.55rem; display: inline-block; transition: transform 0.15s;
}
.section-toggle.open .arrow { transform: rotate(90deg); }
.section-toggle .ico {
    font-size: max(0.85rem, 13px); line-height: 1; opacity: 0.6;
}

.section-body {
    display: none; margin-top: 0.35rem; margin-bottom: 0.5rem;
}
.section-toggle.open + .section-body { display: block; }

.section-pre {
    background: #0c0e14; border: 1px solid #1e2130; border-radius: 8px;
    padding: 0.85rem 1rem; font-family: 'JetBrains Mono', monospace;
    font-size: max(0.85rem, 13px); line-height: 1.6; color: #9a9db0;
    white-space: pre-wrap; word-break: break-word;
}

.section-scroll {
    max-height: 400px; overflow-y: auto;
}

.copy-btn {
    float: right; font-size: max(0.82rem, 13px); font-weight: 500;
    padding: 0.2rem 0.55rem; border-radius: 4px;
    background: #1e2130; border: 1px solid #2a2d40; color: #8b8fa3;
    cursor: pointer; transition: all 0.12s; margin-left: 0.5rem;
}
.copy-btn:hover { background: #2a2d40; color: #f0f1f4; }
.copy-btn.copied { background: #1a3a2a; border-color: #2d5a3d; color: #4ade80; }

/* ---- Weekly Report email preview ---- */
#product-view, #marketing-view {
    max-width: 720px;
}
.report-toolbar {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap;
}
.report-generate {
    font-size: 0.9rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
    padding: 0.5rem 1.25rem; border-radius: 8px;
    background: #4a7cff; border: none; color: #fff;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(74,124,255,0.25);
}
.report-generate:hover { background: #5b8aff; box-shadow: 0 2px 12px rgba(74,124,255,0.35); }
.report-generate.done { background: #1a3a2a; color: #4ade80; box-shadow: none; }
.report-sep { width: 1px; height: 1.4rem; background: #2a2d40; }
.report-btn {
    font-size: 0.85rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 0.45rem 1rem; border-radius: 6px;
    background: #14161e; border: 1px solid #2a2d40; color: #9a9db0;
    cursor: pointer; transition: all 0.15s;
}
.report-btn:hover { background: #1e2130; color: #d0d3db; border-color: #3a3f5c; }
.report-btn.copied { background: #1a3a2a; border-color: #2d5a3d; color: #4ade80; }

.email-card {
    background: #fcfcfc; border-radius: 10px; border: 1px solid #e0e0e0;
    padding: clamp(1.5rem, 4vw, 2.5rem); color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.6;
}
.email-card h1 {
    font-size: 20px; font-weight: 700; color: #111; margin: 0 0 0.15rem;
    letter-spacing: 0.02em;
}
.email-card .email-date { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
/* Feature recap block */
.email-card .recap-block {
    background: #f0f4ff; border-left: 3px solid #4a7cff; border-radius: 4px;
    padding: 1rem 1.2rem; margin: 0.2rem 0 0.4rem;
    color: #2a2e3a; font-size: 15px; line-height: 1.7;
}

.email-card h2 {
    font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase;
    letter-spacing: 0.06em; margin: 1.8rem 0 0.6rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid #e8e8e8;
}
.email-card h2:first-of-type { margin-top: 0; }
.email-card .summary-list { margin: 0; padding: 0 0 0 1.2rem; }
.email-card .summary-list li { margin-bottom: 0.3rem; color: #333; }
.email-card .summary-list li strong { color: #111; }

.email-card .cat-group { margin-bottom: 1.2rem; }
.email-card .cat-title {
    font-size: 15px; font-weight: 600; color: #222; margin-bottom: 0.3rem;
}
.email-card .cat-title .cat-co { font-weight: 400; color: #888; font-size: 13px; }
.email-card .feat-line {
    padding: 0.15rem 0 0.15rem 1rem; color: #444; font-size: 14px;
}
.email-card .feat-line strong { color: #222; }
.email-card .call-links {
    padding-left: 1rem; margin-top: 0.15rem; margin-bottom: 0.2rem;
}
.email-card .call-links a {
    font-size: 13px; color: #4a7cff; text-decoration: none;
}
.email-card .call-links a:hover { text-decoration: underline; }

.email-card .co-line {
    padding: 0.2rem 0 0.2rem 0.2rem; color: #444; font-size: 14px; line-height: 1.5;
}
.email-card .co-line strong { color: #222; }
.email-card .co-line a { color: #4a7cff; text-decoration: none; font-size: 13px; }
.email-card .co-line a:hover { text-decoration: underline; }

/* Excluded call cards */
.card.excluded {
    opacity: 0.4;
}
.card.excluded .card-hdr .name { text-decoration: line-through; }
.card.excluded .mentions { display: none !important; }
.excl-btn {
    font-size: 0.75rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 0.2rem 0.6rem; border-radius: 6px;
    background: transparent; border: 1px solid #2a2d40; color: #6b7084;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.excl-btn:hover { border-color: #ff4a4a; color: #ff4a4a; }
.card.excluded .excl-btn { display: none; }
.incl-btn {
    font-size: 0.75rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 0.2rem 0.6rem; border-radius: 6px;
    background: transparent; border: 1px solid #2a2d40; color: #6b7084;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; display: none;
}
.incl-btn:hover { border-color: #4ade80; color: #4ade80; }
.card.excluded .incl-btn { display: inline-block; }

/* Scan for more calls button */
.scan-row {
    display: flex; justify-content: center; padding: 1.5rem 0 0.5rem;
}
.scan-btn {
    font-size: max(0.85rem, 13px); font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 0.5rem 1.2rem; border-radius: 8px;
    background: #14161e; border: 1px solid #1e2130; color: #6b7084;
    cursor: pointer; transition: all 0.15s;
}
.scan-btn:hover { background: #1e2130; color: #d0d3db; border-color: #2a2d40; }
.scan-btn.copied { background: #1a3a2a; border-color: #2d5a3d; color: #4ade80; }
.scan-btn.scanning { animation: scanPulse 1.2s ease-in-out infinite; }
@keyframes scanPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ---- Scan modal overlay ---- */
.scan-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
}
.scan-overlay.open { display: flex; }
.scan-modal {
    background: #14161e; border: 1px solid #2a2d40; border-radius: 12px;
    width: min(560px, 92vw); max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
}
.scan-modal-hdr {
    padding: 1.25rem 1.5rem; border-bottom: 1px solid #1e2130;
    display: flex; align-items: center; justify-content: space-between;
}
.scan-modal-hdr h2 { font-size: 1.1rem; font-weight: 700; color: #f0f1f4; margin: 0; }
.scan-modal-close {
    background: none; border: none; color: #555a6e; font-size: 1.4rem;
    cursor: pointer; padding: 0 0.3rem; line-height: 1;
}
.scan-modal-close:hover { color: #d0d3db; }
.scan-modal-body {
    padding: 1rem 1.5rem; overflow-y: auto; flex: 1;
}
.scan-modal-footer {
    padding: 1rem 1.5rem; border-top: 1px solid #1e2130;
    display: flex; align-items: center; justify-content: space-between;
}
.scan-modal-info { font-size: 0.82rem; color: #555a6e; }
.scan-process-btn {
    font-size: 0.9rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
    padding: 0.5rem 1.5rem; border-radius: 8px;
    background: #4a7cff; border: none; color: #fff;
    cursor: pointer; transition: all 0.15s;
}
.scan-process-btn:hover { background: #5b8aff; }
.scan-process-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.scan-process-btn.processing { animation: scanPulse 1.2s ease-in-out infinite; }

/* Call list items in modal */
.scan-call {
    display: flex; align-items: flex-start; gap: 0.75rem;
    padding: 0.7rem 0; border-bottom: 1px solid #1a1c28;
}
.scan-call:last-child { border-bottom: none; }
.scan-call input[type="checkbox"] {
    margin-top: 0.25rem; flex-shrink: 0;
    accent-color: #4a7cff; width: 16px; height: 16px; cursor: pointer;
}
.scan-call-info { flex: 1; min-width: 0; }
.scan-call-title { font-size: 0.92rem; font-weight: 600; color: #f0f1f4; }
.scan-call-meta {
    font-size: 0.78rem; color: #6b7084; margin-top: 0.15rem;
    font-family: 'JetBrains Mono', monospace;
}
.scan-call-dupe {
    font-size: 0.72rem; color: #fb923c; font-weight: 500; margin-top: 0.15rem;
}
.scan-empty {
    text-align: center; padding: 2rem; color: #555a6e; font-size: 0.9rem;
}
.scan-error {
    text-align: center; padding: 1.5rem; color: #e74c3c; font-size: 0.9rem;
}

/* ---- Responsive breakpoints ---- */

/* Large screens 1400px+ : feature cards can do 3 columns */
@media (min-width: 1400px) {
    .cat-cards { columns: 3; }
}

/* Narrow screens under 900px : single column everything */
@media (max-width: 900px) {
    .wrap { padding: 1.5rem clamp(0.75rem, 3vw, 2rem); }
    .cat-cards { columns: 1; }
    .mentions { padding: 0 1rem 0.85rem 1.5rem; }
    #calls-view .mentions { padding: 0 1rem 1rem 1.5rem; }
}

/* Very narrow / mobile */
@media (max-width: 600px) {
    .wrap { padding: 1rem 0.75rem; }
    .hdr { flex-direction: column; gap: 0.5rem; }
    .hdr-stats { justify-content: flex-start; }
    .search { width: 100%; }
    .card-hdr { flex-direction: column; gap: 0.5rem; padding: 0.75rem; }
    .card-hdr .right { align-self: flex-end; }
    .mentions { padding: 0 0.75rem 0.75rem 1.2rem; }
    #calls-view .mentions { padding: 0 0.75rem 0.75rem 1.2rem; }
}
</style>
</head>

ng on it \u2014 is what we're calling learning paths. A way for you to group multiple courses, give them a very specific order and create rules.", "ts": "~08:00", "ts_sec": 480, "link": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX?t=480", "transcript": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX"}, {"mention_id": "c2f9676c5696", "call_id": "01KH4P5ZAKDS06QNRRA8PWX3ZX", "call_title": "Teachable Learning Paths/Quizzes", "call_date": "2026-02-11", "speaker": "Anne Blocker (ESI)", "company": "", "contact_title": "", "keyword": "Quiz / Assessment Reporting", "category": "Assessments & Quizzes", "confidence": null, "type": "prospect_request", "text": "In SurveyMonkey, I can dissect that data so I can say, oh, look, 50% missed question two. What did they miss? And were they all picking the same wrong answer? There's just not good segmentation of the data.", "ts": "~15:00", "ts_sec": 900, "link": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX?t=900", "transcript": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX"}, {"mention_id": "a251ea9281c7", "call_id": "01KH4P5ZAKDS06QNRRA8PWX3ZX", "call_title": "Teachable Learning Paths/Quizzes", "call_date": "2026-02-11", "speaker": "Anne Blocker (ESI)", "company": "", "contact_title": "", "keyword": "Certificate Automation", "category": "Compliance & Credentialing", "confidence": null, "type": "prospect_request", "text": "The most ideal certificate is one that we can customize so it doesn't just say congratulations. If it's from the Academy, I can put in this many CE credits. And if they could type their name and their license number and it auto filled \u2014 that'd be like the Taj Mahal.", "ts": "~28:00", "ts_sec": 1680, "link": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX?t=1680", "transcript": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX"}, {"mention_id": "baa6149c22f4", "call_id": "01KH4P5ZAKDS06QNRRA8PWX3ZX", "call_title": "Teachable Learning Paths/Quizzes", "call_date": "2026-02-11", "speaker": "Anne Blocker (ESI)", "company": "", "contact_title": "", "keyword": "Reporting Data Export (CSV)", "category": "Reporting & Analytics", "confidence": null, "type": "prospect_request", "text": "I can see what the teachable sales are, but when I want to bring it back into QuickBooks I only can bring it back as a dollar amount. I have to go into Teachable and download spreadsheets and try to figure out what courses.", "ts": "~12:00", "ts_sec": 720, "link": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX?t=720", "transcript": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX"}, {"mention_id": "5e637a4486be", "call_id": "01KH4P5ZAKDS06QNRRA8PWX3ZX", "call_title": "Teachable Learning Paths/Quizzes", "call_date": "2026-02-11", "speaker": "Anne Blocker (ESI)", "company": "", "contact_title": "", "keyword": "Learner File Upload to Coaches", "category": "User Management", "confidence": null, "type": "prospect_request", "text": "The client has to kind of upload a PowerPoint or a PowerPoint with voice for us. And they're going to be able to do that interactive piece. And they have a pretty robust kind of grading booklet.", "ts": "~23:00", "ts_sec": 1380, "link": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX?t=1380", "transcript": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX"}, {"mention_id": "784ffc6b6aa1", "call_id": "01KH4P5ZAKDS06QNRRA8PWX3ZX", "call_title": "Teachable Learning Paths/Quizzes", "call_date": "2026-02-11", "speaker": "Anne Blocker (ESI)", "company": "", "contact_title": "", "keyword": "Community Features", "category": "Platform & Integrations", "confidence": null, "type": "prospect_interest", "text": "I love your discussion chats. I love how you can have those either in a module or you could have it all in one place. My instructors can go in and they can preload all those prompts in those sessions. That is a feature that works super well.", "ts": "~10:00", "ts_sec": 600, "link": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX?t=600", "transcript": "https://app.fireflies.ai/view/01KH4P5ZAKDS06QNRRA8PWX3ZX"}], "calls": [{"id": "01KGG6JGCKPY1XHBX459A0TJK6", "title": "Teachable <> Speravita: Organizations Review", "date": "2026-02-09", "duration": 1, "organizer": "zach.mccall@teachable.com", "attendees": "", "transcript": "https://app.fireflies.ai/view/01KGG6JGCKPY1XHBX459A0TJK6", "hubspot_note": "CALL DATE: 2026-02-09\nATTENDEES: Jennifer Roush (Speravita), Kristina Edelman, Liselle, Zach McCall, Lennie Zhu (Product), Sarah Dean (Product)\nCOMPANY: Speravita\nSTAGE: Evaluation / Product Deep Dive\n\n---\nSUMMARY\nProduct-focused call with Speravita (nonprofit serving pregnancy resource centers). They have 115 centers with three learning tracks (executive, medical, patient resources). Discussed org nesting, learning paths, and bundles as solutions for their multi-track, multi-center training model. Product team (Lennie + Sarah) provided direct input on roadmap.\n\n---\nUSE CASE\nPrimary goal: Online training platform for pregnancy resource centers\nAudience: Center staff across 3 tracks \u2014 executive directors, medical, patient resources\nBusiness model: B2B nonprofit training sold to organizations\nContent types: Recorded Zoom training, ebooks, live coaching webinars\nScale: 115 centers, 3-6 trained per cohort, minimum 3 participants per center\n\n---\nTECHNICAL REQUIREMENTS\nOrganizations: Need subgroups/nesting \u2014 centers with teams within them. Tags for regions and 'centers of distinction'\nLearning paths: Three ordered learning tracks per center (exec, medical, patient resources)\nAccess duration: Time-limited access per enrollment (e.g., 2 months)\nReporting: Per-center, per-student progress tracking. Year-end aggregate reporting nice-to-have\nCommunity: Interest in online community for cross-center engagement\n\n---\nPRODUCT ROADMAP SHARED\n- Learning paths: Another team building in Q1, essentially what they need\n- Org hings that you talked about, what we're focused on.\nJonathan Corvin-Blackburn (he  him): So yeah, it was super helpful.\nAnne Blocker: What's your time frame, do you think?\nJonathan Corvin-Blackburn (he  him): So we're focused on learning paths now.\nJonathan Corvin-Blackburn (he  him): That's something we're building out currently.\nJonathan Corvin-Blackburn (he  him): Next up is going to be quizzes and I think we're going to try to start with kind of just like simple, easy things, like new question types, things that you mentioned, like importing and exporting probably would fit in that.\nJonathan Corvin-Blackburn (he  him): Probably we'd start development in that around April Ish.\nJonathan Corvin-Blackburn (he  him): I think.\nJonathan Corvin-Blackburn (he  him): And hopefully some of them are pretty quick stuff so it doesn't take too long.\nJonathan Corvin-Blackburn (he  him): But then we want to go even further and really see how you can have great interactive quiz experiences with students.\nJonathan Corvin-Blackburn (he  him): So that would probably be later in the year.\nJonathan Corvin-Blackburn (he  him): And then certificates, we have to dig in a bit to like all the improvements we want to make there.\nJonathan Corvin-Blackburn (he  him): But I definitely see that happening like this summer.\nAnne Blocker: Okay.\nAnne Blocker: I love that you have video and digital downloads for sale and that they're segmented off and learn worlds.\nAnne Blocker: They do not have that.\nAnne Blocker: And I mean you do if you do some funky workaround, but it's really not.\nAnne Blocker: And I like that.\nAnne Blocker: And you have that, and it's broken out, and it lays out nice.\nAnne Blocker: And I really appreciate that.\nJonathan Corvin-Blackburn (he  him): Great.\nJonathan Corvin-Blackburn (he  him): Glad to hear that.\nAnne Blocker: Well, thank you.\nJonathan Corvin-Blackburn (he  him): Yeah, thanks.\nJonathan Corvin-Blackburn (he  him): This is super helpful, and I hope, you know, definitely follow up with Zach.\nJonathan Corvin-Blackburn (he  him): If there's anything else we can do.\nJonathan Corvin-Blackburn (he  him): We want to keep you going.\nAnne Blocker: Well, thank you.\nAnne Blocker: Have a great day.\nJonathan Corvin-Blackburn (he  him): Thanks.\nJonathan Corvin-Blackburn (he  him): You, too.\nAnne Blocker: Bye.\nJonathan Corvin-Blackburn (he  him): Bye.", "hubspot_note": "CALL DATE: 2026-02-11\nATTENDEES: Anne Blocker (ESI), Zach McCall, Jonathan Corvin-Blackburn (Product Designer, Learning Experience team)\nCOMPANY: ESI (Eating Smart International / nutrition education nonprofit)\nSTAGE: Retention / Feature Review\n\n---\nSUMMARY\nRetention call with long-time Teachable customer (since ~2017-2019). Currently on two platforms \u2014 Teachable and Learn Worlds. Anne gave extensive feedback on quiz limitations, certificate customization, and learning path needs. Jonathan (product designer) confirmed these are top 3 priorities for his team. Anne's org did $18K in revenue on Teachable last year.\n\n---\nUSE CASE\nPrimary goal: CE credit courses for nutrition/dietetics professionals\nAudience: Nutritionists, dietitians \u2014 need continuing education credits from Academy of Nutrition & Dietetics\nBusiness model: Small nonprofit, mostly volunteers, growing online revenue\nContent types: Webinar recordings, self-studies, quizzes, evaluations, certificate programs\nScale: Individual learners + occasional organization bulk purchases\n\n---\nQUIZ FEATURE REQUESTS\n- Question bank: Reuse questions across multiple quizzes\n- CSV import/export: Edit questions in spreadsheet, re-upload\n- New question types: True/false, matching, star rating, thumbs up/down, weighted questions\n- Quiz analytics: Which questions people miss, which wrong answers they pick\n- Currently forced to use SurveyMonkey for evaluations because quiz is too limited\n\n---\nCERTIFICATE REQUESTS\n- Custom fields: CE credit hours, license number auto-fill\n let currentTab = 'features';
let excludedCalls = new Set();
let activeDateRange = 'all';

// Parse hash: #calls&exclude=id1,id2 or #features&exclude=id1,id2
function parseHash() {
    const raw = location.hash.replace('#', '');
    const parts = raw.split('&');
    let tab = '';
    parts.forEach(p => {
        if (p.startsWith('exclude=')) {
            p.slice(8).split(',').filter(Boolean).forEach(id => excludedCalls.add(id));
        } else if (p.startsWith('range=')) {
            activeDateRange = p.slice(6);
        } else if (['features', 'calls', 'product', 'marketing'].includes(p)) {
            tab = p;
        }
    });
    return tab;
}

function updateHash() {
    let h = currentTab;
    if (activeDateRange !== 'all') h += '&range=' + activeDateRange;
    if (excludedCalls.size) h += '&exclude=' + [...excludedCalls].join(',');
    location.hash = h;
}

// Date range filter — returns {start, end} Date objects or null for "all"
function getDateRange() {
    if (activeDateRange === 'all') return null;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const day = today.getDay(); // 0=Sun
    const diffToMon = day === 0 ? 6 : day - 1;
    const thisMonday = new Date(today);
    thisMonday.setDate(today.getDate() - diffToMon);
    if (activeDateRange === 'this-week') return { start: thisMonday, end: new Date(now.getTime() + 86400000) };
    if (activeDateRange === 'last-week') {
        const lastMon = new Date(thisMonday);
        lastMon.setDate(thisMonday.getDate() - 7);
        return { start: lastMon, end: thisMonday };
    }
    if (activeDateRange === 'last-2-weeks') {
        const twoWeeksAgo = new Date(thisMonday);
        twoWeeksAgo.setDate(thisMonday.getDate() - 7);
        return { start: twoWeeksAgo, end: new Date(now.getTime() + 86400000) };
    }
    if (activeDateRange === 'last-30-days') {
        const thirtyAgo = new Date(today);
        thirtyAgo.setDate(today.getDate() - 30);
        return { start: thirtyAgo, end: new Date(now.getTime() + 86400000) };
    }
    return null;
}

function isCallInRange(callDate) {
    const range = getDateRange();
    if (!range) return true;
    const d = new Date(callDate + 'T00:00:00');
    return d >= range.start && d < range.end;
}

// Set of call IDs that pass the date filter
function activeCallIds() {
    const ids = new Set();
    DATA.calls.forEach(c => {
        if (isCallInRange(c.date || '2000-01-01')) ids.add(c.id);
    });
    return ids;
}

// Get active (non-excluded, date-filtered) mentions
function activeMentions() {
    const dateIds = activeCallIds();
    return DATA.mentions.filter(m => !excludedCalls.has(m.call_id) && dateIds.has(m.call_id));
}

function toggleExclude(callId) {
    if (excludedCalls.has(callId)) {
        excludedCalls.delete(callId);
    } else {
        excludedCalls.add(callId);
    }
    updateHash();
    // Update the card's visual state
    const card = document.querySelector('#calls-view .card[data-callid="' + callId + '"]');
    if (card) card.classList.toggle('excluded', excludedCalls.has(callId));
    // Rebuild other views and stats
    buildFeatures();
    buildProductReport();
    buildMarketingReport();
    updateStats();
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function extractCompany(attendeeStr) {
    if (!attendeeStr) return '';
    const parts = attendeeStr.split(',').map(s => s.trim()).filter(Boolean);
    const external = parts.filter(p => !p.toLowerCase().includes('teachable'));
    return external.join(', ');
}

function tsLink(m) {
    if (m.link) return '<a href="' + esc(m.link) + '" target="_blank" title="Jump to this moment in the recording">' + esc(m.ts || '0:00') + '</a>';
    if (m.transcript) return '<a href="' + esc(m.transcript) + '" target="_blank">' + (m.ts || 'open') + '</a>';
    return '<span>' + esc(m.ts || '--') + '</span>';
}

function mentionHTML(m, showFeature) {
    let tag = showFeature ? '<span class="feat-tag">' + esc(m.keyword) + '</span> ' : '';
    return '<div class="m-row">' +
        '<div class="m-ts">' + tsLink(m) + '</div>' +

}

// ---- Features view (grouped by category) ----
function buildFeatureCard(kw, mentions, callMap, companies) {
    const mSorted = mentions.sort((a, b) => (b.call_date || '').localeCompare(a.call_date || ''));

    const reqSet = new Set();
    mentions.forEach(m => {
        const call = callMap[m.call_id];
        if (call && call.attendees) {
            const ext = extractCompany(call.attendees);
            if (ext) ext.split(',').map(s => s.trim()).filter(Boolean).forEach(name => reqSet.add(name));
        }
        if (m.speaker && !m.speaker.toLowerCase().includes('unknown')) {
            reqSet.add(m.speaker);
        }
    });
    const reqTags = [...reqSet].slice(0, 6).map(r => '<span class="req-tag">' + esc(r) + '</span>').join('');

    let mHTML = '';
    mSorted.forEach(m => { mHTML += mentionHTML(m, false); });

    const countLabel = mentions.length === 1 ? '1 mention' : mentions.length + ' mentions';

    return '<div class="card" data-companies="' + esc((companies || []).join(',').toLowerCase()) + '" data-search="' + esc(kw.toLowerCase()) + ' ' + esc(mentions.map(m => m.speaker + ' ' + m.call_title + ' ' + m.text).join(' ').toLowerCase()) + ' ' + esc([...reqSet].join(' ').toLowerCase()) + '">' +
        '<div class="card-hdr" onclick="toggleCard(this)">' +
            '<div class="left"><span class="arrow">&#9654;</span>' +
                '<div class="name-block">' +
                    '<div class="name">' + esc(kw) + '</div>' +
                    (reqTags ? '<div class="hdr-tags">' + reqTags + '</div>' : '') +
                '</div>' +
            '</div>' +
            '<div class="right"><span class="cnt-pill">' + countLabel + '</span></div>' +
        '</div>' +
        '<div class="mentions">' + mHTML + '</div></div>';
}

// ---- Week grouping helpers ----
function getWeekStart(dateStr) {
    // Returns Monday 00:00 of the week containing dateStr
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDay(); // 0=Sun
    const diff = day === 0 ? 6 : day - 1; // shift so Mon=0
    d.setDate(d.getDate() - diff);
    return d;
}

function fmtShortDate(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
}

function weekLabel(weekStart) {
    const now = new Date();
    const thisWeekStart = getWeekStart(now.toISOString().slice(0,10));
    const lastWeekStart = new Date(thisWeekStart);
    lastWeekStart.setDate(lastWeekStart.getDate() - 7);

    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 4); // Friday

    const range = fmtShortDate(weekStart) + ' – ' + fmtShortDate(weekEnd);

    if (weekStart.getTime() === thisWeekStart.getTime()) return 'This Week (' + range + ')';
    if (weekStart.getTime() === lastWeekStart.getTime()) return 'Last Week (' + range + ')';
    return range;
}

// ---- Shared report helpers ----
function reportGetCompany(m, callMap) {
    const spk = m.speaker || '';
    const paren = spk.match(/\(([^)]+)\)/);
    if (paren) {
        const raw = paren[1].split('/')[0].trim();
        const call = callMap[m.call_id];
        const title = call ? call.title : '';
        const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
        if (chevron) return chevron[1].trim();
        if (title.toLowerCase().includes('speravita')) return 'Speravita';
        if (title.toLowerCase().includes('dot compliance')) return 'Dot Compliance';
        if (title.toLowerCase().includes('lta') || raw.toLowerCase().includes('lta') ||
            spk.toLowerCase().includes('hui ching') || spk.toLowerCase().includes('kai shan')) return 'LTA';
        if (raw === 'Simon Davey') return 'Simon Davey';
        if (raw === 'Simon' || raw === 'Sabine' || raw === 'Katrina') return 'Simon & Sabine (Coaching)';
        if (raw === 'Ibrahim' || raw === 'Bryan' || raw === 'Oghenetejiri') return 'Dot Compliance';
        if (raw === 'Hui Ching' || raw === 'Kai Shan') return 'LTA';
        return raw;
    }
    return '';
}
function reportFmtTs(sec) {
    if (sec == null) return '';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}
function reportWeekRange(weekStart) {
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 4);
    return fmtShortDate(weekStart) + ' \u2013 ' + fmtShortDate(end) + ', ' + weekStart.getFullYear();
}
function reportToolbar(viewId) {
    return '<div class="report-toolbar">' +
        '<button class="report-generate" onclick="generateReports(this)">Generate Report</button>' +
        '<div class="report-sep"></div>' +
        '<button class="report-btn" onclick="copyReportHTML(\'' + viewId + '\', this)">Copy Email HTML</button>' +
        '<button class="report-btn" onclick="copyReportPlain(\'' + viewId + '\', this)">Copy Plain Text</button>' +
    '</div>';
}

// ---- Product Report builder ----
function buildProductReport() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();
    const coSummaries = DATA.company_summaries || {};

    // Tag each mention with company
    mentions.forEach(m => { m._co = reportGetCompany(m, callMap); });

    // Date range from active calls
    const callIdsWithMentions = new Set(mentions.map(m => m.call_id));
    const activeCalls = DATA.calls.filter(c => callIdsWithMentions.has(c.id) && !excludedCalls.has(c.id));
    const dates = activeCalls.map(c => c.date).filter(Boolean).sort();
    const dateRange = dates.length
        ? fmtShortDate(new Date(dates[0] + 'T00:00:00')) + ' \u2013 ' + fmtShortDate(new Date(dates[dates.length - 1] + 'T00:00:00')) + ', ' + dates[0].slice(0, 4)
        : '';

    // Companies map (across all calls, not per-week)
    const coMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        if (!coMap[co]) coMap[co] = { features: new Set(), calls: new Map() };
        coMap[co].features.add(m.keyword);
        if (!coMap[co].calls.has(m.call_id)) coMap[co].calls.set(m.call_id, callMap[m.call_id]);
    });
    const companies = Object.entries(coMap).sort((a, b) => b[1].features.size - a[1].features.size);

    // Features by category (across all calls)
    const catMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        const cat = m.category || 'Other';
        if (!catMap[cat]) catMap[cat] = {};
        if (!catMap[cat][m.keyword]) catMap[cat][m.keyword] = [];
        catMap[cat][m.keyword].push({ company: co, tsDisplay: reportFmtTs(m.ts_sec), link: m.link || '' });
    });
    const catEntries = Object.entries(catMap).map(([cat, feats]) => {
        let total = 0;
        const coSet = new Set();
        Object.values(feats).forEach(arr => { total += arr.length; arr.forEach(e => coSet.add(e.company)); });
        return { cat, feats, total, coCount: coSet.size };
    }).sort((a, b) => b.total - a.total);

    // Top theme for summary
    const topTheme = catEntries.length ? catEntries[0] : null;

    // ---- HTML ----
    let h = '<h1>PRODUCT INTELLIGENCE REPORT</h1>';
    h += '<div class="email-date">Week of ' + esc(dateRange) + '</div>';

    // SUMMARY
    h += '<h2>Summary</h2>';
    h += '<ul class="summary-list">';
    h += '<li>' + activeCalls.length + ' sales call' + (activeCalls.length !== 1 ? 's' : '') + ' this week</li>';
    h += '<li>' + mentions.length + ' feature request' + (mentions.length !== 1 ? 's' : '') + ' identified across ' + companies.length + ' prospect' + (companies.length !== 1 ? 's' : '') + '</li>';
    if (topTheme) {
        h += '<li>Top theme: <strong>' + esc(topTheme.cat) + '</strong> (' + topTheme.total + ' mention' + (topTheme.total !== 1 ? 's' : '') + ', ' + topTheme.coCount + ' compan' + (topTheme.coCount !== 1 ? 'ies' : 'y') + ')</li>';
    }
    h += '</ul>';

    // FEATURE RECAP
    h += '<h2>Feature Recap</h2>';
    if (DATA.recap) {
        h += '<div class="recap-block">' + DATA.recap.replace(/\n/g, '<br>') + '</div>';
    } else {
        h += '<div class="recap-block"><em>Run analysis to generate the feature recap narrative.</em></div>';
    }

    // CUSTOMERS THIS WEEK
    h += '<h2>Customers This Week</h2>';
    companies.forEach(([name, d]) => {
        const summary = coSummaries[name] || '';
        let links = [];
        d.calls.forEach(c => {
            if (c && c.transcript) {
                const ds = c.date ? c.date.slice(5).replace('-', '/') : '';
                links.push('<a href="' + esc(c.transcript) + '" target="_blank">Call (' + ds + ')</a>');
            }
        });
        h += '<div class="co-line"><strong>' + esc(name) + '</strong>';
        if (summary) h += ' \u2014 ' + esc(summary);
        if (links.length) h += ' \u2192 ' + links.join(', ');
        h += '</div>';
    });

    // FEATURE THEMES
    h += '<h2>Feature Themes</h2>';
    catEntries.forEach(ce => {
        h += '<div class="cat-group">';
        h += '<div class="cat-title">' + esc(ce.cat) + ' <span class="cat-co">(' + ce.coCount + ' compan' + (ce.coCount !== 1 ? 'ies' : 'y') + ')</span></div>';
        Object.entries(ce.feats).sort((a, b) => b[1].length - a[1].length).forEach(([feat, entries]) => {
            const byCompany = {};
            entries.forEach(e => { if (!byCompany[e.company]) byCompany[e.company] = []; byCompany[e.company].push(e); });
            const parts = Object.entries(byCompany).map(([co, es]) => {
                const e = es[0];
                if (e.link && e.tsDisplay) return esc(co) + ' (<a href="' + esc(e.link) + '" target="_blank">' + esc(e.tsDisplay) + '</a>)';
                if (e.tsDisplay) return esc(co) + ' (' + esc(e.tsDisplay) + ')';
                return esc(co);
            });
            h += '<div class="feat-line">\u2013 <strong>' + esc(feat) + '</strong> \u2014 ' + parts.join(' \u00b7 ') + '</div>';
        });
        h += '</div>';
    });

    // ---- Plain text ----
    let plain = 'PRODUCT INTELLIGENCE REPORT\nWeek of ' + dateRange + '\n';
    plain += '\nSUMMARY\n';
    plain += '- ' + activeCalls.length + ' sales calls this week\n';
    plain += '- ' + mentions.length + ' feature requests identified across ' + companies.length + ' prospects\n';
    if (topTheme) plain += '- Top theme: ' + topTheme.cat + ' (' + topTheme.total + ' mentions, ' + topTheme.coCount + ' companies)\n';
    plain += '\nFEATURE RECAP\n' + (DATA.recap || '(Not yet generated)') + '\n';
    plain += '\nCUSTOMERS THIS WEEK\n';
    companies.forEach(([name, d]) => {
        plain += '- ' + name + (coSummaries[name] ? ' — ' + coSummaries[name] : '') + '\n';
    });
    plain += '\nFEATURE THEMES\n';
    catEntries.forEach(ce => {
        plain += ce.cat + ' (' + ce.coCount + ' companies)\n';
        Object.entries(ce.feats).sort((a, b) => b[1].length - a[1].length).forEach(([feat, entries]) => {
            const byCompany = {};
            entries.forEach(e => { if (!byCompany[e.company]) byCompany[e.company] = []; byCompany[e.company].push(e); });
            const parts = Object.entries(byCompany).map(([co, es]) => {
                const ts = es[0].tsDisplay || '';
                return ts ? co + ' (' + ts + ')' : co;
            });
            plain += '  - ' + feat + ' — ' + parts.join(' · ') + '\n';
        });
    });

    // Render
    const wrap = document.getElementById('product-view');
    wrap.innerHTML = reportToolbar('product-view') +
        '<div class="email-card" id="product-email">' + h + '</div>';
    wrap.dataset.plainText = plain;
}

    });
    if (!(mkt.success_metrics || []).length) plain += 'No data from this week\'s calls.\n';

    plain += '\nWEEKLY SUMMARY\n';
    plain += callsWithFeatures.length + ' prospect calls this week\n';
    if (mkt.weekly_summary) {
        (mkt.weekly_summary.patterns || []).forEach(p => { plain += '- Pattern: ' + p + '\n'; });
        (mkt.weekly_summary.surprising_insights || []).forEach(s => { plain += '- Insight: ' + s + '\n'; });
    }

    // Render
    const wrap = document.getElementById('marketing-view');
    wrap.innerHTML = reportToolbar('marketing-view') +
        '<div class="email-card" id="marketing-email">' + h + '</div>';
    wrap.dataset.plainText = plain;
}

// ---- Report actions ----
function generateReports(btn) {
    buildProductReport();
    buildMarketingReport();
    btn.textContent = 'Updated!';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Generate Report'; btn.classList.remove('done'); }, 2000);
}

function copyReportHTML(viewId, btn) {
    const card = document.querySelector('#' + viewId + ' .email-card');
    const html = card.innerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const plainBlob = new Blob([card.innerText], { type: 'text/plain' });
    const item = new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob });
    navigator.clipboard.write([item]).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Email HTML'; btn.classList.remove('copied'); }, 2000);
    });
}

function copyReportPlain(viewId, btn) {
    const plain = document.getElementById(viewId).dataset.plainText;
    navigator.clipboard.writeText(plain).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Plain Text'; btn.classList.remove('copied'); }, 2000);
    });
}

let allExpanded = true;
let activeCompanyFilters = new Set();

// ---- Dropdown logic ----
const DATE_OPTIONS = [
    { value: 'all', label: 'All Time' },
    { value: 'this-week', label: 'This Week' },
    { value: 'last-week', label: 'Last Week' },
    { value: 'last-2-weeks', label: 'Last 2 Weeks' },
    { value: 'last-30-days', label: 'Last 30 Days' },
];

function buildDateDropdown() {
    const panel = document.getElementById('date-panel');
    panel.innerHTML = DATE_OPTIONS.map(o =>
        '<div class="dd-item' + (activeDateRange === o.value ? ' selected' : '') + '" data-val="' + o.value + '" onclick="selectDate(this)">' +
        '<span class="dd-check">&#10003;</span>' + esc(o.label) + '</div>'
    ).join('');
    syncDateLabel();
}

function selectDate(el) {
    activeDateRange = el.dataset.val;
    document.querySelectorAll('#date-panel .dd-item').forEach(d => d.classList.toggle('selected', d.dataset.val === activeDateRange));
    syncDateLabel();
    closeAllDD();
    updateHash();
    buildFeatures();
    buildCalls();
    buildProductReport();
    buildMarketingReport();
    updateStats();
}

function syncDateLabel() {
    const opt = DATE_OPTIONS.find(o => o.value === activeDateRange) || DATE_OPTIONS[0];
    const label = document.getElementById('date-label');
    label.textContent = opt.label;
    document.querySelector('#date-dd .dd-btn').classList.toggle('has-filter', activeDateRange !== 'all');
}

function buildCompanyDropdown(companies) {
    const sorted = [...companies].sort();
    const panel = document.getElementById('co-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectCompany(this)"><span class="dd-check">&#10003;</span>All Companies</div>';
    html += '<div class="dd-sep"></div>';
    sorted.forEach(co => {
        const sel = activeCompanyFilters.size === 0 || activeCompanyFilters.has(co.toLowerCase());
        html += '<div class="dd-item' + (sel && activeCompanyFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(co) + '" onclick="selectCompany(this)">' +
            '<span class="dd-check">&#10003;</span>' + esc(co) + '</div>';
    });
    panel.innerHTML = html;
    syncCompanyLabel();
}

function selectCompany(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeCompanyFilters.clear();
        document.querySelectorAll('#co-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        // Deselect "All"
        document.querySelector('#co-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const co = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeCompanyFilters.add(co);
        } else {
            activeCompanyFilters.delete(co);
        }
        if (activeCompanyFilters.size === 0) {
            document.querySelector('#co-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncCompanyLabel();
    applyCompanyFilter();
}

function syncCompanyLabel() {
    const label = document.getElementById('co-label');
    const btn = document.querySelector('#co-dd .dd-btn');
    if (activeCompanyFilters.size === 0) {
        label.textContent = 'Companies';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeCompanyFilters.size + ' selected';
        btn.classList.add('has-filter');
    }
}

function toggleDD(id) {
    const wrap = document.getElementById(id);
    const btn = wrap.querySelector('.dd-btn');
    const panel = wrap.querySelector('.dd-panel');
    const opening = !panel.classList.contains('open');
    closeAllDD();
    if (opening) {
        btn.classList.add('open');
        panel.classList.add('open');
    }
}

function closeAllDD() {
    document.querySelectorAll('.dd-wrap').forEach(w => {
        w.querySelector('.dd-btn').classList.remove('open');
        w.querySelector('.dd-panel').classList.remove('open');
    });
}

// Close dropdowns on outside click
document.addEventListener('click', function(e) {
    if (!e.target.closest('.dd-wrap')) closeAllDD();
});

function toggleExpandAll() {
    allExpanded = !allExpanded;
    document.querySelectorAll('#features-view .cat-section').forEach(s => {
        s.classList.toggle('collapsed', !allExpanded);
    });
    document.getElementById('expand-btn').textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

function applyCompanyFilter() {
    const noFilter = activeCompanyFilters.size === 0;
    document.querySelectorAll('#features-view .cat-section').forEach(sec => {
        let anyVisible = false;
        sec.querySelectorAll('.card').forEach(card => {
            const cardCos = (card.dataset.companies || '').split(',').filter(Boolean);
            const vis = noFilter || cardCos.some(c => activeCompanyFilters.has(c));
            card.style.display = vis ? '' : 'none';
            if (vis) anyVisible = true;
        });
        sec.style.display = anyVisible ? '' : 'none';
    });
}

function toggleCat(el) {
    el.parentElement.classList.toggle('collapsed');
}

function toggleCard(el) {
    el.parentElement.classList.toggle('open');
}

function toggleSection(el) {
    el.classList.toggle('open');
}

// ---- Two-step scan flow ----
let _scanPreviewCalls = []; // cached from preview response

function closeScanModal() {
    document.getElementById('scan-overlay').classList.remove('open');
}

async function startScan(btn) {
    // Static file mode: fall back to clipboard
    if (location.protocol === 'file:') {
        const cmd = document.getElementById('calls-view').dataset.scanCmd;
        navigator.clipboard.writeText(cmd).then(() => {
            btn.textContent = 'Command Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Scan for More Calls'; btn.classList.remove('copied'); }, 2000);
        });
        return;
    }

    // Server mode: open modal, start preview fetch
    btn.textContent = 'Scanning...';
    btn.classList.add('scanning');
    btn.disabled = true;

    const overlay = document.getElementById('scan-overlay');
    const body = document.getElementById('scan-modal-body');
    const footer = document.getElementById('scan-modal-footer');
    const title = document.getElementById('scan-modal-title');

    title.textContent = 'Fetching calls from Fireflies...';
    body.innerHTML = '<div class="scan-empty" style="padding:3rem"><span class="scanning" style="display:inline-block;animation:scanPulse 1.2s ease-in-out infinite">Scanning...</span></div>';
    footer.style.display = 'none';
    overlay.classList.add('open');

    try {
        const resp = await fetch('/api/scan/preview');
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Preview failed (' + resp.status + ')');
        }
        const data = await resp.json();
        _scanPreviewCalls = data.calls || [];

        if (_scanPreviewCalls.length === 0) {
            title.textContent = 'No Calls Found';
            body.innerHTML = '<div class="scan-empty">No matching calls found in the last 14 days.</div>';
            footer.style.display = 'none';
        } else {
            title.textContent = 'Select Calls to Process';
            renderScanCallList();
            footer.style.display = 'flex';
            updateScanFooter();
        }
    } catch (err) {
        title.textContent = 'Scan Failed';
        body.innerHTML = '<div class="scan-error">' + esc(err.message) + '</div>';
        footer.style.display = 'none';
    }

    btn.textContent = 'Scan for More Calls';
    btn.classList.remove('scanning');
    btn.disabled = false;
}

function renderScanCallList() {
    const body = document.getElementById('scan-modal-body');
    let html = '';
    _scanPreviewCalls.forEach((c, i) => {
        const checked = !c.already_exists ? 'checked' : '';
        const dupeNote = c.already_exists
            ? '<div class="scan-call-dupe">Already in dashboard</div>' : '';
        html += '<div class="scan-call">' +
            '<input type="checkbox" id="scan-cb-' + i + '" data-call-id="' + esc(c.id) + '" ' + checked +
            ' onchange="updateScanFooter()">' +
            '<label class="scan-call-info" for="scan-cb-' + i + '">' +
                '<div class="scan-call-title">' + esc(c.title) + '</div>' +
                '<div class="scan-call-meta">' + c.date + ' &middot; ' + c.duration + ' min &middot; ' + esc(c.attendees || c.organizer) + '</div>' +
                dupeNote +
            '</label>' +
        '</div>';
    });
    body.innerHTML = html;
}

function updateScanFooter() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const info = document.getElementById('scan-modal-info');
    const btn = document.getElementById('scan-process-btn');
    info.textContent = checks.length + ' of ' + _scanPreviewCalls.length + ' selected';
    btn.disabled = checks.length === 0;
}

async function processSelectedCalls() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const ids = Array.from(checks).map(cb => cb.dataset.callId);

    if (ids.length === 0) return;

    const btn = document.getElementById('scan-process-btn');
    const info = document.getElementById('scan-modal-info');
    btn.textContent = 'Processing...';
    btn.classList.add('processing');
    btn.disabled = true;
    info.textContent = 'Running feature scan on ' + ids.length + ' call' + (ids.length > 1 ? 's' : '') + '...';

    try {
        const resp = await fetch('/api/scan/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ call_ids: ids }),
        });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Processing failed (' + resp.status + ')');
        }
        const newData = await resp.json();

        // Merge new calls into global DATA (dedup by ID)
        const existCallIds = new Set(DATA.calls.map(c => c.id));
        let addedCount = 0;
        (newData.calls || []).forEach(c => {
            if (!existCallIds.has(c.id)) {
                DATA.calls.push(c);
                existCallIds.add(c.id);
                addedCount++;
            }
        });
        // Preserve existing mentions unchanged
        if (newData.mentions) {
            const existMentionKeys = new Set(DATA.mentions.map(m => m.call_id + '|' + m.keyword + '|' + m.ts));
            newData.mentions.forEach(m => {
                const k = m.call_id + '|' + m.keyword + '|' + m.ts;
                if (!existMentionKeys.has(k)) { DATA.mentions.push(m); existMentionKeys.add(k); }
            });
        }

        // Rebuild everything
        updateStats();
        buildFeatures();
        buildCalls();
        if (typeof buildProductReport === 'function') buildProductReport();
        if (typeof buildMarketingReport === 'function') buildMarketingReport();

        btn.textContent = 'Done!';
        btn.classList.remove('processing');
        info.textContent = addedCount + ' call' + (addedCount > 1 ? 's' : '') + ' added (pending analysis).';

        setTimeout(() => { closeScanModal(); }, 1200);
    } catch (err) {
        btn.textContent = 'Failed';
        btn.classList.remove('processing');
        info.textContent = err.message;
        setTimeout(() => {
            btn.textContent = 'Process Selected';
            btn.disabled = false;
        }, 3000);
    }
}

function copyNote(btn, callId) {
    const call = DATA.calls.find(c => c.id === callId);
    if (!call || !call.hubspot_note) return;
    navigator.clipboard.writeText(call.hubspot_note).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    });
}

function switchTab(tab) {
    currentTab = tab;
    updateHash();
    const isReport = (tab === 'product' || tab === 'marketing');
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('features-view').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('calls-view').style.display = tab === 'calls' ? '' : 'none';
    document.getElementById('product-view').style.display = tab === 'product' ? '' : 'none';
    document.getElementById('marketing-view').style.display = tab === 'marketing' ? '' : 'none';
    document.querySelector('.search-box').style.display = isReport ? 'none' : '';
    document.getElementById('co-dd').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('expand-btn').style.display = tab === 'features' ? '' : 'none';
    document.getElementById('q').value = '';
    closeAllDD();
    filter('');
}

function filter(q) {
    const low = q.toLowerCase();
    if (currentTab === 'features') {
        document.querySelectorAll('#features-view .cat-section').forEach(sec => {
            const catMatch = !low || (sec.dataset.cat || '').includes(low);
            let anyCardVisible = false;
            sec.querySelectorAll('.card').forEach(c => {
                const vis = !low || catMatch || c.dataset.search.includes(low);
                c.style.display = vis ? '' : 'none';
                if (vis) anyCardVisible = true;
            });
            sec.style.display = anyCardVisible ? '' : 'none';
        });
    } else {
        document.querySelectorAll('#calls-view .card').forEach(c => {
            c.style.display = !low || c.dataset.search.includes(low) ? '' : 'none';
        });
    }
}

function updateStats() {
    const m = activeMentions();
    const callIds = new Set(m.map(x => x.call_id));
    const featureNames = new Set(m.map(x => x.keyword));
    const pendingCount = DATA.calls.filter(c => c.pending_analysis).length;
    let pillsHTML =
        '<span class="hdr-pill"><span class="n">' + m.length + '</span><span class="l">mentions</span></span>' +
        '<span class="hdr-pill"><span class="n">' + callIds.size + '</span><span class="l">calls</span></span>' +
        '<span class="hdr-pill"><span class="n">' + featureNames.size + '</span><span class="l">features</span></span>';
    if (pendingCount > 0) {
        pillsHTML += '<span class="hdr-pill" style="border-color:#5a4a20"><span class="n" style="color:#fb923c">' + pendingCount + '</span><span class="l" style="color:#fb923c">pending</span></span>';
    }
    document.getElementById('hdr-stats').innerHTML = pillsHTML;

    // Tagline: compute date range from visible calls
    const dates = DATA.calls
        .filter(c => callIds.has(c.id) && c.date)
        .map(c => c.date.slice(0, 10))
        .sort();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let tagline = '';
    if (dates.length) {
        const d0 = new Date(dates[0] + 'T00:00:00');
        const d1 = new Date(dates[dates.length - 1] + 'T00:00:00');
        const fmt = d => months[d.getMonth()] + ' ' + d.getDate();
        if (d0.getTime() === d1.getTime()) {
            tagline = fmt(d0) + ', ' + d0.getFullYear();
        } else if (d0.getFullYear() === d1.getFullYear() && d0.getMonth() === d1.getMonth()) {
            tagline = months[d0.getMonth()] + ' ' + d0.getDate() + '\u2013' + d1.getDate() + ', ' + d0.getFullYear();
        } else {
            tagline = fmt(d0) + ' \u2013 ' + fmt(d1) + ', ' + d1.getFullYear();
        }
        tagline += ' \u00b7 ' + callIds.size + ' call' + (callIds.size !== 1 ? 's' : '') + ' analyzed';
    }
    document.getElementById('hdr-tagline').textContent = tagline;
}

// Init — parse hash for exclusions, date range, and tab, then build
const initTab = parseHash();
buildDateDropdown();
updateStats();
buildFeatures();
buildCalls();
buildProductReport();
buildMarketingReport();
switchTab(initTab || 'features');
</script>
