// ---- Shared report helpers ----
function reportGetCompany(m, callMap) {
    const spk = m.speaker || '';
    const spkLow = spk.toLowerCase();
    const call = callMap[m.call_id];
    const title = call ? call.title : '';
    const paren = spk.match(/\(([^)]+)\)/);

    // Known speaker → company mappings (works with or without parenthetical)
    if (spkLow.includes('hui ching') || spkLow.includes('kai shan')) return 'LTA';
    if (spkLow.includes('simon davey')) return 'Simon Davey';
    if (spkLow.includes('simon smith') || spkLow.includes('sabine') || spkLow.includes('katrina welch')) return 'Simon & Sabine (Coaching)';
    if (spkLow.includes('ibrahim') || spkLow.includes('bryan') || spkLow.includes('oghenetejiri')) return 'Dot Compliance';

    if (paren) {
        const raw = paren[1].split('/')[0].trim();
        const chevron = title.match(/^(.+?)\s*<>\s*Teachable/i) || title.match(/^Teachable\s*<>\s*(.+)/i);
        if (chevron) return chevron[1].trim();
        if (title.toLowerCase().includes('speravita')) return 'Speravita';
        if (title.toLowerCase().includes('dot compliance')) return 'Dot Compliance';
        if (title.toLowerCase().includes('lta') || raw.toLowerCase().includes('lta')) return 'LTA';
        // Never return Teachable or Unknown as a company
        if (!isTeachableInternal(raw)) return raw;
        // Fall through: internal speaker, try extracting from title
        if (title) return companyFromTitle(title);
    }
    return '';
}
function reportFmtTs(sec) {
    if (sec == null) return '';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}
function reportWeekRange(weekStart) {
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 4);
    return fmtShortDate(weekStart) + ' \u2013 ' + fmtShortDate(end) + ', ' + weekStart.getFullYear();
}
function reportToolbar(viewId) {
    return '<div class="report-toolbar">' +
        '<button class="report-generate" onclick="generateReports(this)">Generate Report</button>' +
        '<div class="report-sep"></div>' +
        '<button class="report-btn" onclick="copyReportHTML(\'' + viewId + '\', this)">Copy Email HTML</button>' +
        '<button class="report-btn" onclick="copyReportPlain(\'' + viewId + '\', this)">Copy Plain Text</button>' +
    '</div>';
}

// ---- Product Report builder ----
function buildProductReport() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();
    const coSummaries = DATA.company_summaries || {};

    // Tag each mention with company
    mentions.forEach(m => { m._co = reportGetCompany(m, callMap); });

    // Date range from active calls
    const callIdsWithMentions = new Set(mentions.map(m => m.call_id));
    const activeCalls = DATA.calls.filter(c => callIdsWithMentions.has(c.id) && !excludedCalls.has(c.id));
    const dates = activeCalls.map(c => c.date).filter(Boolean).sort();
    const dateRange = dates.length
        ? fmtShortDate(new Date(dates[0] + 'T00:00:00')) + ' \u2013 ' + fmtShortDate(new Date(dates[dates.length - 1] + 'T00:00:00')) + ', ' + dates[0].slice(0, 4)
        : '';

    // Companies map (across all calls, not per-week)
    const coMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        if (!coMap[co]) coMap[co] = { features: new Set(), calls: new Map() };
        coMap[co].features.add(m.keyword);
        if (!coMap[co].calls.has(m.call_id)) coMap[co].calls.set(m.call_id, callMap[m.call_id]);
    });
    const companies = Object.entries(coMap).sort((a, b) => b[1].features.size - a[1].features.size);

    // Features by category (across all calls)
    const catMap = {};
    mentions.forEach(m => {
        const co = m._co;
        if (!co) return;
        const cat = m.category || 'Other';
        if (!catMap[cat]) catMap[cat] = {};
        if (!catMap[cat][m.keyword]) catMap[cat][m.keyword] = [];
        catMap[cat][m.keyword].push({ company: co, tsDisplay: reportFmtTs(m.ts_sec), link: m.link || '' });
    });
    const catEntries = Object.entries(catMap).map(([cat, feats]) => {
        let total = 0;
        const coSet = new Set();
        Object.values(feats).forEach(arr => { total += arr.length; arr.forEach(e => coSet.add(e.company)); });
        return { cat, feats, total, coCount: coSet.size };
    }).sort((a, b) => b.total - a.total);

    // Top theme for summary
    const topTheme = catEntries.length ? catEntries[0] : null;

    // ---- HTML ----
    let h = '<h1>PRODUCT INTELLIGENCE REPORT</h1>';
    h += '<div class="email-date">Week of ' + esc(dateRange) + '</div>';

    // SUMMARY
    h += '<h2>Summary</h2>';
    h += '<ul class="summary-list">';
    h += '<li>' + activeCalls.length + ' sales call' + (activeCalls.length !== 1 ? 's' : '') + ' this week</li>';
    h += '<li>' + mentions.length + ' feature request' + (mentions.length !== 1 ? 's' : '') + ' identified across ' + companies.length + ' prospect' + (companies.length !== 1 ? 's' : '') + '</li>';
    if (topTheme) {
        h += '<li>Top theme: <strong>' + esc(topTheme.cat) + '</strong> (' + topTheme.total + ' mention' + (topTheme.total !== 1 ? 's' : '') + ', ' + topTheme.coCount + ' compan' + (topTheme.coCount !== 1 ? 'ies' : 'y') + ')</li>';
    }
    h += '</ul>';

    // CALLS BY SEGMENT
    const segMap = {};
    activeCalls.forEach(c => {
        const seg = c.segment || 'Unclassified';
        if (!segMap[seg]) segMap[seg] = [];
        // Find company name for this call from mentions
        const callCo = companies.find(([name, d]) => d.calls.has(c.id));
        segMap[seg].push(callCo ? callCo[0] : (c.title || 'Unknown'));
    });
    const segEntries = Object.entries(segMap).sort((a, b) => b[1].length - a[1].length);
    if (segEntries.length > 0 && segEntries.some(([seg]) => seg !== 'Unclassified')) {
        h += '<h2>Calls by Segment</h2>';
        segEntries.forEach(([seg, names]) => {
            h += '<div class="co-line"><strong>' + esc(seg) + ':</strong> ' +
                names.length + ' call' + (names.length !== 1 ? 's' : '') +
                ' (' + esc(names.join(', ')) + ')</div>';
        });
    }

    // FEATURE RECAP
    h += '<h2>Feature Recap</h2>';
    if (DATA.recap) {
        h += '<div class="recap-block">' + DATA.recap.replace(/\n/g, '<br>') + '</div>';
    } else {
        h += '<div class="recap-block"><em>Run analysis to generate the feature recap narrative.</em></div>';
    }

    // CUSTOMERS THIS WEEK
    h += '<h2>Customers This Week</h2>';
    companies.forEach(([name, d]) => {
        const summary = coSummaries[name] || '';
        let links = [];
        d.calls.forEach(c => {
            if (c && c.transcript) {
                const ds = c.date ? c.date.slice(5).replace('-', '/') : '';
                links.push('<a href="' + esc(c.transcript) + '" target="_blank">Call (' + ds + ')</a>');
            }
        });
        h += '<div class="co-line"><strong>' + esc(name) + '</strong>';
        if (summary) h += ' \u2014 ' + esc(summary);
        if (links.length) h += ' \u2192 ' + links.join(', ');
        h += '</div>';
    });

    // FEATURE THEMES
    h += '<h2>Feature Themes</h2>';
    catEntries.forEach(ce => {
        h += '<div class="cat-group">';
        h += '<div class="cat-title">' + esc(ce.cat) + ' <span class="cat-co">(' + ce.coCount + ' compan' + (ce.coCount !== 1 ? 'ies' : 'y') + ')</span></div>';
        Object.entries(ce.feats).sort((a, b) => b[1].length - a[1].length).forEach(([feat, entries]) => {
            const byCompany = {};
            entries.forEach(e => { if (!byCompany[e.company]) byCompany[e.company] = []; byCompany[e.company].push(e); });
            const parts = Object.entries(byCompany).map(([co, es]) => {
                const e = es[0];
                if (e.link && e.tsDisplay) return esc(co) + ' (<a href="' + esc(e.link) + '" target="_blank">' + esc(e.tsDisplay) + '</a>)';
                if (e.tsDisplay) return esc(co) + ' (' + esc(e.tsDisplay) + ')';
                return esc(co);
            });
            h += '<div class="feat-line">\u2013 <strong>' + esc(feat) + '</strong> \u2014 ' + parts.join(' \u00b7 ') + '</div>';
        });
        h += '</div>';
    });

    // ---- Plain text ----
    let plain = 'PRODUCT INTELLIGENCE REPORT\nWeek of ' + dateRange + '\n';
    plain += '\nSUMMARY\n';
    plain += '- ' + activeCalls.length + ' sales calls this week\n';
    plain += '- ' + mentions.length + ' feature requests identified across ' + companies.length + ' prospects\n';
    if (topTheme) plain += '- Top theme: ' + topTheme.cat + ' (' + topTheme.total + ' mentions, ' + topTheme.coCount + ' companies)\n';
    if (segEntries.length > 0 && segEntries.some(([seg]) => seg !== 'Unclassified')) {
        plain += '\nCALLS BY SEGMENT\n';
        segEntries.forEach(([seg, names]) => {
            plain += '- ' + seg + ': ' + names.length + ' call' + (names.length !== 1 ? 's' : '') + ' (' + names.join(', ') + ')\n';
        });
    }
    plain += '\nFEATURE RECAP\n' + (DATA.recap || '(Not yet generated)') + '\n';
    plain += '\nCUSTOMERS THIS WEEK\n';
    companies.forEach(([name, d]) => {
        plain += '- ' + name + (coSummaries[name] ? ' — ' + coSummaries[name] : '') + '\n';
    });
    plain += '\nFEATURE THEMES\n';
    catEntries.forEach(ce => {
        plain += ce.cat + ' (' + ce.coCount + ' companies)\n';
        Object.entries(ce.feats).sort((a, b) => b[1].length - a[1].length).forEach(([feat, entries]) => {
            const byCompany = {};
            entries.forEach(e => { if (!byCompany[e.company]) byCompany[e.company] = []; byCompany[e.company].push(e); });
            const parts = Object.entries(byCompany).map(([co, es]) => {
                const ts = es[0].tsDisplay || '';
                return ts ? co + ' (' + ts + ')' : co;
            });
            plain += '  - ' + feat + ' — ' + parts.join(' · ') + '\n';
        });
    });

    // Render
    const wrap = document.getElementById('product-view');
    wrap.innerHTML = reportToolbar('product-view') +
        '<div class="email-card" id="product-email">' + h + '</div>';
    wrap.dataset.plainText = plain;
}

// ---- Marketing Report builder ----
function buildMarketingReport() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();
    const noData = '<em>No data from this week\u2019s calls.</em>';

    // Internal calls (sales meetings, internal reviews) are excluded from marketing report
    function isInternalCall(c) {
        const t = (c.title || '').toLowerCase();
        return /\bsales\b/i.test(t);
    }
    // Gather active EXTERNAL calls (non-excluded, non-internal, with mentions or marketing_data)
    const mentionCallIds = new Set(mentions.map(m => m.call_id));
    const activeCalls = DATA.calls.filter(c =>
        !excludedCalls.has(c.id) && !isInternalCall(c) && (mentionCallIds.has(c.id) || c.marketing_data)
    );
    const dates = activeCalls.map(c => c.date).filter(Boolean).sort();
    const dateRange = dates.length
        ? fmtShortDate(new Date(dates[0] + 'T00:00:00')) + ' \u2013 ' +
          fmtShortDate(new Date(dates[dates.length - 1] + 'T00:00:00')) + ', ' + dates[0].slice(0, 4)
        : '';

    // Aggregate per-call marketing_data
    const allMktData = activeCalls.map(c => ({
        call: c,
        md: c.marketing_data || {}
    })).filter(x => Object.keys(x.md).length > 0);

    // Helper: build a timestamp link
    function tsLink(call, tsSec, tsDisplay) {
        if (tsSec != null && call && call.transcript) {
            const url = call.transcript.split('?')[0] + '?t=' + Math.floor(tsSec);
            return '<a href="' + esc(url) + '" target="_blank" style="color:#4a7cff;text-decoration:none">' + esc(tsDisplay || reportFmtTs(tsSec)) + '</a>';
        }
        if (tsDisplay) return '<span style="color:#8b8fa3">' + esc(tsDisplay) + '</span>';
        return '';
    }

    // Helper: call link
    function callLink(call) {
        if (!call) return '';
        const label = esc(call.title || '') + ' (' + (call.date || '').slice(5) + ')';
        if (call.transcript) return '<a href="' + esc(call.transcript) + '" target="_blank" style="color:#4a7cff;text-decoration:none">' + label + '</a>';
        return label;
    }

    // Sub-section header
    function subHead(text) {
        return '<div style="font-size:13px;font-weight:600;color:#888;margin:1rem 0 0.4rem;text-transform:uppercase;letter-spacing:0.04em">' + text + '</div>';
    }

    // ---- HTML ----
    let h = '<h1>MARKETING INTELLIGENCE REPORT</h1>';
    h += '<div class="email-date">Week of ' + esc(dateRange) + '</div>';

    // ========== SECTION 1: WHO WE TALKED TO ==========
    h += '<h2>Who We Talked To</h2>';
    if (!allMktData.length) {
        h += '<div class="recap-block">' + noData + '</div>';
    } else {
        // Group by company (merge multiple calls for same company)
        const coCards = {};
        allMktData.forEach(({ call, md }) => {
            const co = md.company || getCompany({ speaker: '', call_id: call.id, call_title: call.title }, callMap) || 'Unknown';
            if (!coCards[co]) coCards[co] = { contacts: [], description: '', industry: '', evaluating: [], calls: [], decisionContext: [], segment: '' };
            if (call.segment && !coCards[co].segment) coCards[co].segment = call.segment;
            (md.contacts || []).forEach(ct => {
                const existing = coCards[co].contacts.find(x => x.name === ct.name);
                if (!existing) coCards[co].contacts.push(ct);
            });
            if (md.company_description && !coCards[co].description) coCards[co].description = md.company_description;
            if (md.industry && !coCards[co].industry) coCards[co].industry = md.industry;
            (md.currently_evaluating || []).forEach(e => { if (!coCards[co].evaluating.includes(e)) coCards[co].evaluating.push(e); });
            coCards[co].calls.push(call);
            (md.contacts || []).forEach(ct => {
                if (ct.role_in_decision) coCards[co].decisionContext.push(ct.name + ': ' + ct.role_in_decision);
            });
        });

        Object.entries(coCards).forEach(([co, data]) => {
            h += '<div style="background:#f8f9fa;border:1px solid #e0e3e8;border-radius:8px;padding:1rem 1.2rem;margin-bottom:0.8rem">';
            h += '<div style="font-weight:700;font-size:16px;margin-bottom:0.3rem">' + esc(co);
            if (data.segment) h += ' <span style="font-weight:400;font-size:12px;color:#6bc79a;background:#1a2520;border:1px solid #253a30;padding:2px 8px;border-radius:6px;margin-left:6px">' + esc(data.segment) + '</span>';
            h += '</div>';
            data.contacts.forEach(ct => {
                h += '<div>' + esc(ct.name || '');
                if (ct.title) h += ', ' + esc(ct.title);
                h += '</div>';
            });
            if (data.description) h += '<div style="color:#555;margin-top:0.3rem">' + esc(data.description) + '</div>';
            if (data.evaluating.length) h += '<div style="color:#555;font-size:13px;margin-top:0.3rem">Currently evaluating: ' + data.evaluating.map(esc).join(', ') + '</div>';
            if (data.decisionContext.length) h += '<div style="color:#666;font-size:13px;margin-top:0.2rem">Decision context: ' + data.decisionContext.map(esc).join('; ') + '</div>';
            data.calls.forEach(c => {
                h += '<div style="font-size:13px;margin-top:0.3rem">Call: ' + callLink(c) + '</div>';
            });
            h += '</div>';
        });
    }

    // ========== SECTION 2: WHAT THEY'RE SAYING ==========
    h += '<h2>What They\u2019re Saying</h2>';
    const allQuotes = [];
    const allTerminology = [];
    const allQuestions = [];

    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        (md.quotes || []).forEach(q => allQuotes.push({ ...q, _co: co, _call: call }));
        (md.terminology || []).forEach(t => allTerminology.push({ ...t, _co: co }));
        (md.questions_asked || []).forEach(q => allQuestions.push({ ...q, _co: co, _call: call }));
    });

    const hasQuotes = allQuotes.length > 0;
    const hasTerm = allTerminology.length > 0;
    const hasQuestions = allQuestions.length > 0;

    if (!hasQuotes && !hasTerm && !hasQuestions) {
        h += '<div class="recap-block">' + noData + '</div>';
    } else {
        // Problem descriptions
        const problemQuotes = allQuotes.filter(q => q.theme === 'problem_description');
        const workaroundQuotes = allQuotes.filter(q => q.theme === 'workaround');
        const otherQuotes = allQuotes.filter(q => q.theme !== 'problem_description' && q.theme !== 'workaround');

        if (problemQuotes.length) {
            h += subHead('How they describe their problems');
            h += '<div class="recap-block">';
            problemQuotes.forEach(q => {
                h += '<div style="margin-bottom:0.6em;padding-left:0.8rem;border-left:3px solid #4a7cff">';
                h += '\u201c' + esc(q.text || '') + '\u201d';
                h += '<br><span style="color:#666;font-size:13px">\u2014 ' + esc(q.speaker || '') + ', ' + esc(q._co);
                if (q.ts_seconds != null) h += ' ' + tsLink(q._call, q.ts_seconds, q.timestamp);
                h += '</span></div>';
            });
            h += '</div>';
        }

        if (workaroundQuotes.length) {
            h += subHead('Current workarounds');
            h += '<div class="recap-block">';
            workaroundQuotes.forEach(q => {
                h += '<div style="margin-bottom:0.6em;padding-left:0.8rem;border-left:3px solid #fb923c">';
                h += '\u201c' + esc(q.text || '') + '\u201d';
                h += '<br><span style="color:#666;font-size:13px">\u2014 ' + esc(q.speaker || '') + ', ' + esc(q._co);
                if (q.ts_seconds != null) h += ' ' + tsLink(q._call, q.ts_seconds, q.timestamp);
                h += '</span></div>';
            });
            h += '</div>';
        }

        if (otherQuotes.length) {
            h += subHead('Notable quotes');
            h += '<div class="recap-block">';
            otherQuotes.forEach(q => {
                h += '<div style="margin-bottom:0.6em;padding-left:0.8rem;border-left:3px solid #6bc77a">';
                h += '\u201c' + esc(q.text || '') + '\u201d';
                h += '<br><span style="color:#666;font-size:13px">\u2014 ' + esc(q.speaker || '') + ', ' + esc(q._co);
                if (q.ts_seconds != null) h += ' ' + tsLink(q._call, q.ts_seconds, q.timestamp);
                h += '</span></div>';
            });
            h += '</div>';
        }

        if (hasTerm) {
            h += subHead('Language & terminology they use');
            h += '<div class="recap-block">';
            allTerminology.forEach(t => {
                if (typeof t === 'string') {
                    h += '<div style="margin-bottom:0.3em">\u2022 ' + esc(t) + '</div>';
                } else {
                    h += '<div style="margin-bottom:0.3em">\u2022 \u201c' + esc(t.prospect_term || '') + '\u201d not \u201c' + esc(t.standard_term || '') + '\u201d (' + esc(t._co) + ')</div>';
                }
            });
            h += '</div>';
        }

        if (hasQuestions) {
            h += subHead('Questions they asked');
            h += '<div class="recap-block">';
            allQuestions.forEach(q => {
                h += '<div style="margin-bottom:0.5em">\u2022 ' + esc(q.question || '');
                h += ' <span style="color:#666;font-size:13px">\u2014 ' + esc(q.speaker || '') + ', ' + esc(q._co);
                if (q.ts_seconds != null) h += ' ' + tsLink(q._call, q.ts_seconds, q.timestamp);
                h += '</span></div>';
            });
            h += '</div>';
        }
    }

    // ========== SECTION 3: OBJECTIONS & COMPETITIVE LANDSCAPE ==========
    h += '<h2>Objections &amp; Competitive Landscape</h2>';
    const allObjections = [];
    const allCompetitors = [];
    const allBarriers = [];

    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        (md.objections || []).forEach(o => allObjections.push({ ...o, _co: co, _call: call }));
        (md.competitors_mentioned || []).forEach(c => allCompetitors.push({ ...c, _co: co, _call: call }));
        (md.barriers_to_adoption || []).forEach(b => {
            const existing = allBarriers.find(x => x.barrier === b);
            if (existing) { if (!existing.companies.includes(co)) existing.companies.push(co); }
            else allBarriers.push({ barrier: b, companies: [co] });
        });
    });

    const hasObj = allObjections.length > 0;
    const hasComp = allCompetitors.length > 0;
    const hasBarr = allBarriers.length > 0;

    if (!hasObj && !hasComp && !hasBarr) {
        h += '<div class="recap-block">' + noData + '</div>';
    } else {
        if (hasObj) {
            h += subHead('Hesitations');
            h += '<div class="recap-block">';
            allObjections.forEach(o => {
                h += '<div style="margin-bottom:0.5em">';
                if (o.quote) {
                    h += '<div style="padding-left:0.8rem;border-left:3px solid #f472b6">\u201c' + esc(o.quote) + '\u201d';
                    h += '<br><span style="color:#666;font-size:13px">\u2014 ' + esc(o.speaker || '') + ', ' + esc(o._co);
                    if (o.ts_seconds != null) h += ' ' + tsLink(o._call, o.ts_seconds, o.timestamp);
                    h += '</span></div>';
                } else {
                    h += esc(o.objection) + ' \u2014 ' + esc(o.speaker || o._co);
                    if (o.ts_seconds != null) h += ' ' + tsLink(o._call, o.ts_seconds, o.timestamp);
                }
                h += '</div>';
            });
            h += '</div>';
        }

        if (hasComp) {
            h += subHead('Competitors mentioned');
            h += '<div class="recap-block">';
            allCompetitors.forEach(c => {
                h += '<div style="margin-bottom:0.4em">\u2022 <strong>' + esc(c.name || '') + '</strong>';
                if (c.context) h += ' \u2014 ' + esc(c.context);
                h += ' (' + esc(c._co) + ')';
                if (c.ts_seconds != null) h += ' ' + tsLink(c._call, c.ts_seconds, c.timestamp);
                h += '</div>';
            });
            h += '</div>';
        }

        if (hasBarr) {
            h += subHead('Barriers to adoption');
            h += '<div class="recap-block">';
            allBarriers.forEach(b => {
                h += '<div style="margin-bottom:0.3em">\u2022 ' + esc(b.barrier) + ' (' + b.companies.map(esc).join(', ') + ')</div>';
            });
            h += '</div>';
        }
    }

    // ========== SECTION 4: BUYING SIGNALS & TIMELINE ==========
    h += '<h2>Buying Signals &amp; Timeline</h2>';
    const allSignals = [];
    const allTimelines = [];

    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        (md.buying_signals || []).forEach(s => allSignals.push({ ...s, _co: co, _call: call }));
        allTimelines.push({ company: co, timeline: md.timeline || null, call: call });
    });

    const hasSignals = allSignals.length > 0;
    const hasTimelines = allTimelines.some(t => t.timeline);

    if (!hasSignals && !hasTimelines && !activeCalls.length) {
        h += '<div class="recap-block">' + noData + '</div>';
    } else {
        if (hasSignals) {
            h += subHead('Active signals');
            h += '<div class="recap-block">';
            allSignals.forEach(s => {
                h += '<div style="margin-bottom:0.5em">\u2022 ' + esc(s.signal || '');
                if (s.interpretation) h += ' \u2014 <em>' + esc(s.interpretation) + '</em>';
                h += ' (' + esc(s._co) + ')';
                if (s.ts_seconds != null) h += ' ' + tsLink(s._call, s.ts_seconds, s.timestamp);
                h += '</div>';
            });
            h += '</div>';
        }

        if (hasTimelines) {
            h += subHead('Timeline indicators');
            h += '<div class="recap-block">';
            allTimelines.forEach(t => {
                h += '<div style="margin-bottom:0.3em">\u2022 <strong>' + esc(t.company) + ':</strong> ' + (t.timeline ? esc(t.timeline) : '<span style="color:#888">No timeline mentioned</span>') + '</div>';
            });
            h += '</div>';
        }

        // This week's pulse
        h += subHead('This week\u2019s pulse');
        h += '<div class="recap-block">';
        h += '<div>\u2022 <strong>' + activeCalls.length + '</strong> prospect call' + (activeCalls.length !== 1 ? 's' : '') + ' this week</div>';

        // Find strongest signal (company with most signals)
        const signalsByCompany = {};
        allSignals.forEach(s => { signalsByCompany[s._co] = (signalsByCompany[s._co] || 0) + 1; });
        const topSignalCo = Object.entries(signalsByCompany).sort((a, b) => b[1] - a[1])[0];
        if (topSignalCo) h += '<div>\u2022 Strongest signal: ' + esc(topSignalCo[0]) + '</div>';

        // Category patterns from mentions
        mentions.forEach(m => { m._co = m._co || getCompany(m, callMap); });
        const catCounts = {};
        mentions.forEach(m => {
            const cat = m.category || 'Other';
            if (!catCounts[cat]) catCounts[cat] = new Set();
            catCounts[cat].add(m.call_id);
        });
        const topCat = Object.entries(catCounts).sort((a, b) => b[1].size - a[1].size)[0];
        if (topCat && topCat[1].size > 1) {
            h += '<div>\u2022 Pattern: <strong>' + esc(topCat[0]) + '</strong> mentioned across ' + topCat[1].size + '/' + activeCalls.length + ' calls</div>';
        }
        h += '</div>';
    }

    // ---- Plain text ----
    let plain = 'MARKETING INTELLIGENCE REPORT\nWeek of ' + dateRange + '\n\n';

    plain += 'WHO WE TALKED TO\n';
    allMktData.forEach(({ call, md }) => {
        const co = md.company || 'Unknown';
        plain += '\n' + co + '\n';
        (md.contacts || []).forEach(ct => {
            plain += '  ' + (ct.name || '') + (ct.title ? ', ' + ct.title : '') + '\n';
        });
        if (md.company_description) plain += '  ' + md.company_description + '\n';
        if (md.currently_evaluating?.length) plain += '  Evaluating: ' + md.currently_evaluating.join(', ') + '\n';
        plain += '  Call: ' + (call.title || '') + ' (' + (call.date || '') + ')\n';
    });
    if (!allMktData.length) plain += 'No data from this week\'s calls.\n';

    plain += '\nWHAT THEY\'RE SAYING\n';
    allQuotes.forEach(q => {
        plain += '  "' + (q.text || '') + '"\n';
        plain += '    -- ' + (q.speaker || '') + ', ' + (q._co || '') + (q.timestamp ? ' (' + q.timestamp + ')' : '') + '\n';
    });
    if (hasTerm) {
        plain += 'Terminology:\n';
        allTerminology.forEach(t => {
            if (typeof t === 'string') plain += '  - ' + t + '\n';
            else plain += '  - "' + (t.prospect_term || '') + '" not "' + (t.standard_term || '') + '" (' + (t._co || '') + ')\n';
        });
    }
    if (hasQuestions) {
        plain += 'Questions asked:\n';
        allQuestions.forEach(q => { plain += '  - ' + (q.question || '') + ' -- ' + (q.speaker || '') + ', ' + (q._co || '') + '\n'; });
    }

    plain += '\nOBJECTIONS & COMPETITIVE LANDSCAPE\n';
    allObjections.forEach(o => {
        plain += '  - ' + (o.objection || '') + (o.quote ? ' ("' + o.quote + '")' : '') + ' -- ' + (o.speaker || o._co || '') + '\n';
    });
    allCompetitors.forEach(c => { plain += '  Competitor: ' + (c.name || '') + ' -- ' + (c.context || '') + ' (' + (c._co || '') + ')\n'; });
    allBarriers.forEach(b => { plain += '  Barrier: ' + b.barrier + ' (' + b.companies.join(', ') + ')\n'; });

    plain += '\nBUYING SIGNALS & TIMELINE\n';
    allSignals.forEach(s => { plain += '  - ' + (s.signal || '') + (s.interpretation ? ' (' + s.interpretation + ')' : '') + ' -- ' + (s._co || '') + '\n'; });
    allTimelines.forEach(t => { plain += '  ' + t.company + ': ' + (t.timeline || 'No timeline mentioned') + '\n'; });
    plain += activeCalls.length + ' prospect calls this week\n';

    // Render
    const wrap = document.getElementById('marketing-view');
    wrap.innerHTML = reportToolbar('marketing-view') +
        '<div class="email-card" id="marketing-email">' + h + '</div>';
    wrap.dataset.plainText = plain;
}

// ---- Report actions ----
function generateReports(btn) {
    if (!checkActionPassword()) return;
    buildProductReport();
    buildMarketingReport();
    btn.textContent = 'Updated!';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Generate Report'; btn.classList.remove('done'); }, 2000);
}

function copyReportHTML(viewId, btn) {
    const card = document.querySelector('#' + viewId + ' .email-card');
    const html = card.innerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const plainBlob = new Blob([card.innerText], { type: 'text/plain' });
    const item = new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob });
    navigator.clipboard.write([item]).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Email HTML'; btn.classList.remove('copied'); }, 2000);
    });
}

function copyReportPlain(viewId, btn) {
    const plain = document.getElementById(viewId).dataset.plainText;
    navigator.clipboard.writeText(plain).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Plain Text'; btn.classList.remove('copied'); }, 2000);
    });
}

let allExpanded = true;
let activeCompanyFilters = new Set();
let activeSegmentFilters = new Set();

// ---- Dropdown logic ----
const DATE_OPTIONS = [
    { value: 'all', label: 'All Time' },
    { value: 'this-week', label: 'This Week' },
    { value: 'last-week', label: 'Last Week' },
    { value: 'last-2-weeks', label: 'Last 2 Weeks' },
    { value: 'last-30-days', label: 'Last 30 Days' },
];

function buildDateDropdown() {
    const panel = document.getElementById('date-panel');
    panel.innerHTML = DATE_OPTIONS.map(o =>
        '<div class="dd-item' + (activeDateRange === o.value ? ' selected' : '') + '" data-val="' + o.value + '" onclick="selectDate(this)">' +
        '<span class="dd-check">&#10003;</span>' + esc(o.label) + '</div>'
    ).join('');
    syncDateLabel();
}

function selectDate(el) {
    activeDateRange = el.dataset.val;
    document.querySelectorAll('#date-panel .dd-item').forEach(d => d.classList.toggle('selected', d.dataset.val === activeDateRange));
    syncDateLabel();
    closeAllDD();
    updateHash();
    buildFeatures();
    buildCalls();
    buildPersonas();
    if (currentTab === 'competitors') buildCompetitors();
    buildProductReport();
    buildMarketingReport();
    updateStats();
}

function syncDateLabel() {
    const opt = DATE_OPTIONS.find(o => o.value === activeDateRange) || DATE_OPTIONS[0];
    const label = document.getElementById('date-label');
    label.textContent = opt.label;
    document.querySelector('#date-dd .dd-btn').classList.toggle('has-filter', activeDateRange !== 'all');
}

function buildCompanyDropdown(companies) {
    const sorted = [...companies].sort();
    const panel = document.getElementById('co-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectCompany(this)"><span class="dd-check">&#10003;</span>All Companies</div>';
    html += '<div class="dd-sep"></div>';
    sorted.forEach(co => {
        const sel = activeCompanyFilters.size === 0 || activeCompanyFilters.has(co.toLowerCase());
        html += '<div class="dd-item' + (sel && activeCompanyFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(co) + '" onclick="selectCompany(this)">' +
            '<span class="dd-check">&#10003;</span>' + esc(co) + '</div>';
    });
    panel.innerHTML = html;
    syncCompanyLabel();
}

function selectCompany(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeCompanyFilters.clear();
        document.querySelectorAll('#co-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        // Deselect "All"
        document.querySelector('#co-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const co = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeCompanyFilters.add(co);
        } else {
            activeCompanyFilters.delete(co);
        }
        if (activeCompanyFilters.size === 0) {
            document.querySelector('#co-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncCompanyLabel();
    applyCompanyFilter();
    if (currentTab === 'personas') buildPersonas();
}

function syncCompanyLabel() {
    const label = document.getElementById('co-label');
    const btn = document.querySelector('#co-dd .dd-btn');
    if (activeCompanyFilters.size === 0) {
        label.textContent = 'Companies';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeCompanyFilters.size + ' selected';

const ALL_SEGMENT_NAMES = [
    'Continuing Education & Credentialing',
    'Professional Training & Development',
    'Coaches & Consultants',
    'Industry Associations & Membership Orgs',
    'Course Creators & Digital Educators',
    'Academic & Higher Education',
    'Corporate Education & Customer Training',
    'Health, Wellness & Fitness',
    'Government & Public Sector Education'
];

function buildSegmentDropdown() {
    // Count calls per segment
    const segCounts = {};
    DATA.calls.forEach(c => { if (c.segment) segCounts[c.segment] = (segCounts[c.segment] || 0) + 1; });

    const panel = document.getElementById('seg-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectSegment(this)"><span class="dd-check">&#10003;</span>All Segments</div>';
    html += '<div class="dd-sep"></div>';
    ALL_SEGMENT_NAMES.forEach(seg => {
        const count = segCounts[seg] || 0;
        const sel = activeSegmentFilters.size === 0 || activeSegmentFilters.has(seg.toLowerCase());
        const dimmed = count === 0 ? ' style="opacity:0.4"' : '';
        html += '<div class="dd-item' + (sel && activeSegmentFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(seg) + '" onclick="selectSegment(this)"' + dimmed + '>' +
            '<span class="dd-check">&#10003;</span>' + esc(seg) + ' <span style="color:#555a6e;font-size:0.85em">(' + count + ')</span></div>';
    });
    // Also include any segments from data not in the canonical list
    Object.keys(segCounts).forEach(seg => {
        if (!ALL_SEGMENT_NAMES.includes(seg)) {
            const count = segCounts[seg];
            const sel = activeSegmentFilters.has(seg.toLowerCase());
            html += '<div class="dd-item' + (sel ? ' selected' : '') + '" data-val="' + esc(seg) + '" onclick="selectSegment(this)">' +
                '<span class="dd-check">&#10003;</span>' + esc(seg) + ' <span style="color:#555a6e;font-size:0.85em">(' + count + ')</span></div>';
        }
    });
    panel.innerHTML = html;
    syncSegmentLabel();
}

function selectSegment(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeSegmentFilters.clear();
        document.querySelectorAll('#seg-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        document.querySelector('#seg-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const seg = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeSegmentFilters.add(seg);
        } else {
            activeSegmentFilters.delete(seg);
        }
        if (activeSegmentFilters.size === 0) {
            document.querySelector('#seg-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncSegmentLabel();
    applySegmentFilter();
    if (currentTab === 'personas') buildPersonas();
    if (currentTab === 'competitors') buildCompetitors();
}

function syncSegmentLabel() {
    const label = document.getElementById('seg-label');
    const btn = document.querySelector('#seg-dd .dd-btn');
    if (activeSegmentFilters.size === 0) {

function applySegmentFilter() {
    const noFilter = activeSegmentFilters.size === 0;

    document.querySelectorAll('#calls-view .card').forEach(card => {

async function startScan(btn) {
    if (!checkActionPassword()) return;
    // Static file mode: fall back to clipboard
    if (location.protocol === 'file:') {
        const cmd = document.getElementById('calls-view').dataset.scanCmd;
        navigator.clipboard.writeText(cmd).then(() => {
            btn.textContent = 'Command Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Scan for More Calls'; btn.classList.remove('copied'); }, 2000);
        });
        return;
    }

    // Server mode: open modal, start preview fetch
    btn.textContent = 'Scanning...';
    btn.classList.add('scanning');
    btn.disabled = true;

    const overlay = document.getElementById('scan-overlay');
    const body = document.getElementById('scan-modal-body');
    const footer = document.getElementById('scan-modal-footer');
    const title = document.getElementById('scan-modal-title');

    title.textContent = 'Fetching calls from Fireflies...';
    body.innerHTML = '<div class="scan-empty" style="padding:3rem"><span class="scanning" style="display:inline-block;animation:scanPulse 1.2s ease-in-out infinite">Scanning...</span></div>';
    footer.style.display = 'none';
    overlay.classList.add('open');

    try {
        const resp = await fetch('/api/scan/preview');
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Preview failed (' + resp.status + ')');
        }
        const data = await resp.json();
        _scanPreviewCalls = data.calls || [];

        if (_scanPreviewCalls.length === 0) {
            title.textContent = 'No Calls Found';
            body.innerHTML = '<div class="scan-empty">No matching calls found in the last 14 days.</div>';
            footer.style.display = 'none';
        } else {
            title.textContent = 'Select Calls to Process';
            renderScanCallList();
            footer.style.display = 'flex';
            updateScanFooter();
        }
    } catch (err) {
        title.textContent = 'Scan Failed';
        body.innerHTML = '<div class="scan-error">' + esc(err.message) + '</div>';
        footer.style.display = 'none';
    }

    btn.textContent = 'Scan for More Calls';
    btn.classList.remove('scanning');
    btn.disabled = false;
}

async function processSelectedCalls() {
    const checks = document.querySelectorAll('.scan-call input[type="checkbox"]:checked');
    const ids = Array.from(checks).map(cb => cb.dataset.callId);

    if (ids.length === 0) return;

    const btn = document.getElementById('scan-process-btn');
    const info = document.getElementById('scan-modal-info');
    btn.textContent = 'Processing...';
    btn.classList.add('processing');
    btn.disabled = true;
    info.textContent = 'Running feature scan on ' + ids.length + ' call' + (ids.length > 1 ? 's' : '') + '...';

    try {
        const resp = await fetch('/api/scan/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ call_ids: ids }),
        });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'Processing failed (' + resp.status + ')');
        }
        const newData = await resp.json();

        // Merge new calls into global DATA (dedup by ID)
        const existCallIds = new Set(DATA.calls.map(c => c.id));
        let addedCount = 0;
        (newData.calls || []).forEach(c => {
            if (!existCallIds.has(c.id)) {
                DATA.calls.push(c);
                existCallIds.add(c.id);
                addedCount++;
            }
        });
        // Preserve existing mentions unchanged
        if (newData.mentions) {
            const existMentionKeys = new Set(DATA.mentions.map(m => m.call_id + '|' + m.keyword + '|' + m.ts));
            newData.mentions.forEach(m => {
                const k = m.call_id + '|' + m.keyword + '|' + m.ts;
                if (!existMentionKeys.has(k)) { DATA.mentions.push(m); existMentionKeys.add(k); }
            });
        }

        // Rebuild everything
        updateStats();
        buildFeatures();
        buildCalls();
        if (typeof buildProductReport === 'function') buildProductReport();
        if (typeof buildMarketingReport === 'function') buildMarketingReport();

        btn.textContent = 'Done!';
        btn.classList.remove('processing');
        info.textContent = addedCount + ' call' + (addedCount > 1 ? 's' : '') + ' added (pending analysis).';

        setTimeout(() => { closeScanModal(); }, 1200);
    } catch (err) {
        btn.textContent = 'Failed';
        btn.classList.remove('processing');
        info.textContent = err.message;
        setTimeout(() => {
            btn.textContent = 'Process Selected';
            btn.disabled = false;
        }, 3000);
    }
}

// ---- Personas tab ----
const SEG_COLORS = {
    'continuing education & credentialing': '#4a9eff',
    'professional training & development': '#4ade80',
    'coaches & consultants': '#a78bfa',
    'industry associations & membership orgs': '#fbbf24',
    'course creators & digital educators': '#f472b6',
    'academic & higher education': '#2dd4bf',
    'corporate education & customer training': '#fb923c',
    'health, wellness & fitness': '#34d399',
    'government & public sector education': '#94a3b8',
    'needs_review': '#f0c040'
};

function segColor(segName) {
    return SEG_COLORS[(segName || '').toLowerCase()] || '#4a7cff';
}

function buildPersonas() {
    const callMap = {};
    DATA.calls.forEach(c => { callMap[c.id] = c; });
    const mentions = activeMentions();

    // Check if any segment data exists
    const hasSegmentData = DATA.calls.some(c => c.segment);
    if (!hasSegmentData) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">Segment data not available. Re-run analysis with persona categorization enabled to populate this tab.</div>';
        return;
    }

    // Tag mentions with company
    mentions.forEach(m => { m._co = m._co || getCompany(m, callMap) || reportGetCompany(m, callMap) || ''; });

    // Active date-filtered + non-excluded calls with segments
    const dateIds = activeCallIds();
    const activeCalls = DATA.calls.filter(c =>
        c.segment && !excludedCalls.has(c.id) && dateIds.has(c.id)
    );

    // Apply segment filter
    const noSegFilter = activeSegmentFilters.size === 0;
    const filteredCalls = activeCalls.filter(c =>
        noSegFilter || activeSegmentFilters.has(c.segment.toLowerCase())
    );

    if (filteredCalls.length === 0) {
        document.getElementById('personas-view').innerHTML =
            '<div class="seg-empty">No calls match the selected filters.</div>';
        return;
    }

    // Group calls by segment
    const segGroups = {};
    filteredCalls.forEach(c => {
        const seg = c.segment;
        if (!segGroups[seg]) segGroups[seg] = { calls: [], companies: new Set(), features: {} };
        segGroups[seg].calls.push(c);
    });

    // Cross-ref mentions with calls to get features per segment and per company
    const filteredCallIds = new Set(filteredCalls.map(c => c.id));
    let filteredMentions = mentions.filter(m => filteredCallIds.has(m.call_id));

    // Apply company filter
    const noCoFilter = activeCompanyFilters.size === 0;
    if (!noCoFilter) {
        filteredMentions = filteredMentions.filter(m => activeCompanyFilters.has((m._co || '').toLowerCase()));
    }

    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        const seg = call.segment;
        if (!segGroups[seg]) return;
        const co = m._co || 'Unknown';
        segGroups[seg].companies.add(co);
        if (!segGroups[seg].features[m.keyword]) segGroups[seg].features[m.keyword] = 0;
        segGroups[seg].features[m.keyword]++;
    });

    // Also add companies from calls (even if no feature mentions)
    filteredCalls.forEach(c => {
        const seg = c.segment;
        const callMentions = filteredMentions.filter(m => m.call_id === c.id);
        const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
        if (cos.size === 0 && noCoFilter) {
            // Fallback: extract from call title (only when no company filter active)
            const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
            if (chevron) cos.add(chevron[1].split(':')[0].trim());
        }
        cos.forEach(co => {
            if (noCoFilter || activeCompanyFilters.has(co.toLowerCase())) {
                segGroups[seg].companies.add(co);
            }
        });
    });

    // Sort segments by call count desc, NEEDS_REVIEW always last
    const sortedSegs = Object.entries(segGroups).sort((a, b) => {
        if (a[0] === 'NEEDS_REVIEW') return 1;
        if (b[0] === 'NEEDS_REVIEW') return -1;
        return b[1].calls.length - a[1].calls.length;
    });

    let html = '';

    // ========== SECTION 1: Segment Overview Cards ==========
    html += '<div class="seg-section-title">Segment Overview</div>';
    html += '<div class="seg-overview">';
    sortedSegs.forEach(([seg, data]) => {
        const isNR = seg === 'NEEDS_REVIEW';
        const color = segColor(seg);
        const displaySeg = isNR ? 'Unclassified' : seg;
        const topFeats = Object.entries(data.features)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3);
        let featsHTML = '';
        if (topFeats.length > 0) {
            featsHTML = '<ul class="seg-card-feats">';
            topFeats.forEach(([f]) => { featsHTML += '<li>' + esc(f) + '</li>'; });
            featsHTML += '</ul>';
        }
        const nrIcon = isNR ? '<span style="margin-right:4px">&#9888;</span>' : '';
        html += '<div class="seg-card" style="--seg-color:' + color + '" onclick="scrollToSegGroup(\'' + esc(seg) + '\')">' +
            '<div class="seg-card-name">' + nrIcon + esc(displaySeg) + '</div>' +
            '<div class="seg-card-stat">' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</div>' +
            '<div class="seg-card-sub">' + data.companies.size + ' compan' + (data.companies.size !== 1 ? 'ies' : 'y') + '</div>' +
            featsHTML +
        '</div>';
    });
    html += '</div>';

    // ========== SEGMENT MIX BAR ==========
    if (sortedSegs.length > 0) {
        const totalCalls = filteredCalls.length;
        html += '<div class="seg-mix">';
        html += '<div class="seg-section-title">Segment Mix</div>';
        html += '<div class="seg-mix-bar">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? (data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            const label = pct >= 12 ? (displaySeg.split(' ').slice(0, 3).join(' ') + ' ' + Math.round(pct) + '%') : (pct >= 6 ? Math.round(pct) + '%' : '');
            html += '<div class="seg-mix-seg" data-pct="' + pct.toFixed(1) + '" style="background:' + color + '" title="' + esc(displaySeg) + ': ' + Math.round(pct) + '% (' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + ')">';
            html += '<span>' + esc(label) + '</span>';
            html += '</div>';
        });
        html += '</div>';
        html += '<div class="seg-mix-legend">';
        sortedSegs.forEach(([seg, data]) => {
            const pct = totalCalls > 0 ? Math.round(data.calls.length / totalCalls * 100) : 0;
            const color = segColor(seg);
            const displaySeg = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg;
            html += '<div class="seg-mix-legend-item">' +
                '<span class="seg-mix-dot" style="background:' + color + '"></span>' +
                esc(displaySeg) + ' ' + pct + '%' +
            '</div>';
        });
        html += '</div>';
        html += '</div>';
    }

    // ========== SECTION 2: Segment Comparison Table ==========
    // Collect all features with 2+ total mentions across ALL segments
    const allFeatureCounts = {};
    filteredMentions.forEach(m => {
        const call = callMap[m.call_id];
        if (!call || !call.segment) return;
        if (!allFeatureCounts[m.keyword]) allFeatureCounts[m.keyword] = { total: 0, bySegment: {} };
        allFeatureCounts[m.keyword].total++;
        if (!allFeatureCounts[m.keyword].bySegment[call.segment]) allFeatureCounts[m.keyword].bySegment[call.segment] = 0;
        allFeatureCounts[m.keyword].bySegment[call.segment]++;
    });

    const tableFeatures = Object.entries(allFeatureCounts)
        .filter(([, v]) => v.total >= 2)
        .sort((a, b) => b[1].total - a[1].total);

    if (tableFeatures.length > 0 && sortedSegs.length > 1) {
        html += '<div class="seg-section-title" style="margin-top:1rem">Segment Comparison</div>';
        html += '<div class="seg-compare-wrap"><table class="seg-compare">';
        html += '<tr><th>Feature</th>';
        sortedSegs.forEach(([seg]) => {
            const label = seg === 'NEEDS_REVIEW' ? 'Unclassified' : seg.split(' ').slice(0, 3).join(' ');
            html += '<th>' + esc(label) + '</th>';
        });
        html += '</tr>';

        const INITIAL_ROWS = 15;
        tableFeatures.forEach(([feat, data], idx) => {
            const hidden = idx >= INITIAL_ROWS ? ' style="display:none" class="seg-compare-extra"' : '';
            html += '<tr' + hidden + '><td>' + esc(feat) + '</td>';
            sortedSegs.forEach(([seg]) => {
                const count = data.bySegment[seg] || 0;
                let dots = '';
                if (count >= 3) dots = '<span class="seg-dots">\u25CF\u25CF\u25CF</span>';
                else if (count === 2) dots = '<span class="seg-dots">\u25CF\u25CF</span>';
                else if (count === 1) dots = '<span class="seg-dots">\u25CF</span>';
                html += '<td>' + dots + '</td>';
            });
            html += '</tr>';
        });
        html += '</table>';
        if (tableFeatures.length > INITIAL_ROWS) {
            html += '<button class="seg-show-all" onclick="toggleCompareRows(this)">Show all ' + tableFeatures.length + ' features</button>';
        }
        html += '</div>';
    }

    // ========== SECTION 3: Prospect Cards by Segment ==========
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem">' +
        '<div class="seg-section-title" style="margin:0">Prospects by Segment</div>' +
        '<button class="expand-btn" onclick="togglePersonasExpand(this)">' + (allExpanded ? 'Collapse All' : 'Expand All') + '</button>' +
        '</div>';

    sortedSegs.forEach(([seg, data], idx) => {
        const color = segColor(seg);
        // Group by company
        const coData = {};
        data.calls.forEach(c => {
            const callMentions = filteredMentions.filter(m => m.call_id === c.id);
            const cos = new Set(callMentions.map(m => m._co).filter(Boolean));
            if (cos.size === 0) {
                const chevron = (c.title || '').match(/^(.+?)\s*<>\s*Teachable/i) || (c.title || '').match(/^Teachable\s*<>\s*(.+)/i);
                if (chevron) cos.add(chevron[1].split(':')[0].trim());
                else cos.add(c.title || 'Unknown');
            }
            cos.forEach(co => {
                if (!coData[co]) coData[co] = { contacts: [], calls: [], features: [], mentionMap: {} };
                coData[co].calls.push(c);
                callMentions.forEach(m => {
                    if (!coData[co].mentionMap[m.keyword]) {
                        coData[co].mentionMap[m.keyword] = m;
                        coData[co].features.push(m);
                    }
                });
            });
        });

        // Extract contacts from marketing_data
        Object.entries(coData).forEach(([co, d]) => {
            d.calls.forEach(c => {
                if (c.marketing_data && c.marketing_data.contacts) {
                    c.marketing_data.contacts.forEach(ct => {
                        if (!d.contacts.find(x => x.name === ct.name)) d.contacts.push(ct);
                    });
                }
            });
        });

        // Apply company filter to prospect cards
        const coEntries = Object.entries(coData)
            .filter(([co]) => noCoFilter || activeCompanyFilters.has(co.toLowerCase()))
            .sort((a, b) => a[0].localeCompare(b[0]));
        if (coEntries.length === 0) return; // Skip segment if no companies match
        const defaultExpanded = allExpanded || sortedSegs.length <= 3 || idx === 0;

        const isNR = seg === 'NEEDS_REVIEW';
        const displaySeg = isNR ? 'Unclassified' : seg;
        const nrClass = isNR ? ' seg-section-nr' : '';
        html += '<div class="seg-group' + (defaultExpanded ? '' : ' collapsed') + nrClass + '" id="seg-group-' + esc(seg.replace(/[^a-z0-9]/gi, '-').toLowerCase()) + '" style="--seg-color:' + color + '">';
        html += '<div class="seg-group-hdr" onclick="this.parentElement.classList.toggle(\'collapsed\')">';
        html += '<span class="seg-group-arrow">&#9654;</span>';
        html += (isNR ? '<span style="color:#f0c040;margin-right:4px">&#9888;</span>' : '');
        html += '<span class="seg-group-name">' + esc(displaySeg) + '</span>';
        html += '<span class="seg-group-count">' + coEntries.length + ' compan' + (coEntries.length !== 1 ? 'ies' : 'y') + ' &middot; ' + data.calls.length + ' call' + (data.calls.length !== 1 ? 's' : '') + '</span>';
        html += '</div>';
        html += '<div class="seg-group-cards">';

        coEntries.forEach(([co, d]) => {
            html += '<div class="prospect-card" style="--seg-color:' + color + '">';
            html += '<div class="prospect-co">' + esc(co) + '</div>';

            // Contacts
            d.contacts.forEach(ct => {
                html += '<div class="prospect-contact">' + esc(ct.name || '');
                if (ct.title) html += ', ' + esc(ct.title);
                html += '</div>';
            });

            // Calls
            const sortedCalls = d.calls.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            sortedCalls.forEach(c => {
                const dateStr = c.date ? c.date.slice(5).replace('-', '/') : '';
                html += '<div class="prospect-call">';
                if (c.transcript) {
                    html += '<a href="' + esc(c.transcript) + '" target="_blank">' + esc(c.title || 'Call') + '</a>';
                } else {
                    html += esc(c.title || 'Call');
                }
                if (dateStr) html += ' &middot; ' + dateStr;
                html += '</div>';
            });

            // Features
            if (d.features.length > 0) {
                html += '<ul class="prospect-feats">';
                d.features.forEach(m => {
                    html += '<li>' + esc(m.keyword);
                    if (m.link) html += '<a href="' + esc(m.link) + '" target="_blank">' + esc(m.ts || '') + '</a>';
                    html += '</li>';
                });
                html += '</ul>';
            } else {
                html += '<div style="font-size:0.82rem;color:#555a6e;margin-top:0.3rem">No feature requests extracted from this call.</div>';
            }

            html += '</div>';
        });

        html += '</div></div>';
    });

    document.getElementById('personas-view').innerHTML = html;

    // Animate segment mix bar widths
    requestAnimationFrame(() => {
        document.querySelectorAll('.seg-mix-seg').forEach(el => {
            el.style.width = el.dataset.pct + '%';
        });
    });
}

const COMP_TYPE_COLORS = {
    'direct': '#4a9eff',
    'lms': '#a78bfa',
    'diy': '#fbbf24',
    'adjacent': '#fb923c',
    'marketplace': '#34d399'
};
const COMP_PALETTE = [
    '#4a9eff', '#f472b6', '#fbbf24', '#4ade80', '#a78bfa',
    '#fb923c', '#34d399', '#f87171', '#38bdf8', '#c084fc',
    '#facc15', '#2dd4bf', '#e879f9', '#94a3b8'
];
const _compColorCache = {};
function compColor(name) {
    if (!_compColorCache[name]) {
        const idx = Object.keys(_compColorCache).length % COMP_PALETTE.length;
        _compColorCache[name] = COMP_PALETTE[idx];
    }
    return _compColorCache[name];
}
const MENTION_TYPE_LABELS = {
    'currently_using': 'Currently Using',
    'switching_from': 'Switching From',
    'evaluated': 'Evaluated',
    'asked_about': 'Asked About',
    'compared_to': 'Compared To'
};

let activeCompTypeFilter = null; // null = show all
let activeCompNameFilters = new Set(); // empty = show all
let compAllExpanded = false; // false = not all expanded (initial: top 3 open); toggled by button
let compExpandUserSet = false; // true once user clicks expand/collapse toggle

// ---- Competitor filter dropdowns ----
function buildCompFilterDropdown(allCompNames) {
    const sorted = [...allCompNames].sort();
    const panel = document.getElementById('comp-filter-panel');
    let html = '<div class="dd-item selected" data-val="__all__" onclick="selectCompFilter(this)"><span class="dd-check">&#10003;</span>All Competitors</div>';
    html += '<div class="dd-sep"></div>';
    sorted.forEach(name => {
        const sel = activeCompNameFilters.size === 0 || activeCompNameFilters.has(name.toLowerCase());
        html += '<div class="dd-item' + (sel && activeCompNameFilters.size > 0 ? ' selected' : '') + '" data-val="' + esc(name) + '" onclick="selectCompFilter(this)">' +
            '<span class="dd-check">&#10003;</span>' + esc(name) + '</div>';
    });
    panel.innerHTML = html;
    syncCompFilterLabel();
}

function selectCompFilter(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeCompNameFilters.clear();
        document.querySelectorAll('#comp-filter-panel .dd-item').forEach(d => {
            d.classList.toggle('selected', d.dataset.val === '__all__');
        });
    } else {
        document.querySelector('#comp-filter-panel .dd-item[data-val="__all__"]').classList.remove('selected');
        el.classList.toggle('selected');
        const name = val.toLowerCase();
        if (el.classList.contains('selected')) {
            activeCompNameFilters.add(name);
        } else {
            activeCompNameFilters.delete(name);
        }
        if (activeCompNameFilters.size === 0) {
            document.querySelector('#comp-filter-panel .dd-item[data-val="__all__"]').classList.add('selected');
        }
    }
    syncCompFilterLabel();
    buildCompetitors();
}

function syncCompFilterLabel() {
    const label = document.getElementById('comp-filter-label');
    const btn = document.querySelector('#comp-filter-dd .dd-btn');
    if (activeCompNameFilters.size === 0) {
        label.textContent = 'Competitors';
        btn.classList.remove('has-filter');
    } else {
        label.textContent = activeCompNameFilters.size + ' selected';
        btn.classList.add('has-filter');
    }
}

function buildCompTypeDropdown(availableTypes) {
    const panel = document.getElementById('comp-type-panel');
    const ALL_COMP_TYPES = ['direct', 'lms', 'diy', 'adjacent', 'marketplace'];
    let html = '<div class="dd-item' + (!activeCompTypeFilter ? ' selected' : '') + '" data-val="__all__" onclick="selectCompType(this)"><span class="dd-check">&#10003;</span>All Types</div>';
    html += '<div class="dd-sep"></div>';
    ALL_COMP_TYPES.forEach(t => {
        const label = t === 'lms' ? 'LMS' : t === 'diy' ? 'DIY' : t.charAt(0).toUpperCase() + t.slice(1);
        const sel = activeCompTypeFilter === t;
        const dimmed = !availableTypes.has(t) ? ' style="opacity:0.4"' : '';
        html += '<div class="dd-item' + (sel ? ' selected' : '') + '" data-val="' + esc(t) + '" onclick="selectCompType(this)"' + dimmed + '>' +
            '<span class="dd-check">&#10003;</span>' + esc(label) + '</div>';
    });
    // Add "Unrecognized" option
    const hasUnrecognized = availableTypes.has('unknown');
    html += '<div class="dd-item' + (activeCompTypeFilter === 'unknown' ? ' selected' : '') + '" data-val="unknown" onclick="selectCompType(this)"' + (!hasUnrecognized ? ' style="opacity:0.4"' : '') + '>' +
        '<span class="dd-check">&#10003;</span>Unrecognized</div>';
    panel.innerHTML = html;
    syncCompTypeLabel();
}

function selectCompType(el) {
    const val = el.dataset.val;
    if (val === '__all__') {
        activeCompTypeFilter = null;
    } else {
        activeCompTypeFilter = (activeCompTypeFilter === val) ? null : val;
    }
    document.querySelectorAll('#comp-type-panel .dd-item').forEach(d => {
        if (d.dataset.val === '__all__') {

function toggleCompCard(el) {
